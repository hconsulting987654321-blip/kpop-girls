<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Pop Star Academy — OG Image</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: #1a1028;
  font-family: 'Segoe UI', sans-serif;
}
.card {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #ff6fd8, #b44dff, #6c5ce7, #ff6fd8);
  background-size: 400% 400%;
  animation: gradShift 6s ease infinite;
  border-radius: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px;
  position: relative;
  overflow: hidden;
}
@keyframes gradShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 50%);
  pointer-events: none;
}
.title {
  font-size: 72px;
  font-weight: 800;
  color: white;
  text-shadow: 0 4px 30px rgba(0,0,0,0.3);
  text-align: center;
  line-height: 1.1;
  z-index: 1;
}
.subtitle {
  font-size: 36px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  margin-top: 16px;
  text-shadow: 0 2px 15px rgba(0,0,0,0.2);
  z-index: 1;
}
.games {
  font-size: 48px;
  margin-top: 30px;
  z-index: 1;
  letter-spacing: 8px;
}
.school {
  position: absolute;
  bottom: 40px;
  font-size: 22px;
  color: rgba(255,255,255,0.7);
  font-weight: 600;
  letter-spacing: 2px;
  z-index: 1;
}
.stars {
  position: absolute;
  font-size: 24px;
  opacity: 0.3;
  z-index: 0;
}
.stars.s1 { top: 40px; left: 60px; }
.stars.s2 { top: 80px; right: 100px; }
.stars.s3 { bottom: 100px; left: 120px; }
.stars.s4 { bottom: 60px; right: 80px; }
</style>
</head>
<body>
<div class="card">
  <span class="stars s1">&#10022; &#10022; &#10022;</span>
  <span class="stars s2">&#10022; &#10022;</span>
  <span class="stars s3">&#10022; &#10022;</span>
  <span class="stars s4">&#10022; &#10022; &#10022;</span>
  <div class="title">K-Pop Star Academy</div>
  <div class="subtitle">10 Mini-Jeux Gratuits</div>
  <div class="games">&#x1F3B6; &#x1F3A4; &#x1F9E9; &#x1F3A8; &#x1F4AB; &#x2753; &#x1F457; &#x1F0CF; &#x2B50; &#x1F3B5;</div>
  <div class="school">&#x1F3EB; K-Pop Star Academy</div>
</div>
</body>
</html>
