body{
  background:linear-gradient(135deg,#0f0c29,#1a1a4e,#302b63,#0f0c29);
  background-size:400% 400%;
  animation:gradientShift 15s ease infinite, pageEnter 0.6s ease-out;
  min-height:100vh;
  font-family:'Quicksand',sans-serif;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* HUD */
.hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  gap:18px;padding:10px 16px;
  color:#fff;font-size:1em;font-weight:700;z-index:50;
  background:linear-gradient(180deg,rgba(0,0,0,0.5),transparent);
  pointer-events:none;
}
.hud-item{display:flex;align-items:center;gap:5px;white-space:nowrap}
.hud .score-val{color:#ffd700;font-size:1.2em}
.hud .combo-val{color:#ff6fd8;font-size:0.9em;opacity:0;transition:opacity 0.3s}
.hud .combo-val.active{opacity:1}
.hud .lives-container{display:flex;gap:2px}
.hud .life-heart{display:inline-block;font-size:1.1em;transition:transform 0.3s}
.hud .life-heart.pulse{animation:heartPulse 0.6s ease}
.hud .time-val{color:#4ecdc4;font-size:1.1em}
.hud .player-name{color:#cd77ff;font-size:0.9em}
.hud .powerup-ind{font-size:0.85em;opacity:0;transition:opacity 0.3s}
.hud .powerup-ind.active{opacity:1;animation:powerGlow 1s infinite}
.hud .items-count{color:rgba(255,255,255,0.6);font-size:0.85em}
@keyframes heartPulse{
  0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}
}
@keyframes powerGlow{
  0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}
}

/* Progress bar */
.progress-bar{
  position:fixed;top:48px;left:50%;transform:translateX(-50%);
  width:min(300px,60vw);height:8px;
  background:rgba(255,255,255,0.1);border-radius:4px;
  z-index:50;overflow:hidden;
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#ff6fd8,#ffd700);
  border-radius:4px;transition:width 0.3s;
}

#gameCanvas{display:block;width:100vw;height:100vh}

/* Overlays */
.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(10,8,30,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(8px);
  animation:fadeIn 0.4s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.overlay.hidden{display:none}
.overlay h2{
  font-size:2.2em;color:#fff;margin-bottom:8px;
  text-shadow:0 0 30px #ff6fd8,0 0 60px rgba(255,111,216,0.3);

}
.overlay .subtitle{

}
.overlay p{color:rgba(255,255,255,0.8);font-size:1.05em;margin:4px 0}
.big-num{

  text-shadow:0 0 30px rgba(255,215,0,0.5);margin:8px 0;

/* Player select */
.player-select{display:flex;gap:10px;margin:12px 0}
.player-btn{
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(255,255,255,0.2);
  color:#fff;padding:10px 24px;border-radius:25px;
  font-family:inherit;font-size:1.05em;font-weight:600;
  cursor:pointer;transition:all 0.3s;
}
.player-btn:hover,.player-btn.active{
  background:linear-gradient(145deg,rgba(255,111,216,0.25),rgba(205,119,255,0.25));

}

/* Mode select */
.mode-select{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap;justify-content:center}
.mode-btn{

.items-legend{

/* Screen flash */
.screen-flash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:60;opacity:0;
  transition:opacity 0.1s;
}
.screen-flash.active{opacity:1;transition:opacity 0s}

/* Power-up border glow */
.powerup-border{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:55;opacity:0;
  transition:opacity 0.4s;
}
.powerup-border.active{opacity:1}

/* Last 10 seconds border */
.danger-border{

.danger-border.active{

@keyframes dangerPulse{

/* High score banner */
.hs-banner{
  position:fixed;top:-80px;left:0;right:0;

/* End screen stats */

/* Items breakdown */
.items-breakdown{

/* High score badge */
.hs-badge{

.hs-badge.show{display:inline-block;animation:popIn 0.5s ease}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.share-row{display:flex;gap:10px;justify-content:center;margin-top:15px}
.share-btn{padding:10px 20px;border-radius:25px;border:none;font-family:inherit;font-size:1em;font-weight:600;cursor:pointer;transition:transform .2s}
.share-btn:hover{transform:scale(1.05)}
.share-whatsapp{background:#25D366;color:white}
.share-copy{background:rgba(255,255,255,0.2);color:white;border:2px solid rgba(255,255,255,0.3)}
.share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#25D366;color:white;padding:10px 25px;border-radius:25px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.share-toast.show{opacity:1}

/* === AAA MOBILE EFFECTS === */
@keyframes emojiRain {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
@keyframes flashOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

<script>
// ===== AUDIO ENGINE =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.15) {
  try {
    const ac = getAudioCtx();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = freq; o.type = type;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}

// Musical notes for combos (C major pentatonic ascending)
const COMBO_NOTES = [523, 587, 659, 784, 880, 988, 1047, 1175, 1319];

function playCatchSound(comboCount, points) {
  const idx = Math.min(comboCount, COMBO_NOTES.length - 1);
  playTone(COMBO_NOTES[idx], 0.15, 'sine', 0.12);
  if (points >= 50) {
    setTimeout(() => playTone(COMBO_NOTES[idx] * 1.5, 0.2, 'triangle', 0.08), 50);
  }
}

function playBombWarning() {
  playTone(180, 0.3, 'sawtooth', 0.08);
}

function playBombHit() {
  playTone(120, 0.4, 'sawtooth', 0.15);
  setTimeout(() => playTone(80, 0.3, 'square', 0.1), 100);
}

function playPowerup() {
  playTone(600, 0.1, 'sine', 0.1);
  setTimeout(() => playTone(800, 0.1, 'sine', 0.1), 80);
  setTimeout(() => playTone(1000, 0.15, 'sine', 0.1), 160);
}

function playCelebration() {
  [0,100,200,300,400].forEach((d,i) => {
    setTimeout(() => playTone(600 + i*100, 0.15, 'sine', 0.1), d);
  });
}

function playRainbow() {
  [0,50,100,150,200,250,300].forEach((d,i) => {
    setTimeout(() => playTone(400 + i*120, 0.12, 'triangle', 0.08), d);
  });
}

function playHighScoreFanfare() {
  const notes = [523,659,784,1047,784,1047,1319];
  notes.forEach((n,i) => {
    setTimeout(() => playTone(n, 0.2, 'sine', 0.12), i * 120);
  });
}

function playNearMiss() {
  playTone(300, 0.08, 'triangle', 0.06);
}

// ===== CANVAS SETUP =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ===== BACKGROUNDS =====
const BACKGROUNDS = [
  { name:'night', top:'#0f0c29', mid:'#302b63', bot:'#24243e', starColor:'rgba(255,255,255,' },
  { name:'sunset', top:'#0f0c29', mid:'#614385', bot:'#516395', starColor:'rgba(255,220,180,' },
  { name:'rainbow', top:'#1a0533', mid:'#6b2fa0', bot:'#c94b4b', starColor:'rgba(255,200,255,' },
  { name:'space', top:'#000010', mid:'#0a001a', bot:'#1a0040', starColor:'rgba(200,220,255,' },
];

// ===== ITEM DEFINITIONS =====
const ITEMS_DEF = [
  { emoji:'⭐', points:10, weight:35, size:36, trail:'#ffd700' },
  { emoji:'🌟', points:15, weight:22, size:38, trail:'#fff3b0' },
  { emoji:'💖', points:20, weight:14, size:36, trail:'#ff6fd8' },
  { emoji:'💜', points:30, weight:8, size:36, trail:'#cd77ff' },
  { emoji:'👑', points:40, weight:4, size:40, trail:'#ffd700' },
  { emoji:'💎', points:50, weight:3.5, size:34, trail:'#4ecdc4' },
];

const BOMB = { emoji:'💣', points:-1, weight:5, size:36, trail:'#ff4444' };
const UNICORN = { emoji:'🦄', points:100, weight:0.5, size:44, trail:'#ff6fd8', rare:true };
const RAINBOW_ITEM = { emoji:'🌈', points:0, weight:0.3, size:44, trail:'#ff6fd8', isRainbow:true };

const POWERUPS = [
  { emoji:'🧲', type:'magnet', weight:1.5, size:36, trail:'#4ecdc4', duration:5000 },
  { emoji:'🛡️', type:'shield', weight:1.5, size:36, trail:'#4ecdc4', duration:0 },
  { emoji:'⏰', type:'time', weight:1.2, size:36, trail:'#4ecdc4', duration:0 },
  { emoji:'2️⃣', type:'double', weight:1.2, size:36, trail:'#ffd700', duration:8000 },
];

// Rare emojis for golden glow halo
const RARE_EMOJIS = ['💎','💜','👑','🦄','🌈'];

function getAllItems() {
  const all = [...ITEMS_DEF, BOMB, UNICORN, RAINBOW_ITEM, ...POWERUPS];
  return all;
}

// ===== GAME STATE =====
let currentPlayer = new URLSearchParams(location.search).get('player') || localStorage.getItem('kpop_player') || '';
if (currentPlayer) { document.getElementById('backBtn').href = 'index.html?player=' + encodeURIComponent(currentPlayer); }
let currentMode = '';
let score = 0;
let lives = 5;
let timeLeft = 50;
let gameRunning = false;
let items = [];
let particles = [];
let floatingTexts = [];
let basketTrail = [];
let bgStars = [];
let popRings = [];        // expanding ring effects
let comboFlashes = [];     // combo milestone screen flashes
let spawnSparkles = [];    // item spawn sparkle effects
let nearMisses = [];       // near-miss "!" popups

// Basket
let mouseX = 0, mouseY = 0;
let basketX = 0, basketY = 0;
let prevBasketX = 0;       // for 3D tilt
const BASKET_LERP = 0.12;
let baseBasketSize = 90;
let basketSize = 90;
let basketTilt = 0;        // current tilt angle

// Combo
let comboCount = 0;
let comboMultiplier = 1;
let bestCombo = 0;
let totalCatches = 0;

// Items caught breakdown
let itemsCaughtMap = {};

// Powerups
let magnetActive = false, magnetEnd = 0;
let shieldActive = false;
let doubleActive = false, doubleEnd = 0;

// Challenge mode
let wave = 1;
let waveItemsLeft = 0;
let waveItemsTotal = 0;
let wavePause = false;

// Spawn
let spawnRate = 900;
let spawnTimer = null;
let gameTimer = null;
let frame = null;

// Background - smooth transition
let currentBg = 0;
let targetBg = 0;
let bgBlend = 1; // 0=transitioning, 1=stable

// Level milestones for basket growth
let nextMilestone = 200;

// Slow motion
let slowMotionEnd = 0;
let slowMotionActive = false;

// Bomb warning
let bombWarningItems = [];

// High score banner shown flag
let hsBannerShown = false;

// ===== INIT BG STARS =====
for (let i = 0; i < 100; i++) {
  bgStars.push({
    x: Math.random() * 3000,
    y: Math.random() * 3000,
    size: Math.random() * 2.2 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: 0.01 + Math.random() * 0.025
  });
}

// ===== BEST SCORES DISPLAY =====
function updateBestScores() {
  const players = ['Ambre','Eden','Louise'];
  ['classic','infinite','challenge'].forEach(mode => {
    let best = 0;
    players.forEach(p => {
      const s = parseInt(localStorage.getItem('kpop_hs_stars_' + p + '_' + mode) || localStorage.getItem('kpop_hs_stars_' + p) || '0');
      if (s > best) best = s;
    });
    const el = document.getElementById('best' + mode.charAt(0).toUpperCase() + mode.slice(1));
    if (el) el.textContent = best > 0 ? ('Record: ' + best) : '';
  });
}
updateBestScores();

// ===== UI SETUP =====
document.querySelectorAll('.player-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPlayer = btn.dataset.player;
    document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('backBtn').href = 'index.html?player=' + encodeURIComponent(currentPlayer);
    checkReady();
    updateBestScoresForPlayer();
  });
});

function updateBestScoresForPlayer() {
  if (!currentPlayer) return;

// ===== CHALLENGE WAVES =====
function startWave(num) {
  wave = num;
  waveItemsTotal = 10 + (num - 1) * 5;
  waveItemsLeft = waveItemsTotal;
  wavePause = false;
  spawnRate = Math.max(300, 900 - (num - 1) * 60);
  scheduleSpawn();
}

function checkWaveComplete() {
  if (currentMode !== 'challenge') return;
  if (waveItemsLeft <= 0 && items.length === 0 && !wavePause) {
    wavePause = true;
    clearTimeout(spawnTimer);
    // Short pause then next wave
    addFloatingText(W/2, H/2, `Vague ${wave} terminee !`, '#4ecdc4', 2.5);
    playCelebration();
    setTimeout(() => {
      if (gameRunning) startWave(wave + 1);
    }, 2000);
  }
}

// ===== SPAWNING =====
function scheduleSpawn() {
  if (!gameRunning) return;
  spawnTimer = setTimeout(() => {
    if (!gameRunning || wavePause) return;
    spawnItem();
    if (currentMode === 'challenge') {
      waveItemsLeft--;
      if (waveItemsLeft > 0) scheduleSpawn();
    } else {
      // Speed up over time in classic
      if (currentMode === 'classic') {
        spawnRate = Math.max(400, 850 - (50 - timeLeft) * 8);
      }
      scheduleSpawn();
    }
  }, spawnRate + (Math.random() - 0.5) * 200);
}

function spawnItem() {
  const allItems = getAllItems();
  // Adjust bomb weight based on mode
  const adjusted = allItems.map(it => {
    let w = it.weight;
    if (it.points === -1) {
      w = currentMode === 'challenge' ? 3 + wave * 0.5 : 5;
    }
    // In challenge, increase difficulty
    if (currentMode === 'challenge' && it.rare) {
      w = Math.max(0.2, it.weight - wave * 0.05);
    }
    return { ...it, w };
  });

  const totalWeight = adjusted.reduce((s, i) => s + i.w, 0);
  let r = Math.random() * totalWeight;
  let chosen = adjusted[0];
  for (const item of adjusted) {
    r -= item.w;
    if (r <= 0) { chosen = item; break; }
  }

  const baseSpeed = currentMode === 'challenge' ?
    1.8 + wave * 0.25 + Math.random() * 1.2 :
    currentMode === 'classic' ?
      1.5 + Math.random() * 1.2 + (50 - timeLeft) * 0.035 :
      1.5 + Math.random() * 1.2 + Math.min(totalCatches * 0.01, 2);

  const spawnX = 50 + Math.random() * (W - 100);
  const spawnY = -50;

  items.push({
    x: spawnX,
    y: spawnY,
    emoji: chosen.emoji,
    points: chosen.points || 0,
    type: chosen.type || null,
    isRainbow: chosen.isRainbow || false,
    rare: chosen.rare || false,
    size: chosen.size || 36,
    speed: baseSpeed,
    trail: chosen.trail || '#fff',
    duration: chosen.duration || 0,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.02 + Math.random() * 0.03,
    rotation: 0,
    rotSpeed: (Math.random() - 0.5) * 0.06,
    trailPositions: [],
    warned: false,
    spawnTime: Date.now(),
    spawnAnim: 1.0  // sparkle-in animation progress
  });

  // Spawn sparkle effect
  createSpawnSparkle(spawnX, spawnY + 50, chosen.trail || '#ffd700');
}

}

// ===== CATCH LOGIC =====
function catchItem(item, drawX) {
  const ix = drawX, iy = item.y;

  // Pop ring on every catch
  createPopRing(ix, iy, item.trail || '#ffd700');

  // BOMB
  if (item.points === -1) {
    if (shieldActive) {
      shieldActive = false;
      addFloatingText(ix, iy, 'Bouclier !', '#4ecdc4');
      createParticles(ix, iy, '#4ecdc4', 10);
      playTone(500, 0.2, 'triangle', 0.1);
      updateHUD();
      return;
    }
    lives--;
    comboCount = 0;
    comboMultiplier = 1;
    updateHUD();
    createParticles(ix, iy, '#ff4444', 12);
    createEmojiParticles(ix, iy, '💥', 4);
    addFloatingText(ix, iy, '-1 Vie', '#ff4444');
    flashScreen('rgba(255,0,0,0.25)', 200);
    playBombHit();
    pulseHearts();
    if (lives <= 0) endGame();
    return;
  }

  // RAINBOW - catch everything on screen
  if (item.isRainbow) {
    playRainbow();
    flashScreen('rgba(255,200,255,0.3)', 300);
    addFloatingText(ix, iy, 'RAINBOW !', '#ff6fd8', 2);
    createParticles(ix, iy, '#ff6fd8', 20, true);
    trackItem('🌈');
    // Catch all non-bomb items
    for (let j = items.length - 1; j >= 0; j--) {
      const other = items[j];
      if (other === item) continue;
      if (other.points === -1) continue;
      const pts = other.points > 0 ? other.points : 10;
      score += pts * comboMultiplier;
      totalCatches++;
      trackItem(other.emoji);
      createParticles(other.x, other.y, other.trail || '#ffd700', 6);
      createPopRing(other.x, other.y, other.trail || '#ffd700');
      addFloatingText(other.x, other.y, '+' + (pts * comboMultiplier), '#ffd700');
      items.splice(j, 1);
    }
    updateHUD();
    return;
  }

  // POWERUPS
  if (item.type) {
    playPowerup();
    createParticles(ix, iy, '#4ecdc4', 12, true);
    trackItem(item.emoji);
    if (item.type === 'magnet') {
      magnetActive = true;
      magnetEnd = Date.now() + 5000;
      addFloatingText(ix, iy, 'Aimant !', '#4ecdc4');
    } else if (item.type === 'shield') {
      shieldActive = true;
      addFloatingText(ix, iy, 'Bouclier !', '#4ecdc4');
    } else if (item.type === 'time') {
      if (currentMode === 'classic') {
        timeLeft += 10;
        addFloatingText(ix, iy, '+10s !', '#4ecdc4');
      } else {
        lives = Math.min(lives + 1, 7);
        addFloatingText(ix, iy, '+1 Vie !', '#ff6b6b');
      }
    } else if (item.type === 'double') {
      doubleActive = true;
      doubleEnd = Date.now() + 8000;
      addFloatingText(ix, iy, 'x2 Points !', '#ffd700');
    }
    updateHUD();
    return;
  }

  // REGULAR or RARE ITEM
  totalCatches++;
  comboCount++;
  if (comboCount > bestCombo) bestCombo = comboCount;
  trackItem(item.emoji);

  // Combo multiplier: every 5 catches
  if (comboCount >= 5) {
    comboMultiplier = 1 + Math.floor(comboCount / 5);
  } else {
    comboMultiplier = 1;
  }

  // Combo milestones: 5x, 10x, 15x...
  if (comboCount > 0 && comboCount % 5 === 0) {
    createComboFlash(comboMultiplier);
    addFloatingText(W/2, H * 0.3, 'COMBO x' + comboMultiplier + ' !', '#ffd700', 2);
    playCelebration();
  }

  let pts = item.points * comboMultiplier;
  if (doubleActive) pts *= 2;
  score += pts;

  // Big catch slow motion (30+ points before multipliers)
  if (item.points >= 30) {
    triggerSlowMotion(100);
  }

  // Floating score text
  const ptText = '+' + pts + (comboMultiplier > 1 ? ' x' + comboMultiplier : '') + (doubleActive ? ' x2' : '');
  addFloatingText(ix, iy, ptText, item.rare ? '#ff6fd8' : '#ffd700');

  // Particles (bigger for rarer)
  const pCount = item.rare ? 20 : item.points >= 40 ? 14 : 8;
  createParticles(ix, iy, item.trail, pCount, item.rare);
  createEmojiParticles(ix, iy, item.emoji, item.rare ? 6 : 3);

  // Rare item flash
  if (item.rare) {
    flashScreen('rgba(255,111,216,0.2)', 250);
    playCelebration();
  }

  // Sound
  playCatchSound(Math.min(comboCount - 1, 8), item.points);

  // Basket growth at milestones
  if (score >= nextMilestone) {
    basketSize = Math.min(baseBasketSize + 30, basketSize + 4);
    nextMilestone += 200;
    addFloatingText(basketX, basketY - 40, 'Panier agrandi !', '#4ecdc4');
  }

  // Background progression (smooth blend)
  const bgIdx = Math.min(BACKGROUNDS.length - 1, Math.floor(score / 300));
  if (bgIdx !== targetBg) {
    targetBg = bgIdx;
    bgBlend = 0; // start transition
  }

  updateHUD();
}

// Track items caught for breakdown
function trackItem(emoji) {
  if (!itemsCaughtMap[emoji]) itemsCaughtMap[emoji] = 0;
  itemsCaughtMap[emoji]++;
}

// ===== HELPER: Parse hex color =====
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lerpColor(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  const r = Math.round(a.r + (b.r - a.r) * t);
  const g = Math.round(a.g + (b.g - a.g) * t);
  const bl = Math.round(a.b + (b.b - a.b) * t);
  return `rgb(${r},${g},${bl})`;
}

// ===== RENDER =====
function render() {
  frame = requestAnimationFrame(render);
  const now = Date.now();

  // Slow motion factor
  const speedFactor = (slowMotionActive && now < slowMotionEnd) ? 0.3 : 1;
  if (slowMotionActive && now >= slowMotionEnd) slowMotionActive = false;

  ctx.clearRect(0, 0, W, H);

  // Background - smooth color blend between backgrounds
  bgBlend = Math.min(1, bgBlend + 0.008);
  const fromBg = BACKGROUNDS[currentBg];
  const toBg = BACKGROUNDS[targetBg];

  if (bgBlend < 1 && currentBg !== targetBg) {
    // Blend between two backgrounds
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, lerpColor(fromBg.top, toBg.top, bgBlend));
    grad.addColorStop(0.5, lerpColor(fromBg.mid, toBg.mid, bgBlend));
    grad.addColorStop(1, lerpColor(fromBg.bot, toBg.bot, bgBlend));
    ctx.fillStyle = grad;
  } else {
    if (currentBg !== targetBg) currentBg = targetBg;
    const bg = BACKGROUNDS[currentBg];
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, bg.top);
    grad.addColorStop(0.5, bg.mid);
    grad.addColorStop(1, bg.bot);
    ctx.fillStyle = grad;
  }
  ctx.fillRect(0, 0, W, H);

  // Stars
  const activeBg = BACKGROUNDS[currentBg];
  bgStars.forEach(s => {
    s.twinkle += s.twinkleSpeed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.35;
    ctx.fillStyle = activeBg.starColor + alpha + ')';
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.size, 0, Math.PI * 2);
    ctx.fill();
  });

  if (!gameRunning && items.length === 0 && particles.length === 0 && floatingTexts.length === 0) return;

  // Powerup timers
  if (magnetActive && now > magnetEnd) magnetActive = false;
  if (doubleActive && now > doubleEnd) { doubleActive = false; updateHUD(); }

  // Smooth basket movement
  prevBasketX = basketX;
  basketX += (mouseX - basketX) * BASKET_LERP;
  basketY += (mouseY - basketY) * BASKET_LERP;

  // 3D tilt based on movement direction
  const basketDeltaX = basketX - prevBasketX;
  const targetTilt = Math.max(-0.25, Math.min(0.25, basketDeltaX * 0.02));
  basketTilt += (targetTilt - basketTilt) * 0.15;

  // Keep basket in bounds
  basketX = Math.max(basketSize/2, Math.min(W - basketSize/2, basketX));
  basketY = Math.max(basketSize/2, Math.min(H - basketSize/2, basketY));

  // Basket trail
  basketTrail.push({ x: basketX, y: basketY, life: 1 });
  if (basketTrail.length > 12) basketTrail.shift();

  // Draw basket trail (stars)
  for (let i = 0; i < basketTrail.length; i++) {
    const t = basketTrail[i];
    t.life -= 0.08;
    if (t.life <= 0) { basketTrail.splice(i, 1); i--; continue; }
    ctx.globalAlpha = t.life * 0.3;
    ctx.font = `${12 + t.life * 6}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✨', t.x, t.y + basketSize * 0.2);
    ctx.globalAlpha = 1;
  }

  // Draw basket with 3D tilt
  ctx.save();
  ctx.translate(basketX, basketY);
  ctx.transform(1, 0, basketTilt, 1 - Math.abs(basketTilt) * 0.15, 0, 0);
  ctx.font = `${basketSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🧺', 0, 0);
  ctx.restore();

  // Shield indicator
  if (shieldActive) {
    ctx.strokeStyle = 'rgba(78,205,196,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(basketX, basketY, basketSize * 0.65, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(78,205,196,0.2)';
    ctx.lineWidth = 6;
    ctx.stroke();
  }

  // Magnet indicator
  if (magnetActive) {
    ctx.strokeStyle = 'rgba(255,111,216,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.arc(basketX, basketY, basketSize * 2.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Glow under basket
  const glow = ctx.createRadialGradient(basketX, basketY, 10, basketX, basketY, basketSize * 0.9);
  glow.addColorStop(0, shieldActive ? 'rgba(78,205,196,0.12)' : 'rgba(255,111,216,0.12)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(basketX - basketSize, basketY - basketSize, basketSize * 2, basketSize * 2);

  // Player name under basket
  if (gameRunning) {
    ctx.font = '600 13px Quicksand';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.textAlign = 'center';
    ctx.fillText(currentPlayer, basketX, basketY + basketSize * 0.65);
  }

  // Update and draw items
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];

    // Magnet attraction
    if (magnetActive && item.points !== -1 && !item.type && !item.isRainbow) {
      const dx = basketX - item.x;
      const dy = basketY - item.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < basketSize * 2.5 && dist > 5) {
        item.x += (dx / dist) * 3;
        item.y += (dy / dist) * 2;
      }
    }

    item.y += item.speed * speedFactor;
    item.wobble += item.wobbleSpeed * speedFactor;
    item.rotation += item.rotSpeed * speedFactor;
    const drawX = item.x + Math.sin(item.wobble) * 18;

    // Spawn animation (sparkle in - scale from 0 to 1)
    item.spawnAnim = Math.min(1, item.spawnAnim + 0.05);
    const spawnScale = item.spawnAnim < 1 ?
      (0.3 + 0.7 * easeOutBack(item.spawnAnim)) : 1;

    // Store trail positions
    item.trailPositions.push({ x: drawX, y: item.y });
    if (item.trailPositions.length > 6) item.trailPositions.shift();

    // Draw trail
    for (let t = 0; t < item.trailPositions.length - 1; t++) {
      const tp = item.trailPositions[t];
      const alpha = (t / item.trailPositions.length) * 0.25;
      ctx.globalAlpha = alpha;
      ctx.font = `${item.size * 0.6}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.emoji, tp.x, tp.y);
    }
    ctx.globalAlpha = 1;

    // Golden glow halo for rare items
    if (RARE_EMOJIS.includes(item.emoji)) {
      const glowRadius = item.size * 1.2;
      const haloGlow = ctx.createRadialGradient(drawX, item.y, 0, drawX, item.y, glowRadius);
      const pulse = 0.3 + Math.sin(now * 0.005 + i) * 0.15;
      haloGlow.addColorStop(0, `rgba(255,215,0,${pulse})`);
      haloGlow.addColorStop(0.5, `rgba(255,180,0,${pulse * 0.4})`);
      haloGlow.addColorStop(1, 'rgba(255,215,0,0)');
      ctx.fillStyle = haloGlow;
      ctx.beginPath();
      ctx.arc(drawX, item.y, glowRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw item with spawn scale
    ctx.save();
    ctx.translate(drawX, item.y);
    ctx.rotate(item.rotation);
    ctx.scale(spawnScale, spawnScale);
    ctx.font = `${item.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Rare item glow
    if (item.rare || item.isRainbow) {
      ctx.shadowColor = item.trail;
      ctx.shadowBlur = 20;
    }
    ctx.fillText(item.emoji, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Spawn sparkle burst (star lines radiating outward)
    if (item.spawnAnim < 0.6) {
      const sparkAlpha = 1 - item.spawnAnim / 0.6;
      ctx.globalAlpha = sparkAlpha * 0.6;
      ctx.strokeStyle = item.trail || '#ffd700';
      ctx.lineWidth = 1.5;
      const spokes = 6;
      const sparkRadius = item.size * (0.5 + item.spawnAnim * 2);
      for (let s = 0; s < spokes; s++) {
        const a = (Math.PI * 2 / spokes) * s + item.rotation;
        ctx.beginPath();
        ctx.moveTo(drawX + Math.cos(a) * item.size * 0.3, item.y + Math.sin(a) * item.size * 0.3);
        ctx.lineTo(drawX + Math.cos(a) * sparkRadius, item.y + Math.sin(a) * sparkRadius);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    // Bomb warning when near basket
    if (item.points === -1 && item.y > basketY - H * 0.35 && !item.warned) {
      item.warned = true;
      playBombWarning();
    }

    // Collision check (generous hitbox)
    const cdx = drawX - basketX;
    const cdy = item.y - basketY;
    const dist = Math.sqrt(cdx*cdx + cdy*cdy);

    if (dist < basketSize * 0.8) {
      catchItem(item, drawX);
      items.splice(i, 1);
      continue;
    }

    // Near-miss detection for non-bomb items
    if (item.points > 0 && !item.type && !item.isRainbow) {
      if (item.y > basketY + basketSize * 0.5 && item.y < basketY + basketSize * 1.2) {
        const horizDist = Math.abs(drawX - basketX);
        if (horizDist < basketSize * 1.3 && horizDist > basketSize * 0.6) {
          if (!item._nearMissShown) {
            item._nearMissShown = true;
            nearMisses.push({
              x: drawX, y: item.y - 20,
              life: 0.8,
              text: '!',
              color: '#ffaa00'
            });
            playNearMiss();
          }
        }
      }
    }

    // Near-miss for bombs (dodged)
    if (item.points === -1 && item.y > H + 10 && !item._bombDodgeShown) {
      item._bombDodgeShown = true;
      const bdx = Math.abs(item.x - basketX);
      if (bdx < basketSize * 2) {
        nearMisses.push({
          x: basketX, y: basketY - basketSize * 0.8,
          life: 1.2,
          text: 'Ouf !',
          color: '#4ecdc4'
        });
        playTone(700, 0.1, 'sine', 0.08);
      }
    }

    // Missed item - off screen bottom
    if (item.y > H + 60) {
      // Missing a catchable item breaks combo
      if (item.points > 0 && !item.type && !item.isRainbow) {
        comboCount = 0;
        comboMultiplier = 1;
        updateHUD();
      }
      items.splice(i, 1);
    }
  }

  // Check wave completion
  if (currentMode === 'challenge') checkWaveComplete();

  // Pop rings
  for (let i = popRings.length - 1; i >= 0; i--) {
    const pr = popRings[i];
    pr.radius += (pr.maxRadius - pr.radius) * 0.15;
    pr.life -= 0.04;
    if (pr.life <= 0) { popRings.splice(i, 1); continue; }
    ctx.globalAlpha = pr.life * 0.6;
    ctx.strokeStyle = pr.color;
    ctx.lineWidth = pr.lineWidth * pr.life;
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, pr.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Combo milestone flashes (radial gradient from center)
  for (let i = comboFlashes.length - 1; i >= 0; i--) {
    const cf = comboFlashes[i];
    cf.radius += (cf.maxRadius - cf.radius) * 0.08;
    cf.life -= 0.02;
    if (cf.life <= 0) { comboFlashes.splice(i, 1); continue; }
    const flashGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, cf.radius);
    flashGrad.addColorStop(0, cf.color + (cf.life * 0.3) + ')');
    flashGrad.addColorStop(0.7, cf.color + (cf.life * 0.1) + ')');
    flashGrad.addColorStop(1, cf.color + '0)');
    ctx.fillStyle = flashGrad;
    ctx.fillRect(0, 0, W, H);
  }

  // Spawn sparkles
  for (let i = spawnSparkles.length - 1; i >= 0; i--) {
    const sp = spawnSparkles[i];
    sp.dist += (sp.maxDist - sp.dist) * 0.12;
    sp.life -= 0.04;
    if (sp.life <= 0) { spawnSparkles.splice(i, 1); continue; }
    const sx = sp.x + Math.cos(sp.angle) * sp.dist;
    const sy = sp.y + Math.sin(sp.angle) * sp.dist;
    ctx.globalAlpha = sp.life * 0.8;
    ctx.fillStyle = sp.color;
    ctx.beginPath();
    ctx.arc(sx, sy, sp.size * sp.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Near-miss popups
  for (let i = nearMisses.length - 1; i >= 0; i--) {
    const nm = nearMisses[i];
    nm.y -= 1.5;
    nm.life -= 0.025;
    if (nm.life <= 0) { nearMisses.splice(i, 1); continue; }
    const alpha = Math.min(1, nm.life * 2);
    const scale = 0.8 + nm.life * 0.6;
    ctx.globalAlpha = alpha;
    ctx.font = `800 ${22 * scale}px Quicksand`;
    ctx.textAlign = 'center';
    ctx.fillStyle = nm.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 3;
    ctx.strokeText(nm.text, nm.x, nm.y);
    ctx.fillText(nm.text, nm.x, nm.y);
    ctx.globalAlpha = 1;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * speedFactor;
    p.y += p.vy * speedFactor;
    p.vy += 0.15 * speedFactor;
    p.life -= 0.025 * speedFactor;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    ctx.globalAlpha = p.life;
    if (p.type === 'emoji') {
      ctx.font = `${p.size * p.life}px serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.emoji, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy * speedFactor;
    ft.vy *= 0.98;
    ft.life -= 0.016 * speedFactor;
    if (ft.life <= 0) { floatingTexts.splice(i, 1); continue; }

    const alpha = Math.min(1, ft.life / (ft.maxLife * 0.3));
    const scale = 0.8 + (ft.life / ft.maxLife) * 0.4;
    ctx.globalAlpha = alpha;
    ctx.font = `800 ${18 * scale}px Quicksand`;
    ctx.textAlign = 'center';
    ctx.fillStyle = ft.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 3;
    ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }

  // Last 10 seconds: heartbeat screen pulse on canvas
  if (currentMode === 'classic' && timeLeft >= 0 && timeLeft <= 10 && gameRunning) {
    const pulse = Math.sin(now * 0.008) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(255,0,0,${pulse * 0.06})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// Easing function for spawn animation
function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

// ===== END GAME =====
function endGame() {
  gameRunning = false;
  if (frame) { cancelAnimationFrame(frame); frame = null; }
  clearInterval(gameTimer);
  clearTimeout(spawnTimer);

  // Hide danger border
  document.getElementById('dangerBorder').classList.remove('active');
  document.getElementById('powerupBorder').classList.remove('active');

  // Save high score (per player + mode)
  const hsKey = 'kpop_hs_stars_' + currentPlayer + '_' + currentMode;
  const hsKeyLegacy = 'kpop_hs_stars_' + currentPlayer;
  const prevHS = Math.max(
    parseInt(localStorage.getItem(hsKey) || '0'),
    parseInt(localStorage.getItem(hsKeyLegacy) || '0')
  );
  const isNewHS = score > prevHS;
  if (isNewHS) {
    localStorage.setItem(hsKey, score);
    localStorage.setItem(hsKeyLegacy, score); // keep legacy key updated
  }

  // Save stars to global star counter
  const starsEarned = score >= 500 ? 5 : score >= 300 ? 4 : score >= 150 ? 3 : score >= 50 ? 2 : 1;
  let totalStarsCatch = parseInt(localStorage.getItem('kpop_stars_' + currentPlayer) || '0');
  totalStarsCatch += starsEarned;
  localStorage.setItem('kpop_stars_' + currentPlayer, String(totalStarsCatch));

  let title, msg;
  if (score >= 500) { title = 'LEGENDAIRE !!!'; msg = `${currentPlayer} est la QUEEN de la K-pop !!!`; }
  else if (score >= 300) { title = 'INCROYABLE !!'; msg = `${currentPlayer} est une vraie star !`; }
  else if (score >= 150) { title = 'Super !'; msg = `Bien joue ${currentPlayer} !`; }
  else if (score >= 50) { title = 'Pas mal !'; msg = `Continue ${currentPlayer}, tu peux faire mieux !`; }
  else { title = 'Oups !'; msg = `Essaie encore ${currentPlayer} !`; }

  if (isNewHS && score > 0) {
    playHighScoreFanfare();
    flashScreen('rgba(255,215,0,0.3)', 400);
    // Golden banner slides in
    const banner = document.getElementById('hsBanner');
    banner.textContent = `Nouveau Record : ${score} !`;
    banner.classList.add('show');
    hsBannerShown = true;
    setTimeout(() => banner.classList.remove('show'), 4000);
  }

  setTimeout(() => {
    document.getElementById('endTitle').textContent = title;
    document.getElementById('endScore').textContent = score;
    document.getElementById('endMsg').textContent = msg;
    document.getElementById('endCatches').textContent = totalCatches;
    document.getElementById('endCombo').textContent = bestCombo;
    document.getElementById('endWave').textContent = currentMode === 'challenge' ? wave : '-';

    // Items breakdown
    const bd = document.getElementById('itemsBreakdown');
    bd.innerHTML = '';
    const sortedItems = Object.entries(itemsCaughtMap).sort((a,b) => b[1] - a[1]);
    sortedItems.forEach(([emoji, count]) => {
      const span = document.createElement('span');
      span.className = 'ib-item';
      span.textContent = `${emoji} x${count}`;
      bd.appendChild(span);
    });

    const badge = document.getElementById('hsBadge');
    if (isNewHS && score > 0) {
      badge.classList.add('show');
      badge.textContent = `Nouveau Record : ${score} ! (avant: ${prevHS})`;
    } else {
      badge.classList.remove('show');
    }

    document.getElementById('endScreen').classList.remove('hidden');
    document.getElementById('hud').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
  }, 600);
}

  e.preventDefault();

  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;

  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}, { passive: false });

canvas.addEventListener('click', () => {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
});
