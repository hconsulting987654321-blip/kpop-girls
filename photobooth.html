<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photo Booth K-Pop — K-Pop Star Academy</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="description" content="Photo Booth K-Pop — Decore tes photos avec des stickers !">
<link rel="stylesheet" href="common.css">
<style>
:root{--pink:#ff6fd8;--purple:#b44dff;--gold:#ffd700;--dark:#0a0a1a;--glass:rgba(255,255,255,.08);--glass-border:rgba(255,255,255,.15)}
body{background:linear-gradient(135deg,var(--dark),#16213e,#0f3460);min-height:100vh;font-family:'Quicksand',sans-serif;overflow-x:hidden;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;color:#fff;display:flex;flex-direction:column;align-items:center;padding-bottom:24px}
.sound-toggle{position:fixed;top:10px;right:10px;background:var(--glass);color:#fff;border:2px solid var(--glass-border);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1em;z-index:200;backdrop-filter:blur(6px);transition:.3s;display:flex;align-items:center;justify-content:center}
.sound-toggle:hover{background:rgba(255,255,255,.25)}
.header{text-align:center;padding:14px 10px 4px;z-index:10}
.header h1{font-size:1.5em;text-shadow:0 0 25px var(--pink)}
.header .subtitle{font-size:.78em;color:rgba(255,255,255,.5);margin-top:2px}
.player-bar{display:flex;gap:16px;justify-content:center;align-items:center;font-size:.9em;padding:3px 0 8px}
.player-bar .name{color:var(--purple);font-weight:700}
.player-bar .stars-count{color:var(--gold)}
.glass{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:18px}
.main-layout{display:flex;gap:12px;padding:0 10px;width:100%;max-width:960px;flex-wrap:wrap;justify-content:center}
.left-panel{display:flex;flex-direction:column;gap:10px;flex:0 0 auto}
.right-panel{display:flex;flex-direction:column;gap:10px;flex:1;min-width:260px;max-width:440px}
.canvas-wrap{position:relative;width:340px;height:440px;border-radius:16px;overflow:hidden;border:3px solid rgba(255,255,255,.2);cursor:crosshair;flex-shrink:0}
.canvas-bg{position:absolute;inset:0;z-index:0;transition:background .5s}
.canvas-stickers{position:absolute;inset:0;z-index:2}
.canvas-frame{position:absolute;inset:0;z-index:3;pointer-events:none}
.canvas-filter{position:absolute;inset:0;z-index:4;pointer-events:none;mix-blend-mode:multiply;opacity:0;transition:opacity .4s}
.canvas-effects{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden}
.canvas-flash{position:absolute;inset:0;z-index:10;background:#fff;opacity:0;pointer-events:none;transition:opacity .15s}
.canvas-flash.active{opacity:1}
.placed-sticker{position:absolute;cursor:grab;touch-action:none;transition:filter .2s;z-index:1;display:flex;align-items:center;justify-content:center}
.placed-sticker.selected{filter:drop-shadow(0 0 8px var(--pink)) drop-shadow(0 0 16px var(--purple));outline:2px dashed rgba(255,111,216,.7);outline-offset:3px;border-radius:4px}
.placed-sticker.dragging{cursor:grabbing;opacity:.85}
.placed-sticker .sticker-content{pointer-events:none;white-space:nowrap}
.placed-sticker .text-sticker{font-family:'Quicksand',sans-serif;font-weight:800;text-shadow:0 0 8px var(--pink),2px 2px 0 #e91e8c;letter-spacing:1px}
.scenes-bar,.frames-bar,.filters-bar,.effects-bar,.templates-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:8px}
.scene-btn,.frame-btn{width:38px;height:38px;border-radius:10px;border:2px solid rgba(255,255,255,.15);cursor:pointer;font-size:1.1em;display:flex;align-items:center;justify-content:center;transition:.3s;background:rgba(255,255,255,.06)}
.scene-btn:hover,.scene-btn.active,.frame-btn:hover,.frame-btn.active{border-color:var(--pink);background:rgba(255,111,216,.15);transform:scale(1.1)}
.frame-btn{font-size:.75em;width:40px;height:40px;line-height:1.1;text-align:center}
.sticker-panel{padding:8px}
.sticker-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.sticker-tab{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15);cursor:pointer;font-size:.75em;transition:.3s;background:rgba(255,255,255,.05)}
.sticker-tab:hover,.sticker-tab.active{background:rgba(255,111,216,.2);border-color:var(--pink)}
.sticker-tab.locked{opacity:.5;position:relative}
.sticker-tab.locked::after{content:'🔒';position:absolute;right:-2px;top:-6px;font-size:.7em}
.sticker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;max-height:170px;overflow-y:auto;padding:4px}
.sticker-grid::-webkit-scrollbar{width:4px}
.sticker-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}
.sticker-item{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:1.4em;transition:.2s;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.sticker-item:hover{transform:scale(1.15);background:rgba(255,255,255,.12)}
.sticker-item:active{transform:scale(.9)}
.sticker-item.text-type{font-size:.55em;font-weight:800;color:var(--pink);text-shadow:0 0 6px rgba(255,111,216,.4)}
.controls-panel{padding:10px}
.control-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:.8em}
.control-row label{min-width:55px;color:rgba(255,255,255,.7)}
.control-row input[type=range]{flex:1;accent-color:var(--pink);height:6px}
.control-row .val{min-width:30px;text-align:right;color:var(--pink);font-weight:700;font-size:.85em}
.small-btn,.effect-btn,.filter-btn,.template-btn{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.15);cursor:pointer;font-size:.78em;transition:.3s;background:rgba(255,255,255,.05);color:#fff;font-family:inherit}
.small-btn:hover,.effect-btn:hover,.effect-btn.active,.filter-btn:hover,.filter-btn.active,.template-btn:hover{background:rgba(255,111,216,.2);border-color:var(--pink)}
.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;padding:8px}
.action-btn{padding:7px 15px;border-radius:30px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:.85em;transition:.3s;display:flex;align-items:center;gap:5px;color:#fff}
.action-btn:active{transform:scale(.93)}
.btn-photo{background:linear-gradient(135deg,var(--pink),#e91e8c);box-shadow:0 4px 15px rgba(255,111,216,.4)}
.btn-photo:hover{box-shadow:0 4px 25px rgba(255,111,216,.6)}
.btn-download{background:linear-gradient(135deg,var(--purple),#8a2be2);box-shadow:0 4px 15px rgba(180,77,255,.3)}
.btn-random{background:linear-gradient(135deg,var(--gold),#ff9500);color:var(--dark)}
.btn-undo{background:rgba(255,255,255,.1);border:1px solid var(--glass-border)}
.btn-redo{background:rgba(255,255,255,.1);border:1px solid var(--glass-border)}
.btn-clear{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
.btn-clear:hover{background:rgba(255,80,80,.2);border-color:#ff5050}
.btn-delete{background:rgba(255,60,60,.2);color:#ff6060;border:1px solid rgba(255,60,60,.3);padding:6px 14px;font-size:.8em}
.btn-delete:hover{background:rgba(255,60,60,.35)}
.text-input-row{display:flex;gap:6px;padding:4px 8px;align-items:center;flex-wrap:wrap}
.text-input-row input[type=text]{flex:1;min-width:100px;padding:5px 10px;border-radius:12px;border:1px solid var(--glass-border);background:rgba(255,255,255,.08);color:#fff;font-family:inherit;font-size:.85em;outline:none}
.text-input-row input[type=text]:focus{border-color:var(--pink)}
.text-input-row input[type=color]{width:32px;height:32px;border:none;border-radius:8px;cursor:pointer;background:transparent}
.text-input-row button{padding:5px 12px;border-radius:12px;border:1px solid var(--pink);background:rgba(255,111,216,.15);color:#fff;cursor:pointer;font-family:inherit;font-size:.8em;font-weight:700}
.gallery-section{width:100%;max-width:960px;padding:0 10px;margin-top:14px}
.gallery-title{font-size:1em;text-align:center;margin-bottom:8px;color:rgba(255,255,255,.7)}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.gallery-item{position:relative;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.12);aspect-ratio:340/440;cursor:pointer;transition:.3s}
.gallery-item:hover{border-color:var(--pink);transform:scale(1.03)}
.gallery-item canvas{width:100%;height:100%;display:block}
.gallery-item .gallery-delete{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.6);color:#ff6060;border:none;cursor:pointer;font-size:.7em;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.gallery-item:hover .gallery-delete{opacity:1}
.gallery-empty{text-align:center;color:rgba(255,255,255,.3);font-size:.85em;padding:20px;grid-column:1/-1}
.section-label{font-size:.72em;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;padding:6px 12px 2px;text-align:center}
.unlock-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,26,.95);border:2px solid var(--gold);border-radius:20px;padding:24px 32px;text-align:center;z-index:300;backdrop-filter:blur(10px);animation:popIn .4s ease}
.unlock-msg h3{color:var(--gold);margin-bottom:8px}
.unlock-msg p{font-size:.9em;margin-bottom:12px}
.unlock-msg button{padding:8px 20px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--gold),#ff9500);color:var(--dark);font-family:inherit;font-weight:700;cursor:pointer}
.frame-hearts{box-shadow:inset 0 0 0 12px rgba(255,111,216,.3);border-radius:14px}
.frame-stars{box-shadow:inset 0 0 0 12px rgba(255,215,0,.3);border-radius:14px}
.frame-flowers{box-shadow:inset 0 0 0 12px rgba(255,150,200,.3);border-radius:14px}
.frame-rainbow{box-shadow:inset 0 0 0 4px #ff0000,inset 0 0 0 8px #ff9900,inset 0 0 0 12px #ffff00,inset 0 0 0 16px #00cc00,inset 0 0 0 20px #0099ff,inset 0 0 0 24px #9933ff;border-radius:14px}
.frame-sparkle{box-shadow:inset 0 0 30px rgba(255,215,0,.4),inset 0 0 60px rgba(255,111,216,.2);border-radius:14px}
.frame-cloud{box-shadow:inset 0 0 40px rgba(255,255,255,.3),inset 0 0 80px rgba(200,220,255,.2);border-radius:14px}
.frame-neon{box-shadow:inset 0 0 0 3px var(--pink),inset 0 0 15px var(--pink),inset 0 0 30px rgba(255,111,216,.3);border-radius:14px}
.frame-gold{box-shadow:inset 0 0 0 6px var(--gold),inset 0 0 0 8px #b8860b,inset 0 0 20px rgba(255,215,0,.3);border-radius:14px}
.frame-purple{box-shadow:inset 0 0 0 8px rgba(180,77,255,.35),inset 0 0 25px rgba(180,77,255,.2);border-radius:14px}
@keyframes sparkleFloat{0%{transform:translateY(100%) rotate(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-20%) rotate(360deg);opacity:0}}
@keyframes heartRain{0%{transform:translateY(-10%) rotate(0);opacity:0}10%{opacity:.8}100%{transform:translateY(110%) rotate(25deg);opacity:0}}
@keyframes starBurst{0%{transform:scale(0) rotate(0);opacity:0}50%{opacity:1}100%{transform:scale(1.5) rotate(180deg);opacity:0}}
@keyframes snowFall{0%{transform:translateY(-10%) translateX(0);opacity:0}10%{opacity:.7}100%{transform:translateY(110%) translateX(30px);opacity:0}}
@keyframes confettiFall{0%{transform:translateY(-10%) rotate(0);opacity:0}10%{opacity:.9}100%{transform:translateY(110%) rotate(720deg);opacity:0}}
.effect-particle{position:absolute;pointer-events:none;font-size:1.2em}
@keyframes stickerPop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.sticker-pop{animation:stickerPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.7)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes bonusPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}60%{transform:translate(-50%,-80%) scale(1)}100%{opacity:0;transform:translate(-50%,-120%) scale(.8)}}
@media(max-width:680px){
  .main-layout{flex-direction:column;align-items:center}
  .canvas-wrap{width:min(340px,92vw);height:min(440px,calc(92vw*1.29))}
  .right-panel{max-width:340px;width:100%}
  .sticker-grid{max-height:140px}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
}
</style>
</head>
<body>
<a href="index.html" class="back-btn" id="backBtn">Retour</a>
<button class="sound-toggle" id="soundToggle" title="Son">🔊</button>

<div class="header">
  <h1>Photo Booth K-Pop</h1>
  <div class="subtitle">Decore tes photos avec des stickers !</div>
</div>
<div class="player-bar">
  <span class="name" id="playerName">Ambre</span>
  <span class="stars-count" id="starsCount">0</span>
</div>

<div class="main-layout">
  <div class="left-panel">
    <div class="canvas-wrap" id="canvasWrap">
      <div class="canvas-bg" id="canvasBg"></div>
      <div class="canvas-stickers" id="canvasStickers"></div>
      <div class="canvas-frame" id="canvasFrame"></div>
      <div class="canvas-filter" id="canvasFilter"></div>
      <div class="canvas-effects" id="canvasEffects"></div>
      <div class="canvas-flash" id="canvasFlash"></div>
    </div>
    <div class="section-label">Arriere-plan</div>
    <div class="scenes-bar" id="scenesBar"></div>
    <div class="actions">
      <button class="action-btn btn-photo" onclick="takePhoto()">📸 Photo !</button>
      <button class="action-btn btn-download" onclick="downloadPhoto()">💾 Sauvegarder</button>
      <button class="action-btn btn-undo" onclick="undo()">↩️</button>
      <button class="action-btn btn-redo" onclick="redo()">↪️</button>
      <button class="action-btn btn-random" onclick="randomStickers()">🎲</button>
      <button class="action-btn btn-clear" onclick="clearAll()">🗑️</button>
    </div>
  </div>

  <div class="right-panel">
    <!-- Templates -->
    <div class="glass" style="padding:6px">
      <div class="section-label">Modeles</div>
      <div class="templates-bar" id="templatesBar"></div>
    </div>

    <!-- Sticker picker -->
    <div class="glass sticker-panel">
      <div class="section-label">Stickers</div>
      <div class="sticker-tabs" id="stickerTabs"></div>
      <div class="sticker-grid" id="stickerGrid"></div>
    </div>

    <!-- Text input -->
    <div class="glass" style="padding:6px">
      <div class="section-label">Texte personnalise</div>
      <div class="text-input-row">
        <input type="text" id="textInput" placeholder="Tape ton texte..." maxlength="20">
        <input type="color" id="textColor" value="#ffffff" title="Couleur">
        <button onclick="addTextSticker()">+ Ajouter</button>
      </div>
    </div>

    <!-- Controls for selected sticker -->
    <div class="glass controls-panel" id="controlsPanel" style="display:none">
      <div class="section-label">Modifier le sticker</div>
      <div class="control-row">
        <label>Taille</label>
        <input type="range" id="sizeSlider" min="16" max="80" value="36" oninput="updateSelected()">
        <span class="val" id="sizeVal">36</span>
      </div>
      <div class="control-row">
        <label>Rotation</label>
        <input type="range" id="rotSlider" min="-180" max="180" value="0" oninput="updateSelected()">
        <span class="val" id="rotVal">0</span>
      </div>
      <div style="text-align:center;margin-top:4px">
        <button class="action-btn btn-delete" onclick="deleteSelected()">Supprimer</button>
      </div>
    </div>

    <!-- Frames -->
    <div class="glass" style="padding:6px">
      <div class="section-label">Cadres</div>
      <div class="frames-bar" id="framesBar"></div>
    </div>

    <!-- Filters -->
    <div class="glass" style="padding:6px">
      <div class="section-label">Filtres</div>
      <div class="filters-bar" id="filtersBar"></div>
    </div>

    <!-- Effects -->
    <div class="glass" style="padding:6px">
      <div class="section-label">Effets</div>
      <div class="effects-bar" id="effectsBar"></div>
    </div>
  </div>
</div>

<div class="gallery-section">
  <div class="gallery-title">Ma Galerie</div>
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<script>
/* ===== CONFIG ===== */
const SCENES = [
  {emoji:'🎤',name:'Concert',bg:'linear-gradient(135deg,#ff6fd8,#6a0dad)',extras:'radial-gradient(circle at 30% 20%,rgba(255,255,255,.15) 0%,transparent 40%)'},

const STICKER_CATS = [
  {name:'Visages',icon:'😊',locked:false,cost:0,items:['😊','🥰','😎','🤩','😘','🥳','😍','🤗','😜','🤭','🥺','😇','🤪','😏','🧐','🤓','😋','🤤','😴','🥱']},

  {name:'Mode',icon:'👗',locked:false,cost:0,items:['👗','👠','👑','🎀','💎','🕶️','👜','💄','💅','👒','🧢','👟','🧣','💍','👝','🎩','👘','🩱','👙','🧤']},
  {name:'Gourmandises',icon:'🍦',locked:false,cost:0,items:['🍦','🧁','🍰','🍭','🍩','🎂','🍪','🍓','🍬','🧃','🍫','🍿','🧋','🍡','🥤','🍮','🥧','🎃','🍉','🍒']},
  {name:'Coeurs',icon:'💖',locked:false,cost:0,items:['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💗','💖','💝','💘','💕','💓','💞','❣️','🩷','♥️','🫶']},
  {name:'Groupes',icon:'🎵',locked:false,cost:0,items:['💜','🖤','💗','🩷','🩵','❤️‍🔥','⚡','🌹','🦋','🐍','🐰','🐱','🐻','🦊','🌙','☀️','🌟','👑','💎','🔮']},
  {name:'Fetes',icon:'🎉',locked:true,cost:50,items:['🎉','🎊','🎈','🎁','🎆','🎇','🧨','🪅','🎏','🏮','🪩','🎐','🎑','🧧','🎍','🎎','🎋','🎄','🎃','🎅']},
  {name:'Voyages',icon:'✈️',locked:true,cost:50,items:['✈️','🗼','🎡','🎢','🗽','🏝️','🏔️','🌅','🌄','🎠','🚀','🛸','🗺️','🏰','⛩️','🕌','🗿','🌋','🏜️','🌌']}
];

const FRAMES = [
  {name:'Aucun',class:''},
  {name:'💖',class:'frame-hearts'},
  {name:'⭐',class:'frame-stars'},
  {name:'🌸',class:'frame-flowers'},
  {name:'🌈',class:'frame-rainbow'},
  {name:'✨',class:'frame-sparkle'},
  {name:'☁️',class:'frame-cloud'},
  {name:'💗',class:'frame-neon'},
  {name:'👑',class:'frame-gold'},
  {name:'💜',class:'frame-purple'}
];

const FILTERS = [

function placeSticker(content, isText, x, y, color, silent) {
  const wrap = document.getElementById('canvasWrap');
  const rect = wrap.getBoundingClientRect();
  const px = x !== undefined ? x : 30 + Math.random() * (rect.width - 80);
  const py = y !== undefined ? y : 30 + Math.random() * (rect.height - 80);
  const col = color || '#ffffff';
  const id = nextId++;
  const el = document.createElement('div');
  el.className = 'placed-sticker sticker-pop';
  el.dataset.id = id;
  el.style.left = px + 'px';
  el.style.top = py + 'px';
  el.style.zIndex = zCounter++;
  el.style.fontSize = isText ? '16px' : '36px';
  const inner = document.createElement('span');
  inner.className = 'sticker-content' + (isText ? ' text-sticker' : '');
  inner.textContent = content;
  if (isText) inner.style.color = col;
  el.appendChild(inner);
  const sticker = { id, content, isText, x: px, y: py, size: isText ? 16 : 36, rotation: 0, color: col };
  placedStickers.push(sticker);
  el.addEventListener('pointerdown', (e) => onStickerDown(e, id));
  el.addEventListener('click', (e) => { e.stopPropagation(); selectSticker(id); });
  document.getElementById('canvasStickers').appendChild(el);
  // Remove pop animation class after it finishes
  el.addEventListener('animationend', () => el.classList.remove('sticker-pop'), { once: true });
  if (!silent) {
    selectSticker(id);
    playPop();
  }
}

function addTextSticker() {

  placeSticker(text, true, undefined, undefined, color);
  input.value = '';
}

/* ===== DRAG ===== */
let dragState = null;

function onStickerDown(e, id) {
  e.preventDefault();
  e.stopPropagation();
  const el = getStickerEl(id);
  if (!el) return;
  el.classList.add('dragging');
  el.style.zIndex = zCounter++;
  const rect = el.getBoundingClientRect();
  const parentRect = document.getElementById('canvasWrap').getBoundingClientRect();
  dragState = { id, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top, parentLeft: parentRect.left, parentTop: parentRect.top };
  selectSticker(id);
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
}

function onDragMove(e) {
  if (!dragState) return;
  const el = getStickerEl(dragState.id);
  if (!el) return;
  let nx = e.clientX - dragState.parentLeft - dragState.offsetX;
  let ny = e.clientY - dragState.parentTop - dragState.offsetY;
  el.style.left = nx + 'px';
  el.style.top = ny + 'px';
  const s = placedStickers.find(s => s.id === dragState.id);
  if (s) { s.x = nx; s.y = ny; }
}

function onDragEnd() {
  if (dragState) {
    const el = getStickerEl(dragState.id);
    if (el) el.classList.remove('dragging');
  }
  dragState = null;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
}

/* ===== SELECT / CONTROLS ===== */
function selectSticker(id) {
  deselectAll();
  selectedId = id;
  const el = getStickerEl(id);
  if (el) el.classList.add('selected');
  const s = placedStickers.find(s => s.id === id);
  if (s) {
    document.getElementById('sizeSlider').value = s.size;
    document.getElementById('sizeVal').textContent = s.size;
    document.getElementById('rotSlider').value = s.rotation;
    document.getElementById('rotVal').textContent = s.rotation + '\u00B0';
  }
  document.getElementById('controlsPanel').style.display = 'block';
}

function deselectAll() {
  selectedId = null;
  document.querySelectorAll('.placed-sticker.selected').forEach(el => el.classList.remove('selected'));
  document.getElementById('controlsPanel').style.display = 'none';
}

function updateSelected() {
  if (!selectedId) return;
  const s = placedStickers.find(s => s.id === selectedId);
  const el = getStickerEl(selectedId);
  if (!s || !el) return;
  s.size = parseInt(document.getElementById('sizeSlider').value);
  s.rotation = parseInt(document.getElementById('rotSlider').value);
  document.getElementById('sizeVal').textContent = s.size;
  document.getElementById('rotVal').textContent = s.rotation + '\u00B0';
  el.style.fontSize = s.size + 'px';
  el.style.transform = `rotate(${s.rotation}deg)`;
}

function deleteSelected() {
  if (!selectedId) return;
  saveUndo();
  const el = getStickerEl(selectedId);
  if (el) el.remove();
  placedStickers = placedStickers.filter(s => s.id !== selectedId);
  deselectAll();
}

function getStickerEl(id) {
  return document.querySelector(`.placed-sticker[data-id="${id}"]`);
}

/* ===== UNDO / REDO ===== */
function saveUndo() {
  undoStack.push(JSON.stringify(placedStickers.map(s => ({...s}))));
  if (undoStack.length > 30) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(JSON.stringify(placedStickers.map(s => ({...s}))));
  const state = JSON.parse(undoStack.pop());
  restoreStickers(state);
  playPop();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(JSON.stringify(placedStickers.map(s => ({...s}))));
  const state = JSON.parse(redoStack.pop());
  restoreStickers(state);
  playPop();
}

function restoreStickers(state) {
  document.getElementById('canvasStickers').innerHTML = '';
  placedStickers = [];
  deselectAll();
  state.forEach(s => {
    placeSticker(s.content, s.isText, s.x, s.y, s.color, true);
    const placed = placedStickers[placedStickers.length - 1];
    placed.size = s.size;
    placed.rotation = s.rotation;
    const el = getStickerEl(placed.id);
    if (el) {
      el.style.fontSize = s.size + 'px';
      el.style.transform = `rotate(${s.rotation}deg)`;
    }
  });
  deselectAll();
}

function setFrame(idx) {

/* ===== FILTERS ===== */
function setFilter(idx) {
  currentFilter = idx;
  const f = FILTERS[idx];
  const wrap = document.getElementById('canvasWrap');
  const filterEl = document.getElementById('canvasFilter');
  // Apply CSS filter to the whole canvas
  wrap.style.filter = f.style || 'none';
  // Color overlay
  if (f.color) {
    filterEl.style.background = f.color;
    filterEl.style.opacity = '1';
  } else {
    filterEl.style.opacity = '0';
  }
  filtersBar.querySelectorAll('.filter-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
}

/* ===== EFFECTS ===== */
function setEffect(type, idx) {
  currentEffect = type;
  if (effectInterval) { clearInterval(effectInterval); effectInterval = null; }
  document.getElementById('canvasEffects').innerHTML = '';
  effectsBar.querySelectorAll('.effect-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  if (type === 'none') return;
  const symbols = { sparkle:'✨', hearts:'💖', stars:'⭐', snow:'❄️', confetti:['🟥','🟧','🟨','🟩','🟦','🟪'] };
  const anims = { sparkle:'sparkleFloat', hearts:'heartRain', stars:'starBurst', snow:'snowFall', confetti:'confettiFall' };
  effectInterval = setInterval(() => {
    const container = document.getElementById('canvasEffects');
    if (container.children.length > 25) container.removeChild(container.firstChild);
    const p = document.createElement('div');
    p.className = 'effect-particle';
    let sym = symbols[type];
    if (Array.isArray(sym)) sym = sym[Math.floor(Math.random() * sym.length)];
    p.textContent = sym;
    const dur = 2 + Math.random() * 3;
    const isTop = type === 'hearts' || type === 'snow' || type === 'confetti';
    p.style.cssText = `left:${Math.random()*90}%;top:${isTop?'-5%':(Math.random()*80+'%')};animation:${anims[type]} ${dur}s linear forwards;font-size:${.8+Math.random()*.8}em`;
    container.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.remove(); }, dur * 1000 + 100);
  }, 300);
}

/* ===== TEMPLATES ===== */
function loadTemplate(idx) {
  const t = TEMPLATES[idx];
  saveUndo();
  clearAllSilent();
  setScene(t.scene);
  setFrame(t.frame);
  if (t.filter !== undefined) setFilter(t.filter);
  t.stickers.forEach(s => {
    placeSticker(s.c, s.t, s.x, s.y, s.col, true);
    const placed = placedStickers[placedStickers.length - 1];
    placed.size = s.s;
    placed.rotation = s.r;
    const el = getStickerEl(placed.id);
    if (el) {
      el.style.fontSize = s.s + 'px';
      el.style.transform = `rotate(${s.r}deg)`;
    }
  });
  deselectAll();
  playShutter();
}

/* ===== STICKER PACKS (UNLOCK) ===== */
function showUnlockPrompt(cat) {
  if (starCount >= cat.cost) {
    const msg = document.createElement('div');
    msg.className = 'unlock-msg';
    msg.innerHTML = `<h3>Debloquer ${cat.icon} ${cat.name} ?</h3><p>Coute ${cat.cost} etoiles (tu en as ${starCount})</p><button id="unlockYes">Oui !</button> <button id="unlockNo" style="background:rgba(255,255,255,.15);color:#fff;margin-left:8px">Non</button>`;
    document.body.appendChild(msg);
    document.getElementById('unlockYes').onclick = () => {
      starCount -= cat.cost;
      localStorage.setItem(`kpop_stars_${playerName}`, starCount);
      localStorage.setItem(`kpop_pack_${playerName}_${cat.name}`, '1');
      cat.locked = false;
      document.getElementById('starsCount').textContent = '\u2B50 ' + starCount + ' etoiles';
      // Update tab appearance
      const tabs = tabsEl.querySelectorAll('.sticker-tab');
      const idx = STICKER_CATS.indexOf(cat);
      if (tabs[idx]) tabs[idx].classList.remove('locked');
      msg.remove();
      playReward();
      showBonus('Pack debloque !', '#00ff88');
    };
    document.getElementById('unlockNo').onclick = () => msg.remove();
  } else {
    const msg = document.createElement('div');
    msg.className = 'unlock-msg';
    msg.innerHTML = `<h3>${cat.icon} ${cat.name}</h3><p>Il te faut ${cat.cost} etoiles pour debloquer ce pack.<br>Tu en as ${starCount}. Continue a prendre des photos !</p><button onclick="this.parentElement.remove()">OK</button>`;
    document.body.appendChild(msg);
  }
}

  setTimeout(() => flash.classList.remove('active'), 200);
  deselectAll();
  playShutter();
  setTimeout(() => saveToGallery(), 300);

function downloadPhoto() {
  deselectAll();
  const canvas = document.createElement('canvas');
  canvas.width = 680;
  canvas.height = 880;
  const ctx = canvas.getContext('2d');
  drawPhotoPreview(ctx, {
    scene: currentScene,
    frame: currentFrame,
    filter: currentFilter,
    effect: currentEffect,
    stickers: placedStickers.map(s => ({...s}))
  }, 680, 880);
  const link = document.createElement('a');
  link.download = `kpop-photo-${playerName}-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  playReward();
}

function randomStickers() {
  saveUndo();
  const count = 5 + Math.floor(Math.random() * 5);
  const wrap = document.getElementById('canvasWrap');
  const rect = wrap.getBoundingClientRect();
  for (let i = 0; i < count; i++) {
    const catIdx = Math.floor(Math.random() * STICKER_CATS.length);
    const cat = STICKER_CATS[catIdx];
    if (cat.locked) continue;
    const item = cat.items[Math.floor(Math.random() * cat.items.length)];
    const x = 20 + Math.random() * (rect.width - 60);
    const y = 20 + Math.random() * (rect.height - 60);
    placeSticker(item, false, x, y);
  }
  deselectAll();
}

function clearAll() {
  saveUndo();
  clearAllSilent();
}

function clearAllSilent() {
  placedStickers = [];
  document.getElementById('canvasStickers').innerHTML = '';
  deselectAll();
}

/* ===== GALLERY ===== */
function getGalleryKey() { return `kpop_photobooth_gallery_${playerName}`; }

function loadGallery() {
  try { return JSON.parse(localStorage.getItem(getGalleryKey()) || '[]'); }
  catch (e) { return []; }
}

function saveToGallery() {
  const gallery = loadGallery();
  if (gallery.length >= 12) gallery.shift();
  const photo = {
    scene: currentScene,
    frame: currentFrame,
    filter: currentFilter,
    effect: currentEffect,
    stickers: placedStickers.map(s => ({...s})),
    timestamp: Date.now()
  };
  gallery.push(photo);
  localStorage.setItem(getGalleryKey(), JSON.stringify(gallery));
  starCount += 20;
  localStorage.setItem(`kpop_stars_${playerName}`, starCount);
  document.getElementById('starsCount').textContent = '\u2B50 ' + starCount + ' etoiles';
  checkUnlocks();
  renderGallery();
  showBonus('+20 etoiles !', '#ffd700');
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  const gallery = loadGallery();
  if (gallery.length === 0) {
    grid.innerHTML = '<div class="gallery-empty">Prends ta premiere photo ! 📸</div>';
    return;
  }
  grid.innerHTML = '';
  gallery.forEach((photo, idx) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    const c = document.createElement('canvas');
    c.width = 170; c.height = 220;
    const ctx = c.getContext('2d');
    drawPhotoPreview(ctx, photo, 170, 220);
    item.appendChild(c);
    const del = document.createElement('button');
    del.className = 'gallery-delete';
    del.textContent = '\u2715';
    del.onclick = (e) => { e.stopPropagation(); deleteFromGallery(idx); };
    item.appendChild(del);
    item.onclick = () => loadPhoto(photo);
    grid.appendChild(item);
  });
}

function drawPhotoPreview(ctx, photo, w, h) {
  const scene = SCENES[photo.scene] || SCENES[0];
  const colors = extractGradientColors(scene.bg);
  if (colors.length >= 2) {
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    colors.forEach((c, i) => grad.addColorStop(i / (colors.length - 1), c));
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = '#0a0a1a';
  }
  ctx.fillRect(0, 0, w, h);

  // Apply CSS filter effect (sepia, grayscale, etc.) by re-drawing onto a temp canvas
  const filter = FILTERS[photo.filter || 0];
  if (filter && filter.style) {
    try {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = w; tempCanvas.height = h;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.drawImage(ctx.canvas, 0, 0);
      ctx.clearRect(0, 0, w, h);
      ctx.filter = filter.style;
      ctx.drawImage(tempCanvas, 0, 0);
      ctx.filter = 'none';
    } catch(e) { /* filter not supported, skip */ }
  }
  // Apply color overlay
  if (filter && filter.color) {
    ctx.fillStyle = filter.color;
    ctx.fillRect(0, 0, w, h);
  }

  const scaleX = w / 340;
  const scaleY = h / 440;
  (photo.stickers || []).forEach(s => {
    ctx.save();
    const sx = s.x * scaleX;
    const sy = s.y * scaleY;
    const fs = Math.max(6, s.size * scaleX * 0.8);
    ctx.translate(sx + fs / 2, sy + fs / 2);
    ctx.rotate(s.rotation * Math.PI / 180);
    if (s.isText) {
      ctx.font = `800 ${fs}px Quicksand, sans-serif`;
      ctx.fillStyle = s.color || '#fff';
      ctx.shadowColor = '#ff6fd8';
      ctx.shadowBlur = 4;
    } else {
      ctx.font = `${fs}px sans-serif`;
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.content, 0, 0);
    ctx.restore();
  });

  // Frame indication
  if (photo.frame && photo.frame > 0) {
    const frameColors = ['','#ff6fd8','#ffd700','#ffb7c5','#ff0000','#ffd700','#ffffff','#ff6fd8','#ffd700','#b44dff'];
    const fc = frameColors[photo.frame] || '#ff6fd8';
    ctx.strokeStyle = fc;
    ctx.lineWidth = Math.max(3, 6 * scaleX);
    ctx.globalAlpha = 0.5;
    ctx.strokeRect(4, 4, w - 8, h - 8);
    ctx.globalAlpha = 1;
  }
}

function extractGradientColors(bg) {
  const m = bg.match(/#[0-9a-fA-F]{3,8}|rgba?\([^)]+\)/g);
  return m || ['#0a0a1a', '#0f3460'];
}

function deleteFromGallery(idx) {
  const gallery = loadGallery();
  gallery.splice(idx, 1);
  localStorage.setItem(getGalleryKey(), JSON.stringify(gallery));
  renderGallery();
}

function loadPhoto(photo) {
  saveUndo();
  clearAllSilent();
  setScene(photo.scene || 0);
  setFrame(photo.frame || 0);
  if (photo.filter !== undefined) setFilter(photo.filter);
  if (photo.effect !== undefined && photo.effect !== 'none') {
    const effIdx = EFFECTS.findIndex(e => e.type === photo.effect);
    if (effIdx >= 0) setEffect(photo.effect, effIdx);
  }
  (photo.stickers || []).forEach(s => {
    placeSticker(s.content, s.isText, s.x, s.y, s.color, true);
    const placed = placedStickers[placedStickers.length - 1];
    placed.size = s.size;
    placed.rotation = s.rotation;
    const el = getStickerEl(placed.id);
    if (el) {
      el.style.fontSize = s.size + 'px';
      el.style.transform = `rotate(${s.rotation}deg)`;
    }
  });
  deselectAll();
}

/* ===== SOUNDS ===== */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function playPop() {
  if (!soundOn) return;
  const ac = getAudioCtx();
  if (!ac) return;
  try {
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(600, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200, ac.currentTime + 0.08);
    g.gain.setValueAtTime(0.12, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    o.start(ac.currentTime);
    o.stop(ac.currentTime + 0.12);
  } catch(e) {}
}

function playShutter() {
  if (!soundOn) return;
  const ac = getAudioCtx();
  if (!ac) return;
  try {
    const buf = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.12;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
    src.connect(g); g.connect(ac.destination);
    src.start(ac.currentTime);
  } catch(e) {}
}

function playReward() {
  if (!soundOn) return;
  const ac = getAudioCtx();
  if (!ac) return;
  try {
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'sine';
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(freq, ac.currentTime + i * 0.1);
      g.gain.setValueAtTime(0.1, ac.currentTime + i * 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.1 + 0.2);
      o.start(ac.currentTime + i * 0.1);
      o.stop(ac.currentTime + i * 0.1 + 0.2);
    });
  } catch(e) {}
}

function showBonus(text, color) {
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.2em;font-weight:800;color:${color};text-shadow:0 0 20px ${color}80;z-index:999;pointer-events:none;animation:bonusPop 1.2s ease forwards`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}
