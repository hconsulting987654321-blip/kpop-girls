<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;min-height:100vh;font-family:'Quicksand',sans-serif;overflow:hidden;display:flex;flex-direction:column;align-items:center;touch-action:manipulation;user-select:none}

.back-btn{position:fixed;top:12px;left:12px;background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.3);padding:7px 16px;border-radius:30px;font-family:inherit;font-size:.95em;cursor:pointer;text-decoration:none;z-index:300;transition:.3s}
.back-btn:hover{background:rgba(255,255,255,.3)}

/* MENU */
#menu{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);gap:18px;padding:20px}
#menu h1{font-size:2em;background:linear-gradient(90deg,#ff6fd8,#b44dff,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
#menu p{color:rgba(255,255,255,.7);font-size:.95em;text-align:center;max-width:340px}
.player-select{display:flex;gap:16px;margin:10px 0}
.player-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 20px;
  background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:18px;
  cursor:pointer;transition:.3s;color:#fff;font-family:inherit;font-weight:700;font-size:.9em}
.player-card:hover,.player-card.sel{border-color:#ff6fd8;background:rgba(255,111,216,.15);transform:scale(1.05)}
.player-card .avatar{font-size:2.8em}
.start-btn{margin-top:8px;padding:14px 48px;border:none;border-radius:40px;font-family:inherit;font-size:1.15em;font-weight:800;
  background:linear-gradient(135deg,#ff6fd8,#b44dff);color:#fff;cursor:pointer;transition:.3s;letter-spacing:.5px}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(255,111,216,.5)}
.start-btn:disabled{opacity:.4;cursor:default;transform:none}
.instructions{color:rgba(255,255,255,.55);font-size:.82em;text-align:center;max-width:300px;line-height:1.5}

/* CANVAS */
#gameCanvas{display:none;border-radius:12px;image-rendering:pixelated}

/* HUD */
#hud{display:none;position:fixed;top:0;left:0;right:0;padding:10px 16px;z-index:50;
  background:linear-gradient(180deg,rgba(0,0,0,.5),transparent);
  font-weight:700;font-size:.95em;color:#fff;pointer-events:none}
#hud>div{display:flex;justify-content:space-between;align-items:center;max-width:700px;margin:0 auto}
.hud-left,.hud-right{display:flex;gap:14px;align-items:center}
#pauseBtn{pointer-events:all;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 12px;border-radius:20px;font-family:inherit;font-weight:700;cursor:pointer;font-size:.85em}

/* SOUND TOGGLE */
#soundBtn{position:fixed;top:12px;right:12px;z-index:300;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);
  color:#fff;padding:7px 14px;border-radius:30px;font-size:1.1em;cursor:pointer;transition:.3s}
#soundBtn:hover{background:rgba(255,255,255,.3)}

/* END SCREEN */
#endScreen{display:none;position:absolute;inset:0;z-index:100;background:rgba(10,10,30,.92);
  flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px}
#endScreen h2{font-size:1.8em;background:linear-gradient(90deg,#ff6fd8,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center}
.stat-box{background:rgba(255,255,255,.08);padding:12px 18px;border-radius:14px;color:#fff}
.stat-box .val{font-size:1.6em;font-weight:800;color:#ffd700}
.stat-box .lbl{font-size:.78em;color:rgba(255,255,255,.6)}
.stars-display{font-size:2em;letter-spacing:4px}
.share-row{display:flex;gap:10px;margin-top:6px}
.share-btn{padding:10px 22px;border:none;border-radius:30px;font-family:inherit;font-weight:700;font-size:.9em;cursor:pointer;transition:.3s}
.share-btn.wa{background:#25d366;color:#fff}
.share-btn.cp{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.3)}
.share-btn:hover{transform:scale(1.05)}
</style>

<body>
<a class="back-btn" href="index.html">< Retour</a>
<button id="soundBtn" onclick="toggleSound()">🔊</button>

<!-- MENU -->
<div id="menu">
  <h1>Course K-Pop</h1>
  <p>Cours, saute et collecte des étoiles dans cette course infinie !</p>
  <div class="player-select">
    <button class="player-card" onclick="selectPlayer(0)"><span class="avatar">💖</span>Ambre</button>
    <button class="player-card" onclick="selectPlayer(1)"><span class="avatar">💖</span>Eden</button>
    <button class="player-card" onclick="selectPlayer(2)"><span class="avatar">💛</span>Louise</button>
  </div>
  <button class="start-btn" id="startBtn" disabled onclick="startGame()">Choisir une joueuse</button>
  <div class="instructions">Espace ou Tap pour sauter<br>Maintenir = saut plus haut<br>Collecte les étoiles, evite les obstacles !</div>
</div>

<!-- CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud"><div>
  <div class="hud-left">
    <span id="hudLives"></span>
    <span id="hudShield" style="display:none">🛡️</span>
  </div>
  <div class="hud-right">
    <span id="hudScore">0 pts</span>
    <span id="hudDist">0 m</span>
    <button id="pauseBtn" onclick="togglePause()">⏸</button>
  </div>
</div></div>

<!-- END SCREEN -->
<div id="endScreen">
  <h2>Course terminee !</h2>
  <div class="stars-display" id="endStars"></div>
  <div class="stat-grid">
    <div class="stat-box"><div class="val" id="endDist">0</div><div class="lbl">metres</div></div>
    <div class="stat-box"><div class="val" id="endScore">0</div><div class="lbl">points</div></div>
    <div class="stat-box"><div class="val" id="endItems">0</div><div class="lbl">objets</div></div>
    <div class="stat-box"><div class="val" id="endBest">0</div><div class="lbl">record</div></div>
  </div>
  <div class="share-row">
    <button class="share-btn wa" onclick="shareWA()">WhatsApp</button>
    <button class="share-btn cp" onclick="copyScore()">Copier</button>
  </div>
  <button class="start-btn" onclick="restartGame()">Rejouer</button>
  <button class="start-btn" style="background:rgba(255,255,255,.15);font-size:.9em;padding:10px 30px" onclick="backToMenu()">Menu</button>
</div>

<script>
// ===== AUDIO ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null, soundOn = true;
function ensureAudio(){if(!actx) actx = new AudioCtx();}
function toggleSound(){soundOn=!soundOn; document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}
function playTone(freq,dur,type='sine',vol=.15){
  if(!soundOn||!actx) return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(actx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.stop(actx.currentTime+dur);
}
function sfxJump(){playTone(400,.15,'sine',.12);setTimeout(()=>playTone(600,.1,'sine',.1),60);}
function sfxCollect(){playTone(800,.08,'sine',.1);setTimeout(()=>playTone(1000,.08,'sine',.1),50);setTimeout(()=>playTone(1200,.12,'sine',.1),100);}
function sfxHit(){playTone(150,.25,'sawtooth',.15);playTone(100,.3,'square',.08);}
function sfxPowerup(){for(let i=0;i<5;i++) setTimeout(()=>playTone(600+i*150,.1,'sine',.08),i*40);}
function sfxRainbow(){for(let i=0;i<8;i++) setTimeout(()=>playTone(500+i*100,.12,'triangle',.1),i*50);}
let beatInterval=null;
function startBeat(){if(beatInterval) return;let i=0;beatInterval=setInterval(()=>{if(!soundOn||!actx)return;
  playTone(i%4===0?200:150,.06,'square',.04);i++;},300);}
function stopBeat(){clearInterval(beatInterval);beatInterval=null;}

// ===== GAME STATE =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, GROUND_Y, selectedPlayer = -1, playerName = '';
const players = [
  {name:'Ambre', run:['💃','🏃‍♀️'], color:'#b44dff'},
  {name:'Eden',  run:['💃','🏃‍♀️'], color:'#ff6fd8'},
  {name:'Louise',run:['💃','🏃‍♀️'], color:'#ffd700'}
];

let game = null, paused = false, animId = null;

function resize(){
  W = Math.min(window.innerWidth, 700);
  H = Math.min(window.innerHeight, 500);
  canvas.width = W; canvas.height = H;
  GROUND_Y = H - 60;
}
window.addEventListener('resize', resize);
resize();

// ===== PLAYER SELECT =====
function selectPlayer(i){
  selectedPlayer = i; playerName = players[i].name;
  document.querySelectorAll('.player-card').forEach((c,j)=>c.classList.toggle('sel',j===i));
  const btn = document.getElementById('startBtn');
  btn.disabled = false; btn.textContent = 'Jouer avec ' + playerName + ' !';
}

// ===== PARALLAX LAYERS =====
function drawParallax(scrollX){
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0f0c29'); sky.addColorStop(.5,'#302b63'); sky.addColorStop(1,'#24243e');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Stars layer (very slow)
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  for(let i=0; i<20; i++){
    const sx = ((i*137+50) % (W+100)) - ((scrollX*0.02) % (W+100));
    const sy = (i*73+20) % (H*0.4);
    const r = (i%3===0)?2:1;
    ctx.beginPath(); ctx.arc(((sx%W)+W)%W, sy, r, 0, Math.PI*2); ctx.fill();
  }

  // Buildings layer (medium speed)
  ctx.fillStyle = '#1a1040';
  const bOff = (scrollX * 0.15) % 180;
  for(let x = -180; x < W+180; x += 90){
    const bx = x - (bOff % 90);
    const bh = 60 + ((x*7+13)%80);
    ctx.fillRect(bx, GROUND_Y - bh, 50, bh);
    // Windows
    ctx.fillStyle = 'rgba(255,200,100,.3)';
    for(let wy=GROUND_Y-bh+10; wy<GROUND_Y-10; wy+=18){
      for(let wx=bx+8; wx<bx+42; wx+=16){
        if((wx*wy)%5!==0) ctx.fillRect(wx,wy,8,10);
      }
    }
    ctx.fillStyle = '#1a1040';
  }

  // Buildings layer 2 (closer, faster)
  ctx.fillStyle = '#120c30';
  const bOff2 = (scrollX * 0.3) % 120;
  for(let x = -120; x < W+120; x += 120){
    const bx = x - (bOff2 % 120);
    const bh = 40 + ((x*3+7)%50);
    ctx.fillRect(bx, GROUND_Y - bh, 70, bh);
    ctx.fillStyle = 'rgba(180,77,255,.15)';
    for(let wy=GROUND_Y-bh+8; wy<GROUND_Y-8; wy+=14){
      for(let wx=bx+6; wx<bx+62; wx+=14){
        if((wx+wy)%3!==0) ctx.fillRect(wx,wy,6,8);
      }
    }
    ctx.fillStyle = '#120c30';
  }

  // Ground
  ctx.fillStyle = '#2a1f4e';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // Ground line
  ctx.strokeStyle = '#ff6fd8'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
  // Ground pattern
  ctx.fillStyle = 'rgba(255,111,216,.08)';
  const gOff = (scrollX * 0.8) % 40;
  for(let x = -40; x < W+40; x += 40){
    ctx.fillRect(x - gOff, GROUND_Y+5, 20, 4);
    ctx.fillRect(x - gOff + 10, GROUND_Y+18, 20, 4);
  }
}

// ===== PARTICLES =====
let particles = [];
const MAX_PARTICLES = 50;
function spawnParticles(x, y, color, count=8){
  for(let i=0;i<count;i++){
    if(particles.length >= MAX_PARTICLES) particles.shift();
    particles.push({x,y,vx:(Math.random()-.5)*6,vy:-Math.random()*5-2,
      life:1,color,size:Math.random()*4+2});
  }
}
function spawnScorePopup(x, y, text, color='#ffd700'){
  if(particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({x,y,vx:0,vy:-2,life:1.2,text,color,size:16,isText:true});
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    if(!p.isText) p.vy+=.15;
    p.life-=dt*2;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.isText){
      ctx.fillStyle=p.color;ctx.font=`800 ${p.size}px Quicksand`;
      ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y);
    } else {
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  });
}

// ===== GAME OBJECTS =====
function createGame(){
  return {
    // Player
    px: 80, py: GROUND_Y, pvx: 0, pvy: 0,
    isJumping: false, jumpHeld: false, jumpTime: 0,
    runFrame: 0, runTimer: 0, squash: 1, stretch: 1,
    // State
    score: 0, distance: 0, lives: 3, speed: 3.5,
    items: 0, scrollX: 0, time: 0,
    // Power-ups
    magnetTimer: 0, shieldActive: false, boostTimer: 0,
    // Obstacles & collectibles
    obstacles: [], collectibles: [], powerups: [],
    spawnTimer: 0, collectTimer: 0, powerupTimer: 0,
    // Effects
    shakeX: 0, shakeY: 0, shakeTimer: 0,
    flashAlpha: 0, flashColor: '#fff',
    glowTimer: 0, rainbowFlash: 0,
    // Game over
    gameOver: false, invincTimer: 0
  };
}

// Obstacle types
function spawnObstacle(g){
  const types = [
    {emoji:'🎵', w:30, h:30, y:GROUND_Y-30, moving:false},
    {emoji:'🎤', w:28, h:55, y:GROUND_Y-55, moving:false},
    {emoji:'🦋', w:30, h:30, y:GROUND_Y-80, moving:true, amp:40, freq:2}
  ];
  const t = types[Math.random()<.5?0:(Math.random()<.6?1:2)];
  const o = {...t, x: W + 50, baseY: t.y};
  g.obstacles.push(o);
}

// Collectible types
function spawnCollectible(g){
  const r = Math.random();
  let c;
  if(r<.55) c={emoji:'⭐',pts:10,color:'#ffd700',w:24,h:24};
  else if(r<.78) c={emoji:'💖',pts:25,color:'#ff6fd8',w:24,h:24};
  else if(r<.93) c={emoji:'💎',pts:50,color:'#00bfff',w:24,h:24};
  else c={emoji:'🌈',pts:100,color:'#ff6fd8',w:28,h:28,rainbow:true};
  // Vary height
  const yOptions = [GROUND_Y-40, GROUND_Y-80, GROUND_Y-120, GROUND_Y-160];
  c.x = W + 30;
  c.y = yOptions[Math.floor(Math.random()*yOptions.length)];
  c.baseY = c.y;
  c.bob = Math.random()*Math.PI*2;
  g.collectibles.push(c);
}

// Power-up types
function spawnPowerup(g){
  const r = Math.random();
  let p;
  if(r<.4) p={emoji:'🧲',type:'magnet',color:'#ff4444',w:28,h:28};
  else if(r<.75) p={emoji:'🛡️',type:'shield',color:'#44aaff',w:28,h:28};
  else p={emoji:'🚀',type:'boost',color:'#ffaa00',w:28,h:28};
  p.x = W + 30;
  p.y = GROUND_Y - 60 - Math.random()*80;
  p.bob = Math.random()*Math.PI*2;
  g.powerups.push(p);
}

// ===== INPUT =====
let jumpPressed = false, jumpStart = 0;
function onDown(e){
  e.preventDefault(); ensureAudio();
  if(game && !game.gameOver && !paused){
    jumpPressed = true; jumpStart = performance.now();
    if(!game.isJumping){
      game.isJumping = true; game.pvy = -10; game.jumpHeld = true;
      game.squash = .7; game.stretch = 1.3;
      sfxJump();
    }
  }
}
function onUp(e){
  e.preventDefault();
  jumpPressed = false; if(game) game.jumpHeld = false;
}

canvas.addEventListener('pointerdown', onDown);
canvas.addEventListener('pointerup', onUp);
document.addEventListener('keydown', e=>{
  if(e.code==='Space'&&!e.repeat){onDown(e);}
  if(e.code==='KeyP') togglePause();
});
document.addEventListener('keyup', e=>{ if(e.code==='Space') onUp(e); });

// ===== GAME LOOP =====
let lastTime = 0;
function gameLoop(ts){
  if(!game || game.gameOver){return;}
  const dt = Math.min((ts - lastTime)/1000, .05);
  lastTime = ts;
  if(paused){animId=requestAnimationFrame(gameLoop);return;}

  const g = game;
  g.time += dt;

  // Speed increases
  g.speed = 3.5 + g.time * 0.03;
  const spd = g.boostTimer > 0 ? g.speed * 1.8 : g.speed;
  g.scrollX += spd;
  g.distance += spd * 0.3;

  // Spawn
  g.spawnTimer -= dt;
  if(g.spawnTimer <= 0){
    spawnObstacle(g);
    g.spawnTimer = 1.2 + Math.random()*1.5 - Math.min(g.time*0.005, 0.6);
  }
  g.collectTimer -= dt;
  if(g.collectTimer <= 0){
    spawnCollectible(g);
    g.collectTimer = 0.6 + Math.random()*0.8;
  }
  g.powerupTimer -= dt;
  if(g.powerupTimer <= 0){
    spawnPowerup(g);
    g.powerupTimer = 8 + Math.random()*7;
  }

  // Player physics
  if(g.jumpHeld && jumpPressed && g.pvy < 0){
    g.pvy -= 0.3; // Hold = higher
    g.jumpTime += dt;
    if(g.jumpTime > 0.25) g.jumpHeld = false;
  }
  g.pvy += 0.55; // gravity
  g.py += g.pvy;
  if(g.py >= GROUND_Y){
    g.py = GROUND_Y; g.pvy = 0; g.isJumping = false; g.jumpTime = 0;
    g.squash = 1.15; g.stretch = .9;
  }

  // Squash/stretch lerp
  g.squash += (1 - g.squash) * 0.15;
  g.stretch += (1 - g.stretch) * 0.15;

  // Run animation
  g.runTimer += dt;
  if(g.runTimer > 0.18){ g.runFrame = (g.runFrame+1)%2; g.runTimer = 0; }

  // Timers
  if(g.magnetTimer > 0) g.magnetTimer -= dt;
  if(g.boostTimer > 0) g.boostTimer -= dt;
  if(g.shakeTimer > 0){
    g.shakeTimer -= dt;
    g.shakeX = (Math.random()-.5)*8; g.shakeY = (Math.random()-.5)*8;
  } else { g.shakeX=0; g.shakeY=0; }
  if(g.invincTimer > 0) g.invincTimer -= dt;
  if(g.flashAlpha > 0) g.flashAlpha -= dt * 2;
  if(g.rainbowFlash > 0) g.rainbowFlash -= dt;
  if(g.glowTimer > 0) g.glowTimer -= dt;

  // Move obstacles
  for(let i=g.obstacles.length-1;i>=0;i--){
    const o=g.obstacles[i];
    o.x -= spd;
    if(o.moving) o.y = o.baseY + Math.sin(g.time * o.freq) * o.amp;
    if(o.x < -60) g.obstacles.splice(i,1);
  }

  // Move collectibles
  for(let i=g.collectibles.length-1;i>=0;i--){
    const c=g.collectibles[i];
    c.x -= spd;
    c.bob += dt * 3;
    c.y = c.baseY + Math.sin(c.bob)*6;
    // Magnet pull
    if(g.magnetTimer > 0){
      const dx=g.px-c.x, dy=(g.py-25)-c.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist < 150){
        c.x += dx*0.1; c.y += dy*0.1;
      }
    }
    if(c.x < -40) g.collectibles.splice(i,1);
  }

  // Move powerups
  for(let i=g.powerups.length-1;i>=0;i--){
    const p=g.powerups[i];
    p.x -= spd;
    p.bob += dt * 4;
    if(p.x < -40) g.powerups.splice(i,1);
  }

  // Collision: obstacles
  const pH = 40, pW = 24;
  const pLeft = g.px - pW/2, pRight = g.px + pW/2;
  const pTop = g.py - pH, pBot = g.py;

  for(let i=g.obstacles.length-1;i>=0;i--){
    const o=g.obstacles[i];
    if(pRight > o.x && pLeft < o.x+o.w && pBot > o.y && pTop < o.y+o.h){
      if(g.boostTimer > 0){
        // Destroy obstacle
        spawnParticles(o.x,o.y,'#ffaa00',6);
        g.obstacles.splice(i,1);
      } else if(g.shieldActive){
        g.shieldActive = false;
        document.getElementById('hudShield').style.display='none';
        spawnParticles(o.x,o.y,'#44aaff',10);
        g.obstacles.splice(i,1);
        sfxHit();
      } else if(g.invincTimer <= 0){
        g.lives--;
        g.invincTimer = 1.5;
        g.shakeTimer = .3;
        g.flashAlpha = 1; g.flashColor = '#ff0000';
        sfxHit();
        spawnParticles(g.px, g.py-20, '#ff4444', 12);
        g.obstacles.splice(i,1);
        updateHUD();
        if(g.lives <= 0){ endGame(); return; }
      }
    }
  }

  // Collision: collectibles
  for(let i=g.collectibles.length-1;i>=0;i--){
    const c=g.collectibles[i];
    const dx=g.px-c.x, dy=(g.py-25)-c.y;
    if(Math.sqrt(dx*dx+dy*dy)<30){
      g.score += c.pts;
      g.items++;
      sfxCollect();
      spawnParticles(c.x, c.y, c.color, 8);
      spawnScorePopup(c.x, c.y-10, '+'+c.pts, c.color);
      if(c.rainbow){
        g.rainbowFlash = 0.4;
        g.flashAlpha = .6; g.flashColor = '#ffd700';
        sfxRainbow();
      }
      g.collectibles.splice(i,1);
      updateHUD();
    }
  }

  // Collision: powerups
  for(let i=g.powerups.length-1;i>=0;i--){
    const p=g.powerups[i];
    const dx=g.px-p.x, dy=(g.py-25)-p.y;
    if(Math.sqrt(dx*dx+dy*dy)<32){
      if(p.type==='magnet') g.magnetTimer = 5;
      else if(p.type==='shield'){g.shieldActive=true; document.getElementById('hudShield').style.display='inline';}
      else if(p.type==='boost'){g.boostTimer=3; g.glowTimer=3;}
      sfxPowerup();
      spawnParticles(p.x,p.y,p.color,12);
      spawnScorePopup(p.x,p.y-10,p.emoji,p.color);
      g.powerups.splice(i,1);
    }
  }

  // Update particles
  updateParticles(dt);

  // ===== DRAW =====
  ctx.save();
  ctx.translate(g.shakeX, g.shakeY);

  // Parallax BG
  drawParallax(g.scrollX);

  // Draw obstacles
  ctx.font = '28px serif'; ctx.textAlign = 'center';
  g.obstacles.forEach(o=>{
    ctx.font = (o.h>40?'36px':'28px')+' serif';
    ctx.fillText(o.emoji, o.x + o.w/2, o.y + o.h - 4);
  });

  // Draw collectibles
  g.collectibles.forEach(c=>{
    const s = 1 + Math.sin(c.bob*2)*.1;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(s,s);
    ctx.font = (c.w > 24 ? '26px':'22px')+' serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.emoji, 0, 8);
    ctx.restore();
  });

  // Draw powerups
  g.powerups.forEach(p=>{
    const s = 1 + Math.sin(p.bob)*.15;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(s,s);
    ctx.font = '26px serif';
    ctx.textAlign = 'center';
    // Glow
    ctx.shadowColor = p.color; ctx.shadowBlur = 15;
    ctx.fillText(p.emoji, 0, 8);
    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // Draw player
  const pColor = players[selectedPlayer].color;
  ctx.save();
  ctx.translate(g.px, g.py);
  ctx.scale(g.squash, g.stretch);

  // Glow effect (boost or magnet active)
  if(g.glowTimer > 0 || g.magnetTimer > 0){
    const gc = g.glowTimer>0 ? '#ffaa00' : '#ff4444';
    ctx.shadowColor = gc; ctx.shadowBlur = 20 + Math.sin(g.time*10)*8;
  }
  // Invincibility blink
  if(g.invincTimer > 0 && Math.floor(g.invincTimer*10)%2===0){
    ctx.globalAlpha = 0.4;
  }

  // Character emoji
  const emoji = players[selectedPlayer].run[g.runFrame];
  ctx.font = '36px serif';
  ctx.textAlign = 'center';
  ctx.fillText(emoji, 0, -8);

  // Shield indicator
  if(g.shieldActive){
    ctx.strokeStyle = '#44aaff'; ctx.lineWidth = 2;
    ctx.globalAlpha = .5 + Math.sin(g.time*4)*.3;
    ctx.beginPath(); ctx.arc(0,-18,24,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();

  // Particles
  drawParticles();

  // Screen flash
  if(g.flashAlpha > 0){
    ctx.fillStyle = g.flashColor;
    ctx.globalAlpha = g.flashAlpha * 0.3;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }

  // Rainbow flash
  if(g.rainbowFlash > 0){
    const hue = (g.time*500)%360;
    ctx.fillStyle = `hsla(${hue},100%,70%,${g.rainbowFlash*0.3})`;
    ctx.fillRect(0,0,W,H);
  }

  // Pause overlay
  if(paused){
    ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.font = '800 32px Quicksand'; ctx.textAlign = 'center';
    ctx.fillText('PAUSE', W/2, H/2);
    ctx.font = '16px Quicksand';
    ctx.fillText('Tap ou Espace pour continuer', W/2, H/2+30);
  }

  ctx.restore();

  // HUD update
  document.getElementById('hudScore').textContent = g.score + ' pts';
  document.getElementById('hudDist').textContent = Math.floor(g.distance) + ' m';

  animId = requestAnimationFrame(gameLoop);
}

function updateHUD(){
  let h='';
  for(let i=0;i<3;i++) h += i < game.lives ? '❤️':'🖤';
  document.getElementById('hudLives').textContent = h;
}

// ===== GAME CONTROL =====
function startGame(){
  ensureAudio();
  game = createGame();
  particles = [];
  paused = false;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('endScreen').style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('hudShield').style.display = 'none';

  canvas.width = W; canvas.height = H;
  updateHUD();
  startBeat();
  lastTime = performance.now();
  animId = requestAnimationFrame(gameLoop);
}

function endGame(){
  game.gameOver = true;
  stopBeat();
  cancelAnimationFrame(animId);

  const dist = Math.floor(game.distance);
  const key = 'kpop_hs_course_' + playerName;
  const best = Math.max(dist, parseInt(localStorage.getItem(key)||'0'));
  localStorage.setItem(key, best);

  // Star rating
  let stars = 1;
  if(dist>=200) stars=2; if(dist>=500) stars=3; if(dist>=1000) stars=4; if(dist>=2000) stars=5;

  document.getElementById('endDist').textContent = dist;
  document.getElementById('endScore').textContent = game.score;
  document.getElementById('endItems').textContent = game.items;
  document.getElementById('endBest').textContent = best;
  document.getElementById('endStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(5-stars);

  canvas.style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  const es = document.getElementById('endScreen');
  es.style.display = 'flex';
}

function restartGame(){ startGame(); }
function backToMenu(){
  document.getElementById('endScreen').style.display='none';
  document.getElementById('menu').style.display='flex';
}

function togglePause(){
  if(!game||game.gameOver) return;
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶️':'⏸';
  if(!paused){lastTime=performance.now(); if(soundOn)startBeat();} else stopBeat();
}

// ===== SHARE =====
function shareWA(){
  const dist=Math.floor(game.distance);
  const txt=`Course K-Pop avec ${playerName} : ${dist}m et ${game.score} pts ! Bats mon score ! 🏃‍♀️⭐`;
  window.open('https://wa.me/?text='+encodeURIComponent(txt));
}
function copyScore(){
  const dist=Math.floor(game.distance);
  const txt=`Course K-Pop avec ${playerName} : ${dist}m et ${game.score} pts !`;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.querySelector('.share-btn.cp');
    btn.textContent='Copie !'; setTimeout(()=>btn.textContent='Copier',1500);
  });
}
