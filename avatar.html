function buildAvatarSVG(state,w,h){
  const skin=SKIN_TONES[state.skin]||SKIN_TONES[0];
  const face=FACE_SHAPES[state.face]||FACE_SHAPES[0];
  const eyes=EYE_STYLES[state.eyes]||EYE_STYLES[0];
  const mouth=MOUTH_STYLES[state.mouth]||MOUTH_STYLES[0];
  const hair=HAIR_STYLES[state.hair]||HAIR_STYLES[0];
  const hc=HAIR_COLORS[state.hairColor]||HAIR_COLORS[0];
  const outfit=OUTFITS[state.outfit]||OUTFITS[0];
  const acc=ACCESSORIES[state.accessory]||ACCESSORIES[0];
  const hairFill=hc.gradient?'url(#rainbowGrad)':hc.color;
  const skinDarker=darkenColor(skin.color,.12);
  const eyeWhite='#fff';
  const eyeIris='#2d1b4e';

  let svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" width="${w||260}" height="${h||380}">`;
  // Defs
  svg+=`<defs>
    <linearGradient id="rainbowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/><stop offset="17%" stop-color="#ffa502"/>
      <stop offset="33%" stop-color="#ffd700"/><stop offset="50%" stop-color="#2ed573"/>
      <stop offset="67%" stop-color="#1e90ff"/><stop offset="83%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#ff6fd8"/>
    </linearGradient>
    <radialGradient id="cheekBlush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b81" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#ff6b81" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity=".15"/></filter>
  </defs>`;

  // ── Body (neck + torso) ──
  svg+=`<g filter="url(#softShadow)">`;
  // Neck
  svg+=`<rect x="118" y="210" width="24" height="30" rx="12" fill="${skin.color}"/>`;
  // Body/outfit
  svg+=renderOutfitSVG(outfit,state);
  svg+=`</g>`;

  // ── Hair BACK ──
  if(hair.back){
    svg+=`<path d="${hair.back}" fill="${hairFill}" opacity=".9"/>`;
  }

  // ── Wings (behind body) ──
  if(acc.id==='wings'){
    svg+=`<g opacity=".7">
      <path d="M50,200 C20,160 10,120 30,100 C50,80 70,110 80,160Z" fill="rgba(200,180,255,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
      <path d="M210,200 C240,160 250,120 230,100 C210,80 190,110 180,160Z" fill="rgba(200,180,255,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
    </g>`;
  }

  // ── Head ──
  svg+=`<g filter="url(#softShadow)">`;
  // Face shape
  svg+=`<path d="${face.d}" fill="${skin.color}"/>`;
  // Ears
  svg+=`<ellipse cx="65" cy="130" rx="8" ry="12" fill="${skin.color}"/>`;
  svg+=`<ellipse cx="195" cy="130" rx="8" ry="12" fill="${skin.color}"/>`;
  // Blush
  svg+=`<ellipse cx="88" cy="148" rx="14" ry="9" fill="url(#cheekBlush)"/>`;
  svg+=`<ellipse cx="172" cy="148" rx="14" ry="9" fill="url(#cheekBlush)"/>`;
  svg+=`</g>`;

  // ── Eyes ──
  svg+=`<g class="avatar-eyes">`;
  // Left eye
  svg+=`<path d="${eyes.left}" fill="${eyeWhite}" stroke="rgba(0,0,0,.1)" stroke-width=".5"/>`;
  if(eyes.pupilL){
    svg+=`<circle cx="${eyes.pupilL[0]}" cy="${eyes.pupilL[1]}" r="${eyes.pupilL[2]}" fill="${eyeIris}"/>`;
    svg+=`<circle cx="${eyes.pupilL[0]}" cy="${eyes.pupilL[1]}" r="${eyes.pupilL[2]*.45}" fill="#0a0a1a"/>`;
  }
  if(eyes.shineL){
    svg+=`<circle cx="${eyes.shineL[0]}" cy="${eyes.shineL[1]}" r="${eyes.shineL[2]}" fill="#fff" opacity=".9"/>`;
  }
  // Right eye
  if(eyes.id==='wink'){
    svg+=`<path d="${eyes.right}" fill="none" stroke="#2d1b4e" stroke-width="2.5" stroke-linecap="round"/>`;
  } else if(eyes.id==='sleepy'){
    svg+=`<path d="${eyes.left}" fill="none" stroke="#2d1b4e" stroke-width="2.5" stroke-linecap="round"/>`;
    svg+=`<path d="${eyes.right}" fill="none" stroke="#2d1b4e" stroke-width="2.5" stroke-linecap="round"/>`;
  } else {
    svg+=`<path d="${eyes.right}" fill="${eyeWhite}" stroke="rgba(0,0,0,.1)" stroke-width=".5"/>`;
    if(eyes.pupilR){
      svg+=`<circle cx="${eyes.pupilR[0]}" cy="${eyes.pupilR[1]}" r="${eyes.pupilR[2]}" fill="${eyeIris}"/>`;
      svg+=`<circle cx="${eyes.pupilR[0]}" cy="${eyes.pupilR[1]}" r="${eyes.pupilR[2]*.45}" fill="#0a0a1a"/>`;
    }
    if(eyes.shineR){
      svg+=`<circle cx="${eyes.shineR[0]}" cy="${eyes.shineR[1]}" r="${eyes.shineR[2]}" fill="#fff" opacity=".9"/>`;
    }
  }
  // Sparkle decorations on eyes
  if(eyes.sparkle){
    svg+=`<circle cx="106" cy="108" r="2" fill="#ffd700" opacity=".8"/>`;
    svg+=`<circle cx="126" cy="112" r="1.5" fill="#ffd700" opacity=".6"/>`;
    svg+=`<circle cx="136" cy="108" r="2" fill="#ffd700" opacity=".8"/>`;
    svg+=`<circle cx="156" cy="112" r="1.5" fill="#ffd700" opacity=".6"/>`;
  }
  // Eyebrows
  svg+=`<path d="M98,102 Q115,95 132,100" fill="none" stroke="${hairFill==='url(#rainbowGrad)'?'#333':darkenColor(hc.color,.3)}" stroke-width="2" stroke-linecap="round"/>`;
  svg+=`<path d="M128,100 Q145,95 162,102" fill="none" stroke="${hairFill==='url(#rainbowGrad)'?'#333':darkenColor(hc.color,.3)}" stroke-width="2" stroke-linecap="round"/>`;
  svg+=`</g>`;

  // Nose
  svg+=`<path d="M128,140 Q130,146 133,140" fill="none" stroke="${skinDarker}" stroke-width="1.5" stroke-linecap="round"/>`;

  // ── Mouth ──
  if(mouth.fill&&mouth.color){
    svg+=`<path d="${mouth.d}" fill="${mouth.color}"/>`;
    if(mouth.id==='big_smile'||mouth.id==='open'){
      svg+=`<path d="${mouth.d}" fill="none" stroke="${darkenColor(mouth.color,.2)}" stroke-width="1"/>`;
    }
  } else {
    svg+=`<path d="${mouth.d}" fill="none" stroke="#2d1b4e" stroke-width="2" stroke-linecap="round"/>`;
  }
  if(mouth.tongue){
    svg+=`<ellipse cx="130" cy="172" rx="7" ry="5" fill="#ff6b81"/>`;
  }

  // ── Hair FRONT ──
  if(hair.front){
    svg+=`<path d="${hair.front}" fill="${hairFill}"/>`;
    // Hair shine
    svg+=`<path d="${hair.front}" fill="rgba(255,255,255,.08)"/>`;
  }

  // ── Accessories ──
  svg+=renderAccessorySVG(acc);

  // ── Eyelash lines ──
  if(eyes.id!=='sleepy'&&eyes.id!=='wink'){
    svg+=`<path d="M95,110 Q90,106 86,108" fill="none" stroke="#2d1b4e" stroke-width="1" stroke-linecap="round"/>`;
    svg+=`<path d="M165,110 Q170,106 174,108" fill="none" stroke="#2d1b4e" stroke-width="1" stroke-linecap="round"/>`;
  }

  svg+=`</svg>`;
  return svg;
}

function renderOutfitSVG(outfit,state){
  let s='';

function starPoints(cx,cy,r){
  let pts=[];
  for(let i=0;i<10;i++){
    const angle=Math.PI/2+i*Math.PI/5;
    const rad=i%2===0?r:r*.4;
    pts.push((cx+Math.cos(angle)*rad).toFixed(1)+','+(cy-Math.sin(angle)*rad).toFixed(1));
  }
  return pts.join(' ');
}

function darkenColor(hex,amount){
  if(hex.startsWith('url'))return '#333';
  const h=hex.replace('#','');
  const r=Math.max(0,parseInt(h.substr(0,2),16)*(1-amount))|0;
  const g=Math.max(0,parseInt(h.substr(2,2),16)*(1-amount))|0;
  const b=Math.max(0,parseInt(h.substr(4,2),16)*(1-amount))|0;
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}

function renderScene(sceneData,bgEl,particlesEl){
  const sc=sceneData||SCENES[0];
  bgEl.style.background=`linear-gradient(180deg,${sc.bg[0]},${sc.bg[1]})`;
  particlesEl.innerHTML='';
  const pTypes={
    spotlight:`<span style="left:50%;top:0;width:0;height:0;border-left:60px solid transparent;border-right:60px solid transparent;border-top:200px solid rgba(255,255,255,.03);font-size:0;transform:translateX(-50%)"></span>`,
    flash:'',
    stars:buildParticleSpans(['*'],8,'#ffd700'),
    petals:buildParticleSpans(['p'],10,'#ffb6c1'),
    twinkle:buildParticleSpans(['*'],12,'#fff'),
    rainbow:'',
    bubbles:buildParticleSpans(['o'],8,'rgba(255,255,255,.3)'),
    cosmic:buildParticleSpans(['*'],10,'#c471f5'),
  };
  particlesEl.innerHTML=pTypes[sc.particles[0]]||'';
}

function buildParticleSpans(types,count,color){
  let h='';
  const shapes={'*':'2px','p':'4px','o':'50%'};
  for(let i=0;i<count;i++){
    const x=(5+Math.random()*90).toFixed(0);
    const y=(5+Math.random()*90).toFixed(0);
    const sz=(3+Math.random()*5).toFixed(0);
    const del=(Math.random()*3).toFixed(1);
    const dur=(3+Math.random()*4).toFixed(1);
    h+=`<span style="left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;background:${color};border-radius:50%;animation-delay:${del}s;animation-duration:${dur}s;opacity:.5"></span>`;
  }
  return h;
}

function getActiveState(){
  return isDuo&&duoTarget===1?duoBFF:current;
}

function updatePreview(){
  // Single mode
  const wrap=document.getElementById('avatarWrap');
  wrap.innerHTML=buildAvatarSVG(current);
  renderScene(SCENES[current.scene],document.getElementById('sceneBg'),document.getElementById('sceneParticles'));

  // Duo mode
  if(isDuo){
    document.getElementById('duoWrapA').innerHTML=buildAvatarSVG(current,200,310);
    document.getElementById('duoWrapB').innerHTML=buildAvatarSVG(duoBFF,200,310);
    renderScene(SCENES[current.scene],document.getElementById('duoBgA'),document.getElementById('duoParticlesA'));
    renderScene(SCENES[duoBFF.scene||0],document.getElementById('duoBgB'),document.getElementById('duoParticlesB'));
  }

  // Name
  const name=document.getElementById('idolNameInput').value||playerName+' Star';
  document.getElementById('nameTag').textContent=name;
  updateStarRating();

  // Idle eye blink
  document.querySelectorAll('.avatar-eyes').forEach(g=>{
    g.style.animation='idleBlink 4s ease-in-out infinite';
  });
}

function updateStarRating(){
  const s=Object.values(current).filter((v,i)=>v>0).length;
  const level=Math.max(1,Math.min(5,Math.ceil(s/2)));
  let d='';
  for(let i=0;i<5;i++)d+=i<level?'\u2B50':'\u2606';
  document.getElementById('starRating').textContent=d+' Niveau '+level;
}

  const st=getActiveState();
  const rng=n=>Math.floor(Math.random()*n);
  if(theme==='cute'){
    st.face=rng(3);st.skin=rng(3);st.eyes=rng(2);st.mouth=0;
    st.hair=0+rng(4);st.hairColor=8+rng(3);st.outfit=rng(2)?1:4;
    st.accessory=1+rng(4);st.scene=3+rng(2);
  } else if(theme==='cool'){
    st.face=3+rng(3);st.skin=rng(8);st.eyes=2+rng(3);st.mouth=2+rng(2);
    st.hair=6+rng(4);st.hairColor=rng(3)?0+rng(4):10+rng(3);st.outfit=2+rng(3)?6:2;
    st.accessory=3+rng(5);st.scene=0+rng(3);
  } else if(theme==='glam'){
    st.face=rng(2);st.skin=rng(4);st.eyes=0+rng(2);st.mouth=1;
    st.hair=1+rng(3);st.hairColor=5+rng(3);st.outfit=rng(2)?1:9;
    st.accessory=rng(2)?1:11;st.scene=2+rng(2);
  }
  sparkleOnPreview();updateAll();
  showToast('Look '+theme+' genere !');
}

// =====================================================================
//  DUO MODE
// =====================================================================
function toggleDuo(){
  isDuo=!isDuo;
  playPop();
  document.getElementById('singleStage').style.display=isDuo?'none':'block';
  document.getElementById('duoStage').style.display=isDuo?'block':'none';
  document.getElementById('duoControls').style.display=isDuo?'block':'none';
  if(isDuo){
    duoTarget=0;
    showToast('Mode Duo active !');
  } else {
    duoTarget=0;
    showToast('Mode Solo');
  }
  updateAll();
}

function switchDuoTarget(t){
  duoTarget=t;
  playPop();
  const btns=document.querySelectorAll('.duo-switch button');
  btns.forEach((b,i)=>b.classList.toggle('active',i===t));
  renderAllOptions();
  showToast(t===0?'Tu edites ton Idol':'Tu edites ta Best Friend');
}

// =====================================================================
//  GALLERY
// =====================================================================
function saveToGallery(){
  playJingle();launchConfetti();
  const name=document.getElementById('idolNameInput').value||playerName+' Star';
  let gallery=JSON.parse(localStorage.getItem('kpop_idol_gallery_'+playerName)||'[]');
  if(gallery.length>=12)gallery.shift();

  const saveData={name,data:{...current},date:Date.now()};
  if(isDuo)saveData.bff={...duoBFF};
  gallery.push(saveData);

  localStorage.setItem('kpop_idol_gallery_'+playerName,JSON.stringify(gallery));
  localStorage.setItem('kpop_avatar_'+playerName,JSON.stringify(current));

  // Trophies + stars
  let trophies=JSON.parse(localStorage.getItem('kpop_trophies_'+playerName)||'[]');
  if(!trophies.includes('avatar_created')){trophies.push('avatar_created');localStorage.setItem('kpop_trophies_'+playerName,JSON.stringify(trophies))}
  let stars=parseInt(localStorage.getItem('kpop_stars_'+playerName)||'0');stars+=20;
  localStorage.setItem('kpop_stars_'+playerName,String(stars));

  showToast(name+' sauvegardee ! +20 etoiles');
  renderGallery();
}

function renderGallery(){
  const grid=document.getElementById('galleryGrid');
  const gallery=JSON.parse(localStorage.getItem('kpop_idol_gallery_'+playerName)||'[]');
  grid.innerHTML='';
  if(!gallery.length){grid.innerHTML='<div class="gallery-empty">Aucune idol sauvegardee. Cree ta premiere !</div>';return}

  gallery.forEach((idol,idx)=>{
    const card=document.createElement('div');card.className='gallery-card';
    const miniWrap=document.createElement('div');miniWrap.className='mini-svg';
    const sc=SCENES[idol.data.scene||0]||SCENES[0];
    miniWrap.style.background=`linear-gradient(180deg,${sc.bg[0]},${sc.bg[1]})`;
    miniWrap.innerHTML=buildAvatarSVG(idol.data,80,110);
    card.appendChild(miniWrap);
    const gn=document.createElement('div');gn.className='gname';gn.textContent=idol.name;card.appendChild(gn);
    const del=document.createElement('div');del.className='gdelete';del.textContent='Supprimer';
    del.onclick=e=>{e.stopPropagation();gallery.splice(idx,1);localStorage.setItem('kpop_idol_gallery_'+playerName,JSON.stringify(gallery));renderGallery()};
    card.appendChild(del);
    card.onclick=()=>{
      Object.assign(current,idol.data);
      if(idol.bff)Object.assign(duoBFF,idol.bff);
      document.getElementById('idolNameInput').value=idol.name;
      playPop();updateAll();showToast(idol.name+' chargee !');
    };
    grid.appendChild(card);
  });
}

// =====================================================================
//  EXPORT SVG
// =====================================================================
function exportSVG(){
  playPop();
  const svgStr=buildAvatarSVG(current,520,760);
  const blob=new Blob([svgStr],{type:'image/svg+xml'});
  const reader=new FileReader();
  reader.onload=function(){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(reader.result).then(()=>{
        showToast('SVG copie dans le presse-papier !');
      }).catch(()=>{
        showToast('Erreur de copie');
      });
    } else {
      showToast('Copie non supportee');
    }
  };
  reader.readAsDataURL(blob);
}

// =====================================================================
//  3D TILT
// =====================================================================
const stage=document.getElementById('avatarStage');
stage.addEventListener('mousemove',function(e){
  const r=this.getBoundingClientRect();
  const dx=(e.clientX-(r.left+r.width/2))/(r.width/2);
  const dy=(e.clientY-(r.top+r.height/2))/(r.height/2);
  const svg=this.querySelector('svg');
  if(svg)svg.style.transform=`rotateX(${-dy*5}deg) rotateY(${dx*5}deg)`;
});
stage.addEventListener('mouseleave',function(){
  const svg=this.querySelector('svg');
  if(svg)svg.style.transform='';
});

// =====================================================================
//  UNLOCK COUNTER
// =====================================================================
function updateUnlockCounter(){
  const total=FACE_SHAPES.length+SKIN_TONES.length+EYE_STYLES.length+MOUTH_STYLES.length+HAIR_STYLES.length+HAIR_COLORS.length+OUTFITS.length+ACCESSORIES.length+SCENES.length;
  document.getElementById('unlockCounter').innerHTML='\uD83D\uDD13 <span>'+total+'/'+total+'</span> options debloquees — Acces VIP !';
}

// =====================================================================
//  SPARKLE TRAIL (mouse/touch)
// =====================================================================
function spawnTrailParticle(x,y){
  if(Math.random()>.65)return;
  const s=document.createElement('div');
  s.style.cssText=`position:fixed;pointer-events:none;z-index:9999;font-size:${8+Math.random()*10}px;left:${x}px;top:${y}px;opacity:1;transition:all .7s ease-out;`;
  s.textContent=['\u2728','\u2B50','\uD83D\uDCAB','\uD83C\uDF1F','\uD83D\uDC96'][Math.floor(Math.random()*5)];
  document.body.appendChild(s);
  requestAnimationFrame(()=>{
    s.style.transform=`translateY(-${25+Math.random()*35}px) translateX(${(Math.random()-.5)*25}px) scale(0)`;
    s.style.opacity='0';
  });
  setTimeout(()=>s.remove(),700);
}
document.addEventListener('mousemove',e=>spawnTrailParticle(e.clientX,e.clientY));
document.addEventListener('touchmove',e=>{const t=e.touches[0];spawnTrailParticle(t.clientX,t.clientY)});

// =====================================================================
//  HAPTIC
// =====================================================================
document.addEventListener('click',e=>{
  if(e.target.closest('button,.opt-card,.color-circle,.outfit-chip,.gallery-card'))
    try{navigator.vibrate?.(15)}catch(ex){}
});

// =====================================================================
//  SWIPE support for carousels
// =====================================================================
document.querySelectorAll('.carousel-track').forEach(track=>{
  let startX=0,scrollL=0;
  track.addEventListener('touchstart',e=>{startX=e.touches[0].pageX;scrollL=track.scrollLeft},{passive:true});
  track.addEventListener('touchmove',e=>{track.scrollLeft=scrollL-(e.touches[0].pageX-startX)},{passive:true});
});

// =====================================================================
//  INIT
// =====================================================================
buildOptionsPanel();renderTabs();showTab();updatePreview();renderGallery();updateUnlockCounter();
</script>
