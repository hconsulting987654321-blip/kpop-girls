<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cree ton Idol K-Pop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #ff9a9e, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradientBG 8s ease infinite;
  min-height: 100vh;
  font-family: 'Quicksand', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.back-btn {
  position: fixed; top: 12px; left: 12px;
  background: rgba(255,255,255,0.3);
  color: white; border: 2px solid rgba(255,255,255,0.5);
  padding: 6px 16px; border-radius: 30px;
  font-family: inherit; font-size: 0.9em;
  cursor: pointer; text-decoration: none; z-index: 100;
}

h1 {
  font-size: 2em; color: white;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
  margin: 10px 0 5px;
}

.player-name-display {
  color: #ffd700; font-size: 1.1em; font-weight: 700;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
  margin-bottom: 15px;
}

.creator {
  display: flex;
  gap: 25px;
  max-width: 900px;
  width: 100%;
  flex-wrap: wrap;
  justify-content: center;
}

/* Preview */
.preview-panel {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 24px;
  padding: 25px;
  text-align: center;
  min-width: 280px;
  flex: 0 0 280px;
}

.avatar-preview {
  width: 220px; height: 280px;
  margin: 0 auto 15px;
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background: linear-gradient(180deg, #ffecd2, #fcb69f);
}

.avatar-layer {
  position: absolute;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1em;
  transition: all 0.3s;
}

.av-bg { font-size: 15em; opacity: 0.15; }
.av-body { font-size: 8em; top: 25%; }
.av-hair { font-size: 5em; top: 2%; }
.av-face { font-size: 3em; top: 28%; }
.av-outfit { font-size: 5em; top: 55%; }
.av-accessory { font-size: 3em; top: 8%; left: 60%; }

.avatar-name-tag {
  background: linear-gradient(145deg, #ff6fd8, #ffd700);
  color: white;
  padding: 8px 25px;
  border-radius: 20px;
  font-size: 1.2em;
  font-weight: 700;
  display: inline-block;
  margin-bottom: 10px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}

.save-btn {
  background: linear-gradient(145deg, #4ecdc4, #2bcbba);
  color: white; border: none;
  padding: 12px 30px; border-radius: 25px;
  font-family: inherit; font-size: 1.1em;
  font-weight: 700; cursor: pointer;
  margin: 5px;
  box-shadow: 0 4px 15px rgba(78,205,196,0.3);
}

.save-btn:hover { transform: scale(1.05); }

.random-btn {
  background: linear-gradient(145deg, #ff6fd8, #cd77ff);
  color: white; border: none;
  padding: 12px 30px; border-radius: 25px;
  font-family: inherit; font-size: 1.1em;
  font-weight: 700; cursor: pointer;
  margin: 5px;
}

/* Options */
.options-panel {
  flex: 1;
  min-width: 300px;
}

.option-group {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 12px;
}

.option-label {
  color: white;
  font-size: 1.1em;
  font-weight: 700;
  margin-bottom: 10px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}

.option-items {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.option-item {
  width: 50px; height: 50px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8em;
  cursor: pointer;
  background: rgba(255,255,255,0.15);
  border: 2px solid transparent;
  transition: all 0.2s;
}

.option-item:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }
.option-item.selected {
  border-color: #ffd700;
  background: rgba(255,215,0,0.2);
  box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.color-item {
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: all 0.2s;
}

.color-item:hover { transform: scale(1.15); }
.color-item.selected {
  border-color: white;
  box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

/* Saved toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 15px 30px;
  border-radius: 15px;
  font-size: 1.1em;
  z-index: 500;
  transition: transform 0.4s ease;
}

.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .creator { flex-direction: column; align-items: center; }
  .preview-panel { min-width: auto; flex: none; width: 100%; }
}
</style>
</head>
<body>

<a href="index.html" class="back-btn">Retour</a>

<h1>Cree ton Idol K-Pop</h1>
<div class="player-name-display" id="playerDisplay"></div>

<div class="creator">
  <div class="preview-panel">
    <div class="avatar-preview" id="avatarPreview">
      <div class="avatar-layer av-bg" id="avBg"></div>
      <div class="avatar-layer av-body" id="avBody">👤</div>
      <div class="avatar-layer av-hair" id="avHair"></div>
      <div class="avatar-layer av-face" id="avFace"></div>
      <div class="avatar-layer av-outfit" id="avOutfit"></div>
      <div class="avatar-layer av-accessory" id="avAccessory"></div>
    </div>
    <div class="avatar-name-tag" id="nameTag">Ma Star</div>
    <br>
    <button class="random-btn" onclick="randomize()">🎲 Aleatoire</button>
    <button class="save-btn" onclick="saveAvatar()">💾 Sauvegarder</button>
  </div>

  <div class="options-panel">
    <div class="option-group">
      <div class="option-label">Peau</div>
      <div class="option-items" id="skinOptions"></div>
    </div>

    <div class="option-group">
      <div class="option-label">Cheveux</div>
      <div class="option-items" id="hairOptions"></div>
    </div>

    <div class="option-group">
      <div class="option-label">Couleur cheveux</div>
      <div class="option-items" id="hairColorOptions"></div>
    </div>

    <div class="option-group">
      <div class="option-label">Visage</div>
      <div class="option-items" id="faceOptions"></div>
    </div>

    <div class="option-group">
      <div class="option-label">Tenue</div>
      <div class="option-items" id="outfitOptions"></div>
    </div>

    <div class="option-group">
      <div class="option-label">Accessoire</div>
      <div class="option-items" id="accessoryOptions"></div>
    </div>

    <div class="option-group">
      <div class="option-label">Fond</div>
      <div class="option-items" id="bgOptions"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Sauvegarde !</div>

<script>
const OPTIONS = {
  skin: ['🧑','🧑🏻','🧑🏼','🧑🏽','🧑🏾','🧑🏿'],
  hair: ['💇‍♀️','👩‍🦰','👩‍🦱','👩','👩‍🦳','💆‍♀️','🧝‍♀️','👸'],
  hairColor: [
    { color: '#1a1a1a', name: 'Noir' },
    { color: '#8B4513', name: 'Brun' },
    { color: '#DAA520', name: 'Blond' },
    { color: '#FF4500', name: 'Roux' },
    { color: '#FF69B4', name: 'Rose' },
    { color: '#8A2BE2', name: 'Violet' },
    { color: '#00CED1', name: 'Bleu' },
    { color: '#FF1493', name: 'Magenta' },
  ],
  face: ['😊','😎','🥰','😇','🤩','😘','😋','🥳'],
  outfit: ['👗','👘','🥻','👔','🎽','👚','🧥','💃'],
  accessory: ['👑','🎀','🌸','🦋','⭐','💎','🌟','🎧','🕶️','💜','✨','🌺'],
  bg: ['🌸','⭐','💜','🌈','🦋','✨','🎵','💖','🔮','🌙'],
};

let current = {
  skin: 0, hair: 0, hairColor: 1, face: 0,
  outfit: 0, accessory: 0, bg: 0
};

const playerName = new URLSearchParams(window.location.search).get('player') || localStorage.getItem('kpop_player') || 'Star';
document.getElementById('playerDisplay').textContent = `L'idol de ${playerName}`;
document.getElementById('nameTag').textContent = `${playerName} Star`;

function renderOptions() {
  // Skin
  renderEmojiOptions('skinOptions', OPTIONS.skin, 'skin');
  // Hair
  renderEmojiOptions('hairOptions', OPTIONS.hair, 'hair');
  // Hair color
  const hcEl = document.getElementById('hairColorOptions');
  hcEl.innerHTML = '';
  OPTIONS.hairColor.forEach((hc, i) => {
    const d = document.createElement('div');
    d.className = `color-item ${i === current.hairColor ? 'selected' : ''}`;
    d.style.background = hc.color;
    d.title = hc.name;
    d.onclick = () => { current.hairColor = i; updateAll(); };
    hcEl.appendChild(d);
  });
  // Face
  renderEmojiOptions('faceOptions', OPTIONS.face, 'face');
  // Outfit
  renderEmojiOptions('outfitOptions', OPTIONS.outfit, 'outfit');
  // Accessory
  renderEmojiOptions('accessoryOptions', OPTIONS.accessory, 'accessory');
  // Bg
  renderEmojiOptions('bgOptions', OPTIONS.bg, 'bg');
}

function renderEmojiOptions(containerId, items, key) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = `option-item ${i === current[key] ? 'selected' : ''}`;
    d.textContent = item;
    d.onclick = () => { current[key] = i; updateAll(); };
    el.appendChild(d);
  });
}

function updatePreview() {
  document.getElementById('avBody').textContent = OPTIONS.skin[current.skin];
  document.getElementById('avHair').textContent = OPTIONS.hair[current.hair];
  document.getElementById('avHair').style.filter = `drop-shadow(0 0 8px ${OPTIONS.hairColor[current.hairColor].color})`;
  document.getElementById('avFace').textContent = OPTIONS.face[current.face];
  document.getElementById('avOutfit').textContent = OPTIONS.outfit[current.outfit];
  document.getElementById('avAccessory').textContent = OPTIONS.accessory[current.accessory];
  document.getElementById('avBg').textContent = OPTIONS.bg[current.bg];

  // Bg gradient based on selection
  const bgColors = [
    ['#ffecd2','#fcb69f'], ['#ffecd2','#ffd700'], ['#e8d5f5','#a18cd1'],
    ['#ffecd2','#ff9a9e'], ['#d4fc79','#96e6a1'], ['#fbc2eb','#a18cd1'],
    ['#89f7fe','#66a6ff'], ['#ffecd2','#ff6fd8'], ['#a18cd1','#6c5ce7'], ['#0f0c29','#302b63']
  ];
  const [c1, c2] = bgColors[current.bg] || bgColors[0];
  document.getElementById('avatarPreview').style.background = `linear-gradient(180deg, ${c1}, ${c2})`;
}

function updateAll() {
  renderOptions();
  updatePreview();
}

function randomize() {
  Object.keys(current).forEach(key => {
    const max = key === 'hairColor' ? OPTIONS.hairColor.length : OPTIONS[key === 'hairColor' ? 'hairColor' : key].length;
    const opts = key === 'hairColor' ? OPTIONS.hairColor : OPTIONS[key];
    current[key] = Math.floor(Math.random() * opts.length);
  });
  updateAll();
}

function saveAvatar() {
  localStorage.setItem(`kpop_avatar_${playerName}`, JSON.stringify(current));

  // Unlock trophy
  let trophies = JSON.parse(localStorage.getItem(`kpop_trophies_${playerName}`) || '[]');
  if (!trophies.includes('avatar_created')) {
    trophies.push('avatar_created');
    localStorage.setItem(`kpop_trophies_${playerName}`, JSON.stringify(trophies));
  }

  // Add stars
  let stars = parseInt(localStorage.getItem(`kpop_stars_${playerName}`) || '0');
  stars += 20;
  localStorage.setItem(`kpop_stars_${playerName}`, stars);

  const toast = document.getElementById('toast');
  toast.textContent = `Avatar de ${playerName} sauvegarde ! +20 ⭐`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Load saved avatar
const saved = localStorage.getItem(`kpop_avatar_${playerName}`);
if (saved) {
  try { Object.assign(current, JSON.parse(saved)); } catch(e) {}
}

updateAll();
</script>
</body>
</html>
