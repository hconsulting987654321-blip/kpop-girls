<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cree ton Idol — Ecole Saint-Esprit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #ff9a9e, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradientBG 8s ease infinite;
  min-height: 100vh;
  font-family: 'Quicksand', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
  50% { opacity: 1; transform: scale(1) rotate(180deg); }
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.5); }
}

@keyframes pulseGold {
  0%, 100% { border-color: #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.3); }
  50% { border-color: #ffec8b; box-shadow: 0 0 20px rgba(255,215,0,0.6); }
}

@keyframes bounceIn {
  0% { opacity: 0; transform: scale(0.3) translateY(20px); }
  50% { transform: scale(1.08) translateY(-4px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(120px) rotate(720deg) scale(0.3); }
}

@keyframes sparkBurst {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
}

@keyframes cameraFlash {
  0% { opacity: 0.9; }
  100% { opacity: 0; }
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 20px var(--glow-color, rgba(255,105,180,0.4)); }
  50% { box-shadow: 0 0 40px var(--glow-color, rgba(255,105,180,0.6)), 0 0 60px var(--glow-color, rgba(255,105,180,0.2)); }
}

@keyframes idolFrameShine {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.back-btn {
  position: fixed; top: 12px; left: 12px;
  background: rgba(255,255,255,0.3);
  color: white; border: 2px solid rgba(255,255,255,0.5);
  padding: 6px 16px; border-radius: 30px;
  font-family: inherit; font-size: 0.9em;
  cursor: pointer; text-decoration: none; z-index: 100;
}

h1 {
  font-size: 1.9em; color: white;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
  margin: 10px 0 5px;
}

.player-name-display {
  color: #ffd700; font-size: 1.1em; font-weight: 700;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
  margin-bottom: 4px;
}

/* Unlock counter */
.unlock-counter {
  color: rgba(255,255,255,0.85); font-size: 0.85em; font-weight: 600;
  margin-bottom: 10px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}
.unlock-counter span { color: #ffd700; font-weight: 700; }

/* Idol du Jour */
.idol-du-jour {
  background: linear-gradient(145deg, rgba(255,215,0,0.2), rgba(255,105,180,0.2));
  border: 2px solid rgba(255,215,0,0.4);
  border-radius: 16px; padding: 10px 20px;
  margin-bottom: 12px; text-align: center;
  max-width: 500px; width: 100%;
  backdrop-filter: blur(8px);
  position: relative; overflow: hidden;
}
.idol-du-jour::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.15), transparent);
  background-size: 200% 100%;
  animation: idolFrameShine 3s linear infinite;
}
.idol-du-jour-title {
  color: #ffd700; font-weight: 700; font-size: 0.95em;
  text-shadow: 0 0 8px rgba(255,215,0,0.4);
  position: relative;
}
.idol-du-jour-suggestion {
  color: white; font-size: 0.85em; margin-top: 4px;
  position: relative;
}
.idol-du-jour-btn {
  background: linear-gradient(145deg, #ffd700, #ffaa00);
  color: #333; border: none; padding: 5px 14px; border-radius: 12px;
  font-family: inherit; font-size: 0.8em; font-weight: 700;
  cursor: pointer; margin-top: 6px; position: relative;
  transition: transform 0.15s;
}
.idol-du-jour-btn:hover { transform: scale(1.06); }

.tabs {
  display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center;
}

.tab-btn {
  background: rgba(255,255,255,0.15);
  color: white; border: 2px solid rgba(255,255,255,0.2);
  padding: 8px 16px; border-radius: 20px;
  font-family: inherit; font-size: 0.85em; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.tab-btn:hover { background: rgba(255,255,255,0.3); }
.tab-btn.active {
  background: rgba(255,215,0,0.3); border-color: #ffd700;
  box-shadow: 0 0 12px rgba(255,215,0,0.3);
}

.creator {
  display: flex; gap: 20px; max-width: 950px; width: 100%;
  flex-wrap: wrap; justify-content: center;
}

/* Preview */
.preview-panel {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 24px;
  padding: 20px; text-align: center;
  min-width: 280px; flex: 0 0 290px;
}

.avatar-preview-wrapper {
  perspective: 600px;
  margin: 0 auto 12px;
  width: 220px; height: 300px;
}

.avatar-preview {
  width: 220px; height: 300px;
  position: relative;
  border-radius: 20px; overflow: hidden;
  background: linear-gradient(180deg, #ffecd2, #fcb69f);
  animation: bounce 3s ease-in-out infinite, glowPulse 2s ease-in-out infinite;
  transition: transform 0.15s ease-out, box-shadow 0.3s;
  transform-style: preserve-3d;
  will-change: transform;
}

.avatar-layer {
  position: absolute; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1em; transition: all 0.3s;
  pointer-events: none;
}

.av-bg { font-size: 14em; opacity: 0.12; }
.av-body { font-size: 7em; top: 22%; }
.av-hair { font-size: 4.5em; top: 1%; }
.av-face { font-size: 3em; top: 26%; }
.av-top { font-size: 4em; top: 48%; }
.av-bottom { font-size: 3.5em; top: 65%; }
.av-shoes { font-size: 2.5em; top: 82%; }
.av-accessory { font-size: 2.8em; top: 6%; left: 60%; }
.av-effect { font-size: 2em; opacity: 0.7; }

.effect-particle {
  position: absolute; font-size: 1.4em; pointer-events: none;
  animation: sparkle 2s ease-in-out infinite;
}

/* Spark burst container */
.spark-burst {
  position: absolute; pointer-events: none;
  font-size: 1em; z-index: 50;
  animation: sparkBurst 0.6s ease-out forwards;
}

.idol-name-input {
  width: 80%; padding: 8px 16px; border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.2);
  color: white; font-family: inherit; font-size: 1.1em;
  font-weight: 700; text-align: center; outline: none;
  margin-bottom: 10px;
}
.idol-name-input::placeholder { color: rgba(255,255,255,0.5); }

.avatar-name-tag {
  background: linear-gradient(145deg, #ff6fd8, #ffd700);
  color: white; padding: 8px 22px; border-radius: 20px;
  font-size: 1.15em; font-weight: 700; display: inline-block;
  margin-bottom: 8px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}

/* Star rating display */
.star-rating {
  margin-bottom: 6px; font-size: 1.1em;
  text-shadow: 0 0 6px rgba(255,215,0,0.5);
}

.btn-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 5px 0; }

.action-btn {
  color: white; border: none; padding: 10px 20px; border-radius: 22px;
  font-family: inherit; font-size: 0.95em; font-weight: 700;
  cursor: pointer; transition: transform 0.15s;
}
.action-btn:hover { transform: scale(1.06); }

.btn-save { background: linear-gradient(145deg, #4ecdc4, #2bcbba); }
.btn-random { background: linear-gradient(145deg, #ff6fd8, #cd77ff); }
.btn-photo { background: linear-gradient(145deg, #ffd700, #ffaa00); color: #333; }
.btn-export { background: linear-gradient(145deg, #6c5ce7, #a18cd1); }

.random-themes { display: flex; gap: 5px; justify-content: center; margin-top: 6px; flex-wrap: wrap; }
.theme-btn {
  background: rgba(255,255,255,0.15); color: white;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 5px 12px; border-radius: 15px;
  font-family: inherit; font-size: 0.8em; cursor: pointer;
}
.theme-btn:hover { background: rgba(255,255,255,0.3); }

/* Photo booth overlay */
.photo-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center;
}
.photo-overlay.active { display: flex; }

/* Camera flash */
.camera-flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: white; z-index: 199; pointer-events: none;
  opacity: 0;
}
.camera-flash.flash {
  animation: cameraFlash 0.5s ease-out forwards;
}

.photo-frame {
  background: white; border-radius: 20px; padding: 20px;
  text-align: center; position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  animation: bounce 0.5s ease;
}
.photo-frame .frame-deco {
  position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
  font-size: 2em;
}
.photo-avatar-box {
  width: 240px; height: 320px; border-radius: 16px;
  position: relative; overflow: hidden; margin: 15px auto 10px;
}
.photo-avatar-box .avatar-layer {
  position: absolute; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.photo-name {
  font-size: 1.3em; font-weight: 700;
  color: #ff6fd8; margin: 5px 0;
}
.photo-close {
  background: #ff6fd8; color: white; border: none;
  padding: 10px 28px; border-radius: 20px;
  font-family: inherit; font-size: 1em; font-weight: 700;
  cursor: pointer; margin-top: 8px;
}

/* Gallery */
.gallery-section {
  width: 100%; max-width: 950px; margin-top: 20px;
}
.gallery-title {
  color: white; font-size: 1.2em; font-weight: 700;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
  margin-bottom: 10px; text-align: center;
}
.gallery-grid {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
}
.gallery-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(5px);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 16px; padding: 12px;
  text-align: center; width: 130px; cursor: pointer;
  transition: transform 0.2s;
}
.gallery-card:hover { transform: scale(1.05); }
.gallery-card .mini-preview {
  width: 100px; height: 120px; border-radius: 12px;
  margin: 0 auto 6px; position: relative; overflow: hidden;
  font-size: 0.6em;
}
.gallery-card .mini-preview .avatar-layer { position: absolute; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center; }
.gallery-card .gname { color: white; font-size: 0.85em; font-weight: 700; }
.gallery-card .gdelete {
  color: rgba(255,255,255,0.5); font-size: 0.7em; cursor: pointer; margin-top: 4px;
}
.gallery-card .gdelete:hover { color: #ff6b6b; }

.gallery-empty {
  color: rgba(255,255,255,0.5); font-size: 0.95em; text-align: center; padding: 20px;
}

/* Options */
.options-panel { flex: 1; min-width: 300px; }

.option-group {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 16px; padding: 14px; margin-bottom: 10px;
  display: none;
}
.option-group.visible { display: block; }

.option-label {
  color: white; font-size: 1.05em; font-weight: 700;
  margin-bottom: 8px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}

.option-items { display: flex; flex-wrap: wrap; gap: 7px; }

.option-item {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.7em; cursor: pointer;
  background: rgba(255,255,255,0.15);
  border: 2px solid transparent; transition: all 0.2s;
}
.option-item:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }
.option-item.selected {
  border-color: #ffd700; background: rgba(255,215,0,0.2);
  animation: pulseGold 1.5s ease-in-out infinite;
}

/* Bounce-in for items when category opens */
.option-item.bounce-enter {
  animation: bounceIn 0.35s ease forwards;
}

.color-item {
  width: 38px; height: 38px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent; transition: all 0.2s;
}
.color-item:hover { transform: scale(1.15); }
.color-item.selected {
  border-color: white; box-shadow: 0 0 12px rgba(255,255,255,0.5);
  animation: pulseGold 1.5s ease-in-out infinite;
}

.swatch-item {
  width: 44px; height: 44px; border-radius: 12px;
  cursor: pointer; border: 3px solid transparent; transition: all 0.2s;
  position: relative;
}
.swatch-item:hover { transform: scale(1.1); }
.swatch-item.selected {
  border-color: #ffd700; box-shadow: 0 0 12px rgba(255,215,0,0.4);
  animation: pulseGold 1.5s ease-in-out infinite;
}

/* Confetti piece */
.confetti-piece {
  position: fixed; z-index: 600; pointer-events: none;
  font-size: 1.5em;
  animation: confettiFall 1.5s ease-in forwards;
}

.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(0,0,0,0.8); color: white;
  padding: 15px 30px; border-radius: 15px;
  font-size: 1.1em; z-index: 500;
  transition: transform 0.4s ease;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 650px) {
  .creator { flex-direction: column; align-items: center; }
  .preview-panel { min-width: auto; flex: none; width: 100%; }
  .options-panel { min-width: auto; width: 100%; }
}
</style>
</head>

<a href="index.html" class="back-btn">Retour</a>

<h1>Cree ton Idol</h1>
<div class="player-name-display" id="playerDisplay"></div>
<div class="unlock-counter" id="unlockCounter"></div>

<!-- Idol du Jour -->
<div class="idol-du-jour" id="idolDuJour">
  <div class="idol-du-jour-title" id="idolDuJourTitle"></div>
  <div class="idol-du-jour-suggestion" id="idolDuJourSuggestion"></div>
  <button class="idol-du-jour-btn" onclick="applyIdolDuJour()">Essayer ce look !</button>
</div>

<div class="tabs" id="tabsBar"></div>

<div class="creator">

    <div class="avatar-preview-wrapper" id="avatarWrapper">
      <div class="avatar-preview" id="avatarPreview">
        <div class="avatar-layer av-bg" id="avBg"></div>
        <div class="avatar-layer av-body" id="avBody"></div>
        <div class="avatar-layer av-hair" id="avHair"></div>
        <div class="avatar-layer av-face" id="avFace"></div>
        <div class="avatar-layer av-top" id="avTop"></div>
        <div class="avatar-layer av-bottom" id="avBottom"></div>
        <div class="avatar-layer av-shoes" id="avShoes"></div>

      </div>

    <input type="text" class="idol-name-input" id="idolNameInput" placeholder="Nom de ton idol..." maxlength="16">

      <button class="action-btn btn-save" onclick="saveAvatar()">Sauvegarder</button>
      <button class="action-btn btn-photo" onclick="openPhotoBooth()">Photo Booth</button>
    </div>

      <button class="action-btn btn-export" onclick="exportDescription()">Partager</button>
    </div>

      <button class="theme-btn" onclick="randomTheme('cute')">Aleatoire Cute</button>
      <button class="theme-btn" onclick="randomTheme('cool')">Aleatoire Cool</button>
      <button class="theme-btn" onclick="randomTheme('princess')">Aleatoire Princesse</button>
    </div>

</div>

<div class="gallery-section">

</div>

<!-- Photo booth -->

  <div class="photo-frame">
    <div class="frame-deco">&#x1F4F8;</div>
    <div class="photo-avatar-box" id="photoBox"></div>

    <button class="photo-close" onclick="closePhotoBooth()">Fermer</button>
  </div>
</div>

<!-- Camera flash overlay -->
<div class="camera-flash" id="cameraFlash"></div>

<div class="toast" id="toast"></div>

<script>
// ========== WEB AUDIO — SOUND ENGINE ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Soft pop (300Hz sine, 0.05s)
function playPop() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = 300;
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.05);
}

// Sparkle — ascending 3-note
function playSparkle() {
  ensureAudio();
  [523, 659, 784].forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.07;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.12);
  });
}

// Camera shutter — white noise burst
function playShutter() {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * 0.12;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  src.buffer = buffer;
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  src.connect(g); g.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + 0.12);
}

// Save jingle — 4-note ascending melody
function playJingle() {
  ensureAudio();
  [523, 659, 784, 1047].forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.12;
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.2);
  });
}

// Slot machine spin — rapid ascending tones
function playSlotSpin() {
  ensureAudio();
  for (let i = 0; i < 8; i++) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = 200 + i * 80;
    const t = audioCtx.currentTime + i * 0.04;
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.06);
  }
}

// ========== VISUAL EFFECTS ==========

// Sparkle burst at a point (relative to body)
function spawnSparkleBurst(x, y) {
  const emojis = ['\u2728','\u2B50','\uD83C\uDF1F','\uD83D\uDCAB','\u2764\uFE0F'];
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'spark-burst';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    const angle = (Math.PI * 2 / 6) * i;
    const dist = 30 + Math.random() * 40;
    el.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 600);
  }
}

// Confetti explosion (20 emoji pieces)
function launchConfetti() {
  const pieces = ['\uD83C\uDF89','\uD83C\uDF8A','\u2B50','\uD83D\uDC96','\uD83C\uDF1F','\u2728','\uD83C\uDF38','\uD83E\uDD8B','\uD83D\uDC8E','\uD83C\uDF80','\uD83C\uDFB5','\uD83C\uDF08','\uD83D\uDC51','\uD83E\uDE84','\uD83C\uDF3A','\uD83C\uDF3B','\uD83D\uDCAB','\uD83D\uDC9C','\uD83C\uDFF0','\uD83C\uDFA4'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = pieces[i % pieces.length];
    el.style.left = (10 + Math.random() * 80) + 'vw';
    el.style.top = (5 + Math.random() * 20) + 'vh';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    el.style.animationDuration = (1 + Math.random() * 1) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

// Camera flash
function triggerFlash() {
  const flash = document.getElementById('cameraFlash');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 600);
}

// ========== 3D TILT ON MOUSE MOVE ==========
const wrapper = document.getElementById('avatarWrapper');
const preview = document.getElementById('avatarPreview');

wrapper.addEventListener('mousemove', function(e) {
  const rect = wrapper.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / (rect.width / 2);
  const dy = (e.clientY - cy) / (rect.height / 2);
  const rotY = dx * 5;   // max +/-5deg
  const rotX = -dy * 5;
  preview.style.transform = 'rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg)';
});
wrapper.addEventListener('mouseleave', function() {
  preview.style.transform = 'rotateX(0) rotateY(0)';
});

// ========== STAR RATING ==========
function getStarRating() {
  // Rating based on how many categories have non-default values
  let score = 0;
  if (current.skin !== 0) score++;
  if (current.hair !== 0) score++;
  if (current.hairColor !== 2) score++;
  if (current.face !== 0) score++;
  if (current.top !== 0) score++;
  if (current.bottom !== 0) score++;
  if (current.shoes !== 0) score++;
  if (current.accessory !== 0) score++;
  if (current.effect !== 0) score++;
  if (document.getElementById('idolNameInput').value.length > 0) score++;
  // Map 0-10 to 1-5 stars
  return Math.max(1, Math.min(5, Math.ceil(score / 2)));
}
function updateStarRating() {
  const stars = getStarRating();
  let display = '';
  for (let i = 0; i < 5; i++) {
    display += i < stars ? '\u2B50' : '\u2606';
  }
  document.getElementById('starRating').textContent = display + ' Niveau ' + stars;
}

function getIdolDuJour() {
  // Deterministic per day
  const today = new Date();
  const dayIndex = (today.getFullYear() * 366 + today.getMonth() * 31 + today.getDate()) % IDOL_SUGGESTIONS.length;
  return IDOL_SUGGESTIONS[dayIndex];
}

  const idol = getIdolDuJour();

// ========== TABS ==========
const allTabs = [...new Set(CATEGORIES.map(c => c.tab))];

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  allTabs.forEach(t => {
    const b = document.createElement('button');
    b.className = 'tab-btn' + (t === activeTab ? ' active' : '');
    b.textContent = t;
    b.onclick = () => {
      lastActiveTab = activeTab;
      activeTab = t;
      playPop();
      renderTabs();
      showTab();
    };
    bar.appendChild(b);
  });
}

function showTab() {
  document.querySelectorAll('.option-group').forEach(g => {
    const isTarget = g.dataset.tab === activeTab;
    g.classList.toggle('visible', isTarget);
    // Bounce-in animation for items when opening a category
    if (isTarget && activeTab !== lastActiveTab) {
      const items = g.querySelectorAll('.option-item, .color-item, .swatch-item');
      items.forEach((item, i) => {
        item.classList.remove('bounce-enter');
        item.style.animationDelay = (i * 0.03) + 's';
        void item.offsetWidth;
        item.classList.add('bounce-enter');
      });
    }
  });
}

function buildOptionsPanel() {
  const panel = document.getElementById('optionsPanel');
  panel.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const group = document.createElement('div');
    group.className = 'option-group' + (cat.tab === activeTab ? ' visible' : '');
    group.dataset.tab = cat.tab;

    const label = document.createElement('div');
    label.className = 'option-label';
    label.textContent = cat.label;
    group.appendChild(label);

    const items = document.createElement('div');
    items.className = 'option-items';
    items.id = cat.key + 'Options';
    group.appendChild(items);

    panel.appendChild(group);
  });
}

function renderAllOptions() {
  renderEmojiOptions('skinOptions', OPTIONS.skin, 'skin');
  renderEmojiOptions('hairOptions', OPTIONS.hair, 'hair');
  renderColorOptions('hairColorOptions', OPTIONS.hairColor, 'hairColor');
  renderEmojiOptions('faceOptions', OPTIONS.face, 'face');
  renderEmojiOptions('topOptions', OPTIONS.top, 'top');
  renderEmojiOptions('bottomOptions', OPTIONS.bottom, 'bottom');
  renderEmojiOptions('shoesOptions', OPTIONS.shoes, 'shoes');
  renderEmojiOptions('accessoryOptions', OPTIONS.accessory, 'accessory');
  renderBgOptions();
  renderEffectOptions();
}

function renderEmojiOptions(containerId, items, key) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  items.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'option-item' + (i === current[key] ? ' selected' : '');
    d.innerHTML = item;
    d.onclick = (e) => {
      current[key] = i;
      playPop();
      spawnSparkleBurstOnPreview();
      updateAll();
    };
    el.appendChild(d);
  });
}

function renderColorOptions(containerId, items, key) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  items.forEach((hc, i) => {
    const d = document.createElement('div');
    d.className = 'color-item' + (i === current[key] ? ' selected' : '');
    d.style.background = hc.color;
    d.title = hc.name;
    d.onclick = (e) => {
      current[key] = i;
      playSparkle();
      spawnSparkleBurstOnPreview();
      updateAll();
    };
    el.appendChild(d);
  });
}

  document.getElementById('avFace').textContent = OPTIONS.face[current.face];
  document.getElementById('avTop').textContent = OPTIONS.top[current.top];
  document.getElementById('avBottom').textContent = OPTIONS.bottom[current.bottom];
  document.getElementById('avShoes').textContent = OPTIONS.shoes[current.shoes];
  document.getElementById('avAccessory').textContent = OPTIONS.accessory[current.accessory];

  const bgData = OPTIONS.bg[current.bg];
  document.getElementById('avBg').textContent = bgData.emoji;
  document.getElementById('avatarPreview').style.background =
    'linear-gradient(180deg, ' + bgData.gradient[0] + ', ' + bgData.gradient[1] + ')';

  // Effect particles
  const effectEl = document.getElementById('avEffect');
  effectEl.innerHTML = '';
  const eff = OPTIONS.effect[current.effect];
  if (eff.particles.length > 0) {
    eff.particles.forEach((p, i) => {
      const span = document.createElement('span');
      span.className = 'effect-particle';
      span.textContent = p;
      span.style.left = (10 + Math.random() * 80) + '%';
      span.style.top = (5 + Math.random() * 85) + '%';
      span.style.animationDelay = (i * 0.4) + 's';
      effectEl.appendChild(span);
    });
  }

  // Name tag
  const idolName = document.getElementById('idolNameInput').value || playerName + ' Star';
  document.getElementById('nameTag').textContent = idolName;

  // Glow aura color
  updateGlowColor();

  // Star rating
  updateStarRating();
}

}

// Random with themes
function randomTheme(theme) {
  playSlotSpin();

  if (theme === 'cute') {
    current.skin = Math.floor(Math.random() * OPTIONS.skin.length);
    current.hair = pickRandom([3,6,7,11]);
    current.hairColor = pickRandom([4,5,7,13]);
    current.face = pickRandom([0,2,4,7,9]);
    current.top = pickRandom([0,1,12]);
    current.bottom = pickRandom([0,2,3]);
    current.shoes = pickRandom([0,1]);
    current.accessory = pickRandom([1,2,3,14]);
    current.bg = pickRandom([0,3,7]);
    current.effect = pickRandom([2,3]);
  } else if (theme === 'cool') {
    current.skin = Math.floor(Math.random() * OPTIONS.skin.length);
    current.hair = pickRandom([8,9,0]);
    current.hairColor = pickRandom([0,8,9,10]);
    current.face = pickRandom([1,5,10,11]);
    current.top = pickRandom([4,6,2]);
    current.bottom = pickRandom([0,6]);
    current.shoes = pickRandom([2,3,4]);
    current.accessory = pickRandom([7,8,15,16]);
    current.bg = pickRandom([8,9,12]);
    current.effect = pickRandom([1,5]);
  } else if (theme === 'princess') {
    current.skin = Math.floor(Math.random() * OPTIONS.skin.length);
    current.hair = pickRandom([7,6,11]);
    current.hairColor = pickRandom([4,5,13]);
    current.face = pickRandom([2,3,4,8]);
    current.top = pickRandom([0,1,14]);
    current.bottom = pickRandom([2,3]);
    current.shoes = pickRandom([0,1]);
    current.accessory = pickRandom([0,5,18]);
    current.bg = pickRandom([1,13]);
    current.effect = pickRandom([4,1,7]);
  }
  spawnSparkleBurstOnPreview();
  updateAll();
  showToast('Style ' + theme + ' genere !');
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Photo booth
function openPhotoBooth() {
  playShutter();
  triggerFlash();

  const overlay = document.getElementById('photoOverlay');
  overlay.classList.add('active');
  const box = document.getElementById('photoBox');
  const bgData = OPTIONS.bg[current.bg];
  box.style.background = 'linear-gradient(180deg, ' + bgData.gradient[0] + ', ' + bgData.gradient[1] + ')';
  box.innerHTML = '';

  // Rebuild layers in photo
  const layers = [
    { cls: 'av-bg', content: bgData.emoji },
    { cls: 'av-body', content: OPTIONS.skin[current.skin], isHTML: true },
    { cls: 'av-hair', content: OPTIONS.hair[current.hair], style: 'filter:drop-shadow(0 0 8px ' + OPTIONS.hairColor[current.hairColor].color + ')' },
    { cls: 'av-face', content: OPTIONS.face[current.face] },
    { cls: 'av-top', content: OPTIONS.top[current.top] },
    { cls: 'av-bottom', content: OPTIONS.bottom[current.bottom] },
    { cls: 'av-shoes', content: OPTIONS.shoes[current.shoes] },
    { cls: 'av-accessory', content: OPTIONS.accessory[current.accessory] },
  ];
  layers.forEach(l => {
    const div = document.createElement('div');
    div.className = 'avatar-layer ' + l.cls;
    if (l.isHTML) div.innerHTML = l.content; else div.textContent = l.content;
    if (l.style) div.setAttribute('style', l.style);
    box.appendChild(div);
  });

  const name = document.getElementById('idolNameInput').value || playerName + ' Star';
  document.getElementById('photoName').textContent = name;
}

function closePhotoBooth() {
  document.getElementById('photoOverlay').classList.remove('active');
}

// Export description
function exportDescription() {
  playPop();
  const name = document.getElementById('idolNameInput').value || playerName + ' Star';
  const stars = getStarRating();
  let starText = '';
  for (let i = 0; i < stars; i++) starText += '\u2B50';

  const desc = [
    'Mon Idol: ' + name + ' ' + starText + ' (' + stars + '/5)',
    'Peau: ' + OPTIONS.skin[current.skin],
    'Cheveux: ' + OPTIONS.hair[current.hair] + ' (' + OPTIONS.hairColor[current.hairColor].name + ')',
    'Expression: ' + OPTIONS.face[current.face],
    'Haut: ' + OPTIONS.top[current.top],
    'Bas: ' + OPTIONS.bottom[current.bottom],
    'Chaussures: ' + OPTIONS.shoes[current.shoes],
    'Accessoire: ' + OPTIONS.accessory[current.accessory],
    'Fond: ' + OPTIONS.bg[current.bg].emoji,
    'Effet: ' + (OPTIONS.effect[current.effect].name),
    '--- Ecole Saint-Esprit ---'
  ].join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(desc).then(() => showToast('Description copiee !'));
  } else {
    showToast('Description: ' + name);
  }
}

// Save / Gallery (max 5)
function saveAvatar() {
  playJingle();
  launchConfetti();

  const name = document.getElementById('idolNameInput').value || playerName + ' Star';
  let gallery = JSON.parse(localStorage.getItem('kpop_idol_gallery_' + playerName) || '[]');

  if (gallery.length >= 5) {
    gallery.shift(); // remove oldest
  }

  gallery.push({ name: name, data: {...current}, date: Date.now() });
  localStorage.setItem('kpop_idol_gallery_' + playerName, JSON.stringify(gallery));

  // Also save as main avatar (backward compatible)
  localStorage.setItem('kpop_avatar_' + playerName, JSON.stringify(current));

  // Trophies
  let trophies = JSON.parse(localStorage.getItem('kpop_trophies_' + playerName) || '[]');
  if (!trophies.includes('avatar_created')) {
    trophies.push('avatar_created');
    localStorage.setItem('kpop_trophies_' + playerName, JSON.stringify(trophies));
  }

  let stars = parseInt(localStorage.getItem('kpop_stars_' + playerName) || '0');
  stars += 20;
  localStorage.setItem('kpop_stars_' + playerName, String(stars));

  showToast(name + ' sauvegardee ! +20 etoiles');
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  const gallery = JSON.parse(localStorage.getItem('kpop_idol_gallery_' + playerName) || '[]');
  grid.innerHTML = '';

  if (gallery.length === 0) {
    grid.innerHTML = '<div class="gallery-empty">Aucune idol sauvegardee. Cree ta premiere !</div>';
    return;
  }

  gallery.forEach((idol, idx) => {
    const card = document.createElement('div');
    card.className = 'gallery-card';

    const bgData = OPTIONS.bg[idol.data.bg] || OPTIONS.bg[0];
    const preview = document.createElement('div');
    preview.className = 'mini-preview';
    preview.style.background = 'linear-gradient(180deg, ' + bgData.gradient[0] + ', ' + bgData.gradient[1] + ')';

    // Mini layers
    const face = document.createElement('div');
    face.className = 'avatar-layer';
    face.style.fontSize = '3em';
    face.textContent = OPTIONS.face[idol.data.face] || OPTIONS.face[0];
    preview.appendChild(face);

    const acc = document.createElement('div');
    acc.className = 'avatar-layer';
    acc.style.fontSize = '1.5em';
    acc.style.top = '-10px';
    acc.textContent = OPTIONS.accessory[idol.data.accessory] || '';
    preview.appendChild(acc);

    card.appendChild(preview);

    const gname = document.createElement('div');
    gname.className = 'gname';
    gname.textContent = idol.name;
    card.appendChild(gname);

    const del = document.createElement('div');
    del.className = 'gdelete';
    del.textContent = 'Supprimer';
    del.onclick = (e) => {
      e.stopPropagation();
      gallery.splice(idx, 1);
      localStorage.setItem('kpop_idol_gallery_' + playerName, JSON.stringify(gallery));
      renderGallery();
    };
    card.appendChild(del);

    // Click to load
    card.onclick = () => {
      Object.assign(current, idol.data);
      document.getElementById('idolNameInput').value = idol.name;
      playPop();
      updateAll();
      showToast(idol.name + ' chargee !');
    };

    grid.appendChild(card);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Load saved avatar
const saved = localStorage.getItem('kpop_avatar_' + playerName);
if (saved) {
  try { Object.assign(current, JSON.parse(saved)); } catch(e) {}
}

// Init
buildOptionsPanel();
renderTabs();
showTab();
updateAll();
renderGallery();
updateUnlockCounter();
renderIdolDuJour();
</script>
