<style>
/* ============================== */
/*  K-POP DANCE CHALLENGE v2.0    */
/* ============================== */
body{
  background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#16213e);
  background-size:400% 400%;
  animation:gradientShift 15s ease infinite, pageEnter .6s ease-out;
  min-height:100vh;font-family:'Quicksand',sans-serif;
  overflow:hidden;display:flex;flex-direction:column;align-items:center;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}

/* ── SONG SELECT SCREEN ── */
.screen{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:20px;overflow-y:auto;transition:opacity .4s,transform .4s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.95)}
.screen-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(5,5,16,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:-1}

.select-title{font-size:clamp(1.6em,5vw,2.4em);font-weight:800;text-align:center;background:linear-gradient(135deg,var(--pink),var(--purple),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;filter:drop-shadow(0 0 20px rgba(255,111,216,.4))}
.select-sub{color:rgba(255,255,255,.5);font-size:.9em;margin-bottom:16px}

/* Player select */
.player-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
.p-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);color:#fff;padding:8px 20px;border-radius:25px;font-family:inherit;font-size:1em;font-weight:600;cursor:pointer;transition:.3s}
.p-btn:hover,.p-btn.active{background:rgba(255,111,216,.25);border-color:var(--pink);transform:scale(1.05);box-shadow:0 0 20px rgba(255,111,216,.3)}

/* Song cards */
.songs-grid{display:flex;flex-direction:column;gap:10px;width:100%;max-width:420px;max-height:52vh;overflow-y:auto;padding:4px 2px}
.song-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 16px;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.song-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--card-glow-1,transparent),var(--card-glow-2,transparent));opacity:0;transition:opacity .3s}
.song-card:hover::before,.song-card.selected::before{opacity:.15}
.song-card:hover,.song-card.selected{border-color:var(--pink);transform:scale(1.02);box-shadow:0 4px 25px rgba(255,111,216,.2)}
.song-card.selected{border-color:var(--gold);box-shadow:0 4px 30px rgba(255,215,0,.25)}
.song-icon{font-size:2.2em;flex-shrink:0;width:50px;text-align:center}
.song-info{flex:1;min-width:0}
.song-name{font-weight:700;font-size:1.05em;color:#fff}
.song-diff{font-size:.78em;font-weight:700;margin-top:2px}
.song-bpm{font-size:.72em;color:rgba(255,255,255,.4);margin-top:1px}
.song-hs{position:absolute;right:14px;top:50%;transform:translateY(-50%);text-align:right}
.song-hs-val{font-size:1.1em;font-weight:700;color:var(--gold)}
.song-hs-lbl{font-size:.65em;color:rgba(255,255,255,.35)}
.song-rank{font-size:1.3em;font-weight:800;margin-left:4px}

.diff-easy{color:#4ecdc4}
.diff-medium{color:#ffd700}
.diff-hard{color:#ff6fd8}
.diff-expert{color:#ff6b6b}
.diff-impossible{color:#cd77ff}

.play-btn{background:linear-gradient(145deg,var(--pink),var(--purple));color:#fff;border:none;padding:14px 40px;font-size:1.3em;border-radius:50px;cursor:pointer;font-family:inherit;font-weight:800;margin-top:16px;box-shadow:0 5px 30px rgba(255,111,216,.4);transition:transform .2s,box-shadow .2s;letter-spacing:.5px}
.play-btn:hover{transform:scale(1.06);box-shadow:0 8px 40px rgba(255,111,216,.5)}
.play-btn:disabled{opacity:.35;cursor:default;transform:none}

/* ── GAME HUD ── */
.game-hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;z-index:100;background:rgba(5,5,16,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.hud-left,.hud-right{display:flex;align-items:center;gap:12px}
.hud-score{font-size:1.3em;font-weight:800;color:var(--pink);text-shadow:0 0 15px rgba(255,111,216,.4)}
.hud-combo{font-size:1.1em;font-weight:700;color:var(--gold);position:relative;transition:.2s}
.hud-combo.fire{animation:fireGlow .3s ease infinite alternate}
@keyframes fireGlow{0%{text-shadow:0 0 8px #ffd700,0 0 20px #ff6b6b}100%{text-shadow:0 0 15px #ff6fd8,0 0 35px #ffd700}}
.hud-mult{font-size:.85em;font-weight:800;color:#ff6b6b;background:rgba(255,107,107,.15);padding:2px 8px;border-radius:10px}
.hud-timer{font-size:1em;font-weight:600;color:#4ecdc4}
.hud-song{font-size:.8em;color:rgba(255,255,255,.5);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── FEVER BANNER ── */
.fever-banner{position:fixed;top:50px;left:50%;transform:translateX(-50%) scale(0);font-size:2.2em;font-weight:900;z-index:150;pointer-events:none;letter-spacing:3px;transition:transform .3s}
.fever-banner.show{transform:translateX(-50%) scale(1);animation:feverPulse .4s ease infinite alternate}
.fever-banner .fever-text{background:linear-gradient(90deg,#ff6fd8,#ffd700,#4ecdc4,#cd77ff,#ff6b6b);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbowText .8s linear infinite;filter:drop-shadow(0 0 20px rgba(255,111,216,.6))}
@keyframes feverPulse{0%{transform:translateX(-50%) scale(1)}100%{transform:translateX(-50%) scale(1.1)}}
@keyframes rainbowText{0%{background-position:0% 50%}100%{background-position:300% 50%}}

/* ── GAME AREA ── */
.game-area{position:fixed;top:46px;left:0;right:0;bottom:0;overflow:hidden}

/* Lanes */
.lanes-wrap{position:absolute;top:0;bottom:80px;left:50%;transform:translateX(-50%);display:flex;gap:0;width:320px}
.lane{flex:1;position:relative;border-left:1px solid rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.04);overflow:hidden}
.lane:first-child{border-left:2px solid rgba(255,255,255,.08)}
.lane:last-child{border-right:2px solid rgba(255,255,255,.08)}

/* Hit zone */
.hit-line{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pink),var(--purple),var(--pink));box-shadow:0 0 15px rgba(255,111,216,.4);z-index:10}
.hit-receptor{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:60px;border:3px solid rgba(255,255,255,.25);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6em;color:rgba(255,255,255,.3);z-index:11;transition:.08s;background:rgba(255,255,255,.03)}
.hit-receptor.pressed{transform:translateX(-50%) scale(.88);border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);box-shadow:0 0 25px rgba(255,255,255,.3)}

/* Lane colors */
.lane:nth-child(1) .hit-receptor{border-color:rgba(255,107,107,.4)}
.lane:nth-child(2) .hit-receptor{border-color:rgba(78,205,196,.4)}
.lane:nth-child(3) .hit-receptor{border-color:rgba(255,217,61,.4)}
.lane:nth-child(4) .hit-receptor{border-color:rgba(162,155,254,.4)}

.lane:nth-child(1) .hit-receptor.pressed{border-color:#ff6b6b;box-shadow:0 0 30px rgba(255,107,107,.5)}
.lane:nth-child(2) .hit-receptor.pressed{border-color:#4ecdc4;box-shadow:0 0 30px rgba(78,205,196,.5)}
.lane:nth-child(3) .hit-receptor.pressed{border-color:#ffd93d;box-shadow:0 0 30px rgba(255,217,61,.5)}
.lane:nth-child(4) .hit-receptor.pressed{border-color:#a29bfe;box-shadow:0 0 30px rgba(162,155,254,.5)}

/* Fever lanes */
.lane.fever-lane{background:rgba(255,111,216,.03)}
.lane.fever-lane .hit-receptor{border-color:rgba(255,215,0,.5)!important;box-shadow:0 0 15px rgba(255,215,0,.2)!important}

/* ── NOTES ── */
.note{position:absolute;left:50%;width:54px;height:54px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none;border-radius:12px;font-size:1.8em;transition:none}
.note-inner{width:100%;height:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.note-inner::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.2),transparent);border-radius:12px 12px 0 0}

.note-l .note-inner{background:linear-gradient(135deg,#ff6b6b,#ee5a24);box-shadow:0 0 20px rgba(255,107,107,.5)}
.note-u .note-inner{background:linear-gradient(135deg,#4ecdc4,#2bcbba);box-shadow:0 0 20px rgba(78,205,196,.5)}
.note-d .note-inner{background:linear-gradient(135deg,#ffd93d,#f6b93b);box-shadow:0 0 20px rgba(255,217,61,.5)}
.note-r .note-inner{background:linear-gradient(135deg,#a29bfe,#6c5ce7);box-shadow:0 0 20px rgba(162,155,254,.5)}

.note-arrow{font-size:1.1em;color:#fff;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));z-index:1;position:relative}

/* Note trail */
.note-trail{position:absolute;left:50%;width:8px;pointer-events:none;z-index:2;border-radius:4px;transform:translateX(-50%);opacity:.5}
.lane:nth-child(1) .note-trail{background:linear-gradient(to top,rgba(255,107,107,.6),transparent)}
.lane:nth-child(2) .note-trail{background:linear-gradient(to top,rgba(78,205,196,.6),transparent)}
.lane:nth-child(3) .note-trail{background:linear-gradient(to top,rgba(255,217,61,.6),transparent)}
.lane:nth-child(4) .note-trail{background:linear-gradient(to top,rgba(162,155,254,.6),transparent)}

/* ── TOUCH BUTTONS (mobile) ── */
.touch-row{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:4px;padding:6px;z-index:120;background:rgba(5,5,16,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.touch-btn{flex:1;max-width:90px;height:68px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8em;color:#fff;border:2px solid rgba(255,255,255,.3);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:.08s}
.touch-btn:nth-child(1){background:rgba(255,107,107,.25)}
.touch-btn:nth-child(2){background:rgba(78,205,196,.25)}
.touch-btn:nth-child(3){background:rgba(255,217,61,.25)}
.touch-btn:nth-child(4){background:rgba(162,155,254,.25)}
.touch-btn.pressed{transform:scale(.9);box-shadow:0 0 30px rgba(255,255,255,.4);border-color:#fff}

/* ── FEEDBACK POPUP ── */
.feedback{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:2.4em;font-weight:900;z-index:160;pointer-events:none;animation:feedPop .55s ease forwards;letter-spacing:1px}
@keyframes feedPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-80%) scale(.8)}}

/* Combo popup */
.combo-popup{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);font-size:1.4em;font-weight:800;z-index:159;pointer-events:none;color:var(--gold);animation:comboPop .6s ease forwards}
@keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5) translateY(10px)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1) translateY(0)}100%{opacity:0;transform:translate(-50%,-50%) scale(.7) translateY(-30px)}}

/* ── PARTICLES ── */
.particle{position:fixed;pointer-events:none;z-index:170;border-radius:50%;will-change:transform,opacity;animation:particleFly .6s ease-out forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}

/* ── CONFETTI ── */
.confetti{position:fixed;width:8px;height:14px;z-index:180;pointer-events:none;animation:confettiFall 2.5s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ── SCREEN SHAKE ── */
.shake-light{animation:shakeLight .12s ease}
@keyframes shakeLight{0%,100%{transform:translate(0)}50%{transform:translate(-2px,1px)}}
.shake-med{animation:shakeMed .15s ease}
@keyframes shakeMed{0%,100%{transform:translate(0)}25%{transform:translate(-4px,2px)}75%{transform:translate(4px,-2px)}}
.shake-hard{animation:shakeHard .18s ease}
@keyframes shakeHard{0%,100%{transform:translate(0)}20%{transform:translate(-6px,3px)}40%{transform:translate(5px,-4px)}60%{transform:translate(-3px,5px)}80%{transform:translate(6px,-2px)}}

/* ── MISS VIGNETTE ── */
.miss-vignette{position:fixed;top:0;left:0;width:100%;height:100%;z-index:155;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,50,50,.3) 100%);animation:vigFlash .35s ease forwards}
@keyframes vigFlash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}

/* ── BACKGROUND EFFECTS ── */
.stage-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;transition:background 2s ease}
.stage-0{background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#16213e)}
.stage-1{background:linear-gradient(135deg,#1a1a2e,#2d1b4e,#0f3460)}
.stage-2{background:linear-gradient(135deg,#2d1b4e,#4a1942,#0f3460)}
.stage-3{background:linear-gradient(135deg,#4a1942,#6b2fa0,#16213e)}
.stage-4{background:linear-gradient(135deg,#6b2fa0,#ff6fd8aa,#16213e)}

.bg-pulse{position:fixed;top:50%;left:50%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,111,216,.06),transparent);transform:translate(-50%,-50%);z-index:-1;pointer-events:none;transition:transform .15s}

.fever-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0;transition:opacity .5s;background:linear-gradient(135deg,#ff6fd8,#ffd700,#4ecdc4,#cd77ff,#ff6b6b);background-size:400% 400%;animation:rainbowShift 2s ease infinite}
.fever-bg.active{opacity:.12}
@keyframes rainbowShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── CROWD LIGHTS ── */
.crowd-light{position:fixed;bottom:0;width:4px;height:0;z-index:-1;opacity:0;transition:height 1s,opacity 1s;border-radius:2px 2px 0 0}

/* ── END SCREEN ── */
.end-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,5,16,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;padding:20px;overflow-y:auto}
.end-overlay.hidden{display:none}

.end-grade{font-size:5em;font-weight:900;margin:8px 0}
.grade-S{animation:gradeS .8s cubic-bezier(.34,1.56,.64,1) forwards;color:#ffd700;text-shadow:0 0 60px rgba(255,215,0,.6)}
@keyframes gradeS{0%{transform:scale(0) rotate(-360deg);opacity:0}60%{transform:scale(1.3) rotate(15deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.grade-A{animation:gradeA .7s cubic-bezier(.34,1.56,.64,1) forwards;color:#ff6fd8;text-shadow:0 0 40px rgba(255,111,216,.5)}
@keyframes gradeA{0%{transform:scale(0) translateY(60px);opacity:0}50%{transform:scale(1.2) translateY(-15px);opacity:1}100%{transform:scale(1) translateY(0)}}
.grade-B{animation:gradeB .6s ease forwards;color:#cd77ff;text-shadow:0 0 30px rgba(205,119,255,.4)}
@keyframes gradeB{0%{transform:translateX(-80px) scale(.5);opacity:0}60%{transform:translateX(8px) scale(1.1);opacity:1}100%{transform:translateX(0) scale(1)}}
.grade-C{animation:gradeC .5s ease forwards;color:#4ecdc4;text-shadow:0 0 20px rgba(78,205,196,.3)}
@keyframes gradeC{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.grade-D{animation:gradeC .5s ease forwards;color:rgba(255,255,255,.4)}

.end-title{font-size:2em;font-weight:800;color:#fff;text-shadow:0 0 25px rgba(255,111,216,.3);margin-bottom:4px}
.end-score{font-size:3.2em;font-weight:900;color:var(--pink);text-shadow:0 0 40px rgba(255,111,216,.5);margin:6px 0}
.end-msg{color:rgba(255,255,255,.7);font-size:1.05em;text-align:center;margin-bottom:10px}
.end-new-record{animation:recordPulse 1s ease infinite alternate;color:var(--gold);font-size:1.2em;font-weight:700}
@keyframes recordPulse{0%{text-shadow:0 0 15px rgba(255,215,0,.3)}100%{text-shadow:0 0 30px rgba(255,215,0,.7),0 0 50px rgba(255,111,216,.2)}}

.stars-row{font-size:2.5em;margin:6px 0}
.stars-row .star{display:inline-block;animation:starPop .4s ease forwards;opacity:0;transform:scale(0)}
@keyframes starPop{to{opacity:1;transform:scale(1)}}

.stat-row{display:flex;gap:20px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.stat-item{text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 14px}
.stat-item .num{font-size:1.6em;font-weight:700;color:var(--gold)}
.stat-item .label{font-size:.75em;color:rgba(255,255,255,.4)}

.share-row{display:flex;gap:10px;justify-content:center;margin-top:12px}
.share-btn{padding:10px 18px;border-radius:25px;border:none;font-family:inherit;font-size:.95em;font-weight:600;cursor:pointer;transition:transform .2s}
.share-btn:hover{transform:scale(1.05)}
.share-whatsapp{background:#25D366;color:#fff}
.share-copy{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.2)}

.share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#25D366;color:#fff;padding:10px 25px;border-radius:25px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.share-toast.show{opacity:1}

/* ── COUNTDOWN ── */
.countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:7em;font-weight:900;color:var(--gold);z-index:250;text-shadow:0 0 60px var(--pink);animation:countPop .8s ease forwards;pointer-events:none}
@keyframes countPop{0%{opacity:0;transform:translate(-50%,-50%) scale(2.5)}25%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(.6)}}

/* ── PROGRESS BAR ── */
.progress-bar{position:fixed;top:46px;left:0;right:0;height:3px;z-index:101;background:rgba(255,255,255,.08)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .3s;width:0%}

/* ── METRONOME FLASH ── */
.beat-flash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;pointer-events:none;background:rgba(255,111,216,.04);opacity:0;transition:opacity .05s}

/* ── FLOATING NOTES ── */
.floating-note{position:fixed;z-index:-3;pointer-events:none;font-size:1.5em;opacity:.08;animation:floatUp linear forwards}
@keyframes floatUp{0%{transform:translateX(0) rotate(0deg);opacity:.08}100%{transform:translateX(20px) rotate(15deg);opacity:0}}

/* ── RESPONSIVE ── */
@media(max-width:400px){
  .lanes-wrap{width:280px}
  .note{width:46px;height:46px}
  .hit-receptor{width:50px;height:50px;font-size:1.4em}
  .touch-btn{height:60px;font-size:1.5em}
  .hud-score{font-size:1.1em}
}
@media(min-width:600px){
  .lanes-wrap{width:380px}
  .note{width:62px;height:62px}
  .hit-receptor{width:68px;height:68px}
  .touch-row{display:none}
}

/* ── AAA EFFECTS ── */
@keyframes emojiRain{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}
</style>

<script>
// ============================================================
//  K-POP DANCE CHALLENGE v2.0 — PRO RHYTHM GAME
// ============================================================

// ─── WEB AUDIO ───
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur = .12, type = 'sine', vol = .13) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function playTapSound(lane) {
  ensureAudio();
  const freqs = [523, 659, 784, 988];
  const types = ['triangle', 'sine', 'triangle', 'sine'];
  playTone(freqs[lane], .1, types[lane], .18);
}

function playPerfectSound() {
  playTone(880, .06, 'sine', .15);
  setTimeout(() => playTone(1108, .1, 'sine', .12), 60);
  setTimeout(() => playTone(1318, .08, 'sine', .1), 120);
}

function playGreatSound() {
  playTone(784, .08, 'sine', .12);
  setTimeout(() => playTone(988, .08, 'sine', .1), 70);
}

function playMissSound() { playTone(180, .2, 'sawtooth', .06); }

function playFeverSound() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, .15, 'sine', .12), i * 70));
}

function playCrowdCheer() {
  for (let i = 0; i < 6; i++) setTimeout(() => playTone(500 + Math.random() * 500, .25, 'triangle', .04), i * 50);
}

function playMetronome() {
  playTone(1000, .03, 'sine', .04);
}

// ─── SONGS ───
const SONGS = [
  { id: 'idol',    name: 'Idol Dream',   emoji: '\u{1F31F}', bpm: 100, dur: 50,  diff: 'easy',       diffLabel: 'Facile',     color1: '#4ecdc4', color2: '#2bcbba', desc: 'Pour bien commencer !' },
  { id: 'neon',    name: 'Neon Lights',  emoji: '\u{1F4A1}', bpm: 120, dur: 55,  diff: 'medium',     diffLabel: 'Moyen',      color1: '#ffd700', color2: '#f6b93b', desc: 'Le vrai challenge commence' },
  { id: 'fire',    name: 'Fire Dance',   emoji: '\u{1F525}', bpm: 140, dur: 60,  diff: 'hard',       diffLabel: 'Difficile',  color1: '#ff6fd8', color2: '#e91e8c', desc: 'Ca brule !' },
  { id: 'galaxy',  name: 'Galaxy Stage', emoji: '\u{1F30C}', bpm: 160, dur: 65,  diff: 'expert',     diffLabel: 'Expert',     color1: '#ff6b6b', color2: '#ee5a24', desc: 'Seules les stars survivent' },
  { id: 'legend',  name: 'K-Pop Legend', emoji: '\u{1F451}', bpm: 180, dur: 70,  diff: 'impossible',  diffLabel: 'IMPOSSIBLE', color1: '#cd77ff', color2: '#6c5ce7', desc: 'Es-tu une legende ?' }
];

const ARROWS = ['\u2190', '\u2191', '\u2193', '\u2192']; // left up down right
const ARROW_LABELS = ['G', 'H', 'B', 'D']; // Gauche Haut Bas Droite
const LANE_COLORS = ['#ff6b6b', '#4ecdc4', '#ffd93d', '#a29bfe'];
const NOTE_CLASSES = ['note-l', 'note-u', 'note-d', 'note-r'];

// Key mappings
const KEY_MAP = {
  'arrowleft': 0, 'arrowup': 1, 'arrowdown': 2, 'arrowright': 3,
  'd': 0, 'f': 1, 'j': 2, 'k': 3,
  'a': 0, 'z': 1, 'n': 2, 'e': 3  // alt layout
};

// ─── STATE ───
let currentPlayer = new URLSearchParams(location.search).get('player') || '';
let selectedSong = null;
let gameRunning = false;

let score = 0, combo = 0, maxCombo = 0;
let perfectCount = 0, greatCount = 0, goodCount = 0, missCount = 0;
let feverActive = false;
let stageLevel = 0;
let multiplier = 1;

let notes = [];
let noteIdCounter = 0;
let songStartTime = 0;
let songDuration = 0;
let beatInterval = 0;
let nextBeatTime = 0;
let patternIndex = 0;
let songPattern = [];
let gameRAF = null;
let timerInterval = null;
let metronomeInterval = null;
let floatingInterval = null;

// Hit zone Y position (from bottom of lanes area)
const HIT_ZONE_Y = 80; // px from bottom of lane
const TRAVEL_PX_FUNC = () => {
  const lw = document.getElementById('lanesWrap');
  return lw ? lw.offsetHeight : 500;
};

// ─── INIT ───
(function init() {
  const saved = new URLSearchParams(location.search).get('player') || localStorage.getItem('kpop_dance_player') || '';
  if (saved) selectPlayer(saved);
  buildPlayerRow();
  buildSongCards();
  setupTouchButtons();
  if (currentPlayer) document.getElementById('backBtn').href = 'index.html?player=' + encodeURIComponent(currentPlayer);
})();

// ─── PLAYER SELECT ───
function buildPlayerRow() {
  const row = document.getElementById('playerRow');
  row.innerHTML = '';
  ['Ambre', 'Eden', 'Louise'].forEach(name => {
    const b = document.createElement('button');
    b.className = 'p-btn' + (currentPlayer === name ? ' active' : '');
    b.textContent = name;
    b.onclick = () => selectPlayer(name);
    row.appendChild(b);
  });
}

function selectPlayer(name) {
  currentPlayer = name;
  localStorage.setItem('kpop_dance_player', name);
  document.querySelectorAll('.p-btn').forEach(b => b.classList.toggle('active', b.textContent === name));
  document.getElementById('backBtn').href = 'index.html?player=' + encodeURIComponent(name);
  updatePlayButton();
  buildSongCards(); // refresh high scores
}

// ─── SONG SELECT ───
function buildSongCards() {
  const grid = document.getElementById('songsGrid');
  grid.innerHTML = '';
  SONGS.forEach(song => {
    const card = document.createElement('div');
    card.className = 'song-card' + (selectedSong && selectedSong.id === song.id ? ' selected' : '');
    card.style.setProperty('--card-glow-1', song.color1);
    card.style.setProperty('--card-glow-2', song.color2);
    card.onclick = () => selectSong(song);

    // High score for this song
    const hs = getSongHS(song.id);
    const rank = hs > 0 ? getRankForScore(hs, song) : '';
    const rankColor = {'S':'#ffd700','A':'#ff6fd8','B':'#cd77ff','C':'#4ecdc4','D':'rgba(255,255,255,.3)'}[rank] || '';

    card.innerHTML = `
      <div class="song-icon">${song.emoji}</div>
      <div class="song-info">
        <div class="song-name">${song.name}</div>
        <div class="song-diff diff-${song.diff}">${song.diffLabel} - ${song.bpm} BPM</div>
        <div class="song-bpm">${song.desc}</div>
      </div>
      <div class="song-hs">
        ${hs > 0 ? `<div class="song-hs-val">${hs}</div><div class="song-hs-lbl">Record</div>` : '<div class="song-hs-lbl">Pas joue</div>'}
        ${rank ? `<div class="song-rank" style="color:${rankColor}">${rank}</div>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

function selectSong(song) {
  selectedSong = song;
  document.querySelectorAll('.song-card').forEach((c, i) => c.classList.toggle('selected', SONGS[i].id === song.id));
  updatePlayButton();
}

function updatePlayButton() {
  document.getElementById('playBtn').disabled = !(currentPlayer && selectedSong);
}

function getSongHS(songId) {
  if (!currentPlayer) return 0;
  try {
    const data = JSON.parse(localStorage.getItem(`kpop_dance_songs_${currentPlayer}`) || '{}');
    return data[songId] || 0;
  } catch(e) { return 0; }
}

function saveSongHS(songId, newScore) {
  if (!currentPlayer) return;
  try {
    const data = JSON.parse(localStorage.getItem(`kpop_dance_songs_${currentPlayer}`) || '{}');
    if (newScore > (data[songId] || 0)) {
      data[songId] = newScore;
      localStorage.setItem(`kpop_dance_songs_${currentPlayer}`, JSON.stringify(data));
      return true; // new record
    }
    return false;
  } catch(e) { return false; }
}

function getRankForScore(s, song) {
  const maxPossible = song.dur * (song.bpm / 60) * 100 * 8; // rough max
  const ratio = s / maxPossible;
  if (ratio >= .06) return 'S';
  if (ratio >= .04) return 'A';
  if (ratio >= .025) return 'B';
  if (ratio >= .015) return 'C';
  return 'D';
}

// ─── PATTERN GENERATOR ───
function generatePattern(song) {
  const bpm = song.bpm;
  const dur = song.dur;
  const beatMs = 60000 / bpm;
  const totalBeats = Math.floor(dur * bpm / 60);
  const pattern = [];

  // Seed based on song id for consistency
  let seed = 0;
  for (let i = 0; i < song.id.length; i++) seed += song.id.charCodeAt(i) * (i + 1);
  function rng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed >> 16) / 32768; }

  // Difficulty parameters
  const diffParams = {
    easy:       { doubleChance: 0,    tripleChance: 0,    restChance: .35, burstChance: 0 },
    medium:     { doubleChance: .1,   tripleChance: 0,    restChance: .2,  burstChance: .05 },
    hard:       { doubleChance: .15,  tripleChance: .05,  restChance: .1,  burstChance: .1 },
    expert:     { doubleChance: .2,   tripleChance: .08,  restChance: .05, burstChance: .15 },
    impossible: { doubleChance: .25,  tripleChance: .12,  restChance: .02, burstChance: .2 }
  };
  const dp = diffParams[song.diff];

  for (let beat = 0; beat < totalBeats; beat++) {
    const timeMs = beat * beatMs;

    // Rest beats
    if (rng() < dp.restChance) continue;

    // Burst: rapid 16th notes
    if (rng() < dp.burstChance) {
      for (let j = 0; j < 3; j++) {
        const lane = Math.floor(rng() * 4);
        pattern.push({ time: timeMs + j * (beatMs / 4), lane });
      }
      continue;
    }

    // Main note
    const lane = Math.floor(rng() * 4);
    pattern.push({ time: timeMs, lane });

    // Double note
    if (rng() < dp.doubleChance) {
      let lane2 = (lane + 1 + Math.floor(rng() * 3)) % 4;
      pattern.push({ time: timeMs, lane: lane2 });
    }

    // Triple note
    if (rng() < dp.tripleChance) {
      let lane3 = (lane + 2) % 4;
      pattern.push({ time: timeMs, lane: lane3 });
    }

    // Half-beat notes for harder difficulties
    if (song.bpm >= 140 && rng() < .3) {
      const halfLane = Math.floor(rng() * 4);
      pattern.push({ time: timeMs + beatMs / 2, lane: halfLane });
    }
  }

  // Sort by time
  pattern.sort((a, b) => a.time - b.time);
  return pattern;
}

// ─── BUILD GAME LANES ───
function buildLanes() {
  const wrap = document.getElementById('lanesWrap');
  wrap.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const lane = document.createElement('div');
    lane.className = 'lane';
    lane.id = 'lane-' + i;

    const receptor = document.createElement('div');
    receptor.className = 'hit-receptor';
    receptor.id = 'receptor-' + i;
    receptor.innerHTML = ARROWS[i];
    receptor.style.bottom = '10px';
    lane.appendChild(receptor);

    wrap.appendChild(lane);
  }
}

// ─── SETUP TOUCH ───
function setupTouchButtons() {
  document.querySelectorAll('.touch-btn').forEach(btn => {
    const lane = parseInt(btn.dataset.lane);
    btn.addEventListener('touchstart', e => { e.preventDefault(); handlePress(lane); btn.classList.add('pressed'); }, { passive: false });
    btn.addEventListener('touchend', e => { e.preventDefault(); handleRelease(lane); btn.classList.remove('pressed'); }, { passive: false });
    btn.addEventListener('mousedown', e => { e.preventDefault(); handlePress(lane); btn.classList.add('pressed'); });
    btn.addEventListener('mouseup', e => { e.preventDefault(); handleRelease(lane); btn.classList.remove('pressed'); });
  });
}

// ─── COUNTDOWN ───
function beginCountdown() {
  ensureAudio();
  document.getElementById('selectScreen').classList.add('hidden');
  document.getElementById('gameHud').style.display = 'flex';
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('touchRow').style.display = 'flex';
  document.getElementById('hudSong').textContent = selectedSong.name;

  buildLanes();
  adjustLaneSize();

  let count = 3;
  function tick() {
    const el = document.createElement('div');
    el.className = 'countdown';
    el.textContent = count === 0 ? 'GO !' : count;
    if (count === 0) el.style.color = 'var(--pink)';
    document.body.appendChild(el);
    playTone(count === 0 ? 880 : 440, .25, 'triangle', .15);
    setTimeout(() => el.remove(), 800);
    if (count === 0) { setTimeout(startGame, 400); return; }
    count--;
    setTimeout(tick, 800);
  }
  tick();
}

function adjustLaneSize() {
  const w = window.innerWidth;
  const wrap = document.getElementById('lanesWrap');
  const hitLine = document.getElementById('hitLine');
  const laneW = Math.min(380, Math.max(280, w - 20));
  wrap.style.width = laneW + 'px';
  hitLine.style.width = laneW + 'px';
}

// ─── START GAME ───
function startGame() {
  const song = selectedSong;
  score = 0; combo = 0; maxCombo = 0;
  perfectCount = 0; greatCount = 0; goodCount = 0; missCount = 0;
  feverActive = false; stageLevel = 0; multiplier = 1;
  notes = []; noteIdCounter = 0; patternIndex = 0;
  gameRunning = true;

  songDuration = song.dur * 1000;
  beatInterval = 60000 / song.bpm;
  songPattern = generatePattern(song);
  songStartTime = performance.now();

  updateHUD();
  updateStage();
  document.getElementById('feverBg').classList.remove('active');
  document.getElementById('feverBanner').classList.remove('show');

  // Start metronome
  metronomeInterval = setInterval(() => {
    if (!gameRunning) return;
    playMetronome();
    // Beat flash
    const flash = document.getElementById('beatFlash');
    flash.style.opacity = '1';
    setTimeout(() => flash.style.opacity = '0', 50);
    // BG pulse
    const bp = document.getElementById('bgPulse');
    bp.style.transform = 'translate(-50%,-50%) scale(1.3)';
    setTimeout(() => bp.style.transform = 'translate(-50%,-50%) scale(1)', 100);
  }, beatInterval);

  // Start floating notes
  startFloatingNotes();

  // Start timer display
  timerInterval = setInterval(() => {
    if (!gameRunning) return;
    const elapsed = performance.now() - songStartTime;
    const remaining = Math.max(0, songDuration - elapsed);
    const s = Math.ceil(remaining / 1000);
    const m = Math.floor(s / 60);
    const ss = s % 60;
    document.getElementById('hudTimer').textContent = m + ':' + (ss < 10 ? '0' : '') + ss;
    // Progress bar
    document.getElementById('progressFill').style.width = (elapsed / songDuration * 100) + '%';
  }, 200);

  // Main game loop
  gameLoop();
}

// ─── GAME LOOP ───
function gameLoop() {
  if (!gameRunning) return;

  const now = performance.now();
  const elapsed = now - songStartTime;

  // End check — add 1s grace after song ends for last notes
  if (elapsed >= songDuration + 1000 || (elapsed >= songDuration && notes.length === 0)) {
    endGame();
    return;
  }

  // Spawn notes from pattern
  const travelTime = getNoteSpeed();
  while (patternIndex < songPattern.length) {
    const p = songPattern[patternIndex];
    // Spawn note so it arrives at hit zone at p.time
    const spawnTime = p.time - travelTime;
    if (elapsed >= spawnTime) {
      spawnNote(p.lane, p.time);
      patternIndex++;
    } else break;
  }

  // Update notes
  const laneH = TRAVEL_PX_FUNC();
  const hitY = laneH - HIT_ZONE_Y;
  const startY = -60; // notes start above visible area

  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    if (n.hit) continue;

    // Note should be at hitY when elapsed === targetTime
    // Note should be at startY when elapsed === spawnTime
    // Linear interpolation
    const totalTime = n.targetTime - n.spawnTime; // = travelTime
    const timePassed = elapsed - n.spawnTime;
    const progress = timePassed / totalTime; // 0 = spawn, 1 = at hit zone
    const top = startY + progress * (hitY - startY);

    n.el.style.top = top + 'px';
    n.currentTop = top;

    // Update trail
    if (n.trail && top > 0) {
      const trailH = Math.min(top, 50);
      n.trail.style.height = trailH + 'px';
      n.trail.style.top = (top - trailH) + 'px';
    }

    // Auto-miss: note went past hit zone by 300ms
    const timeSinceTarget = elapsed - n.targetTime;
    if (timeSinceTarget > 300) {
      handleMiss(n);
      n.el.style.transition = 'opacity .2s';
      n.el.style.opacity = '0';
      if (n.trail) { n.trail.style.transition = 'opacity .2s'; n.trail.style.opacity = '0'; }
      setTimeout(() => { n.el.remove(); if (n.trail) n.trail.remove(); }, 200);
      notes.splice(i, 1);
    }
  }

  gameRAF = requestAnimationFrame(gameLoop);
}

function getNoteSpeed() {
  // Time in ms for note to travel from top to hit zone
  const base = {
    easy: 2200,
    medium: 1800,
    hard: 1400,
    expert: 1100,
    impossible: 900
  };
  return base[selectedSong.diff] || 1500;
}

// ─── SPAWN NOTE ───
function spawnNote(lane, targetTime) {
  const id = noteIdCounter++;
  const laneEl = document.getElementById('lane-' + lane);
  if (!laneEl) return;

  const el = document.createElement('div');
  el.className = 'note ' + NOTE_CLASSES[lane];
  el.innerHTML = `<div class="note-inner"><span class="note-arrow">${ARROWS[lane]}</span></div>`;
  el.style.top = '-60px';
  laneEl.appendChild(el);

  // Trail
  const trail = document.createElement('div');
  trail.className = 'note-trail';
  trail.style.height = '0px';
  trail.style.top = '-60px';
  laneEl.appendChild(trail);

  const travelTime = getNoteSpeed();

  notes.push({
    id, el, trail, lane, hit: false,
    targetTime,
    spawnTime: targetTime - travelTime,
    currentTop: -60
  });
}

// ─── HIT LOGIC ───
function handlePress(lane) {
  if (!gameRunning) return;

  const receptor = document.getElementById('receptor-' + lane);
  if (receptor) receptor.classList.add('pressed');

  playTapSound(lane);

  const elapsed = performance.now() - songStartTime;
  const laneH = TRAVEL_PX_FUNC();
  const hitY = laneH - HIT_ZONE_Y;

  // Find closest note in this lane
  let closest = null, closestDist = Infinity;
  notes.forEach(n => {
    if (n.lane !== lane || n.hit) return;
    const timeDiff = Math.abs(elapsed - n.targetTime);
    if (timeDiff < closestDist) { closestDist = timeDiff; closest = n; }
  });

  // Timing windows (in ms)
  const PERFECT = 50, GREAT = 100, GOOD = 160, MISS_WINDOW = 250;

  if (closest && closestDist < MISS_WINDOW) {
    closest.hit = true;

    let points = 0, text = '', color = '', feedClass = '';
    if (closestDist < PERFECT) {
      points = 100; text = 'PERFECT !!'; color = '#ffd700'; perfectCount++;
      playPerfectSound();
      screenShake('hard');
      spawnParticles(lane, 14);
    } else if (closestDist < GREAT) {
      points = 75; text = 'GREAT !'; color = '#ff6fd8'; greatCount++;
      playGreatSound();
      screenShake('med');
      spawnParticles(lane, 6);
    } else if (closestDist < GOOD) {
      points = 50; text = 'Good'; color = '#4ecdc4'; goodCount++;
      screenShake('light');
    } else {
      points = 25; text = 'OK'; color = 'rgba(255,255,255,.5)'; goodCount++;
    }

    // Combo
    combo++;
    if (combo > maxCombo) maxCombo = combo;

    // Multiplier from combo
    if (combo >= 40) multiplier = 8;
    else if (combo >= 20) multiplier = 4;
    else if (combo >= 10) multiplier = 2;
    else multiplier = 1;

    // Fever
    if (feverActive) points *= 2;
    points *= multiplier;

    score += Math.round(points);

    // Remove note
    closest.el.style.transition = 'transform .15s, opacity .15s';
    closest.el.style.transform = 'translateX(-50%) scale(1.3)';
    closest.el.style.opacity = '0';
    if (closest.trail) { closest.trail.style.transition = 'opacity .15s'; closest.trail.style.opacity = '0'; }
    setTimeout(() => {
      closest.el.remove();
      if (closest.trail) closest.trail.remove();
    }, 150);
    notes = notes.filter(n => n !== closest);

    // Lane flash
    laneLightUp(lane);

    // Show feedback
    showFeedback(text, color);
    if (combo > 0 && combo % 5 === 0) showComboPopup(combo);

    // Fever check
    if (combo >= 20 && !feverActive) activateFever();

    // Stage check
    checkStage();

    // Milestone cheers
    if (combo === 10 || combo === 25 || combo === 50 || combo === 100) {
      playCrowdCheer();
      showFeedback(combo + 'x COMBO !', '#ffd700');
    }

    updateHUD();
  }
}

function handleRelease(lane) {
  const receptor = document.getElementById('receptor-' + lane);
  if (receptor) receptor.classList.remove('pressed');
}

function handleMiss(note) {
  missCount++;
  combo = 0;
  multiplier = 1;
  if (feverActive) deactivateFever();
  playMissSound();
  showFeedback('Miss', '#ff6b6b');
  showMissVignette();
  updateHUD();
}

// ─── VISUAL EFFECTS ───
function laneLightUp(lane) {
  const el = document.getElementById('lane-' + lane);
  if (!el) return;
  el.style.background = LANE_COLORS[lane] + '15';
  setTimeout(() => el.style.background = '', 200);
}

function showFeedback(text, color) {
  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.textContent = text;
  fb.style.color = color;
  fb.style.textShadow = `0 0 25px ${color}`;
  document.body.appendChild(fb);
  setTimeout(() => fb.remove(), 600);
}

function showComboPopup(c) {
  const el = document.createElement('div');
  el.className = 'combo-popup';
  el.textContent = c + 'x COMBO';
  if (c >= 20) el.style.color = '#ff6fd8';
  if (c >= 40) el.style.color = '#ffd700';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function screenShake(level) {
  const ga = document.getElementById('gameArea');
  ga.classList.remove('shake-light', 'shake-med', 'shake-hard');
  void ga.offsetWidth;
  ga.classList.add('shake-' + level);
  setTimeout(() => ga.classList.remove('shake-' + level), 200);
}

function spawnParticles(lane, count) {
  const receptor = document.getElementById('receptor-' + lane);
  if (!receptor) return;
  const rect = receptor.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['#ff6fd8', '#ffd700', '#4ecdc4', '#ff6b6b', '#cd77ff', '#fff'];

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = cx + 'px'; p.style.top = cy + 'px';
    const size = 4 + Math.random() * 8;
    p.style.width = size + 'px'; p.style.height = size + 'px';
    p.style.background = colors[i % colors.length];
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 70;
    p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}

function spawnConfetti(count = 35) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-20px';
      c.style.background = ['#ff6fd8', '#ffd700', '#4ecdc4', '#ff6b6b', '#cd77ff', '#fff'][Math.floor(Math.random() * 6)];
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }, i * 40);
  }
}

function showMissVignette() {
  const v = document.createElement('div');
  v.className = 'miss-vignette';
  document.body.appendChild(v);
  setTimeout(() => v.remove(), 350);
}

// ─── FEVER MODE ───
function activateFever() {
  feverActive = true;
  document.getElementById('feverBg').classList.add('active');
  document.getElementById('feverBanner').classList.add('show');
  playFeverSound();
  spawnConfetti(50);
  document.querySelectorAll('.lane').forEach(l => l.classList.add('fever-lane'));
  // Crowd lights
  spawnCrowdLights();
}

function deactivateFever() {
  feverActive = false;
  document.getElementById('feverBg').classList.remove('active');
  document.getElementById('feverBanner').classList.remove('show');
  document.querySelectorAll('.lane').forEach(l => l.classList.remove('fever-lane'));
  document.querySelectorAll('.crowd-light').forEach(l => l.remove());
}

function spawnCrowdLights() {
  for (let i = 0; i < 8; i++) {
    const light = document.createElement('div');
    light.className = 'crowd-light';
    light.style.left = (5 + i * 12.5) + '%';
    light.style.background = LANE_COLORS[i % 4] + '40';
    light.style.height = (20 + Math.random() * 30) + 'vh';
    light.style.opacity = '.3';
    document.body.appendChild(light);
    // Animate
    setInterval(() => {
      if (!feverActive) { light.remove(); return; }
      light.style.height = (20 + Math.random() * 40) + 'vh';
      light.style.opacity = (.1 + Math.random() * .3) + '';
    }, 400 + Math.random() * 300);
  }
}

// ─── STAGE PROGRESSION ───
function checkStage() {
  let newLevel = 0;
  if (score >= 5000) newLevel = 4;
  else if (score >= 2500) newLevel = 3;
  else if (score >= 1000) newLevel = 2;
  else if (score >= 400) newLevel = 1;
  if (newLevel !== stageLevel) {
    stageLevel = newLevel;
    updateStage();
    if (newLevel > 0) playCrowdCheer();
  }
}

function updateStage() {
  document.getElementById('stageBg').className = 'stage-bg stage-' + stageLevel;
}

// ─── HUD ───
function updateHUD() {
  document.getElementById('hudScore').textContent = score;
  const comboEl = document.getElementById('hudCombo');
  comboEl.textContent = combo > 0 ? combo + ' combo' : '';
  comboEl.classList.toggle('fire', combo >= 10);

  const multEl = document.getElementById('hudMult');
  if (multiplier > 1 || feverActive) {
    const totalMult = multiplier * (feverActive ? 2 : 1);
    multEl.textContent = 'x' + totalMult;
    multEl.style.display = 'inline';
    if (totalMult >= 8) multEl.style.color = '#ffd700';
    else if (totalMult >= 4) multEl.style.color = '#ff6fd8';
    else multEl.style.color = '#ff6b6b';
  } else {
    multEl.style.display = 'none';
  }
}

// ─── FLOATING NOTES ───
function startFloatingNotes() {
  floatingInterval = setInterval(() => {
    const el = document.createElement('div');
    el.className = 'floating-note';
    el.textContent = ['\u{1F3B5}', '\u{1F3B6}'][Math.floor(Math.random() * 2)];
    el.style.left = (5 + Math.random() * 90) + '%';
    el.style.bottom = '-30px';
    const dur = 6 + Math.random() * 5;
    el.style.animationDuration = dur + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000);
  }, 2500);
}

function stopFloatingNotes() {
  if (floatingInterval) { clearInterval(floatingInterval); floatingInterval = null; }
  document.querySelectorAll('.floating-note').forEach(n => n.remove());
}

// ─── END GAME ───
function endGame() {
  gameRunning = false;
  cancelAnimationFrame(gameRAF);
  clearInterval(timerInterval);
  clearInterval(metronomeInterval);
  stopFloatingNotes();
  if (feverActive) deactivateFever();

  // Clean up remaining notes
  notes.forEach(n => { n.el.remove(); if (n.trail) n.trail.remove(); });
  notes = [];

  // Calculate grade
  const total = perfectCount + greatCount + goodCount + missCount;
  const hitRate = total > 0 ? (perfectCount + greatCount + goodCount) / total : 0;
  const perfectRate = total > 0 ? perfectCount / total : 0;
  let grade = 'D', gradeColor = 'rgba(255,255,255,.4)';
  if (hitRate >= .95 && perfectRate >= .5) { grade = 'S'; gradeColor = '#ffd700'; }
  else if (hitRate >= .85 && perfectRate >= .3) { grade = 'A'; gradeColor = '#ff6fd8'; }
  else if (hitRate >= .7) { grade = 'B'; gradeColor = '#cd77ff'; }
  else if (hitRate >= .5) { grade = 'C'; gradeColor = '#4ecdc4'; }

  // Stars
  let stars = 1;
  if (score >= 500) stars = 2;
  if (score >= 1500) stars = 3;
  if (score >= 3000) stars = 4;
  if (score >= 6000) stars = 5;

  // Message
  const msgs = [
    { min: 0, text: `Continue ${currentPlayer}, tu vas y arriver !`, title: 'Pas mal !' },
    { min: 500, text: `${currentPlayer} assure grave !`, title: 'Super !' },
    { min: 1500, text: `${currentPlayer} est une STAR de la K-pop !`, title: 'INCROYABLE !' },
    { min: 3000, text: `${currentPlayer} est la REINE du dance floor !!!`, title: 'LEGENDAIRE !!!' }
  ];
  let msg = msgs[0];
  for (const m of msgs) if (score >= m.min) msg = m;

  // Fill end screen
  document.getElementById('endTitle').textContent = msg.title;
  document.getElementById('endScore').textContent = score;
  document.getElementById('endMsg').textContent = msg.text;
  document.getElementById('statPerfect').textContent = perfectCount;
  document.getElementById('statGreat').textContent = greatCount;
  document.getElementById('statGood').textContent = goodCount;
  document.getElementById('statMiss').textContent = missCount;
  document.getElementById('statCombo').textContent = maxCombo;

  // Grade
  const gradeEl = document.getElementById('endGrade');
  gradeEl.textContent = grade;
  gradeEl.className = 'end-grade grade-' + grade;
  gradeEl.style.color = gradeColor;
  gradeEl.style.textShadow = `0 0 50px ${gradeColor}`;

  // Stars
  const sr = document.getElementById('starsRow');
  sr.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = i < stars ? '\u2605' : '\u2606';
    s.style.color = i < stars ? '#ffd700' : 'rgba(255,255,255,.15)';
    s.style.animationDelay = (i * .15) + 's';
    sr.appendChild(s);
  }

  // Save score
  const isNewRecord = saveSongHS(selectedSong.id, score);

  // Also save to global HS
  const hsKey = `kpop_dance_hs_${currentPlayer}`;
  const prevGlobal = parseInt(localStorage.getItem(hsKey)) || 0;
  if (score > prevGlobal) localStorage.setItem(hsKey, score);

  // Save stars
  let totalStars = parseInt(localStorage.getItem('kpop_stars_' + currentPlayer) || '0');
  totalStars += stars;
  localStorage.setItem('kpop_stars_' + currentPlayer, String(totalStars));

  const recordEl = document.getElementById('endRecord');
  if (isNewRecord) {
    recordEl.style.display = 'block';
    recordEl.textContent = 'Nouveau Record !';
    spawnConfetti(50);
  } else {
    const prev = getSongHS(selectedSong.id);
    if (prev > 0) {
      recordEl.style.display = 'block';
      recordEl.textContent = 'Record : ' + prev;
      recordEl.style.color = 'rgba(255,255,255,.4)';
      recordEl.className = '';
    } else {
      recordEl.style.display = 'none';
    }
  }

  // Show end screen
  document.getElementById('endScreen').classList.remove('hidden');

  if (grade === 'S') {
    spawnConfetti(60);
    megaCelebration();
  } else if (grade === 'A') {
    spawnConfetti(30);
  }
}

// ─── BACK TO SELECT ───
function backToSelect() {
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameHud').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('touchRow').style.display = 'none';
  document.getElementById('selectScreen').classList.remove('hidden');
  stageLevel = 0; updateStage();
  document.querySelectorAll('.crowd-light').forEach(l => l.remove());
  buildSongCards();
  // Reset record display
  const recordEl = document.getElementById('endRecord');
  recordEl.className = 'end-new-record';
  recordEl.style.color = '';
}

// ─── SHARE ───
function shareWhatsApp() {
  const msg = encodeURIComponent(`J'ai score ${score} pts sur "${selectedSong.name}" au Dance Challenge K-Pop ! ${selectedSong.emoji} Tu peux faire mieux ? https://hconsulting987654321-blip.github.io/kpop-girls/dance.html`);
  window.open('https://wa.me/?text=' + msg, '_blank');
}
function shareCopy() {
  const msg = `J'ai score ${score} pts sur "${selectedSong.name}" au Dance Challenge K-Pop ! ${selectedSong.emoji} https://hconsulting987654321-blip.github.io/kpop-girls/dance.html`;
  navigator.clipboard.writeText(msg).then(() => {
    const t = document.getElementById('shareToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

// ─── KEYBOARD ───
const keysDown = new Set();
document.addEventListener('keydown', e => {
  if (keysDown.has(e.key)) return; // prevent repeat
  keysDown.add(e.key);
  const lane = KEY_MAP[e.key.toLowerCase()];
  if (lane !== undefined) {
    e.preventDefault();
    handlePress(lane);
    const receptor = document.getElementById('receptor-' + lane);
    if (receptor) receptor.classList.add('pressed');
    const touchBtn = document.querySelector(`.touch-btn[data-lane="${lane}"]`);
    if (touchBtn) touchBtn.classList.add('pressed');
  }
});
document.addEventListener('keyup', e => {
  keysDown.delete(e.key);
  const lane = KEY_MAP[e.key.toLowerCase()];
  if (lane !== undefined) {
    handleRelease(lane);
    const receptor = document.getElementById('receptor-' + lane);
    if (receptor) receptor.classList.remove('pressed');
    const touchBtn = document.querySelector(`.touch-btn[data-lane="${lane}"]`);
    if (touchBtn) touchBtn.classList.remove('pressed');
  }
});

// Prevent scrolling
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Resize handler
window.addEventListener('resize', () => {
  if (gameRunning) adjustLaneSize();
});

// ─── MEGA CELEBRATION ───
function megaCelebration() {
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,215,0,.3);z-index:9998;pointer-events:none;animation:flashOut .5s ease forwards';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 500);
  const emojis = ['\u{1F31F}', '\u{1F496}', '\u2B50', '\u2728', '\u{1F451}', '\u{1F48E}', '\u{1F389}', '\u{1F984}', '\u{1F308}', '\u{1F49C}'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const e = document.createElement('div');
      e.style.cssText = 'position:fixed;top:-20px;left:' + (Math.random() * 100) + 'vw;font-size:' + (20 + Math.random() * 20) + 'px;z-index:9997;pointer-events:none;animation:emojiRain ' + (2 + Math.random() * 3) + 's linear forwards';
      e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 5000);
    }, i * 60);
  }
}

// ─── SPARKLE TRAIL ───
let _sparkleFrame = 0;
document.addEventListener('mousemove', function(e) {
  if (++_sparkleFrame % 3 !== 0) return;
  if (Math.random() > .85) createSparkle(e.clientX, e.clientY);
});
document.addEventListener('touchmove', function(e) {
  if (++_sparkleFrame % 3 !== 0) return;
  if (Math.random() > .85 && e.touches[0]) createSparkle(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
function createSparkle(x, y) {
  const s = document.createElement('div');
  s.style.cssText = `position:fixed;pointer-events:none;z-index:9999;font-size:${8 + Math.random() * 8}px;left:${x}px;top:${y}px;opacity:1;transition:transform .7s ease-out,opacity .7s ease-out;will-change:transform,opacity`;
  s.textContent = ['\u2728', '\u2B50', '\u{1F4AB}', '\u{1F31F}', '\u{1F496}'][Math.floor(Math.random() * 5)];
  document.body.appendChild(s);
  requestAnimationFrame(() => {
    s.style.transform = `translateY(-${30 + Math.random() * 30}px) translateX(${(Math.random() - .5) * 25}px) scale(0)`;
    s.style.opacity = '0';
  });
  setTimeout(() => s.remove(), 700);
}

// Haptic
document.addEventListener('click', function(e) {
  if (e.target.matches('button, .btn, .touch-btn, .p-btn, .song-card, [onclick]')) {
    try { if (navigator.vibrate) navigator.vibrate(15); } catch(e) {}
  }
});

/* ===== PWA ===== */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
