<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mode Defile — K-Pop Star Academy</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="description" content="Mode Defile K-Pop — Prepare ta tenue et defile sur le podium !">
<link rel="stylesheet" href="common.css">
<style>
:root{
  --pink:#ff6fd8;--purple:#b44dff;--gold:#ffd700;--dark:#0a0a1a;
  --glass:rgba(255,255,255,0.08);--glass-border:rgba(255,255,255,0.18);
  --radius:20px;
}
body{
  background:linear-gradient(135deg,var(--dark),#1a0a2e,#0f1460);
  min-height:100vh;min-height:100dvh;font-family:'Quicksand',sans-serif;
  color:white;overflow-x:hidden;touch-action:manipulation;
}
/* GLASSMORPHISM PANELS */
.glass{
  background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1.5px solid var(--glass-border);border-radius:var(--radius);
}
/* TOP BAR */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;flex-wrap:wrap;gap:8px;
}

.top-bar h1{font-size:1.3em;text-shadow:2px 2px 8px rgba(0,0,0,.4);background:linear-gradient(135deg,var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-right{display:flex;align-items:center;gap:8px}
.player-badge{
  background:linear-gradient(135deg,var(--gold),#f6b93b);
  color:#333;padding:5px 14px;border-radius:18px;font-weight:700;font-size:.85em;
}
.sound-btn{
  width:36px;height:36px;border-radius:50%;font-size:1.1em;
  display:flex;align-items:center;justify-content:center;
}

/* PLAYER SELECT */
.player-select{
  position:fixed;inset:0;background:linear-gradient(135deg,var(--dark),#1a0a2e);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;gap:20px;
}
.player-select h2{font-size:2em;background:linear-gradient(135deg,var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.player-select p{font-size:1.05em;opacity:.7;max-width:380px;text-align:center}
.player-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.player-card{
  background:var(--glass);backdrop-filter:blur(12px);border:2px solid var(--glass-border);
  border-radius:24px;padding:20px 28px;text-align:center;cursor:pointer;transition:.3s;min-width:120px;
}
.player-card:hover{transform:scale(1.08);border-color:var(--gold);box-shadow:0 0 25px rgba(255,215,0,0.25)}
.player-card .pc-emoji{font-size:3em}
.player-card .pc-name{font-size:1.15em;font-weight:700;margin-top:6px}
.player-card .pc-stars{font-size:.8em;color:var(--gold);margin-top:4px}

/* ROUND INFO */
.round-info{
  text-align:center;padding:6px 16px;
  display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;
}
.round-label{font-size:1em;font-weight:700;color:var(--purple)}
.theme-label{font-size:1.15em;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.style-tip{font-size:.85em;color:rgba(255,255,255,.6);font-style:italic;width:100%}
.timer-wrap{display:flex;align-items:center;gap:8px}
.timer-display{font-size:1.3em;font-weight:800;color:#ff6b6b;min-width:36px;text-align:center}
.timer-display.warning{animation:timerPulse .5s ease infinite alternate}
@keyframes timerPulse{0%{transform:scale(1)}100%{transform:scale(1.15);color:#ff3333}}
.pause-btn{
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);
  color:white;width:30px;height:30px;border-radius:50%;font-size:.9em;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;
}
.pause-btn:hover{background:rgba(255,255,255,.3)}
.total-score{font-size:.95em;color:var(--gold);font-weight:700}

/* AUDIENCE METER */
.meter-wrap{width:100%;max-width:320px;margin:4px auto}
.meter-label{font-size:.8em;color:rgba(255,255,255,.6);text-align:center;margin-bottom:3px}
.meter-bar{height:14px;border-radius:7px;background:rgba(255,255,255,.1);overflow:hidden;position:relative}
.meter-fill{height:100%;border-radius:7px;width:0%;transition:width .4s ease;background:linear-gradient(90deg,var(--purple),var(--pink),var(--gold))}
.meter-bar .meter-sparkle{position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4));border-radius:7px;animation:meterGlow 1s ease infinite alternate}
@keyframes meterGlow{0%{opacity:.3}100%{opacity:.8}}

/* OUTFIT PHASE */
.outfit-phase{display:flex;gap:14px;padding:8px 16px 20px;max-width:1100px;margin:0 auto}
@media(max-width:750px){.outfit-phase{flex-direction:column;align-items:center}}
.preview-panel{
  min-width:220px;max-width:260px;flex-shrink:0;padding:14px;
  display:flex;flex-direction:column;align-items:center;
}
.preview-stage{
  width:200px;height:260px;border-radius:18px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center bottom,rgba(var(--pink-rgb,255,111,216),.1),rgba(0,0,0,.25));
}
.mannequin{text-align:center;z-index:2;position:relative}
.m-layer{display:block;line-height:1;transition:.3s cubic-bezier(.34,1.56,.64,1)}
.m-hair{font-size:2.4em;min-height:40px;margin-bottom:-8px}
.m-face{font-size:3.2em}
.m-top{font-size:3.6em}
.m-bottom{font-size:2.8em}
.m-shoes{font-size:2em;min-height:32px}
.m-acc{font-size:1.8em;min-height:28px;margin-top:-4px}
.sparkle-pop{animation:sparklePop .4s ease}
@keyframes sparklePop{0%{transform:scale(1.3);filter:brightness(1.8)}100%{transform:scale(1);filter:brightness(1)}}
.slots-status{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.slot-dot{
  width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;
  font-size:.75em;transition:.3s;
}
.slot-dot.filled{border-color:var(--gold);background:rgba(255,215,0,.15)}

/* WARDROBE */
.wardrobe{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;max-height:calc(100vh - 220px);max-height:calc(100dvh - 220px);overflow-y:auto;padding-right:4px}
.wardrobe::-webkit-scrollbar{width:5px}
.wardrobe::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
.ward-section{overflow:hidden}
.ward-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;cursor:pointer;user-select:none;font-weight:700;font-size:.9em;
}
.ward-header:hover{background:rgba(255,255,255,.06)}
.ward-body{display:flex;gap:5px;flex-wrap:wrap;padding:5px 10px 10px}
.ward-body.collapsed{display:none}
.item-btn{
  width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.08);
  border:2px solid transparent;font-size:1.7em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;position:relative;
}
.item-btn:hover{transform:scale(1.12);background:rgba(255,255,255,.18)}
.item-btn.selected{border-color:var(--gold);background:rgba(255,215,0,.15);box-shadow:0 0 10px rgba(255,215,0,.25)}
.item-btn .sparkle-hint{position:absolute;top:-2px;right:-2px;font-size:.4em;animation:sparkleHint 1.2s ease infinite}
@keyframes sparkleHint{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

/* RUNWAY */
.runway-phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:800px;margin:0 auto;padding:10px 16px;position:relative}
.runway-phase.active{display:flex}
.runway-container{width:100%;height:380px;position:relative;overflow:hidden;border-radius:var(--radius);margin:8px 0;background:linear-gradient(180deg,#050510 0%,#1a1040 40%,#2d1b69 100%)}
.runway-floor{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200%;height:55%;background:linear-gradient(180deg,rgba(255,255,255,.01) 0%,rgba(255,255,255,.07) 100%);clip-path:polygon(42% 0%,58% 0%,90% 100%,10% 100%)}
.runway-floor::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.03) 18px,rgba(255,255,255,.03) 20px)}
.runway-lights{position:absolute;bottom:0;width:100%;height:100%;pointer-events:none}
.runway-light{position:absolute;bottom:0;width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold),0 0 16px rgba(255,215,0,.25);animation:lightPulse 2s ease infinite alternate}
@keyframes lightPulse{0%{opacity:.4;transform:scale(.8)}100%{opacity:1;transform:scale(1.2)}}
.spotlight-cone{position:absolute;top:0;width:120px;height:100%;background:radial-gradient(ellipse at top,rgba(255,255,255,.1),transparent 70%);pointer-events:none;transition:left .12s linear}
.runway-mannequin{position:absolute;bottom:30%;font-size:1em;text-align:center;z-index:10;transition:none}
.runway-mannequin .m-layer{display:block;line-height:1}
.runway-mannequin .m-hair{font-size:2em;margin-bottom:-6px}
.runway-mannequin .m-face{font-size:2.8em}
.runway-mannequin .m-top{font-size:3.2em}
.runway-mannequin .m-bottom{font-size:2.4em}
.runway-mannequin .m-shoes{font-size:1.8em}
.runway-mannequin .m-acc{font-size:1.6em;margin-top:-3px}
.runway-mannequin.walking{animation:walkBounce .5s ease infinite}
@keyframes walkBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.runway-mannequin.posing{animation:poseGlow 1s ease infinite alternate}
@keyframes poseGlow{0%{filter:brightness(1)}100%{filter:brightness(1.3) drop-shadow(0 0 15px rgba(255,215,0,.5))}}
.runway-mannequin.spinning{animation:spinPose .8s ease}
@keyframes spinPose{0%{transform:rotateY(0)}50%{transform:rotateY(180deg) scale(1.1)}100%{transform:rotateY(360deg)}}

/* AUDIENCE ROW */
.audience-row{position:absolute;bottom:6px;left:0;right:0;display:flex;justify-content:center;gap:4px;font-size:1.5em;z-index:5}
.audience-member{transition:transform .3s;display:inline-block}
.audience-member.cheer{animation:audienceCheer .4s ease}
.audience-member.boo{animation:audienceBoo .5s ease}
.audience-member.wave{animation:audienceWave .6s ease}
@keyframes audienceCheer{0%{transform:translateY(0)}30%{transform:translateY(-12px) scale(1.2)}100%{transform:translateY(0) scale(1)}}
@keyframes audienceBoo{0%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}100%{transform:rotate(0)}}
@keyframes audienceWave{0%{transform:translateY(0)}50%{transform:translateY(-8px) rotate(5deg)}100%{transform:translateY(0)}}
.audience-sign{position:absolute;bottom:42px;font-size:.65em;background:var(--pink);color:white;padding:2px 6px;border-radius:6px;white-space:nowrap;animation:signPop .5s ease forwards;pointer-events:none}
@keyframes signPop{0%{opacity:0;transform:translateY(10px) scale(.5)}50%{opacity:1;transform:translateY(-5px) scale(1.1)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* CAMERA FLASH */
.camera-flash{position:absolute;border-radius:50%;background:radial-gradient(white,transparent 70%);pointer-events:none;z-index:15;animation:flashBurst .3s ease forwards}
@keyframes flashBurst{0%{opacity:1;transform:scale(0)}50%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
.photo-flash-overlay{position:absolute;inset:0;background:white;pointer-events:none;z-index:50;animation:photoFlash .6s ease forwards}
@keyframes photoFlash{0%{opacity:.9}30%{opacity:.6}100%{opacity:0}}

/* EMOJI REACTIONS */
.emoji-reaction{position:absolute;bottom:55px;font-size:1.5em;z-index:20;pointer-events:none;animation:emojiFloat 2s ease forwards}
@keyframes emojiFloat{0%{opacity:1;transform:translateY(0) scale(.5)}20%{transform:translateY(-30px) scale(1)}100%{opacity:0;transform:translateY(-160px) scale(.7)}}

/* SCORE SCREEN */
.score-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:10px}
.score-screen.active{display:flex}
.score-card{background:linear-gradient(135deg,#2d2b55,#1a1a2e);border:2px solid var(--glass-border);border-radius:28px;padding:24px 32px;text-align:center;max-width:400px;width:92%;animation:popIn .5s ease}
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.score-card h2{font-size:1.8em;margin-bottom:4px}
.grade-display{font-size:3.5em;margin:8px 0}
.score-detail{font-size:.95em;color:rgba(255,255,255,.65);margin:3px 0}
.score-detail span{color:var(--gold);font-weight:700}
.combo-label{color:var(--pink);font-weight:700;font-size:1em;margin-top:6px}
.stars-earned{font-size:1.8em;margin:8px 0}
.btn-row{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}

/* FINAL SCREEN */
.final-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:12px;overflow-y:auto;padding:20px}
.final-screen.active{display:flex}
.final-card{background:linear-gradient(135deg,#2d2b55,#1a1a2e);border:2px solid var(--gold);border-radius:28px;padding:24px 32px;text-align:center;max-width:460px;width:95%;animation:popIn .6s ease}
.final-card h2{font-size:2em;color:var(--gold);margin-bottom:8px}
.round-recap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0}
.recap-pill{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:5px 10px;font-size:.8em}
.recap-pill .rp-theme{font-weight:700;color:var(--pink)}
.recap-pill .rp-score{color:var(--gold)}
.final-stars{font-size:2.2em;margin:8px 0}
.best-outfit{margin:8px 0;font-size:1.2em}

/* BUTTONS */
.btn{color:white;border:none;padding:9px 20px;border-radius:20px;font-family:inherit;font-size:.9em;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.97)}
.btn-go{background:linear-gradient(145deg,#00c9ff,#92fe9d);color:#333}
.btn-next{background:linear-gradient(145deg,var(--pink),var(--purple))}
.btn-encore{background:linear-gradient(145deg,var(--gold),#f6b93b);color:#333}
.btn-restart{background:linear-gradient(145deg,#ff6b6b,#ee5a24)}
.btn-home{background:rgba(255,255,255,.2)}
.btn-share{background:#25D366}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:400;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 2.5s ease-out forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* SPARKLE PARTICLES */
.sparkle-particle{position:fixed;pointer-events:none;z-index:401;font-size:1.2em;animation:sparkleRise 1.5s ease forwards}
@keyframes sparkleRise{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.3)}}

/* SHARE TOAST */
.share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#25D366;color:white;padding:10px 22px;border-radius:22px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.share-toast.show{opacity:1}

/* PAUSE OVERLAY */
.pause-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pause-overlay.active{display:flex}
.pause-overlay h2{font-size:2em;color:var(--gold)}

/* RESPONSIVE */
@media(max-width:750px){
  .top-bar{justify-content:center;text-align:center}
  .top-bar h1{font-size:1.1em}
  .preview-panel{max-width:100%;width:100%;min-width:unset}
  .wardrobe{max-height:none}
  .runway-container{height:300px}
  .outfit-phase{padding-bottom:70px}
  .round-info{gap:8px}
  .score-card,.final-card{padding:18px 20px}
}
@media(max-width:400px){
  .item-btn{width:42px;height:42px;font-size:1.5em}
  .preview-stage{width:170px;height:220px}
}
</style>
</head>
<body>

<!-- PLAYER SELECT -->
<div class="player-select" id="playerSelect">
  <h2>Mode Defile</h2>
  <p>Choisis ta mannequin pour le defile !</p>
  <div class="player-cards" id="playerCards"></div>
</div>

<!-- TOP BAR -->
<div class="top-bar" id="topBar" style="display:none">
  <a id="backBtn" href="index.html" class="back-btn">Retour</a>
  <h1>Mode Defile</h1>
  <div class="top-right">
    <div class="player-badge" id="playerBadge">Ambre</div>
    <button class="sound-btn" id="soundBtn" title="Son">🔊</button>
  </div>
</div>

<!-- ROUND INFO -->
<div class="round-info" id="roundInfo" style="display:none">
  <span class="round-label" id="roundLabel">Round 1/7</span>
  <span class="theme-label" id="themeLabel">Concert Rock!</span>
  <div class="timer-wrap">
    <span class="timer-display" id="timerDisplay">35</span>
    <button class="pause-btn" id="pauseBtn" title="Pause">⏸</button>
  </div>
  <span class="total-score" id="totalScoreDisplay">Total: 0</span>
  <div class="style-tip" id="styleTip"></div>
  <div class="meter-wrap">
    <div class="meter-label">Excitation du public</div>
    <div class="meter-bar"><div class="meter-fill" id="meterFill"></div><div class="meter-sparkle"></div></div>
  </div>
</div>

<!-- OUTFIT PHASE -->
<div class="outfit-phase" id="outfitPhase" style="display:none">
  <div class="preview-panel glass">
    <div class="preview-stage">
      <div class="mannequin" id="mannequin">
        <span class="m-layer m-hair" id="mHair"></span>
        <span class="m-layer m-face" id="mFace">👩</span>
        <span class="m-layer m-top" id="mTop"></span>
        <span class="m-layer m-bottom" id="mBottom"></span>
        <span class="m-layer m-shoes" id="mShoes"></span>
        <span class="m-layer m-acc" id="mAcc"></span>
      </div>
    </div>
    <div class="slots-status" id="slotsStatus"></div>
  </div>
  <div class="wardrobe" id="wardrobe"></div>
</div>

<!-- GO BUTTON -->
<div id="goBar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,26,.92);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.12);padding:10px;text-align:center;z-index:50">
  <button class="btn btn-go" onclick="startRunway()">Defile !</button>
</div>

<!-- RUNWAY PHASE -->
<div class="runway-phase" id="runwayPhase">
  <div class="runway-container" id="runwayContainer">
    <div class="runway-floor"></div>
    <div class="runway-lights" id="runwayLights"></div>
    <div class="spotlight-cone" id="spotlightCone"></div>
    <div class="audience-row" id="audienceRow"></div>
    <div class="runway-mannequin" id="runwayMannequin"></div>
  </div>
</div>

<!-- SCORE SCREEN -->
<div class="score-screen" id="scoreScreen">
  <div class="score-card">
    <h2 id="scoreTitle">Bravo !</h2>
    <div class="grade-display" id="gradeDisplay">A</div>
    <div class="stars-earned" id="starsEarned"></div>
    <div class="score-detail">Theme : <span id="sdTheme">0</span>/90</div>
    <div class="score-detail">Tenue complete : <span id="sdComplete">0</span>/20</div>
    <div class="score-detail">Combos : <span id="sdCombo">0</span></div>
    <div class="score-detail" style="font-size:1.1em;margin-top:6px">Total round : <span id="sdTotal">0</span></div>
    <div class="combo-label" id="comboLabel"></div>
    <div id="encoreZone" style="margin-top:8px"></div>
    <div class="btn-row">
      <button class="btn btn-next" id="btnNext" onclick="nextRound()">Round suivant</button>
    </div>
  </div>
</div>

<!-- FINAL SCREEN -->
<div class="final-screen" id="finalScreen">
  <div class="final-card">
    <h2>Defile Termine !</h2>
    <div class="final-stars" id="finalStars"></div>
    <div class="score-detail" style="font-size:1.4em">Score final : <span id="finalTotal">0</span>/700</div>
    <div class="score-detail">Meilleur round : <span id="finalBest">-</span></div>
    <div class="best-outfit" id="bestOutfitDisplay"></div>
    <div class="round-recap" id="roundRecap"></div>
    <div class="btn-row">
      <button class="btn btn-share" onclick="shareResult()">Partager</button>
      <button class="btn btn-restart" onclick="restartGame()">Rejouer</button>
      <button class="btn btn-home" id="homeBtn" onclick="goHome()">Accueil</button>

<script>
// ═══════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null,soundOn=true;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}

function playClick(){
  if(!soundOn)return;const ctx=ensureAudio();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.value=600;
  g.gain.setValueAtTime(.1,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.05);
  o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.05);
}
function playCameraClick(){
  if(!soundOn)return;const ctx=ensureAudio();
  const len=ctx.sampleRate*.05,buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,5);
  const src=ctx.createBufferSource();src.buffer=buf;
  const g=ctx.createGain();g.gain.value=.15;
  src.connect(g);g.connect(ctx.destination);src.start();src.stop(ctx.currentTime+.05);
}
function playCrowdCheer(intensity){
  if(!soundOn)return;const ctx=ensureAudio();
  const dur=.4+intensity*.3,len=ctx.sampleRate*dur,buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*.3*(1-i/len);
  const src=ctx.createBufferSource();src.buffer=buf;
  const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=500+intensity*300;bp.Q.value=.5;
  const g=ctx.createGain();g.gain.setValueAtTime(.12+intensity*.08,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
  src.connect(bp);bp.connect(g);g.connect(ctx.destination);src.start();src.stop(ctx.currentTime+dur);
}
function playCrowdBoo(){
  if(!soundOn)return;const ctx=ensureAudio();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(180,ctx.currentTime);
  o.frequency.linearRampToValueAtTime(100,ctx.currentTime+.3);
  g.gain.setValueAtTime(.06,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
  o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.3);
}
function playRunwayBeat(){
  if(!soundOn)return;const ctx=ensureAudio();
  const bpm=120,bl=60/bpm;
  for(let i=0;i<16;i++){
    const t=ctx.currentTime+i*bl;
    if(i%4===0){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+.1);
      g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
      o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.15);
    }
    if(i%2===0){
      const len2=ctx.sampleRate*.03,buf2=ctx.createBuffer(1,len2,ctx.sampleRate),dd=buf2.getChannelData(0);
      for(let j=0;j<len2;j++)dd[j]=(Math.random()*2-1)*Math.pow(1-j/len2,5);
      const s2=ctx.createBufferSource();s2.buffer=buf2;
      const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=8000;
      const g2=ctx.createGain();g2.gain.setValueAtTime(.05,t);g2.gain.exponentialRampToValueAtTime(.001,t+.03);
      s2.connect(hp);hp.connect(g2);g2.connect(ctx.destination);s2.start(t);s2.stop(t+.05);
    }
    // Synth melody on beat
    if(i%4===0||i%4===3){
      const o2=ctx.createOscillator(),g3=ctx.createGain();
      const notes=[523,587,659,784,880,659,784,523];
      o2.type='triangle';o2.frequency.value=notes[i%notes.length];
      g3.gain.setValueAtTime(.04,t);g3.gain.exponentialRampToValueAtTime(.001,t+bl*.8);
      o2.connect(g3);g3.connect(ctx.destination);o2.start(t);o2.stop(t+bl*.8);
    }
  }
}
function playFanfare(){
  if(!soundOn)return;const ctx=ensureAudio();
  const notes=[523.25,659.25,783.99,1046.5];
  notes.forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='triangle';o.frequency.value=f;
    const t=ctx.currentTime+i*.15;
    g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.4);
  });
}
function playPhotoSound(){
  if(!soundOn)return;const ctx=ensureAudio();
  // Big shutter + flash
  const len=ctx.sampleRate*.12,buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3)*.4;
  const src=ctx.createBufferSource();src.buffer=buf;
  const g=ctx.createGain();g.gain.value=.25;
  src.connect(g);g.connect(ctx.destination);src.start();src.stop(ctx.currentTime+.12);
}

  }
}

(function init(){
  // Check URL param or localStorage
  const params=new URLSearchParams(location.search);
  const urlPlayer=params.get('player');
  const storedPlayer=localStorage.getItem('kpop_player');
  const preselected=urlPlayer||storedPlayer;

  if(preselected&&PLAYERS.some(p=>p.name===preselected)){
    selectPlayer(preselected,true);
  } else {
    initPlayerSelect();
  }

  // Sound toggle
  document.getElementById('soundBtn').onclick=()=>{
    soundOn=!soundOn;
    document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
  };
  // Pause toggle
  document.getElementById('pauseBtn').onclick=togglePause;

function initPlayerSelect(){
  const container=document.getElementById('playerCards');
  container.innerHTML='';
  PLAYERS.forEach(p=>{
    const stars=localStorage.getItem(`kpop_stars_${p.name}`)||'0';
    const card=document.createElement('div');card.className='player-card';
    card.innerHTML=`<div class="pc-emoji">${p.emoji}</div><div class="pc-name">${p.name}</div><div class="pc-stars">${stars} etoiles</div>`;
    card.onclick=()=>selectPlayer(p.name);
    container.appendChild(card);
  });
}

function selectPlayer(name,skipAnim){
  playerName=name;
  localStorage.setItem('kpop_player',name);
  const p=PLAYERS.find(pl=>pl.name===name);
  document.getElementById('playerBadge').textContent=`${p.emoji} ${name}`;
  document.getElementById('playerSelect').style.display='none';
  document.getElementById('topBar').style.display='flex';
  document.getElementById('backBtn').href=`index.html?player=${encodeURIComponent(name)}`;
  document.getElementById('homeBtn')&&(document.getElementById('homeBtn').onclick=()=>{location.href=`index.html?player=${encodeURIComponent(name)}`});
  if(!skipAnim)playClick();
  startGame();
}

function startGame(){
  currentRound=0;totalScore=0;roundScores=[];bestRound={score:-1,round:0,outfit:null};runwayInProgress=false;
  // Shuffle 6 themes + freestyle round 7
  roundThemes=[...THEMES].sort(()=>Math.random()-.5);
  roundThemes.push(FREESTYLE_THEME);
  startRound();
}

function startRound(){
  const theme=roundThemes[currentRound];
  outfit={hair:'',face:'',top:'',bottom:'',shoes:'',accessory:''};

  document.getElementById('roundInfo').style.display='flex';
  document.getElementById('outfitPhase').style.display='flex';
  document.getElementById('goBar').style.display='block';
  document.getElementById('runwayPhase').classList.remove('active');
  document.getElementById('scoreScreen').classList.remove('active');
  document.getElementById('finalScreen').classList.remove('active');
  document.getElementById('pauseOverlay').classList.remove('active');

  const isFreestyle=currentRound===6;
  document.getElementById('roundLabel').textContent=isFreestyle?'Bonus!':'Round '+(currentRound+1)+'/6';
  document.getElementById('themeLabel').textContent=theme.emoji+' '+theme.name;
  document.getElementById('totalScoreDisplay').textContent='Total: '+totalScore;
  document.getElementById('styleTip').textContent='💡 '+theme.tip;
  document.getElementById('meterFill').style.width='0%';

  updateMannequin();
  buildWardrobe(theme);
  updateSlotDots();
  startTimer();
}

function buildWardrobe(theme){
  const ward=document.getElementById('wardrobe');ward.innerHTML='';
  const isFreestyle=theme===FREESTYLE_THEME;
  const catKeys=Object.keys(CATEGORIES);
  const isMobile=window.innerWidth<=750;
  catKeys.forEach((key,catIdx)=>{
    const cat=CATEGORIES[key];
    const section=document.createElement('div');section.className='ward-section glass';
    const header=document.createElement('div');header.className='ward-header';
    const startCollapsed=isMobile&&catIdx>0;
    header.innerHTML='<span>'+cat.label+'</span><span>'+(startCollapsed?'▶':'▼')+'</span>';
    header.onclick=()=>{
      const body=section.querySelector('.ward-body');
      body.classList.toggle('collapsed');
      header.querySelector('span:last-child').textContent=body.classList.contains('collapsed')?'▶':'▼';
    };
    const body=document.createElement('div');body.className='ward-body'+(startCollapsed?' collapsed':'');
    cat.items.forEach(item=>{
      const btn=document.createElement('button');btn.className='item-btn';btn.textContent=item.e;
      const matches=isFreestyle||item.tags.some(t=>theme.keywords.includes(t));
      if(matches&&!isFreestyle){
        const spark=document.createElement('span');spark.className='sparkle-hint';spark.textContent='✨';
        btn.appendChild(spark);
      }
      btn.onclick=(ev)=>{
        playClick();
        outfit[key]=item.e;
        body.querySelectorAll('.item-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        updateMannequin();
        updateSlotDots();
        updateMeter();
        spawnSparkles(ev.clientX,ev.clientY,3);
      };
      body.appendChild(btn);
    });
    section.appendChild(header);section.appendChild(body);ward.appendChild(section);
  });
}

function updateMannequin(){
  const ids={hair:'mHair',face:'mFace',top:'mTop',bottom:'mBottom',shoes:'mShoes',accessory:'mAcc'};
  Object.entries(ids).forEach(([key,id])=>{
    const el=document.getElementById(id);
    const val=outfit[key]||(key==='face'?'👩':'');
    if(el.textContent!==val){
      el.textContent=val;el.classList.add('sparkle-pop');
      setTimeout(()=>el.classList.remove('sparkle-pop'),400);
    }
  });
}

function updateSlotDots(){
  const c=document.getElementById('slotsStatus');
  const cats=['hair','face','top','bottom','shoes','accessory'];
  const labels=['💇','😊','👚','👖','👟','💎'];
  c.innerHTML='';
  cats.forEach((k,i)=>{
    const d=document.createElement('div');d.className='slot-dot'+(outfit[k]?' filled':'');
    d.textContent=labels[i];c.appendChild(d);
  });
}

function updateMeter(){
  const theme=roundThemes[currentRound];
  const isFreestyle=theme===FREESTYLE_THEME;
  if(isFreestyle){
    const filled=Object.values(outfit).filter(v=>v).length;
    document.getElementById('meterFill').style.width=Math.round(filled/6*100)+'%';
    return;
  }
  let matchCount=0;
  Object.keys(CATEGORIES).forEach(key=>{
    if(!outfit[key])return;
    const item=CATEGORIES[key].items.find(it=>it.e===outfit[key]);
    if(item&&item.tags.some(t=>theme.keywords.includes(t)))matchCount++;
  });
  document.getElementById('meterFill').style.width=Math.round(matchCount/6*100)+'%';
}

// ═══════════════════════════════════════
function startTimer(){
  timerValue=35;timerPaused=false;
  const display=document.getElementById('timerDisplay');
  display.textContent=timerValue;display.classList.remove('warning');
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(timerPaused)return;
    timerValue--;display.textContent=timerValue;
    if(timerValue<=10)display.classList.add('warning');
    if(timerValue<=0){clearInterval(timerInterval);startRunway();}
  },1000);
}
function togglePause(){
  if(timerPaused){resumeTimer();return;}
  timerPaused=true;
  document.getElementById('pauseOverlay').classList.add('active');
  document.getElementById('pauseBtn').textContent='▶';
}
function resumeTimer(){
  timerPaused=false;
  document.getElementById('pauseOverlay').classList.remove('active');
  document.getElementById('pauseBtn').textContent='⏸';
}

// ═══════════════════════════════════════
// RUNWAY ANIMATION
// ═══════════════════════════════════════
function startRunway(){
  if(runwayInProgress)return;
  runwayInProgress=true;
  clearInterval(timerInterval);
  document.getElementById('outfitPhase').style.display='none';
  document.getElementById('goBar').style.display='none';
  document.getElementById('roundInfo').style.display='none';
  document.getElementById('runwayPhase').classList.add('active');
  document.getElementById('pauseOverlay').classList.remove('active');

  playRunwayBeat();

  // Build runway lights
  const lightsEl=document.getElementById('runwayLights');lightsEl.innerHTML='';
  for(let i=0;i<12;i++){
    const l=document.createElement('div');l.className='runway-light';
    l.style.left=(10+(i%2===0?8:82))+'%';l.style.bottom=(10+i*7)+'%';
    l.style.animationDelay=(Math.random()*2)+'s';lightsEl.appendChild(l);
  }

  // Build audience with members
  const audEl=document.getElementById('audienceRow');audEl.innerHTML='';
  const audienceMembers=[];
  for(let i=0;i<12;i++){
    const span=document.createElement('span');span.className='audience-member';
    span.textContent=AUDIENCE_FACES[Math.floor(Math.random()*AUDIENCE_FACES.length)];
    span.style.position='relative';
    audEl.appendChild(span);audienceMembers.push(span);
  }

  // Build runway mannequin
  const rm=document.getElementById('runwayMannequin');rm.innerHTML='';
  [{cls:'m-hair',val:outfit.hair},{cls:'m-face',val:outfit.face||'👩'},{cls:'m-top',val:outfit.top},
   {cls:'m-bottom',val:outfit.bottom},{cls:'m-shoes',val:outfit.shoes},{cls:'m-acc',val:outfit.accessory}
  ].forEach(l=>{
    const s=document.createElement('span');s.className='m-layer '+l.cls;s.textContent=l.val;rm.appendChild(s);
  });

  const themeScore=calcThemeScore();
  const matchPct=themeScore.matchCount/6;

  const container=document.getElementById('runwayContainer');
  const cWidth=container.offsetWidth;
  const spotlight=document.getElementById('spotlightCone');
  const duration=8000,startTime=Date.now();
  let hasSpun=false,hasFinalPosed=false,photoTaken=false;
  rm.classList.add('walking');rm.classList.remove('posing','spinning');

  // Audience reactions based on quality
  const audienceReactInterval=setInterval(()=>{
    const idx=Math.floor(Math.random()*audienceMembers.length);
    const member=audienceMembers[idx];
    if(matchPct>.5){
      member.classList.remove('cheer');void member.offsetWidth;member.classList.add('cheer');
      // Occasionally show sign
      if(Math.random()<.2){
        const sign=document.createElement('div');sign.className='audience-sign';
        sign.textContent=SIGN_TEXTS[Math.floor(Math.random()*SIGN_TEXTS.length)];
        member.appendChild(sign);setTimeout(()=>sign.remove(),1500);
      }
    } else if(matchPct<.25){
      member.classList.remove('boo');void member.offsetWidth;member.classList.add('boo');
    } else {
      member.classList.remove('wave');void member.offsetWidth;member.classList.add('wave');
    }
  },350);

  const flashInterval=setInterval(()=>spawnCameraFlash(container),700);
  const emojiInterval=setInterval(()=>spawnEmojiReaction(container,matchPct),450);

  function animate(){
    const elapsed=Date.now()-startTime;
    const progress=Math.min(elapsed/duration,1);
    const x=progress*(cWidth-60);
    rm.style.left=x+'px';spotlight.style.left=(x-30)+'px';

    // Spin at center
    if(Math.abs(progress-.5)<.05&&!hasSpun){
      hasSpun=true;rm.classList.remove('walking');rm.classList.add('spinning');
      playCrowdCheer(matchPct);
      setTimeout(()=>{rm.classList.remove('spinning');rm.classList.add('walking');},800);
    }

    // Photo moment at end
    if(progress>.85&&!photoTaken){
      photoTaken=true;
      playPhotoSound();
      const flash=document.createElement('div');flash.className='photo-flash-overlay';
      container.appendChild(flash);setTimeout(()=>flash.remove(),700);
      // Big burst of cameras
      for(let i=0;i<6;i++)setTimeout(()=>{spawnCameraFlash(container);playCameraClick();},i*80);
    }

    // Final pose
    if(progress>.9&&!hasFinalPosed){
      hasFinalPosed=true;rm.classList.remove('walking');rm.classList.add('posing');
      playCrowdCheer(matchPct);
      // Audience eruption
      if(matchPct>.4){
        audienceMembers.forEach((m,i)=>{
          setTimeout(()=>{m.classList.remove('cheer');void m.offsetWidth;m.classList.add('cheer');},i*60);
        });
      }
    }

    if(progress<1){
      runwayAnimFrame=requestAnimationFrame(animate);
    } else {
      clearInterval(flashInterval);clearInterval(emojiInterval);clearInterval(audienceReactInterval);
      rm.classList.remove('walking','spinning');rm.classList.add('posing');
      setTimeout(()=>showRoundScore(),1200);
    }
  }
  runwayAnimFrame=requestAnimationFrame(animate);
}

function spawnCameraFlash(container){
  playCameraClick();
  const flash=document.createElement('div');flash.className='camera-flash';
  flash.style.left=(10+Math.random()*80)+'%';flash.style.bottom=(5+Math.random()*20)+'%';
  flash.style.width=flash.style.height=(18+Math.random()*25)+'px';
  container.appendChild(flash);setTimeout(()=>flash.remove(),350);
}

function spawnEmojiReaction(container,matchPct){
  const emoji=document.createElement('div');emoji.className='emoji-reaction';
  let pool;
  if(matchPct>.5)pool=POSITIVE_EMOJIS;
  else if(matchPct>.25)pool=Math.random()>.4?POSITIVE_EMOJIS:MEH_EMOJIS;
  else pool=Math.random()>.3?MEH_EMOJIS:BOO_EMOJIS;
  emoji.textContent=pool[Math.floor(Math.random()*pool.length)];
  emoji.style.left=(15+Math.random()*70)+'%';
  container.appendChild(emoji);setTimeout(()=>emoji.remove(),2200);
}

// ═══════════════════════════════════════
// SCORING
// ═══════════════════════════════════════
function calcThemeScore(){
  const theme=roundThemes[currentRound];
  const isFreestyle=theme===FREESTYLE_THEME;
  let matchCount=0;
  Object.keys(CATEGORIES).forEach(key=>{
    if(!outfit[key])return;
    if(isFreestyle){matchCount++;return;}
    const item=CATEGORIES[key].items.find(it=>it.e===outfit[key]);
    if(item&&item.tags.some(t=>theme.keywords.includes(t)))matchCount++;
  });
  return{matchCount,themePoints:matchCount*15};
}

function calcScore(){
  const{matchCount,themePoints}=calcThemeScore();
  const filled=Object.values(outfit).filter(v=>v).length;
  const completeBonus=filled===6?20:0;
  let comboBonus=0,comboNames=[];
  COMBOS.forEach(c=>{if(c.check(outfit)){comboBonus+=c.bonus;comboNames.push(c.name+' +'+c.bonus);}});
  const raw=themePoints+completeBonus+comboBonus;
  const total=Math.min(raw,100);
  let grade='C';
  if(total>=90)grade='S';
  else if(total>=75)grade='A';
  else if(total>=60)grade='B';
  return{themePoints,matchCount,completeBonus,comboBonus,comboNames,total,grade};
}

function gradeToStars(grade){
  return{S:3,A:2,B:1,C:0}[grade]||0;
}

function showRoundScore(){
  runwayInProgress=false;
  const score=calcScore();
  document.getElementById('runwayPhase').classList.remove('active');
  if(runwayAnimFrame)cancelAnimationFrame(runwayAnimFrame);

  document.getElementById('sdTheme').textContent=score.themePoints;
  document.getElementById('sdComplete').textContent=score.completeBonus;
  document.getElementById('sdCombo').textContent=score.comboBonus>0?'+'+score.comboBonus:'0';
  document.getElementById('sdTotal').textContent=score.total;

  const gradeEmojis={S:'👑 S',A:'🌟 A',B:'✨ B',C:'💫 C'};
  document.getElementById('gradeDisplay').textContent=gradeEmojis[score.grade]||score.grade;

  const titles={S:'INCROYABLE !',A:'Magnifique !',B:'Tres bien !',C:'Pas mal !'};
  document.getElementById('scoreTitle').textContent=titles[score.grade];

  const stars=gradeToStars(score.grade);
  document.getElementById('starsEarned').textContent=stars>0?'⭐'.repeat(stars):'';

  document.getElementById('comboLabel').textContent=score.comboNames.length?score.comboNames.join(' | '):'';

  const encoreZone=document.getElementById('encoreZone');
  encoreZone.innerHTML='<button class="btn btn-encore" onclick="doEncore(this)">Encore !</button>';

  const btnNext=document.getElementById('btnNext');
  if(currentRound>=totalRounds-1){
    btnNext.textContent='Voir les resultats !';btnNext.onclick=showFinalScreen;
  } else {
    btnNext.textContent='Round suivant';btnNext.onclick=nextRound;
  }

  totalScore+=score.total;
  roundScores.push({theme:roundThemes[currentRound],score:score.total,grade:score.grade,stars,outfit:{...outfit}});

  if(score.total>bestRound.score||bestRound.score<0){
    bestRound={score:score.total,round:currentRound+1,outfit:{...outfit}};
  }

  playFanfare();
  if(score.grade==='S')launchConfetti(80);

  document.getElementById('scoreScreen').classList.add('active');
  document.getElementById('roundInfo').style.display='none';
}

function doEncore(btn){
  btn.disabled=true;btn.textContent='Le public adore !';
  playCrowdCheer(1);
  for(let i=0;i<12;i++){
    setTimeout(()=>{
      const em=document.createElement('div');
      em.style.cssText='position:fixed;bottom:20%;left:'+(20+Math.random()*60)+'%;font-size:2em;pointer-events:none;z-index:250;animation:emojiFloat 2s ease forwards;';
      em.textContent=POSITIVE_EMOJIS[Math.floor(Math.random()*POSITIVE_EMOJIS.length)];
      document.body.appendChild(em);setTimeout(()=>em.remove(),2200);
    },i*120);
  }
}

function nextRound(){
  currentRound++;
  document.getElementById('scoreScreen').classList.remove('active');
  if(currentRound<totalRounds)startRound();
  else showFinalScreen();
}

// ═══════════════════════════════════════
// FINAL SCREEN
// ═══════════════════════════════════════
function showFinalScreen(){
  document.getElementById('scoreScreen').classList.remove('active');
  document.getElementById('roundInfo').style.display='none';
  document.getElementById('outfitPhase').style.display='none';
  document.getElementById('goBar').style.display='none';
  document.getElementById('runwayPhase').classList.remove('active');

  document.getElementById('finalTotal').textContent=totalScore;
  document.getElementById('finalBest').textContent='Round '+bestRound.round+' ('+bestRound.score+' pts)';

  // Total stars from all rounds
  const totalStars=roundScores.reduce((s,r)=>s+r.stars,0);
  document.getElementById('finalStars').textContent=totalStars>0?'⭐'.repeat(Math.min(totalStars,21)):'Aucune etoile';

  if(bestRound.outfit){
    const o=bestRound.outfit;
    document.getElementById('bestOutfitDisplay').textContent=
      'Meilleure tenue : '+o.hair+(o.face||'👩')+o.top+o.bottom+o.shoes+o.accessory;
  }

  const recap=document.getElementById('roundRecap');recap.innerHTML='';
  roundScores.forEach((r,i)=>{
    const pill=document.createElement('div');pill.className='recap-pill';
    const label=i===6?'Bonus':('R'+(i+1));
    pill.innerHTML='<span class="rp-theme">'+r.theme.emoji+' '+label+'</span> <span class="rp-score">'+r.score+'pts ('+r.grade+')</span>';
    recap.appendChild(pill);
  });

  // Save stars
  const starsKey='kpop_stars_'+playerName;
  let existingStars=parseInt(localStorage.getItem(starsKey)||'0');
  existingStars+=totalStars;
  localStorage.setItem(starsKey,existingStars);

  // Save high score
  const hsKey='kpop_hs_defile_'+playerName;
  const prevHS=parseInt(localStorage.getItem(hsKey)||'0');
  if(totalScore>prevHS)localStorage.setItem(hsKey,totalScore);

  playFanfare();
  if(totalStars>=10)launchConfetti(100);

  document.getElementById('finalScreen').classList.add('active');
}

function shareResult(){
  const text='Mode Defile K-Pop !\n'+playerName+' a obtenu '+totalScore+'/700 pts !\n'+'⭐'.repeat(Math.min(5,Math.ceil(totalScore/140)));
  if(navigator.share){
    navigator.share({title:'Mode Defile K-Pop',text});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      const toast=document.getElementById('shareToast');toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'),2000);
    });
  }
}

function goHome(){location.href='index.html?player='+encodeURIComponent(playerName)}

function restartGame(){
  document.getElementById('finalScreen').classList.remove('active');
  startGame();
}
</script>
