<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mode Défilé — École Saint-Esprit</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="description" content="Mode Défilé K-Pop — Prépare ta tenue et défile sur le podium !">
<meta name="author" content="K-Pop Star Academy">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Mode Défilé — École Saint-Esprit">
<meta property="og:description" content="Prépare ta tenue et défile sur le podium devant le public !">
<meta property="og:site_name" content="K-Pop Star Academy — École Saint-Esprit">
<meta property="og:type" content="website">
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --pink:#ff6fd8;--purple:#a18cd1;--gold:#ffd700;--dark:#1a1a2e;
  --glass:rgba(255,255,255,0.1);--glass-border:rgba(255,255,255,0.2);
}

body{
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  min-height:100vh;font-family:'Quicksand',sans-serif;
  color:white;overflow-x:hidden;touch-action:manipulation;
}

/* ── TOP BAR ── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;flex-wrap:wrap;gap:8px;
}
.back-btn{
  background:rgba(255,255,255,0.25);color:white;border:2px solid rgba(255,255,255,0.4);
  padding:6px 18px;border-radius:30px;font-family:inherit;font-size:.9em;
  cursor:pointer;text-decoration:none;transition:.2s;
}
.back-btn:hover{background:rgba(255,255,255,0.4)}
.top-bar h1{font-size:1.5em;text-shadow:2px 2px 8px rgba(0,0,0,0.4)}
.player-badge{
  background:linear-gradient(135deg,var(--gold),#f6b93b);
  color:#333;padding:6px 16px;border-radius:20px;font-weight:700;font-size:.95em;
}

/* ── PLAYER SELECT ── */
.player-select{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;gap:20px;
}
.player-select h2{font-size:2em;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.4)}
.player-select p{font-size:1.1em;opacity:.8;max-width:400px;text-align:center}
.player-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.player-card{
  background:var(--glass);border:2px solid var(--glass-border);border-radius:24px;
  padding:20px 30px;text-align:center;cursor:pointer;transition:.3s;min-width:130px;
}
.player-card:hover{transform:scale(1.08);border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.3)}
.player-card .pc-emoji{font-size:3em}
.player-card .pc-name{font-size:1.2em;font-weight:700;margin-top:8px}
.player-card .pc-hs{font-size:.8em;color:var(--gold);margin-top:4px}

/* ── ROUND INFO ── */
.round-info{
  text-align:center;padding:8px 20px;
  display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;
}
.round-label{font-size:1.1em;font-weight:700;color:var(--purple)}
.theme-label{
  font-size:1.3em;font-weight:800;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.timer-display{
  font-size:1.4em;font-weight:800;color:#ff6b6b;
  min-width:50px;text-align:center;
}
.timer-display.warning{animation:timerPulse .5s ease infinite alternate}
@keyframes timerPulse{0%{transform:scale(1)}100%{transform:scale(1.15);color:#ff3333}}
.total-score{font-size:1em;color:var(--gold);font-weight:700}

/* ── OUTFIT PHASE ── */
.outfit-phase{
  display:flex;gap:16px;padding:10px 20px 20px;max-width:1100px;margin:0 auto;
}
@media(max-width:750px){.outfit-phase{flex-direction:column;align-items:center}}

.preview-panel{
  min-width:240px;max-width:280px;flex-shrink:0;
  background:var(--glass);backdrop-filter:blur(12px);
  border:2px solid var(--glass-border);border-radius:24px;padding:16px;
  display:flex;flex-direction:column;align-items:center;
}
.preview-stage{
  width:220px;height:280px;border-radius:20px;position:relative;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.2);
}
.mannequin{text-align:center;z-index:2;position:relative}
.m-layer{display:block;line-height:1;transition:.3s cubic-bezier(.34,1.56,.64,1)}
.m-hair{font-size:2.6em;min-height:45px;margin-bottom:-8px}
.m-face{font-size:3.6em}
.m-top{font-size:4em}
.m-bottom{font-size:3em}
.m-shoes{font-size:2.2em;min-height:35px}
.m-acc{font-size:2em;min-height:32px;margin-top:-4px}
.sparkle-pop{animation:sparklePop .4s ease}
@keyframes sparklePop{0%{transform:scale(1.3);filter:brightness(1.8)}100%{transform:scale(1);filter:brightness(1)}}

.slots-status{
  display:flex;gap:4px;margin-top:10px;flex-wrap:wrap;justify-content:center;
}
.slot-dot{
  width:28px;height:28px;border-radius:8px;
  background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:.8em;
  transition:.3s;
}
.slot-dot.filled{border-color:var(--gold);background:rgba(255,215,0,0.2)}

/* ── WARDROBE GRID ── */
.wardrobe{
  flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;
  max-height:calc(100vh - 200px);overflow-y:auto;padding-right:4px;
}
.wardrobe::-webkit-scrollbar{width:6px}
.wardrobe::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.3);border-radius:3px}
.ward-section{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;overflow:hidden;
}
.ward-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;user-select:none;font-weight:700;font-size:.95em;
}
.ward-header:hover{background:rgba(255,255,255,0.08)}
.ward-body{display:flex;gap:6px;flex-wrap:wrap;padding:6px 12px 12px}
.ward-body.collapsed{display:none}
.item-btn{
  width:50px;height:50px;border-radius:12px;
  background:rgba(255,255,255,0.1);border:2px solid transparent;
  font-size:1.8em;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;position:relative;
}
.item-btn:hover{transform:scale(1.12);background:rgba(255,255,255,0.22)}
.item-btn.selected{border-color:var(--gold);background:rgba(255,215,0,0.2);box-shadow:0 0 8px rgba(255,215,0,0.3)}
.item-btn .sparkle-hint{
  position:absolute;top:-2px;right:-2px;font-size:.45em;
  animation:sparkleHint 1.2s ease infinite;
}
@keyframes sparkleHint{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

/* ── RUNWAY PHASE ── */
.runway-phase{
  display:none;flex-direction:column;align-items:center;
  width:100%;max-width:800px;margin:0 auto;padding:10px 20px;position:relative;
}
.runway-phase.active{display:flex}

.runway-container{
  width:100%;height:380px;position:relative;overflow:hidden;
  border-radius:20px;margin:10px 0;
  background:linear-gradient(180deg,#0a0a1a 0%,#1a1040 40%,#2d1b69 100%);
}

/* Perspective runway floor */
.runway-floor{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:200%;height:55%;
  background:linear-gradient(180deg,rgba(255,255,255,0.02) 0%,rgba(255,255,255,0.08) 100%);
  clip-path:polygon(42% 0%,58% 0%,90% 100%,10% 100%);
}
.runway-floor::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,0.04) 18px,rgba(255,255,255,0.04) 20px);
}

/* Side lights */
.runway-lights{position:absolute;bottom:0;width:100%;height:100%;pointer-events:none}
.runway-light{
  position:absolute;bottom:0;width:6px;height:6px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 10px var(--gold),0 0 20px rgba(255,215,0,0.3);
  animation:lightPulse 2s ease infinite alternate;
}
@keyframes lightPulse{0%{opacity:.5;transform:scale(.8)}100%{opacity:1;transform:scale(1.2)}}

/* Spotlight cone */
.spotlight-cone{
  position:absolute;top:0;width:120px;height:100%;
  background:radial-gradient(ellipse at top,rgba(255,255,255,0.12),transparent 70%);
  pointer-events:none;transition:left .15s linear;
}

/* Walking mannequin */
.runway-mannequin{
  position:absolute;bottom:30%;font-size:1em;text-align:center;z-index:10;
  transition:none;
}
.runway-mannequin .m-layer{display:block;line-height:1}
.runway-mannequin .m-hair{font-size:2em;margin-bottom:-6px}
.runway-mannequin .m-face{font-size:2.8em}
.runway-mannequin .m-top{font-size:3.2em}
.runway-mannequin .m-bottom{font-size:2.4em}
.runway-mannequin .m-shoes{font-size:1.8em}
.runway-mannequin .m-acc{font-size:1.6em;margin-top:-3px}
.runway-mannequin.walking{animation:walkBounce .5s ease infinite}
@keyframes walkBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.runway-mannequin.posing{animation:poseGlow 1s ease infinite alternate}
@keyframes poseGlow{0%{filter:brightness(1)}100%{filter:brightness(1.3) drop-shadow(0 0 15px rgba(255,215,0,0.6))}}
.runway-mannequin.spinning{animation:spinPose .8s ease}
@keyframes spinPose{0%{transform:rotateY(0)}50%{transform:rotateY(180deg) scale(1.1)}100%{transform:rotateY(360deg)}}

/* Audience row */
.audience-row{
  position:absolute;bottom:8px;left:0;right:0;
  display:flex;justify-content:center;gap:6px;font-size:1.6em;
  filter:brightness(.7);z-index:5;
}

/* Camera flashes */
.camera-flash{
  position:absolute;border-radius:50%;
  background:radial-gradient(white,transparent 70%);
  pointer-events:none;z-index:15;
  animation:flashBurst .3s ease forwards;
}
@keyframes flashBurst{0%{opacity:1;transform:scale(0)}50%{opacity:.8;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}

/* Floating emoji reactions */
.emoji-reaction{
  position:absolute;bottom:60px;font-size:1.6em;z-index:20;
  pointer-events:none;
  animation:emojiFloat 2s ease forwards;
}
@keyframes emojiFloat{
  0%{opacity:1;transform:translateY(0) scale(.5)}
  20%{transform:translateY(-30px) scale(1)}
  100%{opacity:0;transform:translateY(-180px) scale(.8)}
}

/* ── SCORING SCREEN ── */
.score-screen{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
  flex-direction:column;align-items:center;justify-content:center;
  z-index:200;gap:12px;
}
.score-screen.active{display:flex}
.score-card{
  background:linear-gradient(135deg,#2d2b55,#1a1a2e);
  border:2px solid var(--glass-border);border-radius:28px;
  padding:30px 40px;text-align:center;max-width:420px;width:90%;
  animation:popIn .5s ease;
}
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.score-card h2{font-size:2em;margin-bottom:6px}
.grade-display{font-size:4em;margin:10px 0}
.score-detail{font-size:1em;color:rgba(255,255,255,0.7);margin:4px 0}
.score-detail span{color:var(--gold);font-weight:700}
.combo-label{color:var(--pink);font-weight:700;font-size:1.1em;margin-top:8px}
.btn-row{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}

/* ── FINAL SCREEN ── */
.final-screen{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);
  flex-direction:column;align-items:center;justify-content:center;
  z-index:300;gap:14px;overflow-y:auto;padding:20px;
}
.final-screen.active{display:flex}
.final-card{
  background:linear-gradient(135deg,#2d2b55,#1a1a2e);
  border:2px solid var(--gold);border-radius:28px;
  padding:30px 40px;text-align:center;max-width:500px;width:95%;
  animation:popIn .6s ease;
}
.final-card h2{font-size:2.2em;color:var(--gold);margin-bottom:10px}
.round-recap{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0;
}
.recap-pill{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;padding:6px 12px;font-size:.85em;
}
.recap-pill .rp-theme{font-weight:700;color:var(--pink)}
.recap-pill .rp-score{color:var(--gold)}
.final-stars{font-size:2.5em;margin:10px 0}
.best-outfit{margin:10px 0;font-size:1.3em}

/* ── BUTTONS ── */
.btn{
  color:white;border:none;padding:10px 22px;border-radius:22px;
  font-family:inherit;font-size:.95em;font-weight:700;cursor:pointer;
  transition:.2s;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{transform:scale(1.05)}
.btn-go{background:linear-gradient(145deg,#00c9ff,#92fe9d);color:#333}
.btn-next{background:linear-gradient(145deg,var(--pink),var(--purple))}
.btn-encore{background:linear-gradient(145deg,var(--gold),#f6b93b);color:#333}
.btn-restart{background:linear-gradient(145deg,#ff6b6b,#ee5a24)}
.btn-home{background:rgba(255,255,255,0.2)}
.btn-share{background:#25D366}

/* ── CONFETTI ── */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:400;overflow:hidden}
.confetti-piece{
  position:absolute;width:10px;height:10px;border-radius:2px;
  animation:confettiFall 2.5s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* ── SHARE TOAST ── */
.share-toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:#25D366;color:white;padding:10px 25px;border-radius:25px;
  font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;
}
.share-toast.show{opacity:1}

/* ── RESPONSIVE ── */
@media(max-width:750px){
  .top-bar{justify-content:center;text-align:center}
  .preview-panel{max-width:100%;width:100%}
  .wardrobe{max-height:none}
  .runway-container{height:320px}
  .outfit-phase{padding-bottom:80px}
}
</style>
</head>
<body>

<!-- PLAYER SELECT -->
<div class="player-select" id="playerSelect">
  <h2>Mode Defile</h2>
  <p>Choisis ta mannequin pour le defile !</p>

</div>

<!-- TOP BAR -->
<div class="top-bar" id="topBar" style="display:none">
  <a href="index.html" class="back-btn">Retour</a>
  <h1>Mode Defile</h1>
  <div class="player-badge" id="playerBadge">Mannequin : Star</div>
</div>

<!-- ROUND INFO -->
<div class="round-info" id="roundInfo" style="display:none">
  <span class="round-label" id="roundLabel">Round 1/6</span>
  <span class="theme-label" id="themeLabel">Concert Rock!</span>

<!-- OUTFIT PHASE -->

<!-- GO BUTTON (bottom fixed) -->
<div id="goBar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(26,26,46,0.9);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,0.15);padding:10px;text-align:center;z-index:50">
  <button class="btn btn-go" onclick="startRunway()">Defile !</button>

<!-- RUNWAY PHASE -->
<div class="runway-phase" id="runwayPhase">

    <div class="runway-mannequin" id="runwayMannequin"></div>
  </div>
</div>

<!-- SCORE SCREEN (per round) -->
<div class="score-screen" id="scoreScreen">
  <div class="score-card">
    <h2 id="scoreTitle">Bravo !</h2>
    <div class="grade-display" id="gradeDisplay">A</div>
    <div class="score-detail">Theme match: <span id="sdTheme">0</span>/90</div>

    <div id="encoreZone" style="margin-top:10px"></div>

</div>

<!-- FINAL SCREEN -->
<div class="final-screen" id="finalScreen">
  <div class="final-card">
    <h2>Defile Termine !</h2>
    <div class="final-stars" id="finalStars"></div>
    <div class="score-detail" style="font-size:1.5em">Score final: <span id="finalTotal">0</span>/600</div>
    <div class="score-detail">Meilleur round: <span id="finalBest">-</span></div>
    <div class="best-outfit" id="bestOutfitDisplay"></div>
    <div class="round-recap" id="roundRecap"></div>
    <div class="btn-row">
      <button class="btn btn-share" onclick="shareResult()">Partager</button>
      <button class="btn btn-restart" onclick="restartGame()">Rejouer</button>
      <button class="btn btn-home" onclick="location.href='index.html'">Accueil</button>
    </div>
  </div>
</div>

<!-- SHARE TOAST -->
<div class="share-toast" id="shareToast">Copie !</div>

<script>
// ═══════════════════════════════════════════════
// AUDIO ENGINE (Web Audio API)
// ═══════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playClick() {
  const ctx = ensureAudio();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sine'; o.frequency.value = 400;
  g.gain.setValueAtTime(0.12, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.04);
}

function playCameraClick() {
  const ctx = ensureAudio();
  const len = ctx.sampleRate * 0.06;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 4);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = 0.18;
  src.connect(g); g.connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + 0.06);
}

function playCrowdCheer() {
  const ctx = ensureAudio();
  const len = ctx.sampleRate * 0.5;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.3 * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 600; bp.Q.value = 0.5;
  const g = ctx.createGain(); g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  src.connect(bp); bp.connect(g); g.connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + 0.5);
}

function playRunwayBeat() {
  const ctx = ensureAudio();
  const bpm = 120, beatLen = 60 / bpm;
  for (let i = 0; i < 16; i++) {
    const t = ctx.currentTime + i * beatLen;
    // Kick
    if (i % 4 === 0) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(150, t);
      o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + 0.15);
    }
    // Hi-hat
    if (i % 2 === 0) {
      const len2 = ctx.sampleRate * 0.03;
      const buf2 = ctx.createBuffer(1, len2, ctx.sampleRate);
      const dd = buf2.getChannelData(0);
      for (let j = 0; j < len2; j++) dd[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / len2, 5);
      const s2 = ctx.createBufferSource(); s2.buffer = buf2;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 8000;
      const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.06, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
      s2.connect(hp); hp.connect(g2); g2.connect(ctx.destination);
      s2.start(t); s2.stop(t + 0.05);
    }
  }
}

function playFanfare() {
  const ctx = ensureAudio();
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    const t = ctx.currentTime + i * 0.15;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t + 0.4);
  });
}

  clearInterval(timerInterval);

    l.style.bottom = (10 + i * 7) + '%';
    l.style.animationDelay = (Math.random() * 2) + 's';
    lightsEl.appendChild(l);
  }

  // Build audience
  const audEl = document.getElementById('audienceRow');
  audEl.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const span = document.createElement('span');
    span.textContent = AUDIENCE_FACES[Math.floor(Math.random() * AUDIENCE_FACES.length)];
    audEl.appendChild(span);
  }

  // Build runway mannequin
  const rm = document.getElementById('runwayMannequin');
  rm.innerHTML = '';
  const layers = [
    { cls: 'm-hair', val: outfit.hair },
    { cls: 'm-face', val: outfit.face || '👩' },
    { cls: 'm-top', val: outfit.top },
    { cls: 'm-bottom', val: outfit.bottom },
    { cls: 'm-shoes', val: outfit.shoes },
    { cls: 'm-acc', val: outfit.accessory }
  ];
  layers.forEach(l => {
    const s = document.createElement('span');
    s.className = 'm-layer ' + l.cls;
    s.textContent = l.val;
    rm.appendChild(s);
  });

  // Calculate score now for emoji reactions
  const themeScore = calcThemeScore();
  const matchPct = themeScore.matchCount / 6;

  // Animate walk
  const container = document.getElementById('runwayContainer');
  const cWidth = container.offsetWidth;
  const spotlight = document.getElementById('spotlightCone');
  const duration = 8000;
  const startTime = Date.now();
  let hasSpun = false;
  let hasFinalPosed = false;
  rm.classList.add('walking');
  rm.classList.remove('posing', 'spinning');

  // Camera flash + emoji intervals
  const flashInterval = setInterval(() => spawnCameraFlash(container), 600);
  const emojiInterval = setInterval(() => {
    spawnEmojiReaction(container, matchPct);
  }, 400);

  function animate() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / duration, 1);

    // Walk left to right
    const x = progress * (cWidth - 60);
    rm.style.left = x + 'px';
    spotlight.style.left = (x - 30) + 'px';

    // Pause at center (spin)
    const centerProg = Math.abs(progress - 0.5);
    if (centerProg < 0.05 && !hasSpun) {
      hasSpun = true;
      rm.classList.remove('walking');
      rm.classList.add('spinning');
      playCrowdCheer();
      setTimeout(() => {
        rm.classList.remove('spinning');
        rm.classList.add('walking');
      }, 800);
    }

    // Final pose at end
    if (progress > 0.9 && !hasFinalPosed) {
      hasFinalPosed = true;
      rm.classList.remove('walking');
      rm.classList.add('posing');
      playCrowdCheer();
    }

    if (progress < 1) {
      runwayAnimFrame = requestAnimationFrame(animate);
    } else {
      clearInterval(flashInterval);
      clearInterval(emojiInterval);
      rm.classList.remove('walking', 'spinning');
      rm.classList.add('posing');
      setTimeout(() => showRoundScore(), 1500);
    }
  }
  runwayAnimFrame = requestAnimationFrame(animate);
}

// SCORING
// ═══════════════════════════════════════════════
function calcThemeScore() {
  const theme = roundThemes[currentRound];
  let matchCount = 0;
  const catKeys = Object.keys(CATEGORIES);
  catKeys.forEach(key => {
    if (!outfit[key]) return;
    const item = CATEGORIES[key].items.find(it => it.e === outfit[key]);
    if (item && item.tags.some(t => theme.keywords.includes(t))) matchCount++;
  });
  return { matchCount, themePoints: matchCount * 15 };
}

function calcScore() {
  const { matchCount, themePoints } = calcThemeScore();
  // Completeness
  const filled = Object.values(outfit).filter(v => v).length;
  const completeBonus = filled === 6 ? 20 : 0;
  // Combos
  let comboBonus = 0;
  let comboNames = [];
  COMBOS.forEach(c => {
    if (c.check(outfit)) {
      comboBonus += c.bonus;
      comboNames.push(c.name + ' +' + c.bonus);
    }
  });
  const raw = themePoints + completeBonus + comboBonus;
  const total = Math.min(raw, 100);
  let grade = 'C';
  if (total >= 90) grade = 'S';
  else if (total >= 75) grade = 'A';
  else if (total >= 60) grade = 'B';
  return { themePoints, matchCount, completeBonus, comboBonus, comboNames, total, grade };
}

function showRoundScore() {
  const score = calcScore();
  document.getElementById('runwayPhase').classList.remove('active');
  if (runwayAnimFrame) cancelAnimationFrame(runwayAnimFrame);

  document.getElementById('sdTheme').textContent = score.themePoints;
  document.getElementById('sdComplete').textContent = score.completeBonus;
  document.getElementById('sdCombo').textContent = score.comboBonus > 0 ? '+' + score.comboBonus : '0';
  document.getElementById('sdTotal').textContent = score.total;

  const gradeEmojis = { S: '👑 S', A: '🌟 A', B: '✨ B', C: '💫 C' };
  document.getElementById('gradeDisplay').textContent = gradeEmojis[score.grade] || score.grade;

  const titles = { S: 'INCROYABLE !', A: 'Magnifique !', B: 'Tres bien !', C: 'Pas mal !' };
  document.getElementById('scoreTitle').textContent = titles[score.grade];

  document.getElementById('comboLabel').textContent = score.comboNames.length ? score.comboNames.join(' | ') : '';

  // Encore button
  const encoreZone = document.getElementById('encoreZone');
  encoreZone.innerHTML = '<button class="btn btn-encore" onclick="doEncore(this)">Encore !</button>';

  // Next or finish
  const btnNext = document.getElementById('btnNext');
  if (currentRound >= 5) {
    btnNext.textContent = 'Voir les resultats !';
    btnNext.onclick = showFinalScreen;
  } else {
    btnNext.textContent = 'Round suivant';
    btnNext.onclick = nextRound;
  }

  totalScore += score.total;
  roundScores.push({ theme: roundThemes[currentRound], score: score.total, grade: score.grade, outfit: { ...outfit } });

  if (score.total > bestRound.score) {
    bestRound = { score: score.total, round: currentRound + 1, outfit: { ...outfit } };
  }

  playFanfare();
  if (score.grade === 'S') launchConfetti(80);

  document.getElementById('scoreScreen').classList.add('active');
}

function doEncore(btn) {
  btn.disabled = true;
  btn.textContent = 'Le public adore !';
  playCrowdCheer();
  // Spawn floating emojis on score screen
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const em = document.createElement('div');
      em.style.cssText = `position:fixed;bottom:20%;left:${20+Math.random()*60}%;font-size:2em;pointer-events:none;z-index:250;animation:emojiFloat 2s ease forwards;`;
      em.textContent = POSITIVE_EMOJIS[Math.floor(Math.random() * POSITIVE_EMOJIS.length)];
      document.body.appendChild(em);
      setTimeout(() => em.remove(), 2200);
    }, i * 150);
  }
}

function nextRound() {
  currentRound++;
  document.getElementById('scoreScreen').classList.remove('active');
  if (currentRound < 6) {
    startRound();
  } else {
    showFinalScreen();
  }
}

// ═══════════════════════════════════════════════
// FINAL SCREEN
// ═══════════════════════════════════════════════
function showFinalScreen() {
  document.getElementById('scoreScreen').classList.remove('active');
  document.getElementById('roundInfo').style.display = 'none';
  document.getElementById('outfitPhase').style.display = 'none';
  document.getElementById('goBar').style.display = 'none';
  document.getElementById('runwayPhase').classList.remove('active');

  document.getElementById('finalTotal').textContent = totalScore;
  document.getElementById('finalBest').textContent = `Round ${bestRound.round} (${bestRound.score} pts)`;

  // Stars
  let starCount = 1;
  if (totalScore >= 500) starCount = 5;
  else if (totalScore >= 400) starCount = 4;
  else if (totalScore >= 300) starCount = 3;
  else if (totalScore >= 200) starCount = 2;
  document.getElementById('finalStars').textContent = '⭐'.repeat(starCount);

  // Best outfit display
  if (bestRound.outfit) {
    const o = bestRound.outfit;
    document.getElementById('bestOutfitDisplay').textContent =
      `Meilleure tenue: ${o.hair}${o.face || '👩'}${o.top}${o.bottom}${o.shoes}${o.accessory}`;
  }

  // Round recap
  const recap = document.getElementById('roundRecap');
  recap.innerHTML = '';
  roundScores.forEach((r, i) => {
    const pill = document.createElement('div');
    pill.className = 'recap-pill';
    pill.innerHTML = `<span class="rp-theme">${r.theme.emoji} R${i + 1}</span> <span class="rp-score">${r.score}pts (${r.grade})</span>`;
    recap.appendChild(pill);
  });

  // Save high score
  const hsKey = `kpop_hs_defile_${playerName}`;
  const prevHS = parseInt(localStorage.getItem(hsKey) || '0');
  if (totalScore > prevHS) {
    localStorage.setItem(hsKey, totalScore);
  }

  // Add stars
  const starsKey = `kpop_stars_${playerName}`;
  let stars = parseInt(localStorage.getItem(starsKey) || '0');
  stars += starCount;
  localStorage.setItem(starsKey, stars);

  playFanfare();
  if (starCount >= 4) launchConfetti(100);

  document.getElementById('finalScreen').classList.add('active');
}

function shareResult() {
  const text = `Mode Defile K-Pop !\n${playerName} a obtenu ${totalScore}/600 pts !\n${'⭐'.repeat(Math.min(5, Math.ceil(totalScore / 100)))}`;
  if (navigator.share) {
    navigator.share({ title: 'Mode Defile K-Pop', text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('shareToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
}

function restartGame() {
  document.getElementById('finalScreen').classList.remove('active');
  startGame();
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
initPlayerSelect();
</script>
