<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Pop Star Academy</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Quicksand',sans-serif;overflow:hidden;position:relative}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
.center{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center}
#star{font-size:80px;opacity:0;filter:drop-shadow(0 0 30px #ffd700);position:absolute}
#bigK{font-size:100px;font-weight:700;opacity:0;background:linear-gradient(135deg,#ffd700,#ffaa00,#ffe066);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 25px rgba(255,215,0,.6));position:absolute}
#title{font-size:2.4rem;font-weight:700;white-space:nowrap;min-height:3rem;text-align:center}
#title span{opacity:0;display:inline-block;filter:drop-shadow(0 0 8px currentColor)}
#subtitle{margin-top:14px;font-size:1.05rem;color:rgba(255,255,255,.85);letter-spacing:3px;text-transform:uppercase;opacity:0;transition:opacity .6s}
#loadWrap{position:fixed;bottom:40px;width:260px;z-index:3;opacity:0;transition:opacity .4s}
#loadText{color:rgba(255,255,255,.35);font-size:.7rem;text-align:center;margin-bottom:6px;letter-spacing:3px;text-transform:uppercase;font-family:'Quicksand',sans-serif}
#loadBar{width:100%;height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
#loadFill{height:100%;width:0%;background:linear-gradient(90deg,#ff6fd8,#ffd700);border-radius:4px;transition:width .1s linear}
.emoji{position:absolute;z-index:1;font-size:22px;opacity:.12;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-110vh) rotate(360deg)}}
#flash{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:100;opacity:0;pointer-events:none;transition:opacity .4s}
.fade-zoom{animation:fadeZoom .5s ease-in forwards}
@keyframes fadeZoom{to{opacity:0;transform:scale(1.15)}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="center" id="scene">
  <span id="star"></span>
  <span id="bigK">K</span>
  <div id="title"></div>
  <div id="subtitle">K-Pop Star Academy</div>
</div>
<div id="loadWrap"><div id="loadText"></div><div id="loadBar"><div id="loadFill"></div></div></div>
<div id="flash"></div>

<script>
// --- Starfield ---
const cv=document.getElementById('stars'),cx=cv.getContext('2d');
let W,H;function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();addEventListener('resize',resize);
const dots=Array.from({length:60},()=>({x:Math.random()*2000,y:Math.random()*2000,r:.5+Math.random()*1.5,s:Math.random()*Math.PI*2,sp:.5+Math.random()*2}));
function drawStars(t){cx.clearRect(0,0,W,H);dots.forEach(d=>{const a=.3+.7*(.5+.5*Math.sin(d.s+t*d.sp/1000));cx.beginPath();cx.arc(d.x%W,d.y%H,d.r,0,6.28);cx.fillStyle=`rgba(255,255,255,${a})`;cx.fill()})}

// --- Floating emojis ---
const emojis=['🎤','⭐','💖','🎵','👑','💎'];
for(let i=0;i<10;i++){const e=document.createElement('div');e.className='emoji';e.textContent=emojis[i%emojis.length];e.style.left=Math.random()*95+'%';e.style.bottom=-40+'px';e.style.animationDuration=(12+Math.random()*10)+'s';e.style.animationDelay=(Math.random()*6)+'s';e.style.fontSize=(18+Math.random()*12)+'px';document.body.appendChild(e)}

// --- Loading text typewriter ---
function typeText(el,str,ms){let i=0;const iv=setInterval(()=>{el.textContent=str.slice(0,++i);if(i>=str.length)clearInterval(iv)},ms)}

// --- Burst particles ---
function burst(x,y,count,color){for(let i=0;i<count;i++){const p=document.createElement('div');p.style.cssText=`position:absolute;z-index:5;width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;border-radius:50%;background:${color||'#ffd700'};left:${x}px;top:${y}px;pointer-events:none;`;document.body.appendChild(p);const a=Math.random()*Math.PI*2,v=60+Math.random()*120,dx=Math.cos(a)*v,dy=Math.sin(a)*v;let ox=0,oy=0,op=1,t0=performance.now();(function anim(t){const d=(t-t0)/1000;ox=dx*d;oy=dy*d+50*d*d;op=Math.max(0,1-d/1);p.style.transform=`translate(${ox}px,${oy}px)`;p.style.opacity=op;if(op>0)requestAnimationFrame(anim);else p.remove()})(t0)}}

// --- Audio ---
function playChime(){const a=new(window.AudioContext||window.webkitAudioContext)();[523.25,659.25,783.99].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,a.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+i*.15+.6);o.connect(g);g.connect(a.destination);o.start(a.currentTime+i*.15);o.stop(a.currentTime+i*.15+.6)})}
function playSparkle(){const a=new(window.AudioContext||window.webkitAudioContext)();[1318,1568,2093].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.08,a.currentTime+i*.08);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+i*.08+.4);o.connect(g);g.connect(a.destination);o.start(a.currentTime+i*.08);o.stop(a.currentTime+i*.08+.4)})}

// --- Title colors ---
const titleText='K-Pop Star Academy';
const colors=['#ff6fd8','#ff5ec4','#d45cff','#b05cff','#9b6fff','#8b7fff','#c084fc','#d8a0ff','#e8b0ff','#f0c0ff','#ffb0e0','#ffc0c0','#ffd080','#ffd700','#ffe040','#fff060','#ffd700','#ffaa00'];

// --- Sequence ---
const starEl=document.getElementById('star');
const bigK=document.getElementById('bigK');
const titleEl=document.getElementById('title');
const subtitleEl=document.getElementById('subtitle');
const loadWrap=document.getElementById('loadWrap');
const loadFill=document.getElementById('loadFill');
const loadTextEl=document.getElementById('loadText');
const scene=document.getElementById('scene');
const flash=document.getElementById('flash');
let started=false;

function startSequence(){if(started)return;started=true;
  const cx2=document.body.getBoundingClientRect();
  const mx=cx2.width/2,my=cx2.height/2;

  // 0-0.5s: star appears with burst
  starEl.textContent='⭐';
  starEl.style.opacity='1';
  starEl.style.transition='all .4s cubic-bezier(.17,.67,.35,1.5)';
  starEl.style.transform='scale(1)';
  setTimeout(()=>burst(mx,my,25,'#ffd700'),200);

  // Show loading bar + typewriter
  loadWrap.style.opacity='1';
  typeText(loadTextEl,'Loading...',120);
  // Start loading fill
  let prog=0;const loadIv=setInterval(()=>{prog=Math.min(100,prog+100/35);loadFill.style.width=prog+'%';if(prog>=100)clearInterval(loadIv)},100);

  // 0.5-1.5s: star morphs to K
  setTimeout(()=>{
    starEl.style.opacity='0';starEl.style.transform='scale(0) rotate(180deg)';
    bigK.style.opacity='1';bigK.style.transition='opacity .5s, transform .5s cubic-bezier(.17,.67,.35,1.5)';
    bigK.style.transform='scale(1)';
  },500);

  // 1s: chime
  setTimeout(playChime,1000);

  // 1.5-2.5s: K fades, title types out
  setTimeout(()=>{
    bigK.style.transition='opacity .3s, transform .3s';
    bigK.style.opacity='0';bigK.style.transform='scale(0.3)';
    for(let i=0;i<titleText.length;i++){
      const s=document.createElement('span');
      s.textContent=titleText[i]===' '?'\u00A0':titleText[i];
      s.style.color=colors[i%colors.length];
      titleEl.appendChild(s);
      setTimeout(()=>{s.style.opacity='1';s.style.transition='opacity .15s, transform .2s';s.style.transform='scale(1.1)';setTimeout(()=>s.style.transform='scale(1)',100)},i*55);
    }
  },1500);

  // 2.5s: subtitle fades in
  setTimeout(()=>{subtitleEl.style.opacity='1'},2500);

  // 3s: sparkle burst from edges + sparkle sound
  setTimeout(()=>{
    playSparkle();
    for(let i=0;i<8;i++){
      const ex=[0,cx2.width,Math.random()*cx2.width,Math.random()*cx2.width][i%4];
      const ey=[Math.random()*cx2.height,Math.random()*cx2.height,0,cx2.height][i%4];
      burst(ex,ey,12,['#ff6fd8','#ffd700','#a18cd1','#fff'][i%4]);
    }
  },3000);

  // 3.5s: fade out + zoom + redirect
  setTimeout(()=>{
    scene.classList.add('fade-zoom');
    loadWrap.style.opacity='0';
    setTimeout(()=>{flash.style.opacity='1';setTimeout(()=>{window.location.href='index.html'},400)},400);
  },3500);
}

// Animation loop
(function loop(t){requestAnimationFrame(loop);drawStars(t)})(0);

// Start on any interaction or auto-start
document.addEventListener('click',startSequence,{once:true});
document.addEventListener('touchstart',startSequence,{once:true});
setTimeout(startSequence,300);
</script>
</body>
</html>
