<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Pop Star Academy</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
  position: relative;
}

/* Sparkle particles */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #fff;
  animation: sparkleFloat linear infinite;
  opacity: 0;
}

@keyframes sparkleFloat {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  20% { opacity: 1; transform: translateY(-20px) scale(1); }
  80% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
}

/* Logo container */
.logo-container {
  position: relative;
  animation: logoAppear 0.8s ease-out forwards;
  opacity: 0;
  transform: scale(0.5);
}

@keyframes logoAppear {
  to { opacity: 1; transform: scale(1); }
}

.logo-container img {
  width: 140px;
  height: 140px;
  filter: drop-shadow(0 0 30px rgba(255, 111, 216, 0.5));
}

/* Glow pulse behind logo */
.logo-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 180px;
  height: 180px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,111,216,0.3) 0%, transparent 70%);
  animation: glowPulse 2s ease-in-out infinite;
  z-index: -1;
}

@keyframes glowPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
}

/* Title */
.title {
  margin-top: 32px;
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #ff6fd8, #ffd700, #a18cd1);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleFade 1s ease-out 0.4s forwards, shimmer 3s ease-in-out infinite;
  opacity: 0;
  text-align: center;
}

@keyframes titleFade {
  to { opacity: 1; }
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Subtitle */
.subtitle {
  margin-top: 10px;
  font-size: 1rem;
  color: rgba(255, 255, 255, 0.6);
  font-weight: 400;
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: titleFade 1s ease-out 0.8s forwards;
  opacity: 0;
}

/* Loading bar */
.loading-container {
  margin-top: 48px;
  width: 220px;
  animation: titleFade 0.6s ease-out 1.2s forwards;
  opacity: 0;
}

.loading-text {
  color: rgba(255, 255, 255, 0.4);
  font-size: 0.75rem;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.loading-bar {
  width: 100%;
  height: 3px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.loading-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff6fd8, #ffd700, #a18cd1);
  border-radius: 3px;
  animation: loadProgress 2.5s ease-in-out 1.4s forwards;
}

@keyframes loadProgress {
  0% { width: 0%; }
  20% { width: 25%; }
  50% { width: 60%; }
  80% { width: 85%; }
  100% { width: 100%; }
}

/* Fade out everything before redirect */
.fade-out {
  animation: fadeOut 0.4s ease-in forwards;
}

@keyframes fadeOut {
  to { opacity: 0; transform: scale(1.05); }
}
</style>
</head>
<body>

<div class="logo-container">
  <div class="logo-glow"></div>
  <img src="icon-192.svg" alt="K-Pop Star Academy">
</div>

<div class="title">K-Pop Star Academy</div>
<div class="subtitle">École Saint-Esprit</div>

<div class="loading-container">
  <div class="loading-text">Chargement</div>
  <div class="loading-bar">
    <div class="loading-fill"></div>
  </div>
</div>

<script>
// Create sparkle particles
function createSparkles() {
  const colors = ['#ff6fd8', '#ffd700', '#a18cd1', '#fff'];
  for (let i = 0; i < 30; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = Math.random() * 100 + '%';
    sparkle.style.top = (40 + Math.random() * 60) + '%';
    sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
    sparkle.style.width = (2 + Math.random() * 4) + 'px';
    sparkle.style.height = sparkle.style.width;
    sparkle.style.animationDuration = (2 + Math.random() * 3) + 's';
    sparkle.style.animationDelay = (Math.random() * 3) + 's';
    document.body.appendChild(sparkle);
  }
}
createSparkles();

// Auto-redirect after 3 seconds
setTimeout(function() {
  document.body.classList.add('fade-out');
  setTimeout(function() {
    window.location.href = 'index.html';
  }, 400);
}, 3000);
</script>
</body>
</html>
