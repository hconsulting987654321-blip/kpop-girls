/* ============================================
   K-POP MEMORY — GLASSMORPHISM DARK EDITION
   ============================================ */

:root {
  --primary: #b44dff;
  --secondary: #6c5ce7;
  --accent: #ff6fd8;
  --gold: #ffd700;
  --dark: #0a0a1a;
  --darker: #050510;
  --glass: rgba(255,255,255,.07);
  --glass-strong: rgba(255,255,255,.12);
  --glass-border: rgba(255,255,255,.15);
  --card-gradient: linear-gradient(145deg, var(--primary), var(--accent));
  --neon-glow: 0 0 20px rgba(180,77,255,.4), 0 0 60px rgba(255,111,216,.15);
}

body {
  background: var(--darker);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(108,92,231,.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255,111,216,.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(180,77,255,.1) 0%, transparent 50%);
  min-height: 100vh;
  font-family: 'Quicksand', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 12px 30px;
  overflow-x: hidden;
  animation: pageEnter .6s ease-out;
  color: #fff;
}

/* Animated background particles */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.15), transparent),
    radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,.1), transparent),
    radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,.12), transparent),
    radial-gradient(2px 2px at 80% 60%, rgba(255,255,255,.08), transparent),
    radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,.1), transparent),
    radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,.08), transparent);
  background-size: 200px 200px;
  animation: starDrift 60s linear infinite;
  pointer-events: none; z-index: 0;
}
@keyframes starDrift {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

/* All content above particles */
body > * { position: relative; z-index: 1; }

/* ---- HEADER ---- */
h1 {
  font-size: 1.8em; color: #fff;
  text-shadow: 0 0 30px rgba(180,77,255,.5), 0 2px 4px rgba(0,0,0,.3);
  margin: 8px 0 4px; text-align: center;
  background: linear-gradient(135deg, #fff, #e0c3fc, #ff6fd8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
h1 .subtitle {
  font-size: .42em; display: block; font-weight: 600;
  opacity: .7; letter-spacing: 2px;
  -webkit-text-fill-color: rgba(255,255,255,.7);
}

/* ---- SCREEN SELECTOR ---- */
.screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 560px; }
.screen.active { display: flex; animation: fadeSlideIn .4s ease; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- GLASSMORPHISM PANELS ---- */
.glass-panel {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 20px;
  width: 100%;
  margin-bottom: 12px;
}
.glass-panel h2 {
  font-size: 1.1em; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}

/* ---- PILLS / BUTTONS ---- */
.section-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }

.pill {
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
  color: #fff; padding: 8px 18px; border-radius: 25px;
  font-family: inherit; font-size: .9em; font-weight: 600;
  cursor: pointer; transition: all .3s;
  backdrop-filter: blur(4px);
}
.pill:hover { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.3); }
.pill.active {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-color: transparent;
  box-shadow: 0 4px 20px rgba(180,77,255,.3);
}

.btn {
  background: linear-gradient(145deg, var(--primary), var(--secondary));
  color: #fff; border: none; padding: 13px 32px;
  font-size: 1.05em; border-radius: 50px;
  cursor: pointer; font-family: inherit; font-weight: 700;
  box-shadow: 0 4px 20px rgba(108,92,231,.35);
  transition: all .3s; position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(transparent, rgba(255,255,255,.1), transparent);
  transform: rotate(45deg); transition: .5s;
}
.btn:hover { transform: scale(1.05); }
.btn:hover::after { left: 100%; }
.btn + .btn { margin-left: 10px; }
.btn.secondary {
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
}
.btn-sm {
  padding: 8px 20px; font-size: .9em; border-radius: 25px;
}

/* ---- THEME GRID ---- */
.theme-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; width: 100%;
}
.theme-card {
  background: var(--glass);
  border: 2px solid var(--glass-border);
  border-radius: 18px; padding: 16px 10px;
  text-align: center; cursor: pointer;
  transition: all .3s;
  position: relative; overflow: hidden;
}
.theme-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.05) 100%);
  pointer-events: none;
}
.theme-card:hover { transform: scale(1.03); border-color: rgba(255,255,255,.3); }
.theme-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 25px rgba(255,111,216,.25);
  background: rgba(255,111,216,.1);
}
.theme-card.locked {
  opacity: .4; cursor: default;
}
.theme-card.locked:hover { transform: none; }
.theme-card .theme-icon { font-size: 2em; margin-bottom: 4px; }
.theme-card .theme-name { font-weight: 700; font-size: .9em; }
.theme-card .theme-lock { font-size: .75em; opacity: .6; margin-top: 2px; }

/* ---- DIFFICULTY CARDS ---- */
.diff-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; width: 100%;
}
.diff-card {
  background: var(--glass);
  border: 2px solid var(--glass-border);
  border-radius: 18px; padding: 14px 10px;
  text-align: center; cursor: pointer;
  transition: all .3s;
}
.diff-card:hover { transform: scale(1.03); border-color: rgba(255,255,255,.3); }
.diff-card.active {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(180,77,255,.2);
  background: rgba(180,77,255,.1);
}
.diff-card .diff-emoji { font-size: 1.6em; }
.diff-card .diff-name { font-weight: 700; font-size: .95em; margin: 2px 0; }
.diff-card .diff-info { font-size: .75em; opacity: .6; }

/* ---- DAILY CHALLENGE BANNER ---- */
.daily-banner {
  background: linear-gradient(135deg, rgba(255,215,0,.12), rgba(255,111,216,.08));
  border: 1.5px solid rgba(255,215,0,.25);
  border-radius: 18px; padding: 14px 18px;
  text-align: center; cursor: pointer;
  transition: all .3s; width: 100%; margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.daily-banner::before {
  content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: linear-gradient(45deg, #ffd700, #ff6fd8, #b44dff, #ffd700);
  background-size: 300% 300%;
  animation: dailyGlow 3s ease infinite;
  border-radius: 20px; z-index: -1; opacity: .3;
}
@keyframes dailyGlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.daily-banner:hover { transform: scale(1.02); }
.daily-banner .daily-title { font-weight: 800; font-size: 1em; }
.daily-banner .daily-sub { font-size: .8em; opacity: .7; margin-top: 2px; }
.daily-done { opacity: .5; pointer-events: none; }
.daily-done .daily-title::after { content: ' (fait !)'; }

/* ---- LEADERBOARD ---- */
.leaderboard {
  width: 100%;
}
.lb-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 12px;
  background: var(--glass); margin-bottom: 6px;
  font-size: .9em;
}
.lb-row .lb-rank { font-weight: 800; width: 28px; text-align: center; }
.lb-row .lb-name { flex: 1; font-weight: 600; }
.lb-row .lb-score { font-weight: 700; opacity: .8; }
.lb-row .lb-stars { }

/* ---- GAME HUD ---- */
.game-hud {
  display: flex; gap: 12px; align-items: center;
  justify-content: center; flex-wrap: wrap;
  margin-bottom: 8px; font-size: 1em;
}
.hud-item {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 5px 14px; border-radius: 20px;
  font-weight: 600; font-size: .9em;
  display: flex; align-items: center; gap: 5px;
}
.hud-item.streak { display: none; }
.hud-item.streak.visible {
  display: flex;
  background: rgba(255,215,0,.15);
  border-color: rgba(255,215,0,.3);
  animation: pulseGlow 1s ease infinite;
}
.hud-item.combo {
  display: none;
  background: linear-gradient(135deg, rgba(255,100,0,.2), rgba(255,215,0,.2));
  border-color: rgba(255,215,0,.4);
  animation: comboFlame 1s ease infinite;
}
.hud-item.combo.visible { display: flex; }
@keyframes comboFlame {
  0%,100% { box-shadow: 0 0 10px rgba(255,150,0,.2); }
  50% { box-shadow: 0 0 25px rgba(255,150,0,.5); }
}

/* ---- TIMER BAR ---- */
.timer-bar {
  width: 100%; max-width: 520px; height: 8px;
  background: rgba(255,255,255,.08);
  border-radius: 10px; margin-bottom: 8px;
  overflow: hidden;
}
.timer-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 10px;
  transition: width 1s linear;
  width: 100%;
}
.timer-fill.low { animation: pulseLow 1s ease infinite; }
.timer-fill.frozen { background: linear-gradient(90deg, #74b9ff, #0984e3) !important; }
@keyframes pulseLow {
  0%,100% { background: #ff6b6b; } 50% { background: #ff3838; }
}

/* Timer warning border */
.timer-warning-border {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 140; opacity: 0;
  border: 3px solid rgba(255,50,50,.5);
  transition: opacity .3s;
}
.timer-warning-border.active {
  animation: borderPulseRed 1s ease infinite;
}
@keyframes borderPulseRed {
  0%,100% { opacity:.2; border-color:rgba(255,50,50,.3); }
  50% { opacity:.7; border-color:rgba(255,50,50,.7); }
}

/* ---- POWER-UPS ---- */
.powerups-bar {
  display: flex; gap: 8px; margin-bottom: 10px; justify-content: center;
}
.powerup-btn {
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
  color: #fff; padding: 7px 16px; border-radius: 25px;
  font-family: inherit; font-size: .85em; font-weight: 600;
  cursor: default; transition: all .3s;
  opacity: .3; pointer-events: none;
}
.powerup-btn.available {
  opacity: 1; pointer-events: auto;
  border-color: var(--gold);
  background: rgba(255,215,0,.12);
  animation: pulseGlow 1.5s ease infinite;
  cursor: pointer;
}
.powerup-btn.used {
  opacity: .2; text-decoration: line-through;
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 5px rgba(255,215,0,.15); }
  50% { box-shadow: 0 0 20px rgba(255,215,0,.4); }
}

/* ---- CARD GRID ---- */
.grid {
  display: grid; gap: 8px;
  max-width: 520px; width: 100%;
  perspective: 1200px;
}
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
.grid.cols-6 { grid-template-columns: repeat(6, 1fr); }

/* ---- CARD 3D ---- */
.card {
  aspect-ratio: 1;
  border-radius: 14px;
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,.0,.2,1);
  will-change: transform;
}
.card:not(.flipped):not(.matched) {
  animation: cardIdle 3s ease-in-out infinite;
}
.card:nth-child(even):not(.flipped):not(.matched) { animation-delay: -1.5s; }
.card:nth-child(3n):not(.flipped):not(.matched) { animation-delay: -.7s; }

@keyframes cardIdle {
  0%,100% { transform: translateY(0) rotateX(0) rotateY(0); }
  50% { transform: translateY(-3px) rotateX(1deg) rotateY(1deg); }
}

.card.flipped { transform: rotateY(180deg); }
.card.matched { transform: rotateY(180deg); }
.card.match-anim {
  animation: matchPop .7s cubic-bezier(.2,.8,.3,1.2);
}
.card.wrong-anim {
  animation: cardShake .5s ease;
}
.card.peek { transform: rotateY(180deg); transition: transform .25s; }
.card.hint-glow {
  box-shadow: 0 0 25px 8px rgba(255,215,0,.7), inset 0 0 15px rgba(255,215,0,.2);
  z-index: 5;
}

@keyframes matchPop {
  0% { transform: rotateY(180deg) scale(1); }
  30% { transform: rotateY(180deg) scale(1.2); }
  60% { transform: rotateY(540deg) scale(1.08); }
  100% { transform: rotateY(540deg) scale(1); }
}
@keyframes cardShake {
  0%,100% { transform: rotateY(180deg) translateX(0); }
  20% { transform: rotateY(180deg) translateX(-8px) rotateZ(-2deg); }
  40% { transform: rotateY(180deg) translateX(8px) rotateZ(2deg); }
  60% { transform: rotateY(180deg) translateX(-5px) rotateZ(-1deg); }
  80% { transform: rotateY(180deg) translateX(5px) rotateZ(1deg); }
}

/* Card faces */
.card-front, .card-back {
  position: absolute; width: 100%; height: 100%;
  border-radius: 14px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* FRONT = dos de la carte (visible quand non retournee) */
.card-front {
  background: var(--glass-strong);
  border: 1.5px solid var(--glass-border);
}
.card-front .card-pattern {
  position: absolute; width: 200%; height: 200%;
  background: conic-gradient(from var(--card-angle, 0deg),
    var(--primary), var(--accent), var(--gold), var(--primary));
  opacity: .2;
  animation: patternSpin 6s linear infinite;
  border-radius: 50%;
}
@keyframes patternSpin {
  to { transform: rotate(360deg); }
}
.card-front .card-logo {
  position: relative; z-index: 2;
  font-size: 1.6em;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.3));
  text-shadow: 0 0 15px rgba(255,255,255,.3);
}

/* BACK = face de la carte (visible quand retournee) */
.card-back {
  transform: rotateY(180deg);
  font-size: 2.4em;
  background: var(--card-face-bg, linear-gradient(135deg, #1a1a3e, #2d1b69));
  border: 1.5px solid rgba(255,255,255,.1);
  box-shadow: inset 0 0 30px rgba(0,0,0,.2);
}

/* Card entrance stagger */
.card { opacity: 0; animation: cardEnter .4s ease forwards; }
.card:nth-child(1) { animation-delay: .02s; }
.card:nth-child(2) { animation-delay: .04s; }
.card:nth-child(3) { animation-delay: .06s; }
.card:nth-child(4) { animation-delay: .08s; }
.card:nth-child(5) { animation-delay: .10s; }
.card:nth-child(6) { animation-delay: .12s; }
.card:nth-child(7) { animation-delay: .14s; }
.card:nth-child(8) { animation-delay: .16s; }
.card:nth-child(9) { animation-delay: .18s; }
.card:nth-child(10) { animation-delay: .20s; }
.card:nth-child(11) { animation-delay: .22s; }
.card:nth-child(12) { animation-delay: .24s; }
.card:nth-child(n+13) { animation-delay: .26s; }

@keyframes cardEnter {
  from { opacity: 0; transform: scale(.5) rotateY(90deg); }
  to { opacity: 1; transform: scale(1) rotateY(0); }
}

/* Matched card fly-away */
.card.fly-away {
  transition: all .8s cubic-bezier(.4,0,.2,1);
  opacity: 0 !important;
}

/* ---- SCREEN FLASH ---- */
.screen-flash {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 150; opacity: 0;
}
.screen-flash.match-pulse {
  background: radial-gradient(ellipse at center, rgba(180,77,255,.2) 0%, transparent 70%);
  animation: matchPulseAnim .6s ease forwards;
}
.screen-flash.wrong-vignette {
  background: radial-gradient(ellipse at center, transparent 40%, rgba(255,50,50,.25) 100%);
  animation: wrongVignetteAnim .3s ease forwards;
}
@keyframes matchPulseAnim { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }
@keyframes wrongVignetteAnim { 0%{opacity:0} 40%{opacity:1} 100%{opacity:0} }

/* ---- COMBO FLAMES ---- */
.combo-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 145; opacity: 0;
  transition: opacity .5s;
  background:
    radial-gradient(ellipse at 0% 100%, rgba(255,150,0,.15) 0%, transparent 40%),
    radial-gradient(ellipse at 100% 100%, rgba(255,150,0,.15) 0%, transparent 40%);
}
.combo-overlay.active { opacity: 1; }

/* ---- PARTICLES ---- */
.particle {
  position: fixed; pointer-events: none; z-index: 160;
  border-radius: 50%;
  animation: particleFly .8s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
}

.star-burst {
  position: fixed; pointer-events: none; z-index: 160;
  font-size: 1.2em;
  animation: starBurst .9s ease-out forwards;
}
@keyframes starBurst {
  0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0) rotate(360deg); }
}

/* Fire trail */
.fire-trail {
  position: fixed; pointer-events: none; z-index: 160;
  font-size: 1.1em;
  animation: fireFloat .8s ease-out forwards;
}
@keyframes fireFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(.3); }
}

/* ---- WIN OVERLAY ---- */
.win-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(5,5,16,.85);
  z-index: 200;
  flex-direction: column; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.win-overlay.show { display: flex; }

.win-box {
  background: linear-gradient(145deg, rgba(30,20,60,.95), rgba(15,10,35,.95));
  border: 1.5px solid rgba(255,255,255,.12);
  border-radius: 28px; padding: 28px 40px;
  text-align: center;
  animation: popIn .6s cubic-bezier(.2,.8,.3,1.2);
  max-width: 92vw;
  box-shadow: 0 20px 80px rgba(0,0,0,.5), var(--neon-glow);
}
@keyframes popIn {
  0% { transform: scale(0) rotate(-5deg); }
  60% { transform: scale(1.08) rotate(1deg); }
  100% { transform: scale(1) rotate(0); }
}

.win-box h2 {
  font-size: 1.8em; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--gold), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.win-box .stars { font-size: 2.8em; margin: 8px 0; }
.win-box .stars .star-empty { opacity: .2; }
.win-box p { font-size: 1em; opacity: .8; margin: 4px 0; }
.win-box .perfect-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), var(--accent));
  color: #fff; padding: 6px 18px; border-radius: 20px;
  font-weight: 700; font-size: .95em; margin: 8px 0;
  animation: pulseGlow 1.5s ease infinite;
}
.win-box .trophy { font-size: 3.5em; margin: 5px 0; }
.win-box .score-anim { font-size: 2em; font-weight: 800; margin: 5px 0; }

/* ---- CONFETTI ---- */
.confetti {
  position: fixed; pointer-events: none; z-index: 300;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(.5); }
}

/* ---- SHARE ---- */

function playFlipSound() {
  try {
    const ctx = getAudioCtx(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 600; o.type = 'sine';
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    o.start(); o.stop(ctx.currentTime + 0.08);
  } catch(e) {}
}

  try {

      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      const t = ctx.currentTime + i * 0.08;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.15, t + 0.02);

function spawnStarBurst(x, y, count) {
  const emojis = ['\u2B50','\u2728','\uD83D\uDCAB','\uD83C\uDF1F','\uD83D\uDC96'];
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star-burst';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    s.style.fontSize = (0.8 + Math.random() * 0.8) + 'em';
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const dist = 40 + Math.random() * 60;
    s.style.setProperty('--px', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--py', Math.sin(angle) * dist + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function spawnParticles(x, y, count, colors) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 50;
    p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

// Animated score counter
function animateScoreCount(el, target, duration) {
  const start = 0;
  const startTime = performance.now();
  function tick(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(start + (target - start) * eased);
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function buildLeaderboard() {
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';
  const diff = DIFFICULTIES[currentDifficulty];
  const players = ['Ambre', 'Eden', 'Louise'];
  const entries = [];

  players.forEach(name => {
    try {
      const hs = JSON.parse(localStorage.getItem('kpop_memory_hs_' + name)) || {};
      const d = hs[diff.id];
      if (d) {
        entries.push({ name, stars: d.stars, moves: d.moves, time: d.time });
      }
    } catch(e) {}
  });

  entries.sort((a, b) => {
    if (b.stars !== a.stars) return b.stars - a.stars;
    if (a.moves !== b.moves) return a.moves - b.moves;
    return a.time - b.time;
  });

  if (entries.length === 0) {
    lb.innerHTML = '<div style="text-align:center;opacity:.5;padding:10px;font-size:.9em;">Pas encore de scores en ' + diff.label + '</div>';
    return;
  }

  const medals = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];
  entries.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.innerHTML =
      '<div class="lb-rank">' + (medals[i] || (i + 1)) + '</div>' +
      '<div class="lb-name">' + e.name + '</div>' +
      '<div class="lb-score">' + e.moves + ' coups / ' + e.time + 's</div>' +
      '<div class="lb-stars">' + '\u2B50'.repeat(e.stars) + '</div>';
    lb.appendChild(row);
  });
}

// ===== SHUFFLE =====
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== DAILY CHALLENGE =====
function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function startDailyChallenge() {
  if (isDailyDone()) return;
  playClickSound();
  isDailyChallenge = true;

  // Daily uses medium difficulty with seeded shuffle
  const seed = getDailySeed();
  const rng = seededRandom(seed);

  // Pick a random theme based on seed
  const themeKeys = Object.keys(THEMES);
  const dailyTheme = themeKeys[Math.floor(rng() * themeKeys.length)];
  currentTheme = dailyTheme;

  // Use medium difficulty
  currentDifficulty = 1;
  const diff = DIFFICULTIES[1];

  startGameInternal(diff, rng);
}

function launchGame() {
  playClickSound();
  isDailyChallenge = false;
  const diff = DIFFICULTIES[currentDifficulty];
  startGameInternal(diff, null);
}

// ===== GAME START =====
function startGameInternal(diff, rng) {
  const theme = THEMES[currentTheme];
  totalPairs = diff.pairs;
  matched = 0; moves = 0; wrongMatches = 0;
  flipped = []; locked = false;
  streak = 0; maxStreak = 0;
  lastMatchTime = Date.now();
  fastMatches = 0;

  // Reset power-ups (all available from start, 1 use each)
  peekUsed = false; freezeUsed = false; hintUsed = false;
  freezeActive = false;
  if (freezeInterval) clearInterval(freezeInterval);
  updatePowerupUI(true);

  // Reset UI
  document.getElementById('timerWarningBorder').classList.remove('active');
  showComboFlames(false);
  document.getElementById('pairs').textContent = '0';
  document.getElementById('total').textContent = totalPairs;
  document.getElementById('moves').textContent = '0';
  document.getElementById('winOverlay').classList.remove('show');
  updateStreakUI();
  updateComboUI();

  // Build grid
  const grid = document.getElementById('grid');
  grid.className = 'grid cols-' + diff.cols;

  const rngFn = rng || Math.random.bind(Math);
  let selected;
  if (rng) {
    // Seeded shuffle for daily
    const pool = [...theme.emojis];
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    selected = pool.slice(0, totalPairs);
    const deck = [...selected, ...selected];
    for (let i = deck.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    cards = deck;
  } else {
    selected = shuffle([...theme.emojis]).slice(0, totalPairs);
    cards = shuffle([...selected, ...selected]);
  }

  grid.innerHTML = '';
  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const faceBg = theme.faceBgs[i % theme.faceBgs.length];
    card.innerHTML =
      '<div class="card-front">' +
        '<div class="card-pattern"></div>' +
        '<span class="card-logo">' + theme.cardLogo + '</span>' +
      '</div>' +
      '<div class="card-back" style="--card-face-bg:' + faceBg + ';background:' + faceBg + '">' + emoji + '</div>';
    card.addEventListener('click', () => flipCard(card, i));
    grid.appendChild(card);
  });

  // Timer
  clearInterval(timerInterval);
  totalTime = diff.time;
  timeLeft = totalTime;
  updateTimer();
  timerInterval = setInterval(() => {
    if (freezeActive) return;
    timeLeft--;
    updateTimer();
    updateTimerWarning();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      gameOver(false);
    }
  }, 1000);

  showScreen('gameScreen');
}

    timeEl.classList.remove('timer-shake');

// ===== FLIP CARD =====
function flipCard(card, index) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  card.classList.add('flipped');
  flipped.push({ card, index });
  playFlipSound();

  // Sparkle on flip
  const rect = card.getBoundingClientRect();
  spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, 4,
    ['#b44dff','#ff6fd8','#ffd700']);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;

    const [a, b] = flipped;
    if (cards[a.index] === cards[b.index]) {
      // === MATCH ===
      const now = Date.now();
      if (now - lastMatchTime < 3000) fastMatches++;
      lastMatchTime = now;

      setTimeout(() => {
        a.card.classList.add('matched', 'match-anim');
        b.card.classList.add('matched', 'match-anim');
        matched++;
        streak++;
        if (streak > maxStreak) maxStreak = streak;

        // Screen-wide glow
        showScreenFlash('match-pulse');

        // Star explosion
        const ra = a.card.getBoundingClientRect();
        const rb = b.card.getBoundingClientRect();
        spawnStarBurst(ra.left + ra.width/2, ra.top + ra.height/2, 8);
        spawnStarBurst(rb.left + rb.width/2, rb.top + rb.height/2, 8);

        // Combo (2+ in a row)
        if (streak >= 2) {
          playComboSound();
          showComboFlames(true);
          updateComboUI();
          // Fire trail on combo 3+
          if (streak >= 3) {
            spawnFireTrail(a.card);
            spawnFireTrail(b.card);
          }
        } else {
          showComboFlames(false);
          updateComboUI();
        }

        updateStreakUI();
        playMatchSound();

        document.getElementById('pairs').textContent = matched;
        flipped = [];
        locked = false;

        if (matched === totalPairs) {
          clearInterval(timerInterval);
          if (freezeInterval) clearInterval(freezeInterval);
          document.getElementById('timerWarningBorder').classList.remove('active');
          document.getElementById('timeDisplay').classList.remove('timer-shake');
          showComboFlames(false);
          setTimeout(() => gameOver(true), 600);
        }
      }, 350);
    } else {
      // === MISMATCH ===
      wrongMatches++;
      streak = 0;
      updateStreakUI();
      updateComboUI();
      showComboFlames(false);
      playMismatchSound();
      showScreenFlash('wrong-vignette');

      setTimeout(() => {
        a.card.classList.add('wrong-anim');
        b.card.classList.add('wrong-anim');
      }, 200);

      setTimeout(() => {
        a.card.classList.remove('flipped', 'wrong-anim');
        b.card.classList.remove('flipped', 'wrong-anim');
        flipped = [];
        locked = false;
      }, 1200);
    }
  }
}

function useHint() {
  if (hintUsed || locked) return;
  hintUsed = true;
  updatePowerupUI();
  playClickSound();
  const cardEls = document.querySelectorAll('.card');
  const unmatched = [];
  cardEls.forEach((c, i) => {
    if (!c.classList.contains('matched') && !c.classList.contains('flipped')) {
      unmatched.push({ el: c, idx: i, emoji: cards[i] });
    }
  });
  for (let i = 0; i < unmatched.length; i++) {
    for (let j = i + 1; j < unmatched.length; j++) {
      if (unmatched[i].emoji === unmatched[j].emoji) {
        unmatched[i].el.classList.add('hint-glow');
        unmatched[j].el.classList.add('hint-glow');
        setTimeout(() => {
          unmatched[i].el.classList.remove('hint-glow');
          unmatched[j].el.classList.remove('hint-glow');
        }, 2000);
        return;
      }
    }
  }
}

// ===== GAME OVER =====
function gameOver(won) {
  const theme = THEMES[currentTheme];
  const diff = DIFFICULTIES[currentDifficulty];
  const timeTaken = totalTime - timeLeft;
  const ratio = totalPairs > 0 ? moves / totalPairs : 99;
  let starsCount = 0;
  const isPerfect = won && wrongMatches === 0;

  if (won) {
    playWinFanfare();
    showGoldenBurst();

    // Calculate stars
    if (ratio <= 1.2) starsCount = 3;
    else if (ratio <= 1.8) starsCount = 2;
    else starsCount = 1;

    // Bonus star for streak 3+
    if (maxStreak >= 3 && starsCount < 3) starsCount++;

    // Save score
    saveHS(diff.id, { time: timeTaken, moves: moves, stars: starsCount });
    const totalGames = incrementGames();

    // Save stars globally
    let totalStarsMemory = parseInt(localStorage.getItem('kpop_stars_' + currentPlayer) || '0');
    totalStarsMemory += starsCount;
    localStorage.setItem('kpop_stars_' + currentPlayer, String(totalStarsMemory));

    // Daily challenge bonus
    if (isDailyChallenge) {
      localStorage.setItem(getDailyKey(), 'done');
      starsCount += 1; // daily bonus star
      totalStarsMemory += 1;
      localStorage.setItem('kpop_stars_' + currentPlayer, String(totalStarsMemory));
    }

    // Confetti rain
    spawnConfetti(currentTheme, 40);

    // Build win screen
    const starsHTML = [];
    for (let i = 0; i < 3; i++) {
      starsHTML.push(i < starsCount ? '\u2B50' : '<span class="star-empty">\u2B50</span>');
    }

    document.getElementById('winTrophy').textContent = isPerfect ? '\uD83C\uDFC6' : starsCount === 3 ? '\uD83C\uDF1F' : '\uD83C\uDF89';
    document.getElementById('winTitle').textContent = isPerfect ? 'PARFAIT !!' : starsCount === 3 ? 'INCROYABLE !' : starsCount === 2 ? 'SUPER !' : 'BRAVO !';
    document.getElementById('winStars').innerHTML = starsHTML.join('');

    const msgs = [
      currentPlayer + ' a une memoire de championne !',
      'Trop forte ' + currentPlayer + ' !',
      currentPlayer + ' est la meilleure !',
      'Incroyable ' + currentPlayer + ' !'
    ];
    document.getElementById('winMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];

    const details = [moves + ' coups', timeTaken + 's'];
    if (maxStreak >= 3) details.push('Serie max: ' + maxStreak);
    if (isDailyChallenge) details.push('Bonus quotidien +1\u2B50');
    document.getElementById('winDetails').textContent = details.join(' \u2014 ');

    // Animated score counter
    const scoreEl = document.getElementById('scoreAnim');
    scoreEl.textContent = '0';
    const finalScore = starsCount * 100 + Math.max(0, 500 - moves * 10) + Math.max(0, 300 - timeTaken * 2);
    animateScoreCount(scoreEl, finalScore, 1500);

    // Perfect badge
    const badgeEl = document.getElementById('perfectBadge');
    badgeEl.innerHTML = isPerfect
      ? '<div class="perfect-badge">Parfait ! Zero erreurs !</div>'
      : isDailyChallenge
        ? '<div class="perfect-badge">Defi quotidien termine !</div>'
        : '';

  } else {
    // Time's up
    document.getElementById('winTrophy').textContent = '\uD83D\uDCAA';
    document.getElementById('winTitle').textContent = 'Temps ecoule !';
    document.getElementById('winStars').innerHTML = '\u23F0';
    document.getElementById('winMsg').textContent = 'Pas grave ' + currentPlayer + ', reessaie !';
    document.getElementById('winDetails').textContent = matched + '/' + totalPairs + ' paires trouvees';
    document.getElementById('scoreAnim').textContent = '';
    document.getElementById('perfectBadge').innerHTML = '';
  }

  document.getElementById('winButtons').innerHTML =
    '<button class="btn" onclick="restartGame()">Rejouer</button>' +
    '<button class="btn secondary" onclick="backToMenu()">Menu</button>';

  document.getElementById('winOverlay').classList.add('show');
}

  document.getElementById('winOverlay').classList.remove('show');
  const diff = DIFFICULTIES[currentDifficulty];
  startGameInternal(diff, null);
}

function createSparkleTrail(x, y) {
  var s = document.createElement('div');
  s.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;font-size:' + (8 + Math.random() * 8) + 'px;left:' + x + 'px;top:' + y + 'px;opacity:1;transition:transform 0.8s ease-out,opacity 0.8s ease-out;will-change:transform,opacity;';
  s.textContent = ['\u2728','\u2B50','\uD83D\uDCAB','\uD83C\uDF1F','\uD83D\uDC96'][Math.floor(Math.random() * 5)];
  document.body.appendChild(s);
  requestAnimationFrame(function() {
    s.style.transform = 'translateY(-' + (30 + Math.random() * 40) + 'px) translateX(' + ((Math.random() - 0.5) * 30) + 'px) scale(0)';
    s.style.opacity = '0';
  });
  setTimeout(function() { s.remove(); }, 800);
}

// Haptic feedback
document.addEventListener('click', function(e) {
  if (e.target.matches('button, .btn, .pill, .card, .theme-card, .diff-card, .daily-banner, [onclick]')) {
    try { if (navigator.vibrate) navigator.vibrate(15); } catch(err) {}
  }
});
</script>

<!-- Page Transition -->
<style>
.page-transition-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;pointer-events:none;background:#050510;opacity:1;transition:opacity .3s ease}
.page-transition-overlay.visible{opacity:1;pointer-events:all}
.page-transition-overlay.hidden{opacity:0}
.page-transition-overlay .sparkle{position:absolute;width:4px;height:4px;border-radius:50%;background:radial-gradient(circle,#ffd700,#ff6fd8);opacity:0;animation:ptSparkle .6s ease-out forwards}
@keyframes ptSparkle{0%{opacity:1;transform:scale(0) rotate(0deg)}40%{opacity:1;transform:scale(1.5) rotate(180deg)}100%{opacity:0;transform:scale(0) rotate(360deg)}}
</style>
<script>
(function(){var o=document.createElement("div");o.className="page-transition-overlay";for(var i=0;i<12;i++){var s=document.createElement("div");s.className="sparkle";s.style.left=Math.random()*100+"%";s.style.top=Math.random()*100+"%";s.style.animationDelay=Math.random()*.3+"s";o.appendChild(s)}document.body.appendChild(o);
requestAnimationFrame(function(){requestAnimationFrame(function(){o.classList.add("hidden")})});
document.addEventListener("click",function(e){var a=e.target.closest("a[href]");if(!a||a.target==="_blank"||a.href.startsWith("javascript")||a.href.startsWith("#")||a.href.startsWith("mailto"))return;e.preventDefault();o.classList.remove("hidden");o.classList.add("visible");o.querySelectorAll(".sparkle").forEach(function(sp){sp.style.animation="none";sp.offsetHeight;sp.style.left=Math.random()*100+"%";sp.style.top=Math.random()*100+"%";sp.style.animationDelay=Math.random()*.3+"s";sp.style.animation=""});setTimeout(function(){window.location.href=a.href},300)})})();
</script>

</body>
