<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --primary:#a18cd1;--secondary:#6c5ce7;
  --card-back:linear-gradient(145deg,#a18cd1,#6c5ce7);
  --bg1:#ff9a9e;--bg2:#fad0c4;--bg3:#fbc2eb;--bg4:#a18cd1;
}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3),var(--bg4));
  background-size:400% 400%;
  animation:gradientBG 8s ease infinite, pageEnter 0.6s ease-out;
  min-height:100vh;
  font-family:'Quicksand',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 15px 30px;
  overflow-x:hidden;
}

@keyframes gradientBG{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}

/* Screen flash overlays */
.screen-flash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:150;opacity:0;
  transition:opacity 0.15s ease;
}
.screen-flash.match-pulse{
  background:radial-gradient(ellipse at center,rgba(76,217,100,0.25) 0%,transparent 70%);
  animation:matchPulseAnim 0.6s ease forwards;
}
@keyframes matchPulseAnim{
  0%{opacity:0}30%{opacity:1}100%{opacity:0}
}
.screen-flash.wrong-vignette{
  background:radial-gradient(ellipse at center,transparent 40%,rgba(255,50,50,0.3) 100%);
  animation:wrongVignetteAnim 0.2s ease forwards;
}
@keyframes wrongVignetteAnim{
  0%{opacity:0}40%{opacity:1}100%{opacity:0}
}

/* Timer warning border pulse */
.timer-warning-border{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:140;opacity:0;
  border:4px solid rgba(255,50,50,0.6);
  transition:opacity 0.3s;
}
.timer-warning-border.active{
  animation:borderPulseRed 1s ease infinite;
}
@keyframes borderPulseRed{
  0%,100%{opacity:0.3;border-color:rgba(255,50,50,0.4)}
  50%{opacity:0.8;border-color:rgba(255,50,50,0.8)}
}

/* Timer shake */
.timer-shake{
  animation:timerShake 0.3s ease infinite;
}
@keyframes timerShake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-2px)}
  75%{transform:translateX(2px)}
}

/* Golden sparkle particles */
.sparkle-particle{
  position:absolute;pointer-events:none;z-index:10;
  width:8px;height:8px;
  background:radial-gradient(circle,#ffd700,#ff6fd8);
  border-radius:50%;
  animation:sparkleFloat 0.6s ease forwards;
}
@keyframes sparkleFloat{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}

/* Fire emoji trail */
.fire-trail{
  position:absolute;pointer-events:none;z-index:10;
  font-size:1.2em;
  animation:fireTrailAnim 0.8s ease forwards;
}
@keyframes fireTrailAnim{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-30px) scale(0.3)}
}

/* Win golden burst */
.golden-burst{
  position:fixed;top:50%;left:50%;
  width:0;height:0;pointer-events:none;z-index:190;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,215,0,0.5),rgba(255,111,216,0.2),transparent);
  animation:goldenBurstAnim 1.2s ease forwards;
}
@keyframes goldenBurstAnim{
  0%{width:0;height:0;opacity:1;transform:translate(-50%,-50%)}
  60%{opacity:0.8}
  100%{width:200vw;height:200vw;opacity:0;transform:translate(-50%,-50%)}
}

/* Win 3D card spread */
.card.win-spread{
  animation:winCardSpread 1s ease forwards !important;
}
@keyframes winCardSpread{
  0%{transform:rotateY(540deg) scale(1)}
  50%{transform:rotateY(720deg) scale(1.1) translateZ(30px)}
  100%{transform:rotateY(720deg) scale(0.9) translateY(-20px)}
}

/* Perfect badge golden animation */
.perfect-badge-glow{
  position:relative;
  overflow:visible;
}
.perfect-badge-glow::after{
  content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;
  border-radius:22px;
  background:linear-gradient(45deg,#ffd700,#ff6fd8,#ffd700,#ff6fd8);
  background-size:300% 300%;
  animation:perfectGlowBorder 1.5s ease infinite;
  z-index:-1;
}
@keyframes perfectGlowBorder{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}

.back-btn{
  position:fixed;top:12px;left:12px;
  background:rgba(255,255,255,.3);color:#fff;border:2px solid rgba(255,255,255,.5);
  padding:7px 16px;border-radius:30px;font-family:inherit;font-size:.95em;
  cursor:pointer;text-decoration:none;z-index:100;backdrop-filter:blur(5px);
  transition:all .3s;
}
.back-btn:hover{background:rgba(255,255,255,.5)}

h1{font-size:2em;color:#fff;text-shadow:3px 3px 6px rgba(0,0,0,.2);margin:8px 0 4px;text-align:center;}
h1 .subtitle{font-size:.45em;display:block;font-weight:600;opacity:.85;letter-spacing:1px;}

/* Sections */
.section-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;}

.pill{
  background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.45);
  color:#fff;padding:6px 16px;border-radius:25px;font-family:inherit;
  font-size:.92em;font-weight:600;cursor:pointer;transition:all .3s;
  backdrop-filter:blur(3px);
}
.pill:hover{background:rgba(255,255,255,.35)}
.pill.active{background:#fff;color:var(--secondary);font-weight:700;box-shadow:0 2px 12px rgba(108,92,231,.25);}

/* Power-ups bar */
.powerups-bar{
  display:flex;gap:10px;margin-bottom:8px;
}
.powerup-btn{
  background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);
  color:#fff;padding:5px 14px;border-radius:20px;font-family:inherit;
  font-size:.85em;cursor:pointer;transition:all .3s;opacity:.4;
  pointer-events:none;
}
.powerup-btn.available{opacity:1;pointer-events:auto;background:rgba(255,255,255,.35);border-color:rgba(255,255,255,.7);animation:pulseGlow 1.5s ease infinite;}
.powerup-btn.used{opacity:.25;text-decoration:line-through;pointer-events:none;}

@keyframes pulseGlow{
  0%,100%{box-shadow:0 0 5px rgba(255,255,255,.2)}
  50%{box-shadow:0 0 15px rgba(255,255,255,.5)}
}

/* Timer bar */
.timer-bar{
  width:100%;max-width:520px;height:10px;
  background:rgba(255,255,255,.25);border-radius:10px;
  margin-bottom:8px;overflow:hidden;
}
.timer-fill{
  height:100%;background:linear-gradient(90deg,#ff6fd8,#ffd700);
  border-radius:10px;transition:width 1s linear;width:100%;
}
.timer-fill.low{animation:pulseLow 1s ease infinite;}
.timer-fill.frozen{background:linear-gradient(90deg,#74b9ff,#0984e3)!important;}

@keyframes pulseLow{
  0%,100%{background:#ff6b6b}50%{background:#ff3838}
}

/* Score board */
.score-board{
  display:flex;gap:18px;margin-bottom:10px;font-size:1.1em;color:#fff;
  text-shadow:2px 2px 4px rgba(0,0,0,.2);align-items:center;flex-wrap:wrap;justify-content:center;
}
.streak-display{
  background:rgba(255,255,255,.2);padding:3px 12px;border-radius:15px;
  font-size:.9em;transition:all .3s;
}
.streak-display.hot{background:rgba(255,200,0,.4);animation:pulseGlow 1s ease infinite;}

/* Grid */
.grid{
  display:grid;gap:10px;max-width:520px;width:100%;perspective:1000px;
}
.grid.size-8{grid-template-columns:repeat(4,1fr)}
.grid.size-12{grid-template-columns:repeat(4,1fr)}
.grid.size-16{grid-template-columns:repeat(4,1fr)}
.grid.size-20{grid-template-columns:repeat(5,1fr)}

/* Card */
.card{
  aspect-ratio:1;border-radius:14px;cursor:pointer;position:relative;
  transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.0,.2,1);
  box-shadow:0 4px 15px rgba(0,0,0,.15);
}
.card:not(.flipped):not(.matched){animation:cardFloat 3s ease-in-out infinite;}
.card:nth-child(even):not(.flipped):not(.matched){animation-delay:-1.5s;}
.card:nth-child(3n):not(.flipped):not(.matched){animation-delay:-.8s;}

@keyframes cardFloat{
  0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}
}

.card.flipped{transform:rotateY(180deg);}
.card.matched{transform:rotateY(180deg);animation:matchSpin .7s ease;}
.card.wrong{animation:cardShake .5s ease;}
.card.peek{transform:rotateY(180deg);transition:transform .3s;}
.card.hint-glow{box-shadow:0 0 20px 5px rgba(255,215,0,.8);z-index:5;}

@keyframes matchSpin{
  0%{transform:rotateY(180deg) scale(1)}
  30%{transform:rotateY(180deg) scale(1.15)}
  60%{transform:rotateY(540deg) scale(1.05)}
  100%{transform:rotateY(540deg) scale(1)}
}

@keyframes cardShake{
  0%,100%{transform:rotateY(180deg) translateX(0)}
  20%{transform:rotateY(180deg) translateX(-8px)}
  40%{transform:rotateY(180deg) translateX(8px)}
  60%{transform:rotateY(180deg) translateX(-5px)}
  80%{transform:rotateY(180deg) translateX(5px)}
}

.card-front,.card-back{
  position:absolute;width:100%;height:100%;border-radius:14px;
  backface-visibility:hidden;display:flex;align-items:center;justify-content:center;
}
.card-front{
  background:var(--card-back);color:#fff;font-size:1.8em;
  overflow:hidden;
}
.card-front .card-pattern{
  position:absolute;width:100%;height:100%;opacity:.15;
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  font-size:.5em;line-height:1.4;overflow:hidden;
}
.card-front .card-icon{position:relative;z-index:2;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));}

.card-back{
  background:#fff;transform:rotateY(180deg);font-size:2.6em;
  box-shadow:inset 0 0 20px rgba(0,0,0,.05);
}

/* Win overlay */
.win-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.7);z-index:200;
  flex-direction:column;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.win-overlay.show{display:flex;}

.win-box{
  background:#fff;border-radius:30px;padding:30px 45px;text-align:center;
  animation:popIn .6s cubic-bezier(.2,.8,.3,1.2);max-width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}

@keyframes popIn{0%{transform:scale(0) rotate(-5deg)}60%{transform:scale(1.08) rotate(1deg)}100%{transform:scale(1) rotate(0)}}

.win-box h2{font-size:2em;color:var(--secondary);margin-bottom:4px;}
.win-box .stars{font-size:2.8em;margin:8px 0;}
.win-box p{font-size:1.05em;color:#666;margin:4px 0;}
.win-box .perfect-badge{
  display:inline-block;background:linear-gradient(135deg,#ffd700,#ff6fd8);
  color:#fff;padding:6px 18px;border-radius:20px;font-weight:700;
  font-size:1em;margin:10px 0;animation:pulseGlow 1.5s ease infinite;
}
.win-box .trophy{font-size:4em;margin:5px 0;}
.win-box .next-round-info{font-size:.9em;color:#999;margin-top:8px;}

.btn{
  background:linear-gradient(145deg,var(--primary),var(--secondary));
  color:#fff;border:none;padding:12px 30px;font-size:1.1em;border-radius:50px;
  cursor:pointer;font-family:inherit;font-weight:700;margin-top:12px;
  box-shadow:0 4px 15px rgba(108,92,231,.3);transition:all .3s;
}
.btn:hover{transform:scale(1.05);}
.btn+.btn{margin-left:10px;}
.btn.secondary{background:rgba(108,92,231,.15);color:var(--secondary);}

/* Theme selection screen */
.theme-select{
  display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:400px;width:100%;
  margin-bottom:15px;
}
.theme-card{
  background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);
  border-radius:20px;padding:18px 12px;text-align:center;cursor:pointer;
  transition:all .3s;backdrop-filter:blur(3px);
}
.theme-card:hover{transform:scale(1.03);background:rgba(255,255,255,.3);}
.theme-card.active{background:#fff;border-color:#fff;transform:scale(1.03);}
.theme-card .theme-icon{font-size:2.2em;margin-bottom:6px;}
.theme-card .theme-name{color:#fff;font-weight:700;font-size:1em;}
.theme-card.active .theme-name{color:var(--secondary);}

/* Confetti */
.confetti{
  position:fixed;font-size:2em;
  animation:confettiFall linear forwards;z-index:300;pointer-events:none;
}
@keyframes confettiFall{
  0%{opacity:1}
  to{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* Progress dots for multi-round */
.round-progress{display:flex;gap:6px;margin-bottom:8px;}
.round-dot{
  width:12px;height:12px;border-radius:50%;
  background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);
  transition:all .3s;
}
.round-dot.completed{background:#ffd700;border-color:#ffd700;box-shadow:0 0 8px rgba(255,215,0,.5);}
.round-dot.current{background:#fff;border-color:#fff;animation:pulseGlow 1s ease infinite;}

/* High score display */
.hs-display{
  font-size:.85em;color:rgba(255,255,255,.7);margin-bottom:6px;
}

/* Best score on start screen */
.best-score-start{
  font-size:.9em;color:rgba(255,255,255,.8);margin-bottom:8px;
  font-weight:600;
}

@media(max-width:500px){
  .card-back{font-size:2em}
  h1{font-size:1.6em}
  .score-board{font-size:.95em;gap:12px}
  .theme-card .theme-icon{font-size:1.8em}
  .win-box{padding:24px 28px}
}
.share-row{display:flex;gap:10px;justify-content:center;margin-top:15px}
.share-btn{padding:10px 20px;border-radius:25px;border:none;font-family:inherit;font-size:1em;font-weight:600;cursor:pointer;transition:transform .2s}
.share-btn:hover{transform:scale(1.05)}
.share-whatsapp{background:#25D366;color:white}
.share-copy{background:rgba(255,255,255,0.2);color:white;border:2px solid rgba(255,255,255,0.3)}
.share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#25D366;color:white;padding:10px 25px;border-radius:25px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.share-toast.show{opacity:1}

/* === AAA MOBILE EFFECTS === */
@keyframes emojiRain {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
@keyframes flashOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes pageEnter {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- Screen flash overlay -->
<div class="screen-flash" id="screenFlash"></div>
<!-- Timer warning border -->
<div class="timer-warning-border" id="timerWarningBorder"></div>

<a href="index.html" class="back-btn">&#8592; Retour</a>

<h1>K-Pop Memory<span class="subtitle">K-Pop Star Academy</span></h1>

<!-- Player selection -->
<div class="section-row" id="playerBar">
  <button class="pill active" onclick="setPlayer(this,'Ambre')">Ambre</button>
  <button class="pill" onclick="setPlayer(this,'Eden')">Eden</button>

<!-- Theme selection -->

    <div class="theme-icon">🎤💜</div>
    <div class="theme-name">K-Pop</div>
  </div>
  <div class="theme-card" onclick="setTheme('animals',this)">
    <div class="theme-icon">🐱🦋</div>
    <div class="theme-name">Animaux Mignons</div>

<!-- Best score on start screen -->
<div class="best-score-start" id="bestScoreStart"></div>

<!-- Difficulty -->

<!-- Score board -->

<!-- Win overlay -->

<div class="share-toast" id="shareToast">Copié !</div>

<script>
// ===== THEMES =====
const THEMES = {
  kpop: {
    name:'K-Pop',
    emojis:['🎤','🎵','🎶','💜','💖','⭐','🌟','👑','🦋','🌸','💎','🎀','🎧','🎹','🎸','💫','🌈','🦄','✨','🎪'],
    cardBack:'linear-gradient(145deg,#a18cd1,#6c5ce7)',
    cardIcon:'🎵',
    pattern:'🎤🎵💜⭐🌸',
    bg:['#ff9a9e','#fad0c4','#fbc2eb','#a18cd1'],
    primary:'#a18cd1',secondary:'#6c5ce7',
    confetti:['🎉','💖','⭐','🌟','🎀','✨','💜','🎵']
  },
  animals: {
    name:'Animaux Mignons',
    emojis:['🐱','🐶','🐰','🦊','🐼','🐨','🦋','🐬','🐥','🦄','🐝','🐢','🦔','🐙','🦩','🐿️','🦜','🐳','🦑','🐞'],
    cardBack:'linear-gradient(145deg,#ff9ff3,#f368e0)',
    cardIcon:'🐾',
    pattern:'🐱🐶🐰🦊🐼',
    bg:['#ffeaa7','#fdcb6e','#ff9ff3','#f368e0'],
    primary:'#f368e0',secondary:'#e056a0',
    confetti:['🐱','🐶','🐰','🦊','💕','🌸','🦋','⭐']
  },
  princess: {
    name:'Princesses',

let currentTheme = 'kpop';
let currentPlayer = new URLSearchParams(location.search).get('player') || localStorage.getItem('kpop_player') || 'Ambre';
let currentSize = 8;
let cards = [], flipped = [], matched = 0, moves = 0, locked = false;

let fastMatches = 0; // matches under 3s

// Power-ups

let hintAvailable = false, hintUsed = false;

// Audio context
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// ===== SOUNDS =====
function playFlipSound() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 600; o.type = 'sine';
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    o.start(); o.stop(ctx.currentTime + 0.08);
  } catch(e) {}
}

function playMatchSound() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784];
    notes.forEach((freq, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      g.gain.setValueAtTime(0, ctx.currentTime + i * 0.08);
      g.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i * 0.08 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.15);
      o.start(ctx.currentTime + i * 0.08);
      o.stop(ctx.currentTime + i * 0.08 + 0.15);
    });
  } catch(e) {}
}

function playMismatchSound() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 250; o.type = 'triangle';
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    o.start(); o.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function playWinFanfare() {
  try {
    const ctx = getAudioCtx();
    const melody = [523, 587, 659, 784, 880, 1047];
    melody.forEach((freq, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      const t = ctx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.2, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.start(t); o.stop(t + 0.25);
    });
  } catch(e) {}
}

function playClickSound() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 900; o.type = 'sine';
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    o.start(); o.stop(ctx.currentTime + 0.05);
  } catch(e) {}
}

// ===== SCREEN EFFECTS =====
function showScreenFlash(type) {
  const el = document.getElementById('screenFlash');
  el.className = 'screen-flash';
  // Force reflow
  void el.offsetWidth;
  el.classList.add(type);
  setTimeout(() => { el.className = 'screen-flash'; }, 700);
}

function spawnSparkles(card) {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'sparkle-particle';
    const angle = (Math.PI * 2 / 6) * i + Math.random() * 0.5;
    const dist = 30 + Math.random() * 40;
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
    p.style.width = (6 + Math.random() * 6) + 'px';
    p.style.height = p.style.width;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
}

function spawnFireTrail(card) {
  const rect = card.getBoundingClientRect();
  const fires = ['🔥','🔥','✨','💫','⭐'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const f = document.createElement('div');
      f.className = 'fire-trail';
      f.textContent = fires[i % fires.length];
      f.style.left = (rect.left + Math.random() * rect.width) + 'px';
      f.style.top = (rect.top + Math.random() * rect.height) + 'px';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 900);
    }, i * 80);
  }
}

function showGoldenBurst() {
  const burst = document.createElement('div');
  burst.className = 'golden-burst';
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 1500);
}

function updateTimerWarning() {
  const border = document.getElementById('timerWarningBorder');
  const timeEl = document.getElementById('timeDisplay');
  if (timeLeft <= 15 && !freezeActive) {
    border.classList.add('active');
    timeEl.classList.add('timer-shake');
  } else {
    border.classList.remove('active');
    timeEl.classList.remove('timer-shake');
  }
}

// ===== 3D CARD TILT =====
function initCardTilt(card) {
  card.addEventListener('mousemove', (e) => {
    if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    const rotateY = ((x - centerX) / centerX) * 5;
    const rotateX = ((centerY - y) / centerY) * 5;
    card.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });
  card.addEventListener('mouseleave', () => {
    if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
    card.style.transform = '';
  });
}

// ===== HELPERS =====
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function hsKey() { return 'kpop_hs_memory_' + currentPlayer; }

function getHS() {
  try { return JSON.parse(localStorage.getItem(hsKey())) || {}; } catch(e) { return {}; }
}
function saveHS(size, starsCount) {
  const hs = getHS();
  const key = currentTheme + '_' + size;
  if (!hs[key] || starsCount > hs[key]) hs[key] = starsCount;
  localStorage.setItem(hsKey(), JSON.stringify(hs));
}
function updateHSDisplay() {
  const hs = getHS();
  const key = currentTheme + '_' + currentSize;
  const best = hs[key];
  const el = document.getElementById('hsDisplay');
  el.textContent = best ? `Meilleur score ${currentPlayer}: ${'⭐'.repeat(best)}` : '';
}

function updateBestScoreStart() {
  const hs = getHS();
  const el = document.getElementById('bestScoreStart');
  // Show best across all sizes for current theme
  let bestStars = 0;
  let bestLabel = '';
  for (const diff of DIFFICULTIES) {
    const key = currentTheme + '_' + diff.size;
    if (hs[key] && hs[key] > bestStars) {
      bestStars = hs[key];
      bestLabel = diff.label;
    }
  }
  if (bestStars > 0) {
    el.textContent = `Meilleur score de ${currentPlayer} : ${'⭐'.repeat(bestStars)} (${bestLabel})`;
  } else {
    el.textContent = '';
  }
}

// ===== POWER-UPS =====
function resetPowerups() {
  peekAvailable = false; peekUsed = false;
  freezeAvailable = false; freezeUsed = false;
  hintAvailable = false; hintUsed = false;
  freezeActive = false;
  if (freezeInterval) clearInterval(freezeInterval);
  fastMatches = 0;
  updatePowerupUI();
}

function updatePowerupUI() {
  const peek = document.getElementById('pwPeek');
  const freeze = document.getElementById('pwFreeze');
  const hint = document.getElementById('pwHint');
  peek.className = 'powerup-btn' + (peekUsed ? ' used' : peekAvailable ? ' available' : '');
  freeze.className = 'powerup-btn' + (freezeUsed ? ' used' : freezeAvailable ? ' available' : '');
  hint.className = 'powerup-btn' + (hintUsed ? ' used' : hintAvailable ? ' available' : '');
}

function checkPowerupUnlocks() {
  // Peek: every 3 fast matches (matched in < 3s)
  if (!peekUsed && fastMatches >= 3) {
    peekAvailable = true;
  }
  // Freeze: at half completion
  if (!freezeUsed && matched >= Math.floor(totalPairs / 2)) {
    freezeAvailable = true;
  }
  // Hint: always available once, first use
  if (!hintUsed && matched >= 1) {
    hintAvailable = true;
  }
  updatePowerupUI();
}

function usePeek() {
  if (!peekAvailable || peekUsed || locked) return;
  peekUsed = true; peekAvailable = false;
  updatePowerupUI();
  const allCards = document.querySelectorAll('.card:not(.matched)');
  allCards.forEach(c => c.classList.add('peek'));
  locked = true;
  setTimeout(() => {
    allCards.forEach(c => c.classList.remove('peek'));
    locked = false;
  }, 2000);
}

function useFreeze() {
  if (!freezeAvailable || freezeUsed) return;
  freezeUsed = true; freezeAvailable = false;
  freezeActive = true;
  freezeTimeLeft = 10;
  updatePowerupUI();
  document.getElementById('timerFill').classList.add('frozen');
  // Timer pauses for 10s
  freezeInterval = setInterval(() => {
    freezeTimeLeft--;
    if (freezeTimeLeft <= 0) {
      clearInterval(freezeInterval);
      freezeActive = false;
      document.getElementById('timerFill').classList.remove('frozen');
    }
  }, 1000);
}

function useHint() {
  if (!hintAvailable || hintUsed || locked) return;
  hintUsed = true; hintAvailable = false;
  updatePowerupUI();
  // Find an unmatched pair
  const unmatched = [];
  const cardEls = document.querySelectorAll('.card');
  cardEls.forEach((c, i) => {
    if (!c.classList.contains('matched') && !c.classList.contains('flipped')) {
      unmatched.push({el: c, idx: i, emoji: cards[i]});
    }
  });
  // Find first pair
  for (let i = 0; i < unmatched.length; i++) {
    for (let j = i + 1; j < unmatched.length; j++) {
      if (unmatched[i].emoji === unmatched[j].emoji) {
        unmatched[i].el.classList.add('hint-glow');
        unmatched[j].el.classList.add('hint-glow');
        setTimeout(() => {
          unmatched[i].el.classList.remove('hint-glow');
          unmatched[j].el.classList.remove('hint-glow');
        }, 2500);
        return;
      }
    }
  }
}

// ===== STREAK =====
function updateStreakUI() {
  const el = document.getElementById('streakDisplay');
  if (streak >= 2) {
    el.style.display = '';
    el.textContent = '\uD83D\uDD25 x' + streak;
    el.classList.toggle('hot', streak >= 3);
  } else {
    el.style.display = 'none';
  }

// ===== MULTI-ROUND =====
function startMultiRound() {
  multiRoundActive = true;
  multiRoundIndex = 0;
  multiRoundErrors = 0;
  multiRoundTotalMoves = 0;
  document.getElementById('roundProgress').style.display = 'flex';
  updateRoundDots();
  startGame(DIFFICULTIES[0].size, null);
  // Highlight the correct diff button
  document.querySelectorAll('#diffBar .pill').forEach((b, i) => b.classList.toggle('active', i === 0));
}

function updateRoundDots() {
  document.querySelectorAll('.round-dot').forEach((d, i) => {
    d.classList.remove('completed', 'current');
    if (i < multiRoundIndex) d.classList.add('completed');
    else if (i === multiRoundIndex) d.classList.add('current');
  });
}

function advanceMultiRound() {
  multiRoundIndex++;
  if (multiRoundIndex >= 4) {
    // All rounds done!
    return false;
  }
  updateRoundDots();
  return true;
}

// ===== GAME =====
function startGame(size, btn) {
  const theme = THEMES[currentTheme];
  currentSize = size;
  totalPairs = size / 2;
  matched = 0; moves = 0; wrongMatches = 0;
  flipped = []; locked = false;
  streak = 0; maxStreak = 0;
  lastMatchTime = Date.now();
  resetPowerups();
  updateStreakUI();
  updateHSDisplay();

  // Reset timer warning
  document.getElementById('timerWarningBorder').classList.remove('active');
  document.getElementById('timeDisplay').classList.remove('timer-shake');

  if (btn) {
    document.querySelectorAll('#diffBar .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Cancel multi-round if manually selecting difficulty
    if (multiRoundActive) {
      multiRoundActive = false;
      document.getElementById('roundProgress').style.display = 'none';
    }
  }

  document.getElementById('pairs').textContent = 0;
  document.getElementById('total').textContent = totalPairs;
  document.getElementById('moves').textContent = 0;
  document.getElementById('winOverlay').classList.remove('show');

  const grid = document.getElementById('grid');
  grid.className = 'grid size-' + size;

  const selected = shuffle([...theme.emojis]).slice(0, totalPairs);
  cards = shuffle([...selected, ...selected]);

  grid.innerHTML = '';
  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-front">' +
        '<div class="card-pattern">' + (theme.pattern + ' ').repeat(6) + '</div>' +
        '<span class="card-icon">' + theme.cardIcon + '</span>' +
      '</div>' +
      '<div class="card-back">' + emoji + '</div>';
    card.addEventListener('click', () => flipCard(card, i));
    initCardTilt(card);
    grid.appendChild(card);
  });

  // Timer
  clearInterval(timerInterval);
  const diff = DIFFICULTIES.find(d => d.size === size);
  totalTime = diff ? diff.time : 120;
  timeLeft = totalTime;
  updateTimer();
  timerInterval = setInterval(() => {
    if (freezeActive) return; // paused
    timeLeft--;
    updateTimer();
    updateTimerWarning();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      gameOver(false);
    }
  }, 1000);

  // Update background progress
  updateBGProgress();
}

function updateTimer() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timeDisplay').textContent = m + ':' + s.toString().padStart(2, '0');
  const fill = document.getElementById('timerFill');
  fill.style.width = (timeLeft / totalTime * 100) + '%';
  if (timeLeft <= 15 && !freezeActive) {
    fill.classList.add('low');
    fill.style.background = '';
  } else if (!freezeActive) {
    fill.classList.remove('low');
    fill.style.background = '';
  }
}

function updateBGProgress() {
  // Shift background hue based on completion progress
  const progress = matched / totalPairs;
  const hueShift = Math.round(progress * 30);
  document.body.style.filter = 'hue-rotate(' + hueShift + 'deg)';
}

function flipCard(card, index) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  card.classList.add('flipped');
  // Clear tilt transform when flipping
  card.style.transform = '';
  flipped.push({card, index});
  playFlipSound();
  // Sparkle burst on flip
  spawnSparkles(card);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;

    const [a, b] = flipped;
    if (cards[a.index] === cards[b.index]) {
      // MATCH
      const now = Date.now();
      const matchSpeed = now - lastMatchTime;
      if (matchSpeed < 3000) fastMatches++;
      lastMatchTime = now;

      setTimeout(() => {
        a.card.classList.add('matched');
        b.card.classList.add('matched');
        matched++;
        streak++;
        if (streak > maxStreak) maxStreak = streak;
        updateStreakUI();

        // Screen-wide green glow
        showScreenFlash('match-pulse');

        // Fire trail for streak 3+
        if (streak >= 3) {
          spawnFireTrail(a.card);
          spawnFireTrail(b.card);
        }

        document.getElementById('pairs').textContent = matched;
        playMatchSound();
        checkPowerupUnlocks();
        updateBGProgress();
        flipped = [];
        locked = false;

        if (matched === totalPairs) {
          clearInterval(timerInterval);
          if (freezeInterval) clearInterval(freezeInterval);
          document.getElementById('timerWarningBorder').classList.remove('active');
          document.getElementById('timeDisplay').classList.remove('timer-shake');
          setTimeout(() => gameOver(true), 500);
        }
      }, 300);
    } else {
      // MISMATCH
      wrongMatches++;
      streak = 0;
      updateStreakUI();
      playMismatchSound();

      // Red vignette flash
      showScreenFlash('wrong-vignette');

      // Shake animation
      setTimeout(() => {
        a.card.classList.add('wrong');
        b.card.classList.add('wrong');
      }, 200);

      setTimeout(() => {
        a.card.classList.remove('flipped', 'wrong');
        b.card.classList.remove('flipped', 'wrong');
        flipped = [];
        locked = false;
      }, 1500); // 1.5s visible for kids to memorize
    }
  }
}

function gameOver(won) {
  const theme = THEMES[currentTheme];
  const ratio = totalPairs > 0 ? moves / totalPairs : 99;
  let starsCount = 0, stars, title, msg;
  const isPerfect = won && wrongMatches === 0;
  const timeTaken = totalTime - timeLeft;

  if (won) {
    playWinFanfare();

    // Golden burst effect
    showGoldenBurst();

    // 3D card spread animation
    document.querySelectorAll('.card.matched').forEach((c, i) => {
      setTimeout(() => c.classList.add('win-spread'), i * 60);
    });

    if (ratio <= 1.3) { starsCount = 3; stars = '⭐⭐⭐'; title = 'PARFAIT !!'; }
    else if (ratio <= 2.0) { starsCount = 2; stars = '⭐⭐'; title = 'SUPER !!'; }
    else { starsCount = 1; stars = '⭐'; title = 'BRAVO !'; }

    // Bonus star for streak of 3+
    if (maxStreak >= 3 && starsCount < 3) {
      starsCount++;
      stars += '⭐';
      title = starsCount === 3 ? 'PARFAIT !!' : 'SUPER !!';
    }

    saveHS(currentSize, starsCount);

    const msgs = [
      currentPlayer + ' a une mémoire de championne !',
      'Trop forte ' + currentPlayer + ' !',
      currentPlayer + ' est la meilleure !',
      'Incroyable ' + currentPlayer + ' !'
    ];
    msg = msgs[Math.floor(Math.random() * msgs.length)];

    // Confetti
    for (let i = 0; i < 35; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = theme.confetti[Math.floor(Math.random() * theme.confetti.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-50px';
        c.style.animationDuration = (2.5 + Math.random() * 3) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 6000);
      }, i * 70);
    }
  } else {
    starsCount = 0;
    stars = '⏰';
    title = 'Temps écoulé !';
    msg = 'Pas grave ' + currentPlayer + ', réessaie !';
  }

  // Trophy for multi-round or perfect
  let trophy = '';
  if (isPerfect) trophy = '🏆';
  else if (won && starsCount === 3) trophy = '🌟';
  else if (won) trophy = '🎉';
  else trophy = '💪';

  document.getElementById('winTrophy').textContent = trophy;
  document.getElementById('winTitle').textContent = title;
  document.getElementById('winStars').textContent = stars;
  document.getElementById('winMsg').textContent = msg;

  const detailParts = [];
  if (won) {
    detailParts.push('En ' + moves + ' coups et ' + timeTaken + 's');
    if (maxStreak >= 3) detailParts.push('Série max: ' + maxStreak + ' paires !');
  } else {
    detailParts.push(matched + '/' + totalPairs + ' paires trouvées');
  }
  document.getElementById('winDetails').textContent = detailParts.join(' — ');

  // Perfect badge
  const badgeEl = document.getElementById('perfectBadge');
  if (isPerfect) {
    badgeEl.innerHTML = '<div class="perfect-badge perfect-badge-glow">Parfait ! Zero erreurs !</div>';
  } else {
    badgeEl.innerHTML = '';
  }

  // Multi-round handling
  const nextInfo = document.getElementById('nextRoundInfo');
  const btns = document.getElementById('winButtons');

  if (multiRoundActive && won) {
    multiRoundTotalMoves += moves;
    multiRoundErrors += wrongMatches;
    const hasNext = advanceMultiRound();

    if (hasNext) {
      const nextDiff = DIFFICULTIES[multiRoundIndex];
      nextInfo.textContent = 'Prochain: ' + nextDiff.label + ' (' + nextDiff.size + ' cartes)';
      btns.innerHTML =
        '<button class="btn" onclick="continueMultiRound()">Continuer</button>' +
        '<button class="btn secondary" onclick="restartGame()">Rejouer</button>';
    } else {
      // All 4 rounds done!
      nextInfo.textContent = '';
      document.getElementById('winTrophy').textContent = '🏆👑🏆';
      document.getElementById('winTitle').textContent = 'MÉGA TROPHÉE !';
      document.getElementById('winMsg').textContent = currentPlayer + ' a conquis les 4 niveaux !';
      document.getElementById('winDetails').textContent = multiRoundTotalMoves + ' coups au total — ' + multiRoundErrors + ' erreur(s)';
      badgeEl.innerHTML = '<div class="perfect-badge">Multi-Round terminé !</div>';
      btns.innerHTML = '<button class="btn" onclick="restartGame()">Rejouer</button>';
      multiRoundActive = false;
      document.getElementById('roundProgress').style.display = 'none';

      // Extra confetti for mega win
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.textContent = ['🏆','👑','⭐','🎉','💎','✨'][Math.floor(Math.random() * 6)];
          c.style.left = Math.random() * 100 + 'vw';
          c.style.top = '-50px';
          c.style.animationDuration = (2 + Math.random() * 3) + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 6000);
        }, i * 60);
      }
    }
  } else {
    nextInfo.textContent = '';
    btns.innerHTML = '<button class="btn" onclick="restartGame()">Rejouer</button>';
    if (multiRoundActive) {
      multiRoundActive = false;
      document.getElementById('roundProgress').style.display = 'none';
    }
  }

  document.getElementById('winOverlay').classList.add('show');
}

function continueMultiRound() {
  const diff = DIFFICULTIES[multiRoundIndex];
  document.querySelectorAll('#diffBar .pill').forEach((b, i) => b.classList.toggle('active', i === multiRoundIndex));
  startGame(diff.size, null);
}

    multiRoundActive = false;
    document.getElementById('roundProgress').style.display = 'none';
  }

}
