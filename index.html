<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Pop Star Academy — École Saint-Esprit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --pink:#ff6fd8;--purple:#b44dff;--gold:#ffd700;--dark:#1a1028;
  --glass:rgba(255,255,255,0.1);--glass-border:rgba(255,255,255,0.18);
  --card-bg:rgba(255,255,255,0.08);
}

html{scroll-behavior:smooth;}

body{
  background:var(--dark);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(180,77,255,.25) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(255,111,216,.2) 0%,transparent 60%);
  min-height:100vh;
  font-family:'Quicksand',sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* ===== SPARKLE CANVAS ===== */
#sparkleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

/* ===== WELCOME SCREEN ===== */
.welcome{
  position:fixed;inset:0;z-index:900;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0d0b1a 0%,#1a1028 40%,#2a1040 100%);
  transition:opacity .8s,transform .8s;
}
.welcome.exit{opacity:0;transform:scale(1.1);pointer-events:none;}

.welcome-crest{
  width:120px;height:120px;
  border-radius:50%;
  background:linear-gradient(145deg,var(--pink),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:3.5em;
  box-shadow:0 0 60px rgba(180,77,255,.4),0 0 120px rgba(255,111,216,.2);
  animation:crestPulse 3s ease-in-out infinite;
  margin-bottom:20px;
  border:3px solid rgba(255,255,255,.2);
}
@keyframes crestPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(180,77,255,.4),0 0 120px rgba(255,111,216,.2);}
  50%{transform:scale(1.06);box-shadow:0 0 80px rgba(180,77,255,.6),0 0 160px rgba(255,111,216,.3);}
}

.welcome h1{
  font-size:clamp(1.8em,5vw,3.2em);font-weight:700;
  background:linear-gradient(135deg,#fff,var(--pink),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;line-height:1.2;
}
.welcome .school-badge{
  display:inline-block;margin-top:8px;
  padding:6px 24px;border-radius:30px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  font-size:.85em;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.6);
}

.welcome-form{text-align:center;margin-top:30px;}
.welcome-form label{display:block;color:rgba(255,255,255,.7);font-size:1.1em;margin-bottom:10px;}
.welcome-input{
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);
  color:#fff;padding:14px 30px;font-size:1.2em;border-radius:50px;
  font-family:inherit;text-align:center;width:300px;outline:none;
  transition:border-color .3s,box-shadow .3s;
}
.welcome-input:focus{border-color:var(--pink);box-shadow:0 0 30px rgba(255,111,216,.25);}
.welcome-input::placeholder{color:rgba(255,255,255,.25);}

.quick-names{display:flex;gap:10px;justify-content:center;margin:16px 0;}
.quick-btn{
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.2);
  color:#fff;padding:8px 22px;border-radius:25px;font-family:inherit;
  font-size:.95em;cursor:pointer;transition:all .3s;
}
.quick-btn:hover{background:rgba(255,111,216,.2);border-color:var(--pink);transform:scale(1.05);}

.enter-btn{
  background:linear-gradient(145deg,var(--pink),var(--purple));
  color:#fff;border:none;padding:16px 55px;font-size:1.3em;
  border-radius:50px;cursor:pointer;font-family:inherit;font-weight:700;
  box-shadow:0 8px 40px rgba(180,77,255,.35);
  transition:all .3s;margin-top:14px;
}
.enter-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 12px 50px rgba(180,77,255,.5);}
.enter-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none;}

/* ===== DAILY REWARD OVERLAY ===== */
.daily-reward{
  position:fixed;inset:0;z-index:950;
  background:rgba(0,0,0,.7);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
  animation:fadeIn .4s;
}
.daily-reward.show{display:flex;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.reward-card{
  background:linear-gradient(160deg,#2a1040,#1a1028);
  border:2px solid rgba(255,215,0,.3);border-radius:30px;
  padding:40px;text-align:center;max-width:380px;width:90%;
  box-shadow:0 0 80px rgba(255,215,0,.15);
  animation:rewardPop .5s cubic-bezier(.17,.67,.35,1.2);
}
@keyframes rewardPop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.reward-card .reward-emoji{font-size:4em;margin-bottom:10px;display:block;}
.reward-card h2{font-size:1.6em;color:var(--gold);margin-bottom:6px;}
.reward-card p{color:rgba(255,255,255,.7);margin-bottom:20px;line-height:1.5;}
.reward-card .bonus{font-size:2em;font-weight:700;color:var(--gold);margin:10px 0;}
.claim-btn{
  background:linear-gradient(145deg,#ffb700,var(--gold));
  color:#1a1028;border:none;padding:12px 40px;font-size:1.1em;
  border-radius:30px;cursor:pointer;font-family:inherit;font-weight:700;
  transition:transform .2s;
}
.claim-btn:hover{transform:scale(1.05);}

/* ===== MAIN CONTAINER ===== */
.main{display:none;flex-direction:column;align-items:center;width:100%;padding-bottom:40px;}
.main.show{display:flex;animation:mainFadeIn .6s;}
@keyframes mainFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== MUSIC TOGGLE ===== */
.music-toggle{
  position:fixed;top:16px;right:16px;z-index:100;
  width:48px;height:48px;border-radius:50%;
  background:var(--glass);backdrop-filter:blur(10px);
  border:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3em;cursor:pointer;transition:all .3s;
}
.music-toggle:hover{background:rgba(255,255,255,.18);transform:scale(1.1);}
.music-toggle.playing{box-shadow:0 0 20px rgba(180,77,255,.4);}

/* ===== HEADER ===== */
.header{text-align:center;padding:30px 20px 10px;position:relative;z-index:2;}
.header h1{
  font-size:clamp(1.6em,4vw,2.6em);font-weight:700;
  background:linear-gradient(135deg,#fff,var(--pink),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header .school-sub{
  font-size:.8em;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin-top:2px;
}
.greeting{
  font-size:1.3em;color:var(--gold);font-weight:700;margin-top:10px;
  text-shadow:0 0 20px rgba(255,215,0,.3);
}

/* ===== NEWS TICKER ===== */
.ticker-wrap{
  width:100%;max-width:900px;overflow:hidden;
  background:rgba(255,255,255,.05);border-radius:14px;
  margin:12px auto;padding:8px 0;position:relative;z-index:2;
  border:1px solid rgba(255,255,255,.08);
}
.ticker{
  display:flex;white-space:nowrap;
  animation:tickerScroll 40s linear infinite;
}
.ticker span{
  padding:0 40px;font-size:.9em;color:rgba(255,255,255,.7);
  flex-shrink:0;
}
.ticker span::before{content:'🎵 ';font-size:.9em;}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ===== MOT DU JOUR ===== */
.mot-du-jour{
  max-width:600px;width:90%;margin:10px auto;
  background:linear-gradient(135deg,rgba(255,111,216,.1),rgba(180,77,255,.1));
  border:1px solid rgba(255,255,255,.1);border-radius:18px;
  padding:14px 24px;text-align:center;font-size:.95em;
  color:rgba(255,255,255,.8);position:relative;z-index:2;
  font-style:italic;
}
.mot-du-jour::before{content:'"';font-size:2em;color:var(--pink);vertical-align:middle;margin-right:4px;}
.mot-du-jour::after{content:'"';font-size:2em;color:var(--pink);vertical-align:middle;margin-left:4px;}

/* ===== PLAYER PROFILE CARD ===== */
.profile-card{
  max-width:500px;width:90%;margin:16px auto;
  background:var(--card-bg);backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:24px;
  padding:24px;position:relative;z-index:2;overflow:hidden;
}
.profile-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--pink),var(--purple),var(--gold));
}
.profile-top{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.profile-avatar{
  width:70px;height:70px;border-radius:50%;
  background:linear-gradient(145deg,var(--pink),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:2em;flex-shrink:0;
  border:2px solid rgba(255,255,255,.2);
  box-shadow:0 4px 20px rgba(180,77,255,.3);
}
.profile-info{flex:1;}
.profile-info .name{font-size:1.3em;font-weight:700;}
.profile-info .title-rank{font-size:.8em;color:var(--pink);font-weight:600;margin-top:2px;}
.profile-stats{display:flex;gap:20px;flex-wrap:wrap;}
.profile-stat{text-align:center;flex:1;min-width:70px;}
.profile-stat .val{font-size:1.5em;font-weight:700;color:var(--gold);}
.profile-stat .lbl{font-size:.7em;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;}

/* XP BAR */
.xp-bar-wrap{margin-top:14px;}
.xp-label{display:flex;justify-content:space-between;font-size:.75em;color:rgba(255,255,255,.5);margin-bottom:4px;}
.xp-bar{
  height:10px;border-radius:10px;
  background:rgba(255,255,255,.08);overflow:hidden;
}
.xp-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,var(--pink),var(--purple),var(--gold));
  background-size:200% 100%;
  animation:xpShimmer 3s linear infinite;
  transition:width .8s cubic-bezier(.25,.8,.25,1);
}
@keyframes xpShimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* ===== CLASSEMENT ===== */
.classement{
  max-width:500px;width:90%;margin:16px auto;position:relative;z-index:2;
}
.classement h2{font-size:1.2em;text-align:center;margin-bottom:12px;color:rgba(255,255,255,.8);}
.classement-list{display:flex;flex-direction:column;gap:8px;}
.classement-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card-bg);backdrop-filter:blur(8px);
  border:1px solid var(--glass-border);border-radius:16px;
  padding:12px 18px;transition:transform .2s;
}
.classement-row:hover{transform:translateX(4px);}
.classement-row.first{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.06);}
.rank-num{font-size:1.4em;font-weight:700;width:30px;text-align:center;}
.rank-num.gold{color:var(--gold);}
.rank-num.silver{color:#c0c0c0;}
.rank-num.bronze{color:#cd7f32;}
.rank-avatar{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3em;flex-shrink:0;
}
.rank-info{flex:1;}
.rank-info .rname{font-weight:700;font-size:1em;}
.rank-info .rage{font-size:.75em;color:rgba(255,255,255,.45);}
.rank-stars{font-weight:700;color:var(--gold);font-size:1em;}

/* ===== GAMES GRID ===== */
.games-section{max-width:1050px;width:100%;padding:10px 20px;position:relative;z-index:2;}
.games-section h2{text-align:center;font-size:1.3em;margin-bottom:14px;color:rgba(255,255,255,.8);}
.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}

.game-card{
  background:var(--card-bg);backdrop-filter:blur(10px);
  border:1.5px solid var(--glass-border);border-radius:22px;
  padding:22px 16px 18px;text-align:center;
  cursor:pointer;transition:all .35s cubic-bezier(.25,.8,.25,1);
  text-decoration:none;color:#fff;
  position:relative;overflow:hidden;
}
.game-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,111,216,.08),rgba(180,77,255,.08));
  opacity:0;transition:opacity .3s;
}
.game-card:hover::before{opacity:1;}
.game-card:hover{
  transform:translateY(-8px) scale(1.02);
  border-color:rgba(255,111,216,.3);
  box-shadow:0 20px 50px rgba(0,0,0,.3),0 0 40px rgba(180,77,255,.15);
}
.game-card:hover .game-icon{transform:scale(1.2) rotate(-5deg);}

.new-badge{
  position:absolute;top:10px;right:10px;
  background:linear-gradient(135deg,#ff3b5c,#ff6b3b);
  color:#fff;font-size:.65em;font-weight:700;
  padding:3px 10px;border-radius:10px;
  animation:badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.game-icon{font-size:2.8em;display:block;margin-bottom:8px;transition:transform .35s;}
.game-title{font-size:1.15em;font-weight:700;margin-bottom:4px;}
.game-desc{font-size:.78em;color:rgba(255,255,255,.6);line-height:1.3;margin-bottom:8px;}

.game-meta{display:flex;justify-content:center;gap:12px;align-items:center;margin-bottom:6px;}
.difficulty{font-size:.75em;color:var(--gold);}
.est-time{font-size:.7em;color:rgba(255,255,255,.4);}

.game-badge{
  display:inline-block;background:rgba(255,255,255,.1);
  padding:3px 14px;border-radius:12px;
  font-size:.72em;font-weight:600;color:rgba(255,255,255,.7);
}
.game-highscore{font-size:.75em;color:var(--gold);margin-top:6px;font-weight:600;}

/* ===== TROPHIES ===== */
.trophies-section{
  max-width:700px;width:90%;margin:24px auto;position:relative;z-index:2;
}
.trophies-section h2{text-align:center;font-size:1.2em;margin-bottom:14px;color:rgba(255,255,255,.8);}
.trophies-grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

.trophy{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.7em;transition:all .3s;position:relative;cursor:default;
}
.trophy.locked{
  background:rgba(255,255,255,.04);
  border:2px dashed rgba(255,255,255,.12);
  filter:grayscale(1);opacity:.35;
}
.trophy.unlocked{
  background:rgba(255,215,0,.12);
  border:2px solid rgba(255,215,0,.35);
  animation:trophyGlow 2.5s ease-in-out infinite;
}
@keyframes trophyGlow{
  0%,100%{box-shadow:0 0 8px rgba(255,215,0,.2)}
  50%{box-shadow:0 0 24px rgba(255,215,0,.45)}
}
.trophy-tip{
  position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.85);color:#fff;font-size:.45em;
  padding:4px 12px;border-radius:8px;white-space:nowrap;
  opacity:0;transition:opacity .25s;pointer-events:none;
}
.trophy:hover .trophy-tip{opacity:1;}

/* ===== FOOTER ===== */
.footer{
  text-align:center;padding:30px 20px;
  color:rgba(255,255,255,.3);font-size:.8em;
  position:relative;z-index:2;
}

/* ===== CONFETTI ===== */
.confetti-piece{
  position:fixed;width:8px;height:8px;z-index:999;
  pointer-events:none;border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg);}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg);}
}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  .games-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .game-icon{font-size:2.2em;}
  .game-title{font-size:1em;}
  .game-desc{font-size:.72em;}
  .profile-top{flex-direction:column;text-align:center;}
  .profile-stats{justify-content:center;}
  .welcome-input{width:260px;}
  .welcome-crest{width:90px;height:90px;font-size:2.5em;}
  .classement-row{padding:10px 14px;}
  .music-toggle{top:10px;right:10px;width:40px;height:40px;font-size:1.1em;}
}
@media(max-width:400px){
  .games-grid{grid-template-columns:1fr;gap:10px;}
  .quick-names{flex-wrap:wrap;}
}
</style>
</head>
<body>

<canvas id="sparkleCanvas"></canvas>

<!-- ===== DAILY REWARD ===== -->
<div class="daily-reward" id="dailyReward">
  <div class="reward-card">
    <span class="reward-emoji">🎁</span>
    <h2>Bonus du jour !</h2>
    <p>Tu es revenue aujourd'hui, bravo !</p>
    <div class="bonus" id="rewardAmount">+10 ⭐</div>
    <button class="claim-btn" onclick="claimDailyReward()">Merci !</button>
  </div>
</div>

<!-- ===== WELCOME ===== -->
<div class="welcome" id="welcome">
  <div class="welcome-crest">🎤</div>
  <h1>K-Pop Star Academy</h1>
  <div class="school-badge">École Saint-Esprit</div>

  <div class="welcome-form">
    <label>Comment tu t'appelles ?</label>
    <input type="text" class="welcome-input" id="nameInput" placeholder="Ton prénom..." maxlength="20" autocomplete="off">
    <div class="quick-names">
      <button class="quick-btn" onclick="pickName('Ambre')">Ambre</button>
      <button class="quick-btn" onclick="pickName('Eden')">Eden</button>
      <button class="quick-btn" onclick="pickName('Louise')">Louise</button>
    </div>
    <button class="enter-btn" id="enterBtn" disabled onclick="enterApp()">C'est parti !</button>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main" id="main">

  <!-- Music toggle -->
  <div class="music-toggle" id="musicToggle" onclick="toggleMusic()" title="Musique">🎵</div>

  <!-- Header -->
  <div class="header">
    <h1>K-Pop Star Academy</h1>
    <div class="school-sub">École Saint-Esprit</div>
    <div class="greeting" id="greeting"></div>
  </div>

  <!-- News ticker -->
  <div class="ticker-wrap">
    <div class="ticker" id="ticker"></div>
  </div>

  <!-- Mot du jour -->
  <div class="mot-du-jour" id="motDuJour"></div>

  <!-- Profile card -->
  <div class="profile-card" id="profileCard">
    <div class="profile-top">
      <div class="profile-avatar" id="profileEmoji">💜</div>
      <div class="profile-info">
        <div class="name" id="profileName"></div>
        <div class="title-rank" id="profileTitle"></div>
      </div>
    </div>
    <div class="profile-stats">
      <div class="profile-stat"><div class="val" id="pStars">0</div><div class="lbl">Étoiles</div></div>
      <div class="profile-stat"><div class="val" id="pLevel">1</div><div class="lbl">Niveau</div></div>
      <div class="profile-stat"><div class="val" id="pTrophies">0</div><div class="lbl">Trophées</div></div>
    </div>
    <div class="xp-bar-wrap">
      <div class="xp-label"><span id="xpText">0 / 100 XP</span><span id="xpLevelText">Niveau 1</span></div>
      <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Classement -->
  <div class="classement">
    <h2>🏆 Classement</h2>
    <div class="classement-list" id="classementList"></div>
  </div>

  <!-- Games -->
  <div class="games-section">
    <h2>🎮 Mes Jeux</h2>
    <div class="games-grid" id="gamesGrid"></div>
  </div>

  <!-- Trophies -->
  <div class="trophies-section">
    <h2>🏅 Mes Trophées</h2>
    <div class="trophies-grid" id="trophiesGrid"></div>
  </div>

  <div class="footer">Fait avec amour par Papa — École Saint-Esprit</div>
</div>

<script>
/* ===== DATA ===== */
const PLAYERS = [
  {name:'Ambre', age:6, emoji:'💜', color:'linear-gradient(145deg,#ff9a9e,#fecfef)'},
  {name:'Eden', age:6, emoji:'💖', color:'linear-gradient(145deg,#a18cd1,#cdb4f0)'},
  {name:'Louise', age:10, emoji:'⭐', color:'linear-gradient(145deg,#fbc2eb,#f6a5c1)'},
];

const GAMES = [
  {file:'avatar.html',icon:'👸',title:'Crée ton Idol',desc:'Crée ta K-Pop star avec cheveux, tenue et accessoires !',badge:'Création',difficulty:1,time:'5 min',isNew:false},
  {file:'carte.html',icon:'💳',title:'Ma Carte K-Pop',desc:'Ta carte de star personnalisée à montrer aux copines !',badge:'Perso',difficulty:1,time:'3 min',isNew:false},

/* ===== WELCOME ===== */
const nameInput = document.getElementById('nameInput');

nameInput.addEventListener('input',()=>{enterBtn.disabled=!nameInput.value.trim();});
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&nameInput.value.trim())enterApp();});

function pickName(n){nameInput.value=n;enterBtn.disabled=false;nameInput.focus();}

function enterApp(){
  playerName=nameInput.value.trim();
  if(!playerName)return;
  localStorage.setItem('kpop_player',playerName);

  let visitors=JSON.parse(localStorage.getItem('kpop_visitors')||'[]');
  if(!visitors.includes(playerName)){visitors.push(playerName);localStorage.setItem('kpop_visitors',JSON.stringify(visitors));}

  document.getElementById('welcome').classList.add('exit');
  setTimeout(()=>{
    document.getElementById('main').classList.add('show');
    initMain();
    checkDailyReward();
  },400);
}

/* ===== DAILY REWARD ===== */
function checkDailyReward(){
  const key='kpop_daily_'+playerName;
  const last=localStorage.getItem(key);
  const today=new Date().toDateString();
  if(last===today)return;
  // Show reward
  const streak=parseInt(localStorage.getItem('kpop_streak_'+playerName)||'0')+1;
  localStorage.setItem('kpop_streak_'+playerName,streak);
  const bonus=10+Math.min(streak*5,40); // 10 to 50
  document.getElementById('rewardAmount').textContent='+'+bonus+' ⭐';
  document.getElementById('dailyReward').classList.add('show');
  window._dailyBonus=bonus;
  window._dailyKey=key;
  window._dailyToday=today;
}
function claimDailyReward(){
  const bonus=window._dailyBonus||10;
  const stars=parseInt(localStorage.getItem('kpop_stars_'+playerName)||'0')+bonus;
  localStorage.setItem('kpop_stars_'+playerName,stars);
  localStorage.setItem(window._dailyKey,window._dailyToday);
  document.getElementById('dailyReward').classList.remove('show');
  launchConfetti();
  initMain(); // refresh stats
}

function getRankTitle(stars){
  let title='Trainee';
  for(const[threshold,t]of RANK_TITLES){if(stars>=threshold)title=t;}

}

/* ===== MUSIC (Web Audio API) ===== */
function toggleMusic(){
  const btn=document.getElementById('musicToggle');
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(musicPlaying){
    stopMusic();
    btn.textContent='🔇';
    btn.classList.remove('playing');
  }else{
    startMusic();
    btn.textContent='🎵';
    btn.classList.add('playing');
  }
  musicPlaying=!musicPlaying;
}

function startMusic(){
  // Simple cute melody loop using Web Audio API
  const notes=[523.25,587.33,659.25,698.46,783.99,659.25,587.33,523.25]; // C5 D5 E5 F5 G5 E5 D5 C5
  let i=0;
  function playNote(){
    if(!musicPlaying&&i>0)return;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(notes[i%notes.length],audioCtx.currentTime);
    gain.gain.setValueAtTime(0.08,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime+0.45);
    i++;
  }
  playNote();
  musicInterval=setInterval(playNote,500);
}

function stopMusic(){
  if(musicInterval){clearInterval(musicInterval);musicInterval=null;}
}

/* ===== SPARKLE CANVAS ===== */
(function(){
  const canvas=document.getElementById('sparkleCanvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  const particles=[];
  const COLORS=['rgba(255,111,216,','rgba(180,77,255,','rgba(255,215,0,','rgba(255,255,255,'];

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  function Particle(){
    this.x=Math.random()*W;
    this.y=Math.random()*H;
    this.r=Math.random()*2.5+0.5;
    this.dx=(Math.random()-0.5)*0.4;
    this.dy=-Math.random()*0.6-0.1;
    this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
    this.alpha=Math.random()*0.5+0.2;
    this.phase=Math.random()*Math.PI*2;
  }

  for(let i=0;i<60;i++)particles.push(new Particle());

  // React to scroll
  let scrollBoost=0;
  window.addEventListener('scroll',()=>{scrollBoost=3;});

  function draw(){
    ctx.clearRect(0,0,W,H);
    scrollBoost*=0.95;
    particles.forEach(p=>{
      p.x+=p.dx;
      p.y+=p.dy-scrollBoost*0.3;
      p.phase+=0.02;
      const flicker=0.5+0.5*Math.sin(p.phase);
      const a=p.alpha*flicker;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color+a+')';
      ctx.fill();
      if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
      if(p.x<-10)p.x=W+10;
      if(p.x>W+10)p.x=-10;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
