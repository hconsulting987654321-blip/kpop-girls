<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke Star - K-Pop Games</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  min-height: 100vh;
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
}

.back-btn {
  position: fixed; top: 15px; left: 15px;
  background: rgba(255,255,255,0.15);
  color: white; border: 2px solid rgba(255,255,255,0.3);
  padding: 8px 18px; border-radius: 30px;
  font-family: inherit; font-size: 1em;
  cursor: pointer; text-decoration: none; z-index: 100;
  transition: all 0.3s;
}
.back-btn:hover { background: rgba(255,255,255,0.3); }

.header { text-align: center; padding: 15px; z-index: 10; }
.header h1 { font-size: 1.8em; color: white; text-shadow: 0 0 20px #ff6fd8; }
.header .sub { color: #cd77ff; font-size: 0.9em; margin-top: 4px; }

.score-bar {
  display: flex; gap: 25px; justify-content: center;
  color: white; font-size: 1.1em; padding: 8px; z-index: 10;
}
.score-bar span { text-shadow: 0 0 10px rgba(255,255,255,0.5); }
#combo { color: #ffd700; }
#score-val { color: #ff6fd8; }

/* Screens */
.screen { display: none; flex-direction: column; align-items: center; z-index: 10; }
.screen.active { display: flex; }

/* Song select */
.song-select { padding: 20px; width: 100%; max-width: 500px; }
.song-card {
  background: linear-gradient(135deg, rgba(255,111,216,0.2), rgba(161,140,209,0.2));
  border: 2px solid rgba(255,111,216,0.4); border-radius: 16px;
  padding: 14px 18px; margin: 8px 0; cursor: pointer;
  color: white; transition: all 0.3s;
}
.song-card:hover, .song-card:active {
  background: linear-gradient(135deg, rgba(255,111,216,0.4), rgba(161,140,209,0.4));
  transform: scale(1.03); border-color: #ff6fd8;
}
.song-card .title { font-size: 1.15em; font-weight: 700; }
.song-card .info { font-size: 0.85em; color: #cd77ff; margin-top: 3px; }

/* Lyrics area */
.lyrics-zone {
  width: 100%; max-width: 600px; text-align: center;
  padding: 20px; min-height: 200px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px;
}
.lyric-line {
  color: rgba(255,255,255,0.3); font-size: 1.3em; font-weight: 600;
  transition: all 0.4s; line-height: 1.5;
}
.lyric-line.active {
  color: white; font-size: 1.7em;
  text-shadow: 0 0 20px #ff6fd8, 0 0 40px #cd77ff;
  animation: pulse 0.6s ease infinite alternate;
}
.lyric-line.done { color: rgba(161,140,209,0.5); font-size: 1.1em; }

@keyframes pulse { to { text-shadow: 0 0 30px #ff6fd8, 0 0 60px #cd77ff; } }

/* Sing button */
.sing-btn {
  width: 140px; height: 140px; border-radius: 50%;
  background: linear-gradient(135deg, #ff6fd8, #cd77ff);
  border: 4px solid rgba(255,255,255,0.5);
  color: white; font-size: 2.5em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s; margin: 20px 0;
  box-shadow: 0 0 30px rgba(255,111,216,0.5);
  -webkit-tap-highlight-color: transparent;
}
.sing-btn:active { transform: scale(0.9); }
.sing-btn.glow {
  box-shadow: 0 0 50px rgba(255,111,216,0.8), 0 0 80px rgba(205,119,255,0.5);
}

/* Progress bar */
.progress-wrap {
  width: 80%; max-width: 400px; height: 8px;
  background: rgba(255,255,255,0.15); border-radius: 10px;
  overflow: hidden; margin: 10px 0;
}
.progress-fill {
  height: 100%; width: 0%; border-radius: 10px;
  background: linear-gradient(90deg, #ff6fd8, #cd77ff, #a18cd1);
  transition: width 0.3s;
}

/* Floating notes */
.float-note {
  position: fixed; font-size: 2em; pointer-events: none; z-index: 50;
  animation: floatUp 1.2s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-120px) scale(1.5) rotate(20deg); }
}

/* Combo flash */
.combo-flash {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 2.5em; font-weight: 700; color: #ffd700;
  text-shadow: 0 0 20px #ffd700; pointer-events: none; z-index: 50;
  animation: comboIn 0.8s ease-out forwards;
}
@keyframes comboIn {
  0% { opacity: 1; transform: translate(-50%,-50%) scale(0.5); }
  50% { transform: translate(-50%,-50%) scale(1.3); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
}

/* End screen */
.end-box {
  background: linear-gradient(135deg, rgba(255,111,216,0.2), rgba(161,140,209,0.2));
  border: 2px solid rgba(255,111,216,0.4); border-radius: 20px;
  padding: 30px; text-align: center; color: white; max-width: 400px;
}
.end-box h2 { font-size: 1.8em; margin-bottom: 10px; text-shadow: 0 0 15px #ff6fd8; }
.end-stars { font-size: 2.5em; margin: 15px 0; }
.end-msg { font-size: 1.1em; color: #cd77ff; margin: 10px 0; }
.end-score { font-size: 1.5em; color: #ff6fd8; font-weight: 700; }

.btn {
  background: linear-gradient(135deg, #ff6fd8, #cd77ff);
  color: white; border: none; padding: 12px 30px;
  border-radius: 30px; font-family: inherit; font-size: 1.05em;
  font-weight: 600; cursor: pointer; margin: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,111,216,0.5); }

/* Confetti */
.confetti {
  position: fixed; top: -10px; width: 10px; height: 10px;
  pointer-events: none; z-index: 60; border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(105vh) rotate(720deg); }
}

/* Countdown */
.countdown {
  font-size: 4em; color: white; font-weight: 700;
  text-shadow: 0 0 30px #ff6fd8;
  animation: countPop 0.8s ease-out;
}
@keyframes countPop {
  0% { transform: scale(2); opacity: 0; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); }
}

@media (max-width: 500px) {
  .header h1 { font-size: 1.4em; }
  .lyric-line { font-size: 1.1em; }
  .lyric-line.active { font-size: 1.4em; }
  .sing-btn { width: 110px; height: 110px; font-size: 2em; }
}
</style>
</head>
<body>
<a href="index.html" class="back-btn">← Retour</a>

<div class="header">
  <h1>🎤 Karaoke Star 🎤</h1>
  <div class="sub">Chante avec <span id="player-name">Star</span> !</div>
</div>

<!-- Song Select Screen -->
<div id="selectScreen" class="screen active">
  <div class="song-select" id="songList"></div>
</div>

<!-- Game Screen -->
<div id="gameScreen" class="screen">
  <div class="score-bar">
    <span>Score : <span id="score-val">0</span></span>
    <span id="combo"></span>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
  <div class="lyrics-zone" id="lyricsZone"></div>
  <button class="sing-btn" id="singBtn">🎤</button>
</div>

<!-- End Screen -->
<div id="endScreen" class="screen">
  <div class="end-box">
    <h2 id="endTitle">Bravo !</h2>
    <div class="end-stars" id="endStars"></div>
    <div class="end-score">Score : <span id="endScore">0</span></div>
    <div class="end-msg" id="endMsg"></div>
    <button class="btn" onclick="showSelect()">Autre chanson</button>
    <button class="btn" onclick="replaySong()">Rejouer</button>
  </div>
</div>

<script>
const player = new URLSearchParams(window.location.search).get('player')
  || localStorage.getItem('kpop_player') || 'Star';
document.getElementById('player-name').textContent = player;

const noteEmojis = ['🎵','🎶','💖','✨','🌟','💜','🎀','💫','🦋','💗'];
const songs = [
  { title: "Danse Avec Moi", icon: "💃", bpm: 110, info: "Pop dance ~ facile",
    lyrics: [
      { t: 0, text: "Danse avec moi ce soir" },
      { t: 3, text: "Sous les lumieres on brille" },
      { t: 6, text: "Tourne et saute en rythme" },
      { t: 9, text: "On est des stars qui scintillent" },
      { t: 12, text: "La musique nous emporte" },
      { t: 15, text: "Nos coeurs battent ensemble" },
      { t: 18, text: "Danse danse encore" },
      { t: 21, text: "Ce moment nous ressemble" },
      { t: 24, text: "Un deux trois on tourne !" },
      { t: 27, text: "La scene est a nous !" }
    ]},
  { title: "Meilleures Amies", icon: "💕", bpm: 100, info: "Ballade amitie ~ facile",
    lyrics: [
      { t: 0, text: "Toi et moi pour toujours" },
      { t: 3, text: "Meilleures amies chaque jour" },
      { t: 6, text: "On partage nos secrets" },
      { t: 9, text: "Et nos reves les plus vrais" },
      { t: 12, text: "Ensemble on est fortes" },
      { t: 15, text: "Rien ne nous arrete" },
      { t: 18, text: "Main dans la main on avance" },
      { t: 21, text: "Avec toi tout est une chance" },
      { t: 24, text: "Amies pour la vie !" },
      { t: 27, text: "Je t aime mon amie !" }
    ]},
  { title: "Etoile Magique", icon: "⭐", bpm: 120, info: "Energique ~ moyen",
    lyrics: [
      { t: 0, text: "Je suis une etoile magique" },
      { t: 2.5, text: "Qui brille dans la nuit" },
      { t: 5, text: "Mon pouvoir est fantastique" },
      { t: 7.5, text: "La scene est mon paradis" },
      { t: 10, text: "Spotlight sur moi" },
      { t: 12.5, text: "Je chante de toute ma voix" },
      { t: 15, text: "Les fans crient mon nom" },
      { t: 17.5, text: "C est ma plus belle chanson" },
      { t: 20, text: "Etoile etoile brille" },
      { t: 22.5, text: "Mille feux mille scintilles" },
      { t: 25, text: "Ce soir on est magiques !" }
    ]},
  { title: "K-Pop Princess", icon: "👑", bpm: 115, info: "K-Pop style ~ moyen",
    lyrics: [
      { t: 0, text: "K-Pop princess c est moi" },
      { t: 2.5, text: "Sur scene je suis la reine" },
      { t: 5, text: "Chaque pas est une joie" },
      { t: 7.5, text: "La danse coule dans mes veines" },
      { t: 10, text: "Aegyo power activate !" },
      { t: 12.5, text: "Mon coeur fait boum boum" },
      { t: 15, text: "Les lightsticks illuminent" },
      { t: 17.5, text: "Toute la salle s enflamme" },
      { t: 20, text: "Saranghae les fans !" },
      { t: 22.5, text: "Fighting on y va !" },
      { t: 25, text: "K-Pop forever yeah !" }
    ]},
  { title: "Arc-en-ciel Dream", icon: "🌈", bpm: 95, info: "Doux et magique ~ facile",
    lyrics: [
      { t: 0, text: "Dans un monde de couleurs" },
      { t: 3.5, text: "Ou tout est doux et beau" },
      { t: 7, text: "Je chante avec mon coeur" },
      { t: 10.5, text: "Des mots comme des cadeaux" },
      { t: 14, text: "Rose violet et bleu" },
      { t: 17.5, text: "L arc-en-ciel est en feu" },
      { t: 21, text: "Reve avec moi ce soir" },
      { t: 24.5, text: "Tout est possible a croire" },
      { t: 28, text: "Dream dream dream !" }
    ]}
];

let currentSong = null, score = 0, combo = 0, maxCombo = 0;
let gameTimer = null, startTime = 0, taps = 0, gameRunning = false;
let audioCtx = null;

// Build song list
const songList = document.getElementById('songList');
songs.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'song-card';
  card.innerHTML = `<div class="title">${s.icon} ${s.title}</div><div class="info">${s.info}</div>`;
  card.onclick = () => startSong(i);
  songList.appendChild(card);
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showSelect() { showScreen('selectScreen'); }

function replaySong() {
  if (currentSong !== null) startSong(currentSong);
}

function startSong(idx) {
  currentSong = idx;
  const song = songs[idx];
  score = 0; combo = 0; maxCombo = 0; taps = 0;
  document.getElementById('score-val').textContent = '0';
  document.getElementById('combo').textContent = '';
  document.getElementById('progressFill').style.width = '0%';

  showScreen('gameScreen');
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Build lyrics
  const zone = document.getElementById('lyricsZone');
  zone.innerHTML = '<div class="countdown" id="cdText">3</div>';

  // Countdown
  let cd = 3;
  const cdEl = document.getElementById('cdText');
  const cdInterval = setInterval(() => {
    cd--;
    if (cd > 0) {
      cdEl.textContent = cd;
      cdEl.style.animation = 'none';
      void cdEl.offsetWidth;
      cdEl.style.animation = 'countPop 0.8s ease-out';
      playNote(440 + cd * 100, 0.15);
    } else if (cd === 0) {
      cdEl.textContent = '🎤';
      cdEl.style.animation = 'none';
      void cdEl.offsetWidth;
      cdEl.style.animation = 'countPop 0.8s ease-out';
      playNote(880, 0.25);
    } else {
      clearInterval(cdInterval);
      beginSong(song);
    }
  }, 800);
}

function beginSong(song) {
  const zone = document.getElementById('lyricsZone');
  zone.innerHTML = '';
  gameRunning = true;

  // Create lyric elements
  const lines = song.lyrics.map((l, i) => {
    const el = document.createElement('div');
    el.className = 'lyric-line';
    el.textContent = l.text;
    zone.appendChild(el);
    return { el, time: l.t, done: false };
  });

  const lastTime = song.lyrics[song.lyrics.length - 1].t;
  const totalDuration = lastTime + 4;
  startTime = Date.now();
  let currentLine = -1;

  gameTimer = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const progress = Math.min(100, (elapsed / totalDuration) * 100);
    document.getElementById('progressFill').style.width = progress + '%';

    // Update active line
    let newLine = -1;
    for (let i = lines.length - 1; i >= 0; i--) {
      if (elapsed >= lines[i].time) { newLine = i; break; }
    }

    if (newLine !== currentLine) {
      if (currentLine >= 0) {
        lines[currentLine].el.classList.remove('active');
        lines[currentLine].el.classList.add('done');
      }
      currentLine = newLine;
      if (currentLine >= 0) {
        lines[currentLine].el.classList.add('active');
        lines[currentLine].el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // Glow sing button when lyrics active
    const btn = document.getElementById('singBtn');
    btn.classList.toggle('glow', currentLine >= 0 && elapsed < lastTime + 2);

    if (elapsed >= totalDuration) {
      clearInterval(gameTimer);
      gameRunning = false;
      setTimeout(endSong, 500);
    }
  }, 50);
}

// Sing button
const singBtn = document.getElementById('singBtn');
function onSing(e) {
  e.preventDefault();
  if (!gameRunning) return;
  taps++;

  // Score: more points if lyrics are active
  const elapsed = (Date.now() - startTime) / 1000;
  const song = songs[currentSong];
  let onBeat = false;
  for (const l of song.lyrics) {
    if (Math.abs(elapsed - l.t) < 1.5) { onBeat = true; break; }
  }

  if (onBeat) {
    score += 15 + combo * 2;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
  } else {
    score += 5;
    // Don't break combo for kids - very forgiving!
  }

  document.getElementById('score-val').textContent = score;

  // Combo display
  if (combo >= 3) {
    document.getElementById('combo').textContent = 'Combo x' + combo + ' 🔥';
  }
  if (combo > 0 && combo % 10 === 0) showComboFlash(combo);

  // Floating note emoji
  spawnFloatNote(e);

  // Play a melodic note
  const notes = [262, 294, 330, 349, 392, 440, 494, 523];
  playNote(notes[taps % notes.length], 0.15);

  // Button feedback
  singBtn.style.transform = 'scale(0.85)';
  setTimeout(() => singBtn.style.transform = '', 100);
}

singBtn.addEventListener('mousedown', onSing);
singBtn.addEventListener('touchstart', onSing, { passive: false });

// Also allow spacebar and any key
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (!gameRunning) return;
    onSing(e);
  }
});

function spawnFloatNote(e) {
  const el = document.createElement('div');
  el.className = 'float-note';
  el.textContent = noteEmojis[Math.floor(Math.random() * noteEmojis.length)];
  const x = (e.clientX || e.touches?.[0]?.clientX || window.innerWidth / 2) + (Math.random() - 0.5) * 80;
  const y = (e.clientY || e.touches?.[0]?.clientY || window.innerHeight * 0.7) - 20;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function showComboFlash(n) {
  const el = document.createElement('div');
  el.className = 'combo-flash';
  el.textContent = 'COMBO x' + n + ' !';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function playNote(freq, dur) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function endSong() {
  const song = songs[currentSong];
  const maxScore = song.lyrics.length * 15 * 3;
  const ratio = Math.min(1, score / Math.max(1, maxScore));

  let stars, msg, title;
  if (ratio >= 0.8) {
    stars = '⭐⭐⭐⭐⭐';
    msg = 'Tu es une VRAIE K-Pop Star ! Incroyable !';
    title = 'PARFAIT !';
    launchConfetti();
  } else if (ratio >= 0.5) {
    stars = '⭐⭐⭐⭐';
    msg = 'Super performance ' + player + ' ! Tu chantes trop bien !';
    title = 'Super !';
    launchConfetti();
  } else if (ratio >= 0.3) {
    stars = '⭐⭐⭐';
    msg = 'Tres bien ! Continue comme ca !';
    title = 'Bravo !';
  } else if (ratio >= 0.15) {
    stars = '⭐⭐';
    msg = 'Bon debut ! Essaie de taper plus vite !';
    title = 'Bien !';
  } else {
    stars = '⭐';
    msg = 'N hesite pas a taper le micro ! Tu vas y arriver !';
    title = 'Continue !';
  }

  document.getElementById('endTitle').textContent = title;
  document.getElementById('endStars').textContent = stars;
  document.getElementById('endScore').textContent = score;
  document.getElementById('endMsg').textContent = msg;
  showScreen('endScreen');
}

function launchConfetti() {
  const colors = ['#ff6fd8','#cd77ff','#a18cd1','#ffd700','#ff9a9e','#84fab0','#fff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.animationDuration = (2 + Math.random() * 2) + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// Background sparkles
function createSparkle() {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;pointer-events:none;z-index:0;font-size:${10+Math.random()*14}px;
    left:${Math.random()*100}vw;top:${Math.random()*100}vh;opacity:0;
    animation:sparkleGlow ${2+Math.random()*3}s ease-in-out infinite;`;
  el.textContent = ['✨','💫','🌟','⭐'][Math.floor(Math.random()*4)];
  document.body.appendChild(el);
}
const style = document.createElement('style');
style.textContent = `@keyframes sparkleGlow {
  0%,100% { opacity:0; transform:scale(0.5); }
  50% { opacity:0.6; transform:scale(1.2); }
}`;
document.head.appendChild(style);
for (let i = 0; i < 12; i++) createSparkle();
</script>
</body>
</html>
