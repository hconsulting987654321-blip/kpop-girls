<style>

body {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite, pageEnter 0.6s ease-out;
  min-height: 100vh;
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
}

/* Star field canvas */
#starField {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* Animated stage background */
.stage-bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  pointer-events: none;
}
.stage-light {
  position: absolute; width: 200px; height: 600px;
  opacity: 0.08; filter: blur(40px); border-radius: 50%;
}
.stage-light:nth-child(1) {
  background: #ff6fd8; left: 10%; top: -100px;
  animation: lightSway 4s ease-in-out infinite alternate;
}
.stage-light:nth-child(2) {
  background: #cd77ff; left: 40%; top: -100px;
  animation: lightSway 5s ease-in-out infinite alternate-reverse;
}
.stage-light:nth-child(3) {
  background: #84fab0; right: 10%; top: -100px;
  animation: lightSway 3.5s ease-in-out infinite alternate;
}
.stage-light:nth-child(4) {
  background: #ffd700; right: 35%; top: -100px;
  animation: lightSway 4.5s ease-in-out infinite alternate-reverse;
}

/* Lens flare on stage lights */
.lens-flare {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  animation: lensFlareGlow 3s ease-in-out infinite;
}
.lens-flare:nth-child(5) {
  background: radial-gradient(circle, rgba(255,111,216,0.6) 0%, rgba(255,111,216,0) 70%);
  left: 14%; top: 30px;
  animation-delay: 0s;
}
.lens-flare:nth-child(6) {
  background: radial-gradient(circle, rgba(205,119,255,0.5) 0%, rgba(205,119,255,0) 70%);
  left: 44%; top: 25px;
  animation-delay: 1s;
}
.lens-flare:nth-child(7) {
  background: radial-gradient(circle, rgba(132,250,176,0.5) 0%, rgba(132,250,176,0) 70%);
  right: 14%; top: 35px;
  animation-delay: 0.5s;
}
.lens-flare:nth-child(8) {
  background: radial-gradient(circle, rgba(255,215,0,0.5) 0%, rgba(255,215,0,0) 70%);
  right: 39%; top: 28px;
  animation-delay: 1.5s;
}
@keyframes lensFlareGlow {
  0%, 100% { opacity: 0.15; transform: scale(0.8); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

@keyframes lightSway {
  0% { transform: rotate(-15deg) translateX(-30px); opacity: 0.06; }
  100% { transform: rotate(15deg) translateX(30px); opacity: 0.12; }
}

/* Combo stage flash */
.stage-flash {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: white; opacity: 0;
  transition: opacity 0.05s;
}
.stage-flash.active {
  opacity: 0.3;
}

/* Screen edge glow */
.edge-glow {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  box-shadow: inset 0 0 80px rgba(255,111,216,0.0);
  transition: box-shadow 0.15s;
}
.edge-glow.pulse {
  box-shadow: inset 0 0 80px rgba(255,111,216,0.25), inset 0 0 120px rgba(205,119,255,0.15);
}

/* Edge ripple on tap */
.edge-ripple {
  position: fixed; pointer-events: none; z-index: 2;
  border: 3px solid rgba(255,111,216,0.5);
  border-radius: 50%;
  animation: edgeRippleExpand 0.6s ease-out forwards;
}
@keyframes edgeRippleExpand {
  0% { width: 20px; height: 20px; opacity: 0.8; }
  100% { width: 300px; height: 300px; opacity: 0; }
}

/* Spotlight cone behind singer */
.spotlight-cone {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 250px solid rgba(255,215,0,0.04);
  z-index: 1; pointer-events: none;
  filter: blur(20px);
  animation: spotlightPulse 3s ease-in-out infinite;
}
@keyframes spotlightPulse {
  0%, 100% { opacity: 0.5; border-bottom-color: rgba(255,215,0,0.04); }
  50% { opacity: 1; border-bottom-color: rgba(255,215,0,0.08); }
}

/* Singer silhouette */
.singer-silhouette {
  position: fixed; bottom: -10px; left: 50%; transform: translateX(-50%);
  z-index: 2; pointer-events: none; font-size: 120px;
  opacity: 0.12; filter: blur(1px);
  animation: singerBob 2s ease-in-out infinite;
}
@keyframes singerBob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-8px); }
}

/* Disco ball overlay */
.disco-overlay {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  opacity: 0; transition: opacity 0.5s;
  background: conic-gradient(
    from 0deg,
    rgba(255,111,216,0.05) 0deg,
    rgba(132,250,176,0.05) 60deg,
    rgba(205,119,255,0.05) 120deg,
    rgba(255,215,0,0.05) 180deg,
    rgba(255,111,216,0.05) 240deg,
    rgba(132,250,176,0.05) 300deg,
    rgba(205,119,255,0.05) 360deg
  );
  background-size: 100% 100%;
  animation: discoSpin 4s linear infinite;
}
.disco-overlay.active { opacity: 1; }
@keyframes discoSpin {
  0% { transform: rotate(0deg) scale(2); }
  100% { transform: rotate(360deg) scale(2); }
}

/* Screen shake */
@keyframes screenShake {
  0%, 100% { transform: translate(0,0); }
  10% { transform: translate(-3px, 2px); }
  20% { transform: translate(3px, -2px); }
  30% { transform: translate(-2px, 3px); }
  40% { transform: translate(2px, -1px); }
  50% { transform: translate(-1px, 2px); }
  60% { transform: translate(3px, 1px); }
  70% { transform: translate(-2px, -2px); }
  80% { transform: translate(1px, 3px); }
  90% { transform: translate(-3px, -1px); }
}
body.shaking {
  animation: screenShake 0.3s ease;
}


.header { text-align: center; padding: 15px; z-index: 10; }
.header h1 { font-size: 1.8em; color: white; text-shadow: 0 0 20px #ff6fd8; }
.header .sub { color: #cd77ff; font-size: 0.9em; margin-top: 4px; }

.score-bar {
  display: flex; gap: 25px; justify-content: center;
  color: white; font-size: 1.1em; padding: 8px; z-index: 10;
}
.score-bar span { text-shadow: 0 0 10px rgba(255,255,255,0.5); }
#combo { color: #ffd700; }
#score-val { color: #ff6fd8; }

/* Player indicator in game */
.player-indicator {
  color: #84fab0; font-size: 0.95em; font-weight: 700;
  text-shadow: 0 0 10px rgba(132,250,176,0.5);
  min-height: 24px; z-index: 10;
}

/* Screens */
.screen { display: none; flex-direction: column; align-items: center; z-index: 10; width: 100%; }
.screen.active { display: flex; }

/* Player Select */
.player-select { padding: 20px; width: 100%; max-width: 420px; }
.player-select h2 { color: white; text-align: center; margin-bottom: 16px; font-size: 1.3em; }
.player-card {
  background: linear-gradient(135deg, rgba(132,250,176,0.15), rgba(161,140,209,0.15));
  border: 2px solid rgba(132,250,176,0.3); border-radius: 16px;
  padding: 14px 20px; margin: 8px 0; cursor: pointer;
  color: white; transition: all 0.3s; text-align: center;
  font-size: 1.15em; font-weight: 600;
}
.player-card:hover, .player-card:active {
  background: linear-gradient(135deg, rgba(132,250,176,0.3), rgba(161,140,209,0.3));
  transform: scale(1.04); border-color: #84fab0;
}
.player-card .emoji { font-size: 1.5em; margin-right: 8px; }

/* Mode select */
.mode-select { padding: 10px 20px; width: 100%; max-width: 420px; }
.mode-select h2 { color: white; text-align: center; margin-bottom: 12px; font-size: 1.2em; }
.mode-card {
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,111,216,0.15));
  border: 2px solid rgba(255,215,0,0.3); border-radius: 16px;
  padding: 14px 20px; margin: 8px 0; cursor: pointer;
  color: white; transition: all 0.3s; text-align: center;
}
.mode-card:hover { transform: scale(1.04); border-color: #ffd700; }
.mode-card .title { font-size: 1.1em; font-weight: 700; }
.mode-card .info { font-size: 0.8em; color: #cd77ff; margin-top: 3px; }

/* Song select */
.song-select {
  padding: 10px 20px; width: 100%; max-width: 500px;
  max-height: calc(100vh - 160px); overflow-y: auto;
}
.song-select::-webkit-scrollbar { width: 6px; }
.song-select::-webkit-scrollbar-thumb { background: rgba(255,111,216,0.4); border-radius: 3px; }

/* Song completion tracker bar */
.song-tracker {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,111,216,0.3);
  border-radius: 14px; padding: 10px 16px;
  margin-bottom: 12px; color: white;
  text-align: center; font-size: 0.9em;
}
.song-tracker .tracker-bar {
  width: 100%; height: 8px; background: rgba(255,255,255,0.1);
  border-radius: 4px; margin-top: 6px; overflow: hidden;
}
.song-tracker .tracker-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, #ff6fd8, #cd77ff, #84fab0);
  transition: width 0.5s;
}
.song-tracker .master-badge {
  display: inline-block; margin-top: 6px;
  background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,111,216,0.2));
  border: 1px solid rgba(255,215,0,0.5);
  padding: 3px 10px; border-radius: 10px;
  color: #ffd700; font-weight: 700; font-size: 0.85em;
  animation: achievePop 0.6s ease;
}

.song-card {
  background: linear-gradient(135deg, rgba(255,111,216,0.15), rgba(161,140,209,0.15));
  border: 2px solid rgba(255,111,216,0.3); border-radius: 16px;
  padding: 14px 18px; margin: 8px 0; cursor: pointer;
  color: white; transition: all 0.3s;
  position: relative; overflow: hidden;
}
.song-card:hover, .song-card:active {
  background: linear-gradient(135deg, rgba(255,111,216,0.35), rgba(161,140,209,0.35));
  transform: scale(1.03); border-color: #ff6fd8;
}

/* Vinyl record hover animation */
.song-card .vinyl {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, #222 30%, #444 31%, #333 60%, #222 61%, #111 100%);
  opacity: 0; transition: opacity 0.3s;
  box-shadow: 0 0 8px rgba(0,0,0,0.5);
}
.song-card .vinyl::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 12px; height: 12px; border-radius: 50%;
  background: radial-gradient(circle, #ff6fd8 40%, #cd77ff 100%);
}
.song-card:hover .vinyl {
  opacity: 0.7;
  animation: vinylSpin 2s linear infinite;
}
@keyframes vinylSpin {
  0% { transform: translateY(-50%) rotate(0deg); }
  100% { transform: translateY(-50%) rotate(360deg); }
}

.song-card .top-row { display: flex; align-items: center; justify-content: space-between; }
.song-card .title { font-size: 1.15em; font-weight: 700; }
.song-card .difficulty { font-size: 0.85em; }
.song-card .preview {
  font-size: 0.8em; color: rgba(255,255,255,0.5); margin-top: 5px;
  font-style: italic;
}
.song-card .info { font-size: 0.82em; color: #cd77ff; margin-top: 3px; }

/* High score display on song card */
.song-card .high-score {
  font-size: 0.78em; color: #ffd700; margin-top: 3px;
  font-weight: 600;
}

/* Favorite heart */
.song-card .fav-btn {
  position: absolute; top: 10px; right: 12px;
  font-size: 1.2em; cursor: pointer; z-index: 5;
  transition: transform 0.2s;
  filter: grayscale(1) opacity(0.4);
}
.song-card .fav-btn.active {
  filter: none;
  animation: heartPop 0.3s ease;
}
@keyframes heartPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

/* Karaoke bar for lyrics */
.lyrics-zone {
  width: 100%; max-width: 620px; text-align: center;
  padding: 16px 20px; min-height: 180px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
  position: relative;
}

.karaoke-bar {
  background: linear-gradient(180deg, rgba(255,111,216,0.12), rgba(161,140,209,0.08), rgba(0,0,0,0.2));
  border: 1px solid rgba(255,111,216,0.2);
  border-radius: 20px; padding: 20px 16px;
  width: 100%; min-height: 160px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  backdrop-filter: blur(4px);
}

.lyric-line {
  color: rgba(255,255,255,0.25); font-size: 1.15em; font-weight: 600;
  transition: all 0.4s; line-height: 1.5;
  display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
}
.lyric-line .word {
  transition: all 0.25s; display: inline-block;
}
.lyric-line.active { color: rgba(255,255,255,0.5); }
.lyric-line.active .word.current {
  color: white; font-size: 1.35em;
  text-shadow: 0 0 20px #ff6fd8, 0 0 40px #cd77ff;
  animation: wordPulseRainbow 1.5s ease infinite;
  transform: scale(1.1);
}
.lyric-line.active .word.sung {
  color: rgba(205,119,255,0.8);
}
.lyric-line.done { color: rgba(161,140,209,0.35); font-size: 0.95em; }

@keyframes wordPulseRainbow {
  0% { text-shadow: 0 0 20px #ff6fd8, 0 0 40px #ff6fd8, 0 0 60px #ff6fd8; }
  16% { text-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700, 0 0 60px #ffd700; }
  33% { text-shadow: 0 0 20px #84fab0, 0 0 40px #84fab0, 0 0 60px #84fab0; }
  50% { text-shadow: 0 0 20px #87ceeb, 0 0 40px #87ceeb, 0 0 60px #87ceeb; }
  66% { text-shadow: 0 0 20px #cd77ff, 0 0 40px #cd77ff, 0 0 60px #cd77ff; }
  83% { text-shadow: 0 0 20px #ff9a9e, 0 0 40px #ff9a9e, 0 0 60px #ff9a9e; }
  100% { text-shadow: 0 0 20px #ff6fd8, 0 0 40px #ff6fd8, 0 0 60px #ff6fd8; }
}

/* Duet indicator */
.duet-label {
  font-size: 0.75em; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; margin-bottom: 2px; display: inline-block;
}
.duet-p1 { background: rgba(255,111,216,0.3); color: #ff9ee8; }
.duet-p2 { background: rgba(132,250,176,0.3); color: #84fab0; }

/* Sing button — 3D press effect */
.sing-btn {
  width: 130px; height: 130px; border-radius: 50%;
  background: linear-gradient(135deg, #ff6fd8, #cd77ff);
  border: 4px solid rgba(255,255,255,0.5);
  color: white; font-size: 2.5em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s, box-shadow 0.1s;
  margin: 14px 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 30px rgba(255,111,216,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
  -webkit-tap-highlight-color: transparent;
  position: relative; z-index: 10;
}
.sing-btn:active {
  transform: scale(0.88) translateY(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 15px rgba(255,111,216,0.3), inset 0 -2px 4px rgba(0,0,0,0.2);
}
.sing-btn.glow {
  box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 50px rgba(255,111,216,0.8), 0 0 80px rgba(205,119,255,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
}
.sing-btn.bounce {
  animation: micBounce 0.2s ease;
}
@keyframes micBounce {
  0% { transform: scale(0.82) translateY(4px); }
  50% { transform: scale(1.15) translateY(-2px); }
  100% { transform: scale(1) translateY(0); }
}

/* Golden note trail */
.golden-trail {
  position: fixed; pointer-events: none; z-index: 50;
  font-size: 1.2em; color: #ffd700;
  text-shadow: 0 0 10px #ffd700;
  animation: goldenTrail 0.8s ease-out forwards;
}
@keyframes goldenTrail {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-180px) scale(0.5); }
}

/* Progress bar -- music staff style */
.progress-wrap {
  width: 85%; max-width: 420px; height: 18px;
  background: rgba(255,255,255,0.08); border-radius: 10px;
  overflow: hidden; margin: 8px 0; z-index: 10;
  position: relative; border: 1px solid rgba(255,255,255,0.1);
}
.progress-wrap .staff-lines {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: space-evenly;
  pointer-events: none;
}
.progress-wrap .staff-lines div {
  height: 1px; background: rgba(255,255,255,0.1);
}
.progress-fill {
  height: 100%; width: 0%; border-radius: 10px;
  background: linear-gradient(90deg, #ff6fd8, #cd77ff, #a18cd1, #84fab0);
  transition: width 0.3s; position: relative; z-index: 1;
}
.progress-note {
  position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
  font-size: 14px; z-index: 2;
}

/* Floating notes */
.float-note {
  position: fixed; font-size: 2em; pointer-events: none; z-index: 50;
  animation: floatUp 1.3s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-140px) scale(1.6) rotate(25deg); }
}

/* Combo flash */
.combo-flash {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 2.5em; font-weight: 700; color: #ffd700;
  text-shadow: 0 0 20px #ffd700; pointer-events: none; z-index: 50;
  animation: comboIn 0.8s ease-out forwards;
}
@keyframes comboIn {
  0% { opacity: 1; transform: translate(-50%,-50%) scale(0.5); }
  50% { transform: translate(-50%,-50%) scale(1.3); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
}

/* End screen — curtain reveal */
.end-curtain {
  position: fixed; inset: 0; z-index: 55;
  background: linear-gradient(180deg, #1a1a2e, #0f3460);
  pointer-events: none;
  animation: curtainReveal 1.2s ease-out forwards;
}
@keyframes curtainReveal {
  0% { clip-path: inset(0 0 0 0); opacity: 1; }
  60% { clip-path: inset(0 0 0 0); opacity: 0.8; }
  100% { clip-path: inset(50% 0 50% 0); opacity: 0; }
}

.end-box {
  background: linear-gradient(135deg, rgba(255,111,216,0.2), rgba(161,140,209,0.2));
  border: 2px solid rgba(255,111,216,0.4); border-radius: 20px;
  padding: 28px; text-align: center; color: white; max-width: 420px;
  animation: endBoxReveal 0.8s ease-out 0.4s both;
}
@keyframes endBoxReveal {
  0% { opacity: 0; transform: translateY(30px) scale(0.9); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.end-box h2 { font-size: 1.8em; margin-bottom: 10px; text-shadow: 0 0 15px #ff6fd8; }
.end-stars { font-size: 2.5em; margin: 12px 0; min-height: 50px; }
.end-star {
  display: inline-block;
  opacity: 0;
  animation: starFlyIn 0.5s ease-out forwards;
}
@keyframes starFlyIn {
  0% { opacity: 0; transform: translateY(-40px) scale(0) rotate(-180deg); }
  60% { transform: translateY(5px) scale(1.3) rotate(10deg); }
  80% { transform: translateY(-2px) scale(0.95) rotate(-5deg); }
  100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
}
/* Star sparkle after landing */
.end-star.sparkle::after {
  content: '';
  position: absolute; top: -4px; right: -4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: #fff;
  animation: starSparkle 0.6s ease-out forwards;
}
@keyframes starSparkle {
  0% { opacity: 1; transform: scale(0); }
  50% { opacity: 1; transform: scale(2); }
  100% { opacity: 0; transform: scale(0); }
}
.end-msg { font-size: 1.05em; color: #cd77ff; margin: 10px 0; }
.end-score { font-size: 1.5em; color: #ff6fd8; font-weight: 700; }
.end-achievement {
  margin-top: 12px; padding: 8px 16px;

// ==================== STAR FIELD ====================
const starCanvas = document.getElementById('starField');
const starCtx = starCanvas.getContext('2d');
let stars = [];

function initStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      size: 0.5 + Math.random() * 2,
      speed: 0.1 + Math.random() * 0.3,
      alpha: 0.3 + Math.random() * 0.7,
      twinkleSpeed: 0.005 + Math.random() * 0.015,
      twinklePhase: Math.random() * Math.PI * 2
    });
  }
}

function animateStars() {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  const time = Date.now() * 0.001;
  for (const s of stars) {
    s.y += s.speed;
    s.x += s.speed * 0.3;
    if (s.y > starCanvas.height) { s.y = -2; s.x = Math.random() * starCanvas.width; }
    if (s.x > starCanvas.width) s.x = 0;
    const twinkle = 0.4 + 0.6 * Math.sin(time * s.twinkleSpeed * 60 + s.twinklePhase);
    starCtx.fillStyle = `rgba(255,255,255,${s.alpha * twinkle})`;
    starCtx.beginPath();
    starCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    starCtx.fill();
  }
  requestAnimationFrame(animateStars);
}

  let masterHTML = '';
  if (allWith3Stars && completed === total) {
    masterHTML = '<div class="master-badge">👑 Karaoké Master 👑</div>';
  }

  trackerDiv.innerHTML = `
    ${completed}/${total} chansons chantées
    <div class="tracker-bar"><div class="tracker-fill" style="width:${pct}%"></div></div>
    ${masterHTML}
  `;
  songList.appendChild(trackerDiv);

  songs.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'song-card';
    const stars = '⭐'.repeat(s.difficulty);
    const isFav = favorites.includes(i);

// ==================== AUDIO ====================
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playNote(freq, dur, type = 'sine', vol = 0.18) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playChord(freqs, dur) {
  freqs.forEach(f => playNote(f, dur, 'triangle', 0.1));
}

function playCountdownBeep(n) {
  playNote(440 + n * 150, 0.15, 'sine', 0.2);
}

function playCrowdCheer() {
  if (!audioCtx) return;
  try {
    const bufferSize = audioCtx.sampleRate * 1.5;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 0.5);
    }
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2000;
    filter.Q.value = 0.5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
  } catch(e) {}
}

// ==================== GAME LOOP ====================
function beginSong(song) {
  const bar = document.getElementById('karaokeBar');
  bar.innerHTML = '';
  gameRunning = true;

  // Create lyric line elements with individual words
  const lines = song.lyrics.map((l, i) => {
    const lineEl = document.createElement('div');
    lineEl.className = 'lyric-line';

    // Duet labels
    if (gameMode === 'duet') {
      const label = document.createElement('span');
      label.className = 'duet-label ' + (i % 2 === 0 ? 'duet-p1' : 'duet-p2');
      label.textContent = i % 2 === 0 ? 'J1' : 'J2';
      lineEl.appendChild(label);
      lineEl.appendChild(document.createTextNode(' '));
    }

    const words = l.text.split(' ');
    const wordEls = words.map(w => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w;
      lineEl.appendChild(span);
      return span;
    });

    bar.appendChild(lineEl);
    return { el: lineEl, time: l.t, words: wordEls, wordTexts: words, done: false };
  });

  const lastTime = song.lyrics[song.lyrics.length - 1].t;
  const totalDuration = lastTime + 4;
  startTime = Date.now();
  let currentLine = -1;
  let activeWordInLine = -1;

  gameTimer = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const progress = Math.min(100, (elapsed / totalDuration) * 100);
    document.getElementById('progressFill').style.width = progress + '%';

    // Find current line
    let newLine = -1;
    for (let i = lines.length - 1; i >= 0; i--) {
      if (elapsed >= lines[i].time) { newLine = i; break; }
    }

    if (newLine !== currentLine) {
      if (currentLine >= 0) {
        lines[currentLine].el.classList.remove('active');
        lines[currentLine].el.classList.add('done');
        lines[currentLine].words.forEach(w => {
          w.classList.remove('current');
          w.classList.add('sung');
        });
      }
      currentLine = newLine;
      activeWordInLine = 0;
      if (currentLine >= 0) {
        lines[currentLine].el.classList.add('active');
        if (lines[currentLine].words[0]) {
          lines[currentLine].words[0].classList.add('current');
        }
        lines[currentLine].el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // Advance word within line based on timing
    if (currentLine >= 0 && currentLine < lines.length) {
      const line = lines[currentLine];
      const nextLineTime = currentLine + 1 < lines.length ? lines[currentLine + 1].time : line.time + 4;
      const lineDuration = nextLineTime - line.time;
      const lineElapsed = elapsed - line.time;
      const wordCount = line.words.length;
      const targetWord = Math.min(wordCount - 1, Math.floor((lineElapsed / lineDuration) * wordCount));

      if (targetWord > activeWordInLine) {
        for (let w = activeWordInLine; w < targetWord; w++) {
          if (line.words[w]) {
            line.words[w].classList.remove('current');
            line.words[w].classList.add('sung');
          }
        }
        activeWordInLine = targetWord;
        if (line.words[activeWordInLine]) {
          line.words[activeWordInLine].classList.add('current');
        }
      }
    }

    // Glow sing button when lyrics active
    const btn = document.getElementById('singBtn');
    btn.classList.toggle('glow', currentLine >= 0 && elapsed < lastTime + 2);

    // Disco ball for high combos
    document.getElementById('discoOverlay').classList.toggle('active', combo >= 15);

    if (elapsed >= totalDuration) {
      clearInterval(gameTimer);
      gameRunning = false;
      document.getElementById('discoOverlay').classList.remove('active');
      setTimeout(endSong, 500);
    }
  }, 50);
}

// ==================== SING BUTTON ====================
const singBtn = document.getElementById('singBtn');

function onSing(e) {
  e.preventDefault();
  if (!gameRunning) return;
  taps++;

  ensureAudio();

  // Vibration feedback
  if (navigator.vibrate) {
    navigator.vibrate(combo >= 10 ? [30, 20, 30] : [20]);
  }

  const elapsed = (Date.now() - startTime) / 1000;
  const song = songs[currentSong];
  let onBeat = false;
  let perfectTiming = false;
  for (const l of song.lyrics) {
    const diff = Math.abs(elapsed - l.t);
    if (diff < 0.5) { perfectTiming = true; onBeat = true; break; }
    if (diff < 1.8) { onBeat = true; break; }
  }

  if (onBeat) {
    score += 20 + combo * 2;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
  } else {
    score += 5;
  }

  document.getElementById('score-val').textContent = score;

  // Combo display
  if (combo >= 3) {
    document.getElementById('combo').textContent = 'Combo x' + combo + ' 🔥';
  }
  if (combo > 0 && combo % 10 === 0) {
    showComboFlash(combo);
    playComboChord();
    // Stage lights flash
    triggerStageFlash();
  }

  // Screen shake at combo 20+
  if (combo >= 20 && combo % 5 === 0) {
    document.body.classList.remove('shaking');
    void document.body.offsetWidth;
    document.body.classList.add('shaking');
    setTimeout(() => document.body.classList.remove('shaking'), 300);
  }

  // Floating note emoji
  spawnFloatNote(e);

  // Edge glow pulse
  const glow = document.getElementById('edgeGlow');
  glow.classList.add('pulse');
  setTimeout(() => glow.classList.remove('pulse'), 200);

  // Edge ripple
  spawnEdgeRipple(e);

  // Golden note trail for perfect timing
  if (perfectTiming) {
    spawnGoldenTrail();
  }

  // Melodic note from song scale
  const scale = song.scale || [262, 294, 330, 349, 392, 440, 494, 523];
  playNote(scale[taps % scale.length], 0.18);

  // Mic bounce animation
  singBtn.classList.remove('bounce');
  void singBtn.offsetWidth;
  singBtn.classList.add('bounce');
}

singBtn.addEventListener('mousedown', onSing);

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'Enter') {

  }
});

function endSong() {
  const song = songs[currentSong];
  songsCompleted.add(currentSong);

  const maxScore = song.lyrics.length * 20 * 3;
  const ratio = Math.min(1, score / Math.max(1, maxScore));

  let starCount, msg, title;
  if (ratio >= 0.75) {
    starCount = 5;
    msg = `Incroyable ${currentPlayer} ! Tu es une VRAIE star !`;
    title = 'PARFAIT !';
  } else if (ratio >= 0.5) {
    starCount = 4;
    msg = `Super performance ${currentPlayer} ! Tu chantes trop bien !`;
    title = 'Super !';
  } else if (ratio >= 0.25) {
    starCount = 3;
    msg = `Très bien ${currentPlayer} ! Continue comme ça !`;
    title = 'Bravo !';
  } else {
    starCount = 2;
    msg = `Bon début ${currentPlayer} ! Tu vas devenir une star !`;
    title = 'Bien !';
  }

  // Save high score and stars
  if (!highScores[currentSong] || score > highScores[currentSong]) {
    highScores[currentSong] = score;
  }
  if (!songStars[currentSong] || starCount > songStars[currentSong]) {
    songStars[currentSong] = starCount;
  }
  savePersist();

  // Save stars to global star counter
  if (currentPlayer) {
    let totalStars = parseInt(localStorage.getItem('kpop_stars_' + currentPlayer) || '0');
    totalStars += starCount;
    localStorage.setItem('kpop_stars_' + currentPlayer, String(totalStars));
  }

  // Crowd cheer
  playCrowdCheer();

  // Confetti for 4+ stars
  if (starCount >= 4) launchConfetti();

  // Curtain reveal
  const curtain = document.createElement('div');
  curtain.className = 'end-curtain';
  document.body.appendChild(curtain);
  setTimeout(() => curtain.remove(), 1300);

  document.getElementById('endTitle').textContent = title;

  // Animated stars that fly in with delay
  const starsDiv = document.getElementById('endStars');
  starsDiv.innerHTML = '';
  for (let i = 0; i < starCount; i++) {
    const starEl = document.createElement('span');
    starEl.className = 'end-star';
    starEl.textContent = '⭐';
    starEl.style.animationDelay = (0.3 + i * 0.2) + 's';
    // Add sparkle effect after landing
    setTimeout(() => {
      starEl.style.position = 'relative';
      const sparkle = document.createElement('span');
      sparkle.style.cssText = 'position:absolute;top:-6px;right:-6px;font-size:0.4em;animation:starSparkle 0.6s ease-out forwards;';
      sparkle.textContent = '✨';
      starEl.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 600);
    }, 600 + i * 200);
    starsDiv.appendChild(starEl);
  }

  document.getElementById('endScore').textContent = score;
  document.getElementById('endMsg').textContent = msg;

  // Achievement check
  const achDiv = document.getElementById('endAchievement');
  const allWith3Stars = songs.every((_, i) => (songStars[i] || 0) >= 3);
  if (allWith3Stars && songsCompleted.size === songs.length) {
    achDiv.innerHTML = '<div class="end-achievement">👑 Karaoké Master ! Toutes les chansons avec 3+ étoiles !</div>';
    setTimeout(() => playChord([523, 659, 784], 0.8), 500);

  } else if (songsCompleted.size >= 5) {
    achDiv.innerHTML = '<div class="end-achievement">🏆 Chanteuse Pro ! 5 chansons terminées !</div>';
    setTimeout(() => playChord([523, 659, 784], 0.8), 500);

  }

  showScreen('endScreen');
}

document.addEventListener("click",function(e){var a=e.target.closest("a[href]");if(!a||a.target==="_blank"||a.href.startsWith("javascript")||a.href.startsWith("#")||a.href.startsWith("mailto"))return;e.preventDefault();o.classList.remove("hidden");o.classList.add("visible");o.querySelectorAll(".sparkle").forEach(function(sp){sp.style.animation="none";sp.offsetHeight;sp.style.left=Math.random()*100+"%";sp.style.top=Math.random()*100+"%";sp.style.animationDelay=Math.random()*.3+"s";sp.style.animation=""});setTimeout(function(){window.location.href=a.href},300)})})();
</script>
